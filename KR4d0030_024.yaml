body:
  text: 祠部集巻二十四宋强至撰啟宿州石學士啟伏審進膺細劄出甸巨藩伏惟慶慰恭惟某官行潔文純才宏業鉅亞鼎科之異選暉映熈辰刋石室之譌文翺翔華貫固合發揮賢藴潤色辰猷厭直承明之廬樂從外補卧理淮陽之郡暫領使麾然鈴閣班條豈容於滿嵗而鋒車祇召計在於匪朝代答許發運啟自阻嚴麾倐經累月一有司之賤動懼凟尊大漕使之前罔敢奏記豈謂高明之造不遺么冗之姿特賜瑶函親承教筆拜而伏讀藏以為榮兼承溽暑貫辰粹襟蹈吉恭以某官業術精奥方格淳修性與道俱器隨用過弗由左右之援自結聖神之知綢繆利權于兹數稔㕘貳鈞柄決在匪朝願綏寢餗之和庸副幅員之望又近因還使常奉卑函荷教誨之洊臨悚焉下拜顧使令之匪稱第以中藏仰惟領計之間増固毓神之勝恭以某官際天藴識名世標才上知素明賢業彌劭羨中都之經用未罄猷為躋億姓于厚生庶繄陶冶代兩制并都水監啓進冒嚴塗實憂公議之未允出司通漕曽乏使才之所長併此叨恩靦然就職竊以陞黜屬官之狀要在聰明轉輸本道之財莫非籌畫而又地惟朔野之廣嵗有洪流之虞北壓敵疆内儲兵食委之大計須曰周才如某者學有媿于古人識不經於世務蚤尸憲職旋補諫工因彈擊於當塗遂流離於逺郡生還闕下坐陟臺端畧未踰時亟陪主計贍邦家之億費何有㣲勞董金榖於一方復更重計决非弱植自致榮階此盖伏遇某官宻借公言曲題人品繇褒華之溢美俾寵數之加優誓竭愚𠂻少酬恩紀代歐陽龍圖啓就奉宸緡往司邦漕言念計臺之冗得參使斾之華獲幸於天依仁有地伏惟餘寒貫序泰宇餐和恭以某官術業該世亮節在廷刋藏室之譌文備紓素藴進諫囊之宻疏夙罄良規夷險洊更明哲一致寖結中宸之眷遄陞内閣之華俄被詔函屈司宫鑰經綸之業尚巻而未舒登用之音匪朝而伊夕回鄭州祖龍圗啓逖阻朝游罕馳書舍審于宣於屏翰比䝉福於京師秋氣兆凉天和迪吉恭以某官學探聖閫名重士林獨蚤掇於巍科最晩躋於顯服屯夷殊致明哲惟均淹徊延閣之圗書偃息輔藩之印綬請麾東里繄雅俗之撫柔趣召西廂即舊人之登用伏望為國自厚以時考祥代薛師正問候陳州王宻諫啓乆違盛徳増跂下風適經煩使之謀旋抱仲兄之戚官事勞止私懷惘然比朝京師甫邇藩翰既造門而弗及復奏記以莫遑仰惟高明卒以涵貸伏惟坐班寛詔日擁蕃禧恭以某官生徳為時挺才不世危言有感於真主大節無慙於古人臺綱懇辭朝議愈重股肱右郡暫鬰士民之瞻羽翼東宫蚤知公輔之器謂在旦夕入調隂陽發揮壯猷登翊元化矧叨同里之雅尤倍薦紳之依瞻戀所縈文陳曷罄賀回運使兵部啓右某啓伏審某官露章辭劇剖竹為藩輟使務於冀方殿鄉邦於江國主知素厚暫諧卧治之榮士論所歸行聴節趨之寵眷言屬部悵失餘光方深去徳之思忽枉摛華之貺清函縟禮拜手迹以彌勤大斾嚴行望車塵而益逺更祈良㑹少緩遐心代曽文魯公回賀許舍人啓竊審顯對制函榮躋詞掖允華拜選鈞穆朝言伏惟某官出以瑞時居然名世智周事物之變識際天人之交精學雅文蚤冠士科之高選傑才厚望旋追儒館之盛游一登載筆之聨乆直代言之地淵𠂻覈實寵命即真誥令坦明行見同風于三代謀猷堅正續當宏化以貳公適屬退居喜聞進拜敢圗惇篤弗簡衰遲首煩嚴馭之臨申沐長牋之貺永銜謙眷奚諭感悰代上問候安撫舍人啓乆去署居向董河役風霜暴露日為賤事之勞牋牒缺疎第仰崇威之切伏惟臨撫列郡妥安粹襟恭以某官學際淵源器函夷雅揚雄之論於聖人而不違劉向之言皆當世之有助賢業彌劭主知㝡深輟諫署之凝嚴夙將明命布詔書之寛大以慰羣元行聞麾斾之還亟陟廟堂之祕問侯提舉鹽税周郎中啓竊審顯對恩函總提利柄伏惟歡慰恭以提舉郎中器資閎敏術履淳深蚤效傑才累更煩使專在坰之牧政頃嘗試於北方按煮海之算緡兹兩兼於劇路行疇最課進被褒章稽布慶音首紆榮問仰御謙眷奚諭感悰回監務司徒啓比者冒被宸緍獲紆縣綬何闇愚之無狀遇明哲之為僚未列音函首占誨筆仰帷謙厚第劇銘藏恭以監務司徒蚤練善經乆從美仕聊屈材於利局行増耀於勲閎瞻奉有涯欣翹良極代問侯澶州通判駕部啓竊審甫被更書已諧交政方告成於善課行入對於清光未列慶函首貽榮檢伏惟通判駕部郎垣厚望王國偉才闗掌教條乆為一府之賴甄旌治狀即拜本朝之恩感頌并深文陳非悉代問侯王宻學啓向幸漕臺適居治府相從之日殊淺過愛之情特深方喜附于末光㑹趣祗于明詔就除帥寄實踵賢規舊必告新賴片言為矩矱小而任大得壹意以持循比縁懿戚之行聊獲短書之奉苐論私悃莫具公函計未徹于聴觀忽逺䝉于誨諭温言累幅之為貺厚誼謙懷之莫量兹獲珍藏奚深戢感伏惟某官文章經世術業光朝行高古人名動真主入陪朱邸巳龍徳之天飛進直鴻樞漸鵬圗于海運行布朝廷之新政坐躋鈞局之近司豈惟輿言抑有故事代回臨淮齊寺丞啓右某比者竊冒恩章謬當獄寄方急道途之勤頓遽司鞭朴之冗紛未暇馳音猥先流諭愧惶感戢并集卑悰代回范仇香祕校啓嚮客上京獲親聲采兹官下邑懬奉音題豈謂雅眷未移珍函首及仰佩謙厚苐勤銘藏溽暑正繁清規尚邈勉祈精毓前對華章代回侯著作啓適官下邑獲庇末暉方道路之息肩即簿書之闗慮公函講好第免後時官守相望末由前謁豈圗高誼嗣枉珍題仰服謙勤倍深藏戢炎歊向盛晤語正遥覬保燕興行服光寵代回知邢州史大卿啓别離恩館不知嵗月之㡬遷奔走冗塗阻叙寒暄而上問比遇旌麾之北獲趨几席之前自損逹尊未移曩眷數幸誨言之傾聴洊䝉嚴馭之屈臨去徳尚新棲庇如昨敢謂過存謙矩首賜教函捧讀載周銘藏兼劇恭惟知府大卿偉才經世厚望端朝蚤躋九寺之榮班暫領一州之重寄講圗大政行渇見於老成宣布寛條豈少須於嵗最霜稜正厲時祉載蕃上為邦家倍綏寢食代回郭樞宻太尉啓近者伏審某官進秩廉車増光宥府輙具慶函之獻獲塵台几之觀過沐謙尊繼頒教答仍以某比叨宸綍就領帥符縁託庇於高明特過情而眷與占書記室均饌兵厨副以餼牽極于禮意仰承重貺併戢丹悰恭以某官偉蹟熈朝壯猷冠代方鬯謀於陪幄暫倚重於長城大臣臨邊咸竦威聲之著小醜欵塞益昭勲烈之融即還宅於樞嚴復坐毘於國論代問侯栁龍圗啓言念郡卑地要術短事繁阻奉音函逺頒教幅受而伏讀藏以為榮仍審順履沍塞具膺祉福恭以某官早紓賢業親遘聖辰挺忠諒之一心出誠明之正性厭居内閣之侍樂駕兩轓之游圭衮儻来靡攖於素志江山有助不廢於清吟諒五月之政成即三篇之冊拜代回吕縉叔舍人啓伏審制函疏渥詞掖陞華邦選既行朝言惟穆建國清禁法天紫垣式是賢才之居麗於政事之府凡廷中詔命之所出雖海外幽遐之必聞導宣上心粲如星斗之掲鼓動羣聴嚴若雷霆之馳矧體要之特工宜訓辭之所屬伏惟某官學優聖閫名重士林就青史一家之書入鴻都三館之直㑹光朝之善述紀仁廟之洪休爰藉該研遹參論次疇咨俊徳被鳯尾之褒嘉宻邇清光謹螭頭之注録給廟堂之試札上户牖之奏篇獨副淵𠂻曰欽大手演綸之筆繄潤色於宸猷拖紫於朝漸發揮於賢藴追坦明于上世揜温厚於西京即自近班亟當大用曽慶音之未講辱華牘之光臨祗佩謹勤第増銘愧代回河陽王宣徽啓鼎食累年門弧始旦禮優賜予繆叨將相之兼榮恩重生成莫報君親之厚徳拜嘉甫訖集感方深豈圗徽省之宗工特眷留符之繼守台光雖逺不忘載誕之期慶問聿臨更發俾康之禱永言佩戢曷究敷論代回元内翰啟自忝玉麟之假守漫厯嵗時逖仰金鑾之貴游居勞夢想豈圗乗潤色之豐暇篤虛謙之雅懷發於書音備有情好矧惟厚望簡在清衷朝夕論思禁職已尊於内相左右登用政㡬行與於中階感頌并深名言奚悉代上答亳州宋侍讀啓伏審茂對恩書出觀藩政側閒新命竊忭寸襟恭以某官名世標才際天藴識早逢文雅之㑹優踐秀廉之科華要洊揚聲光愈綽以至宻陪衡石之覽自結纊旒之知然翔步嚴途曷殫行事之效而班條治屏少見澤民之為而况先一州乃大用之階為三公由此途而出靡容秩滿行被詔還某黽勉外臺阻遥尊府未遑馳慶先辱流音媿喜交懷名言非諭代上都官答親家啟自塵仕綴即奉朝游宦路孤飛漫踰於嵗月朋簮一判寖濶于晤言遽乗幸㑹之縁得預姻連之末豈圗愚息獲事高閎内省悴宗曷勝厚幸此盖過敦撝抑弗簡單㣲吏牒相紛曠馳于謝牘使郵趣戒亟捧于榮函屬冬序之正嚴挹風猷而尚邈倍祈珍玉以迓寵章感誦并深文陳非悉問侯上交代學士啓自逺徳誼漫踰年序傾風引脰與日増企按章淮右忽焉再嵗泛舟走陸曽靡定所間獲署居又迫多事起居之問職此而怠某術疎才短訖㣲善最止虞簡黜以警無狀曲恩延擢移漕南服退自環省曷勝繁使尚賴踵迹賢軌綱領素緝何所更為第守成效匪才之人得以冒寵兼承祗奉詔召將朝京師矧文章器業乆注上意代言禁掖發揮辰猷萬口一辭僉曰宜職某已趣行李自淮如閩瞻對伊邇預切欣幸外臺大方當俟必告伏惟以時自壽前迓休命代上職司啓某啓某得為屬吏忽踰半嵗向者某官行衙在泗日備趨走承命鞠獄幸無敗事間有宵人抵罪搆虚自訴贓狀甚白覆案仍舊皆指蹤之素及非下吏之獨能若乃潔廉自持氷霜其操譬良民之不為盜此常分而安足論間繇建白之隙嘗䝉一言之賜且曰知汝固厚論薦必矣將倡諸聨事成汝孤跡某聞諭悚愕退竊感抃狂愚之心不能無望今待命凡累月官滿過五旬清舉未行憂疑翻集噫豈材疎迹賤不足汙薦書將謗言横議隂有所嫌間徐而思之似不然也果疎賤不足薦耶則誤知在前重言既發豈忍遽移哉果嫌謗所間耶則執事明甚某無纎缺使嫌者之極不過曰是子嘗殺人亡命使謗者之毒不過曰是掾嘗受賕賣獄此於人情豈近哉夫疑似之謗能惑於庸人而不能為明者惑也是二者皆不足疑則雖代者甫至解去有日而望舉之心猶不絶如綫幸執事終特逹之遇續㡬絶之望先諸公與形薦牘俾恩徳不出他門結草繄桑生死論報如或不然則將求閒僻之邑避奔命之勞仰事偏親俯活妻子簿書粗了圗史自娛不復動心于知已矣辭情僣迫拱俟誅斥代謝秀才投巻啓右某啓累曰前伏䝉某人親屈臨門貺示編著辭高理逺且仰且服竊以三代之盛養士于學文行道藝日較月比孰材孰否自朝廷公卿大夫以至于鄉黨朋友舉得而知後世學廢士不素養惟禮闈一開猝然羣萃材與否者亡復自别矧朝廷鄉黨之人可知哉故連篇累軸争贄于薦紳之門跡其來不過望甄别而博稱遇非有名當時言足輕重烏足塞所來之望耶若某之愚徒辱勤意吏職鞅掌阻叩謁舍代賈内翰答蔡州錢龍圗啓案此啓以下五首據宋文鑑増入審即便時已開尊府盖賢者以出處一致因請宣風天子恐侍從久勞遂容均佚寵之士諫之優秩付以中京之輔邦未列慶函首紆榮牘矧本朝之雋老實延閣之真儒力通聖言俛華禁近蚤勸經帷之講日瞻法座之光厭事朝游樂觀藩政然而公卿要明大誼自昔推崇左右思得正人匪朝升用伏望為國自厚副時所傾問侯王給事回陳待制啓伏審茂對制恩榮躋法從側聞異數竊忭丹衷於皇聖辰若攷古道繩累朝之遐武敞二閣以右文倬彼天漢之昭回掲為寶宇之目坦然帝制之明白祕厥宸篇之辭並延儒臣増重禁職居則備法座之清問出則扈徳車之順游惟待傑材乃稱華選伏惟某官氣涵渾厚道際醇深蚤踐積星之垣久提太史之筆綴應劉之賓客方司朱邸之裁牋聴禹啟之謳歌遽際洪圗之纉服首擢東藩之舊進陞近侍之聨矧日月之親逢有風雲之盛㑹弼謨新政惟故事之甚明舒鬯元猷抑輿情之所跂未修慶問先貺珍函過枉巽辭益銘謙矩永言感懌奚盡鋪論代韓符到任制謝史館相公啟易甚難之道任俾總外臺得嘗失之寵榮復聨内閣云初視事已懼隳官於皇本朝分置諸道惟北土漕權之劇葢軍須自昔之尤煩由頻年水沴之餘顧民力至今而未復加用度之百出無利源之一遺宜得衣冠之偉能老於金榖之要術因才以授於職乃安如某者器無所容技有俱短蚤知忠誼之自勉晩喜功名之可為大河以東全陕之右計符連領固嘗歴董于輸將治狀絶稱曾莫少成於績效既有所試是云不能矧控朔陲㝡曰要部豈宜煩使乃屬寡才省其由來何所自得復此假人之寵良繇造物之私此盖伏遇史館相公首贊萬㡬更新百度宰論可否朝倫慘舒以後效之足求靡尤人於既往雖匪功而亦用庶勸士於將來遂俾拙疎訖叨甄擢敢不圗講長利澄清屬封弗專聚歛之能兼拊凋罷之俗罔有貳事少酬大鈞代謝徐校勘啟祗荷寵擢不任戰競竊以國家右文寖昌聚書増廣經始靈蘭之祕發揮河洛之文表章著明淵源深厚然惟道術分裂時師異言下逮九家猶瘉於野彼雖小道亦有可觀故稗官以芻蕘而弗遺詞賦比博奕而䝉幸采獲非一多愛益新名山之藏為空廣内之䇿加倍而後實事求是聚精㑹神芟夷複重筆削譌謬是以圗書之府貴比列星之居校讐之官寵甚治民之最自非精力過絶篤志淵微言古而能驗今聞一足以知十則何以辯雌蜺之為字信魯魚之失真子雲沉思僅能宿職安世黙識乃為得人伏念某生質晦㝠天機黯淺染人偽而逾久求俗學以復初顛㝠失圖荏苒過壯性不傷物慨嵇生之怨憎居甚畏言慕夷吾之老吃曩者拔自邊邑擢處郊庠經汎為通非有專門之效器不周用動詒方枘之譏先皇帝志在育材詔從試可白衣不召徒愴恨於崔駰賜劍猶存尚孰何於衛綰逮禁林之給筆慙髦士之比肩所貴莫邪干將為其立斷惟是朽株枯木獨賴先容然而地寒者品常後人數竒者功不中率顧惟瓠落甘觸報聞豈意寵恩横加弱植委蜕塵滓濯質清流捫心自驚非有萬一之覬望屈指黙計儻十失五而在兹静言伏思實有幸㑹此盖伏遇某官彌綸帝載斡施化鈞大受小知未始違於精鑒言揚事舉盖曲盡於所長底事庸虗冒于甄録謹當思浚明之成徳勤窽綮之淺聞砥節厲行以為修臨淵履氷而申誡桑榆之景尚冀於晚收管蒯之㣲無忘於代匱上酬洪造次答厚知代與孫觀文啓跼守陋邦坐賖賓館誰謂河廣曽微杭葦之艱畏此簡書居積道躋之歎恭惟節宣時若啟處用康伏以某官徳崇國華智兼人傑㡬深開物以成務倜儻扶義而濟功内參帷幄之謀外膺方面之寄夫倚伏之效巧厯猶知其必然隆汚之期賢者盖有以無悶是故稱子文之美為其去令尹而弗憂言仲華之賢亦曰褫龍章而無愠矧以全徳邁衆逹生徇天宜其捐芥蔕而何疑寓逍遥而自得推數循理已符傾否之占求舊記功方盡樂終之義勉祈善毓以副禱詞祠部集巻二十四
