body:
  text: 祠部集卷三十二宋強至撰䇿問試京兆府學生策問八道問讓者天下之美道所以息忮心而長廉節也處夫上者或為之先在下者隂從以效今公卿大臣間旦受一命焉暮必讓讓至于三四不聼則必就噫果可讓也奚三四而遂至雖百十猶為之必聼焉而後已其不可讓而讓也是率天下以偽也其從而效者皆偽道也望忮心之息廉之長難乎矣今之讓可行也不可問肉刑之刑慘也後世憫其體膚之斷而去之然罪有大於髠黥者遂無等以處置一加而至於死於戲斷者誠不可續較死不猶近輕乎若是變肉刑之慘而反重之豈法之得就慘與重奚適為可問記曰君子行禮不求變俗夫不求變俗固也然俗固有媺惡又可槩而不之變乎如是則固簡者得籍以為説覩惡俗而恬不一變焉將驅其俗以就吾體又慮夫安於故習有不得已而就焉者非中心樂而成變也君子之於禮如何為可行願以聞其説問戰危事也雖機變不出或先克以濟方長勺之役曹劌問莊公何以戰公曰小大之獄雖不能察必以情劌曰可以一戰噫矢石既接敵者在望驅生人而就死地而曰我察獄能以情可使之一戰必克乎劌之言偶取於當時耶遂可以為後世用兵之術耶問昔洚水泛濫蛇龍交人之迹禹導而行諸地中然後九川以濬而中國得以食河自金隄之役興其故道遷而橫流肆者後世不絶今瀕河之地或種不得下有既耕殆穫而隨被水害者無虛嵗欲順其性而從其所自流則有毁城壞畝之患將堅其防以禦之然水行地上不決則溢未見其可禦也講河策者必有長利問孟子對齊宣王以為明堂者王者之堂欲行王政則勿毁噫聖人之君世其道德仁義凡可以為治者莫不講鰥寡孤獨莫不皆有養雖無是堂王政可勿行乎苟宴然自得於九重之上弗講其所以為治之具而施仁弗先夫四者又可以行王政乎若是王政之行否果繫一堂之存毁乎否也既曰王者之堂矣於齊焉得有諸軻之旨安在諸君試辨之問書稱鯀堙洪水汩陳其五行帝乃震怒弗畀洪範九疇乃錫禹噫天高乎在上將睹其赫然震威以怒鯀又諄諄然有所命以錫禹耶不然豈箕子之言過耶抑禹得九疇其取以治水者果何法耶及夫決天下之水而注之海然後任九州之土以定貢彼八州者先田後賦莫不皆有貢而兾獨反是何耶問夫子曰吾四十而不惑孟子曰四十不動心有以異乎苟無以異也是二者聖賢少時何不能必待四十而後可孟子以為顔淵具體而微且淵也短命是未嘗至四十也苟不至夫子之年已不惑則過聖人逺已烏在其微也若猶未也既未能無惑其於聖人之道有不足者矣烏在其能具體也諸君為辨之試德州進士策問二道問儒苟名則已必欲蹈其實而不心乎治亂之原未見其能儒也自古皆有治亦莫不有亂治亂之來非天降地出直根夫君臣得失之歸爾若二帝三王之盛有治而無亂不待講而白孤秦五季又無足道者繇漢以迄于唐其間有欲治之君而無治臣或臣得矣而君失之於上與夫君臣一德號為至治之極者此宜就諸君以考也其厯代史籍之載各按往古以對庶觀儒者之用心問鹽於海利為最巨欲利一於上而絶下之侵也故防峻而網逾密自竊鬻私販之興而愚民俱入於罪甚者或轉而為盜至制挺以殺捕間入死法而不知止何利之誘人也如是議者欲天下通行而商焉則又官之所得才關市之算爾是刑罰可省而利入或無幾噫通行傷官禁止害私害私滋刑傷官耗利若之何其可也頌上文相公生辰頌某蓋聞昔在宗周則有若申甫鍾神喬嶽而克宣四方之澤粵惟炎漢則有若蕭相儲精大昴而終砥第一之功皇天眷宋思佑真主和正之氣上不為景星慶雲殊尤之祉下不在靈芝屈軼中萃河汾是生王佐公翕受純粹亶為誠明入則暢衮謀裨王體以躋君於堯舜出則布上恩厚民德以措世於仁夀方將施澤於無垠較功於無前區區周漢之佐不足為公議也惟月孟冬日僅盈數實公載誕之辰謹獻頌以夀夀曰月十為陽日九為良河汾之鄉于時發祥是生我公德完道充文乎深厚志乎粹忠出殄強敵入登元輔甘雨早嵗和氣綿宇誕辰爰臨幅員一心祈公之夀松筠千尋銘鐡漏壺銘注之涓涓弗舍晝夜節數之正差不容罅作於熙寧庚戌孟夏序盧君字序古之人有所志且戒或寓文銘器以自謹有時而汜也豈若名在已稱於口而終身焉名不徒立具見君子之志善哉盧君之名正臣也其志於忠者歟然正之施不一有諫諍之正焉有議論之正焉有容色之正焉有進退之正焉諫諍之正過中則失亢議論之正過中則傷泥容色之正過中則太剛進退之正過中則近僻若是不得中之助亦不足云也故云既定朋友之間又為字以稱道使聞而知所表焉豫於盧君則友也字君字職請字曰中甫君方屈才佐一邑他日立朝廷事人主使人稱之曰盧某正人也則君之名不虛命又曰正而且得中則豫之字不虛表中甫其勉之皇祐三年正月十二日餘杭某序吳三班字序致政宫師杜公昔為樞密使今三班吳君嘗給事其府謹廉敏慧能自得公意故未嘗以吏視君問因視側命之名曰希逺公旨必曰功名事業在希其逺者而不以近器期君也今咨字於蒙請字曰伯強何則適千里者在足力之強爾否則跬步不能到君子之於逺業亦曰自強而已矣皇祐五年六月二十四日友生強某序送監征錢宗哲序人心之仁均有也然而不能者利奪之爾關征之吏探囊發篋索人之隱其心豈索不仁哉蓋曰賞格誘之爾今有司之令主關征者月校季比嵗終會其祼視前嵗之增減以為殿最課增有厚賞惟恐搜隱之不至仁何預我哉浦陽在婺為窮山商旅之過婺者多道旁邑故關征之官常病嵗課益張其防伺人之來間有一觸者則必傾囊倒篋算緡而去譬夫設機待獸中則不擇故商旅益不來常嵗之課益不登獨錢君宗哲之蒞是局其術大抵本仁誼且曰籠商之術在寬不在急急則吏與商為表裏將寡取其賄而私縱之寬則商喜輸官而吏無以為私計宗哲持是術凡商旅之過者必裁減其數而征之繇是皆願出其塗而常嵗之課愈登羡四方之商率稱宗哲為材官又浦陽俗善織凡補吏者指此邑為膏潤其空槖而來盈裝而歸者前後或相繼獨宗哲解官去家儲無擔石吏負而隨者皆先世賜書與父祖誥軸一邑之民愈以宗哲為廉吏宗哲嘗語豫我高祖挈東南之籍歸天子始有功王室厥後用直言登科選者一門凡三人故家聲大于當世今我階蔭籍列冗官苟復規規嵗課覬賞格之及寧獨愧吾門抑豈不貽仁誼之羞耶故學不喜章句仕不圖苟進惴惴焉唯弗紹家世之烈為懼以是宗哲能文善詩卓然有逺器噫能言宗哲之材而不能知其廉者四方之商也能知其廣而不能知其文者一邑之民也知材與廉而復能知其有文且仁者豫也於其行并取行商居民之誦以為序云至和乙未三月十一日浦江令強某幾聖題劉君仙尉字序世治安則士得伸其藴而見貴於時自古竒偉士或遭世不幸避冦干戈之際窮死巖谷之下而其藴意不得伸者衆矣宋興垂百載天下號無事東南之民不識兵革西北貢享不絶於廷士遭此時真治安矣劉君生綺紈家既得為太平之臣而名復以世安命君是名得其實矣今一命尉武川武川邑小事簡固宜以學問自力異日效古人乘軺上書一伸于當時不徒為治安之士矣請以伸之為君字苟名與字兩得其實則得不為虛矣劉君其勉之至和二年三月二十七日浦江令強某序送嚴公裕序每天下詔貢士而吾鄉應者不下二百人其選而升禮部者十二人而已吾友公裕嘗預焉既而十二人者偕試於禮部禮部總天下貢士之籍其數才三千餘其選而進於天子者不下七百餘公裕弗預焉議者曰十五而取一焉公裕得之五取一焉公裕乃失之豈其命耶不然何得於寡取而失之多取也為公裕父母兄弟者亦曰命朋友於公裕者亦曰命公裕亦自惑於其命而已耳昔有習舟者往來絶大江未嘗或失也一旦猝與風濤遇篙亂楫橫既覆厥載歸而嘆曰自吾泛大江而吾舟未嘗危也今特為風濤之困爾豈吾術未至耶毁楫折篙不復習舟事客有笑於旁者曰夫操舟患不工爾苟工焉則之江之河之巨海無不利寧有利於安流而敗於驚波哉子弗汝咎而尤風濤今而後吾將見子不能舟斷港寧復大江之能絶乎於是舟者釋然悟再拜為客謝治篙整楫畢力於舟事期於工而止焉豫與公裕别十年矣今嵗詔罷貢士而公裕自婺過豫道所為學則粹然其正矣出所為文則曄然其冨矣殆非豫昔别之公裕然獨所謂取名之術者若將易而不為耶未幾告歸因語之曰士患業不精業苟精即於鄉於禮部於天子之廷何試而不可安有工於其鄉而拙於禮部哉今公一衄而弛其亦由風濤而毁篙楫者歟寧知無竊笑於傍者公裕亦幡然悟再拜為吾謝而去送邵秀才序豫官泗四方之學者與其州之士凡過豫不言其他而輒及賦彼果不能其他而惟賦之知固不足怪苟略其他而止豫以知賦其待人既薄其自處必不厚向豫之於賦豈好為而求其能且工哉偶作而偶能爾始用此科等既得其方捨而專六經之微鉤聖言之深發而為文章行而為事業所謂賦者烏復置吾齒牙哉譬嘗為盜者今既為良民有人道向時之為必頸漲面赤惡人之訐也秀才邵君自楚及門貺豫以書其間多易春秋發明聖人之道無一及前之云者待人既厚其自處果不薄今還楚有待豫若前者一為豫辨之送向祕丞序民不見治其原在州縣之情分州者曰縣吾統事無便不利檄一下責縣之必從縣者曰縣自有政檄如豫何事不問當否一切欲違州故州病勢削縣患氣沮上下交鬪戾而民不得見治儻州可行縣曰必不可行縣曰是州曰非州忘其勢縣抑其氣唯其當而從焉則上下交相通而治可見一賢一否不能獨治州縣俱賢焉而後治今范公鎮青社向侯為屬縣范公屈廊廟之尊就一郡固不識州之所以謂勢也向侯之台輔之後領一邑固不識縣之所以謂氣也而又向侯志古力學處事有本末得天下之賢而事之范公斂大施小獲竒材為官屬州縣之情將合如符節青之民其見大治豈止上下相通而已哉純甫仙尉正性齋序室以齋名無他也蓋居之者內焉諸心外焉諸身藏焉為萬慮行焉為萬事無不潔齋而居之也苟身黷于貨心溺于偽慮發而不端事行而不正獨泰然以居是有齋名而無齋實矣純甫名家子一命尉此邑因即署東舊宇葺以為齋六經置諸前羣史列左右純甫日居其間取詩之無邪以秉心禮樂之中和以治身易之精微以端慮春秋之斷以行事書之洪範以蹈中其考諸往古則姦邪雖死我得以筆誅忠骨雖朽我景其遺烈是無愧于齋實矣顧其名猶缺且咨于豫豫曰夫身末也心本也性之於心又本也性正則心正心正則其身與事無不正也宜以正性名君齋若乃苟華榱桷苟積圖史動靜不由于正則非豫所以名齋之意也考德集序熙寧八年六月甲寅魏國公獻韓公薨訃聞皇帝震悼追榮送終皆軼舊典既葬親為製文刻石以褒大之所以哀寵之意甚厚自朝廷三事大夫以及四方閭巷之士婦人孺子知公名莫不嘆息相與感動顔色而公所素厚者則皆匍匐會哭於其堂或不得往則瞻望歔欷寓使人以祭將葬又皆為詩以抒其哀於是其孤戴上之施且榮卿士大夫之能盡於公也既類次上賜録而為集又裒卿士大夫所為文詩以屬公之故吏強某而序之謹名其集曰考德而言曰宋興四世仁宗以恭儉慈仁繼承於上而公以碩德偉望感會于下君臣一心遂被顧託建萬世之利定二帝之策而社稷以尊人神有主此其功業與日月並明與天地並久雖前世顧命大臣載在册書磊落駿偉者不能過也若夫結髮從事以暨白首出入將相垂四十年深謀達識動中機會忠厚樂易人化其德寬而有制剛而無虐小心大度夷險一節卒能佐佑三后格于皇天有勳于王有功于國有庸在民此則前世顧命大臣有不能及也至于功大而志愈虛位高而身愈降多財而愈貧既老而愈壯則又合於伊尹之不以寵利居成功周公之不驕吝孔子之年彌高而德彌劭可謂有始有卒者也公之德業誄于太常著在史官金石有銘旗常有紀宜其暴耀震顯傳於無窮而某又以為考德於斯集者蓋公所最著者固已溢於人之耳目至於微言片善雖一介之寡有學士大夫終身弗能及者而公則具有焉然不可以一言盡也是集作者非一人述者非一辭合而觀之巨細悉傋後世窺公之全者繇斯文以求之不為無補則名曰考德其有不可者乎公之門人多一時豪傑之士而其孤乃獨以此屬於某豈以某從公為最久識公行事為最詳而某亦貪於頌述功德以稱公始終待遇之意故輒忘其材之淺陋言之朴鄙以為之序跋跋大名縣主簿石亢之東齋卷後亢之治平間與豫令尉元城者也於是乎兩人者交甚好其相從未嘗一日不歡也久之豫辟京兆後亢之喪其親以去相望千百里之外竊以為他時縱得遊豈復如前日之數也熙寧已酉春豫隨司徒魏國公府來魏居無何亢之亦主簿大名以吾兩人者如逸羽驚鱗東西奔逐復相逢於茂林滄海乃其所不意爾知必散易得而偶聚之為難也故情愈好好而遊愈以密一日亢之徹腐屋敞新構揭以為東齋家藏圖史左右而前後疏忩淨榻據依而坐卧蔭有翠柏之景濯有小池之流亢之且不得而獨有復與豫共於此每幕府無事未嘗輒舍此以不來也亢之修潔明俊自其祖而上二世連執大政能俯首州縣不知其貴家子也於戲使亢之而出於先世方盛之時其附而遊也必苟取勢利諂言媚道或因以驕其志氣寧若今日為亢之者無可附之勢可希之利耶凡豫之相從也亦曰無可苟而來正言直道更益而迭進則吾兩人共樂於一齋之中豈不裕如哉記漣水軍監轉般鹽倉題名記海利鹽最為巨故法有禁私煮欲利一於公而防民之至也雖食者必市於官矧敢商焉若是官鹽之流通不可一日而息也漣水轉般倉受四場之鹽其石常二十餘萬以友下淮數州之用苟出納不謹則吏得以乘慢而攘取於其間般運不時則民闕其用而公家之利亦乏然倉興厯二十有九年鹽官凡十有九人至於能究吏弊以謹出納足公利以時般運而數州之用未嘗一日闕者何耶蓋官舉於省則所得皆材吏嵗滿有賞格人人思懋力爾殿省丞張公繇鹽局權泗倅某為獄官間以獄事詣公因從容語倉事且曰豫與同職供奉官和侯議欲第其官之名氏而志諸壁子其為我記之某不敢讓謹記云年月日具位某題湖州德清縣覺華寺藏記記吾聞聖人之書曰經荀孟而下不預焉經常也蓋言彌天地亘萬世可常行之爾然則經之稱尊矣而諸佛之書無小大統名曰經其尊抑甚矣吾聖人之書其言修身誠意經國家治天下之術備矣惟賢者能知其説彼愚者投其書墜諸地雖千百過之孰肯一援手以置安處謂其無益於已也佛之書窮死生論報應其言曰今世修其善來世享某福今世作某惡來世獲某罪某書在前雖甚愚不敢褻視必稽首而對之口不潄不誦手不盥不執謂其能罪福于已也凡數口之家數家之聚未有不蓄其書而奉焉矧浮屠之舍哉湖州德清縣覺華寺佛之徒曰昭序自落髮已能悚然服其師之教既尸寺事又能募錢若干緡購其書若干卷為髹函鈿軸以華之復嚴一室其所謂藏者類而聚焉故觀者益信嚮誦者益精進逮訖事以記屬豫豫嘉佛之書能信千百嵗今昭序復能尊其師之書使益信於人是為其徒有力於師矣遂為記云至和二年三月二十六日記湯隂縣思賢堂記龍圖閣直學士會稽陸公嘗為令湯隂公去愛留久而民思思公不得見輒寓其情於物凡過公昔所居堂必徘徊想像若有所戀而不能去今令張漸伯因民之所慕榜其堂曰思賢去年公解常山帥節移鎮全蜀過故治邑邑民歡呼焚香夾道爭拜馬首噫公之不為邑久矣雖有餘風遺愛在民耳目其觀迎而望拜者未必盡當時之人猶喜公若是使其人盡嘗親被公惠與其方去邑之時其喜若思宜如何也公為詩以道邑民之勤漸伯并刋諸石始公能以善政使民思今漸伯能名堂以慰民之所以思民之思止於迹漸伯能思公所以為賢而履其實苟去而他日過此安知不能使湯隂人如望陸公於前日也陸公字介夫名詵熙寧三年四月初六日記重建左藏庫記大名河北之要處為官府必高甍巨桷相望以稱别都之雄又其聚人也廣其養兵也衆金繒泉布之蓄與夫每嵗十七縣常賦之入海輸而山委所謂左藏庫者宜壯而嚴乃旁雜吏舍逼隘衙門之側嘗比舍火延燎幾殆今司徒侍中魏國公居守封國會主藏吏白狀願得更造因按有羡數者兵幾何官所自有者材幾何者兵足吾使材足吾用可不賦吾民而辦吾事矣一日條所宜改作之狀請於朝報可遂易其故處而新之匠出於心巧隨於目崇庳廣袤之勢無一不中度四無附居閎爽軒豁出納之令不戒自謹受藏於內者得以安置如律而左藏庫屹然雄視一府非他屋可並凡為楹百一十有七始作於熙寧二年十月之丙申訖工於三年三月之丙午在城巡檢魏繼宗實董役事奉行規制無尺寸不如指者初河朔飢天子處公北門以四路三十四州之人全屬公撫民嵗穰爰及興作為政信有先後哉方公坐廟堂時聞天下某事有未便或人以為便而事未舉雖出京師數千百里之外必立罷而即行之矧是庫既在公宇下又始當騶馭六纛出入往來之道目擊其陋且非所宜處其圖新而侈舊去彼而就此也宜慮之已熟况主吏有請所以庫成居諸役之先公特為字二十門揭一字有倫有訓有司成誦足以為官針云公以本末俾某書屢辭不獲聽故書熙寧三年四月十一日謹記祠部集卷三十二
