body:
  text: 祠部集卷十三宋強至撰劄子代轉對劄子伏覩朝堂曉示近降中書劄子節文奉聖旨臣僚已授差遣並令依例朝辭許當日實封轉對文宇於閣門投進者臣身在冗列特其心思有所補欲一進狂瞽之説而厥路無由今乃承詔得自獻其愚兹不可常之遇然而不以二帝三王之道陳于前是不以堯舜文武望吾君也臣竊謂致治之本在用人用而不得其當如弗用徒有所纍而無益於治也故其先論用人且廣睿德達衆志宜莫如聽言聽之不得其審而是否參用則纍於聽故其次論察言夫巧偽興則誠實廢天下之俗將相率而趨於詐故其次論所以矯士風之偽又聳士大夫之節者在遇之以厚儻進責其節備而退待其身薄則賊恩而無勸故其次論所以措老臣之宜今臣之所陳敢不以堯舜文武之道有望於陛下是故竊不自知輒冒不赦之誅著篇于左惟陛下垂聽而擇焉論用人臣伏觀陛下以聰明睿智之德臨有重器方鋭然垂意於大有為之際躬攬萬化乾剛震烈以權以斷凡事有所以宜於人者朝思而夕行之不持循而固守雖前世已行之熟未嘗或憚改天下歡呼鼓舞拭目以觀聖人之作而跂踵以待極治之成謂按資計日不足延卓異之士而責非常之效或左右一言以為材或偉辭高論自合於上意則超然置於平進之上而不復限常序在聖君求才之心為得矣奈何未聞有竒功顯業取稱朝廷之所以寵異而聳動衆人之心使之歆羡者不唯不如是又人人有不自滿之色而翻憤其躐已且興勸之道未一得而奔競之風已四起矣借如某士以計進既越千百人而處之金穀要劇之地矣經費一有不給於內民力一有屈竭於外方是時也宜倚辦斯人果籌畫有以應猝而財用由其所自出雖日遷之職人不以為過其以文學政事進者類試之若是惡有不服者歟今則不然取其名不責其實始以此進終不以此試又冒虛名而受實用者或其中無以異衆人欲人人自安其分難矣且不得知於左右則不能自達於朝廷計資級纍日月則不能底冨貴之速以是走公卿之門唯恐足迹之或後望廉恥之長而奔競之息抑難矣持甚高之論者未必無甚卑之行騁喋喋之辨者未必有犖犖之見言之不可必信也如此噫虞舜之智非不及其臣又命之以九職者皆當時功德易見之人猶咨俞曲折以盡羣臣之可否者知獨見不足以取人也矧一言以為材耶既奏以言矣而復試以功者知徒説未足以明其效也矧一論之偶合耶臣愚以謂取人以言則詭辭巧辨者出以希一時之合曽無益於實也進人與其失於速也寧緩進真才失之緩其德章而不可掩終為國家用若庸才誤速進也徒激不如已之憤而於誼無所勸然則若之何其可用人法虞舜斯可也論察言臣竊以聖人體不降几席之上而聰明隱於旒纊之內凡天下臣民事物之情洞然若家至而目見者由廣問以得之也問之者廣則言之來無窮君子小人有時而雜吾聽也用其言不善則失之於跬步况其逺者乎得失之機在用君子小人之言耳惟君子者其言初若厲已而終有以利行故聽之者難也不必效於近或有驗於逺以為濶於用也小人則不然其言逢意而易入行於逺則泥措於近或通以為切於理也其有所愛必有所是其有所惡必有所非而是非未嘗牽於愛惡之私者君子之言也以愛惡而移是非其情偽卒莫可見者小人之言也於戲問之非難受言之惟艱受而察之又其艱也昔虞舜所以獨稱大智而後世弗可及者由好問而察邇言也既好問矣下情其有不通乎又察言矣是非其有不白乎故其智塞乎天地之間而莫與較其大也恭惟陛下變萬化之變而不自以為神燭百事之隱而不自以為聖舍已稽衆畢采羣説由公卿以及于百執事莫不人人爭竭其慮言路開而治道行矣然而惟君子與小人其言關乎得失方聽納之際臣願陛下用虞舜之察而辨之在早使大公至正之論行而不為巧辭邪説之所勝則其為智愈大矣論矯士風之偽臣伏聞聖王在上莫不欲明德厚俗所以教化醇而習俗媺者由先正天下之風其風正顧有蹈非其道者乎臣竊觀急賢願治未有如今日之切而詐偽成俗亦未有如近世之盛方陛下寤寐咨訪思得惇實朴茂之士進以為風俗之倡有人焉曰仕者有某士處者有某士其為人也性恬而操約行淳而質茂故外物無所纍其內公卿以言諸朝而朝廷用之不待班次天下之士知上之所取者以是則有隱為沽激求聞之計而陽為靜退不競之行其心惟恐爵位之不高而其言惟恐山林之不深至於矯情飾貌以譁衆動俗及名成而計得矣而意有所未滿且懼進之不加速也則又有蘄間願退之請以邀乎上其請數者其寵益固小詐則小得志大詐則大得志後來者務勝於前人愈假不可及之言行以濟諸詐朝幸進而暮失其所守浸淫誕謾天下日入於偽而不知止此風遂肆欲望俗化之厚其可得耶噫巧言令色不容於堯之朝今士偽其行豈聖世之所宜有夫欲矯之使正豈曰無術且衆人曰某賢矣其行淳又不苟乎進必考其實果非矯妄以疑世又有可進之勢而不進是真賢者也然後進之又其退也聽其所自退則真退者出而士之言行進退皆誠天下之俗其有不歸於正乎論措老臣之宜臣伏聞聖王能養臣下之節當其進而使之也既以禮及其退也又示之以不忍輕去之心然後人知自重而不失去就之正惟其去就之不失所以廉恥興而風節完矣古者大夫七十而致仕是老者必自告於其君也若不得謝則必賜之以几杖是臣雖告老而君或不聽其去也老而必以告者知耄將及矣即有萬鍾之享不可得而戀以安吾義也告之而不聽其去者彼誠老矣而力若可勉猶當強而祿之以終吾仁也近世俗澆薄廉恥不行於衣冠之間或靦然忘其齒髮之衰筋骸之憊貪進而不知止至有其身嘗用於國家矣一日老與疾相會怗怗然求􅊩間局以不得請為憂者有自蔽其狀告上以不疾至放之田里猶惓惓然有乞哀不欲去之色者噫仕而至於老且疾可去矣然猶不去以自辱彼固不足惜也但少盡其力而老無以容其身其在仁政抑恐有所纍爾今夫四海之廣百官之富若此等輩豈不容有耶故疾則賜之告以冀其萬一之安老則置之散以養其不復久之嵗月免斥歸之名則疾者無所愧獲易得之祿則老者無所憾然後全進退之體以示夫不可輕之去就顧老而疾者既愛之若是則少者勉力而無恤於其後矣風節其有不完者哉昔在三代之治唯周家所以號忠厚者獨養老之為備成周之養老果復行於今日臣不勝大願右謹具如前是四篇者粗竭臣愚區區之忠曽不足以仰輔盛德之萬一干冒宸嚴臣無任激切屏營之至代唐公乞録用魏鄭公裔孫劄子臣讀唐史見魏元成之輔太宗能盡忠切諌卒致貞觀之治所以後代欲治之主知納諌為先是其功不止一時而實及百世此其裔孫乃夷民伍又本家見執前來州縣判憑得免差役今乃一刺義勇一充衙前真可憫悼欲乞朝廷特與家長道嚴一官仍免本户差役庶使為臣者聞異代忠賢之後猶蒙奬録則今日能忠於朝廷者誠有所勸也兼臣據魏道嚴賫到逺祖處哲洽官告二道處晢乃元成之孫洽乃重孫今道嚴等鄉里在臣管下既再有敘陳合具敷奏取進止代孫待制乞郡劄子臣學術淺陋始備東宫官屬陛下睿德自廣無有所補洎六飛在御首蒙拔擢置之近侍恩榮兼極獨母老懷鄉日夜思去臣方受命西陲不敢即以私計妨公事今已事歸闕是敢輒干宸聽臣欲乞某處一郡遂老母思鄉之心又得以二千石之祿侍奉甘旨乾坤恩施莫此為大臣非不知荷陛下生成之德有踰父母逺闕庭咫尺之地則戀清光蓋臣事陛下之日長而事親之日短伏望陛下憫烏鳥區區之情特賜俞允代乞徐州劄子臣近三上章乞就移徐州伏蒙聖慈遣使降詔不允所乞豈唯恩禮之重懼弗克稱伏讀睿訓尤增悸栗始者地震北道民流去四方朝廷以四路綏御之柄全屬臣臣於此時勢有可辭而不以為辭今災震既息流徙既復民和嵗穰幾至無事而又去三路之煩而就一道之簡可以無辭矣而辭之由外而觀臣則有若所為倒錯而圖安已甚在臣自省則以為前日之不辭者力猶可勉今日之必辭者疲不任劇若猶處此則上不能勤宣陛下利澤下不能深究兵民疾苦中不能完養老臣久衰之氣是朝廷重易臣一州而俾臣負三不能之患恐非所以厚仁恩念舊物之本意也臣識具材術無足過人如天性所得之多私心自信之篤者唯至誠朴忠爾今臣以朴愚之誠叩陛下倘陛下垂聽而哀憐之使養疾僻州避逺要劇物性得所自然安和天地之恩有如今日之再造犬馬之力敢忘異時之少施然臣尚有餘懇謹附陳其口奏云代乞邢相劄子臣近以連年被疾三曽奏乞就移邢相一郡今月二十二日某官齎到敕告各一道伏蒙聖慈加恩再任者復司管鑰仍換節旄恩與願違敢畢愚懇伏念臣久勞多病日瘁一日而猶遲徊強勉不敢亟去甫及二嵗然後決請於朝廷者重辭陛下北顧之託冀憫其日月之久而筋力不支有可去之理今乃蒙改恩遣使再委重寄丁寧賜諭不許訴免上心圖舊雖至優篤在臣愚分義實難處且前臣之所以辭是力不勝劇也若今日之所以受是有邀而貪得也名為辭劇而實在邀得此非事君之道也陛下即哀臣既憊不忍遂廢猶當置之間郡俾資醫藥心休體佚自有生意犬馬未斃尚效餘力矧北門衝會非養疴之地儻再勞嵗月或殘驅不能保是寵之適足以害之也恐非所以愛老臣之意伏望陛下特回鑒照曲全衰朽就移邢相一郡使便調養形骸雖􅷝苟完復之有時溝塗未填免哀憐之已晚罄輸血懇決俟矜從代謝宣賜劄子顓飭使指肅將恩賚跽然拜貺感懼交集伏以仁廟在位四十二載神功聖烈貫蔽天地善美衆巨莫可勝紀此書之成雖曰浩博若論次本末則官吏協慮照定是否則仰憑睿鑒臣於其間夫復何力而中金上幣文韉良駟謂疇薄效殆虛寵數此蓋伏遇皇帝陛下紹休鴻業推廣孝治維時文祖垂光典册終篇奏御親紆省覽凡一時秉筆與夫典領之臣匪頒增秩以至降詔褒諭莫不務極優渥以稱聖孫所以奉揚祖德之意罔功被奬以榮為愧乾坤恩施何以論報謝刷蕩劄子人君之言格諸天地吏民同聽孰不感悅恭惟尊號皇帝陛下即位以來孜孜政化常欲置刑不用之地而下民多辟自抵邦法雖深居蠖濩而猶軫萬方有纍繫之幽每嵗歊暑降詔矜恤堯仁禹泣何以尚之臣職在長民不能諭陛下欽慎之意俟丁寧而後知則臣之過宜無以宥謹當奉行德音夙夜自勉庶幾獄無留繫吏無濫罰以副聖君慎刑之心此臣區區之願也祠部集卷十三
