body:
  text: 祠部集卷二十六宋強至撰書上通判屯田書某竊以君子之所貴者道也道者何經天下治國家修身誠意之大本也堯舜之所以帝禹湯文武之所以王周公孔子孟軻楊雄韓愈氏之所以為聖賢本此者也其為術重矣今之士有扶之以求遇彼當其求者見而為之禮蓋稀矣禮之而知其所存人稀矣知其所存而遂取之或無焉有一士於此恃王公之薦以求之其當其求者禮焉不暇屣知焉不旋踵取焉不問賢不肖嗚呼勢勝於道矣若之何使天下之本大不委而墜諸地唯大人者為不然能重其所以輕輕其所以重彼以勢動雖力逾千鈞弗吾重也彼以道進雖微如一羽弗吾輕也吾之所以輕重云者有賢不肖之分焉爾能之者誰其見之執事恭惟執事文醇德完學周孔孟韓之道而至焉者也雖甚賤其亦蹈其籓牆而未及者若是與執事所趨之道同矣其不同而異者位爾道內也位外也唯失人者取其內不取其外道苟我同雖在厮御猶將進之矧亦士其服者歟以故某之今日不藉千鈞之力直以一羽之微求遇於門下者知執事不能以勢動某乃得以道進爾有誚於傍者曰夫下吏之於上官有貴賤之别今子僣而同之抑過矣某應之曰鳯之於鳥德矣彼羽而飛者皆類也麟之於獸祥矣彼跂而走者皆類也猶上官之於下吏貴矣彼士其服者亦類爾雖同何僣哉誚者復曰凡薦子者五六人今人懇懇于公之門多見其不知止也某謹應曰天獲褒於衆人雖千百其辭猶為虛寵與過美得孔子之一字乃定某之區區正為此爾於是誚者翻然解執事倘知而取之使天下之士知道不為勢勝者其自執事始干冒威重無任戰慓待罪之至代萬表臣上魏公書某竊以王公大人垂念官屬之下者必其人才業政術有足過人與夫傑識妙畫於吾治有所補或奔走左右且嵗之久是宜均戚休愛若子姪無過也乃前日執事之坐鎮全魏而魏人服化己舊一府十七縣之民無有煽姦搆詐以干靜洽者訟事至庭下聽無留斷雖有傑識妙盡之士以為之官屬於執事之洽何補矧某才短而術疏者耶而又備位幕府才數月任奔走為未久若前之云者咸無焉而惻然垂執事之念者徒以某頃為監司所捃文致其罪鬱抑之氣蟠結於胸中者纍年矣近輒一吐憤執事之前言未出口而憐憫之色已見於容此無他不欲匹夫一物之慊其中伊尹之用心爾今伏遇肆覲過闕將力雪某之任如得滌濯其疵復為完人則站站墜翼再有青𡨕飛意數年鬱結一旦變為和氣今日以往實執事更生之也上魏公書方閣下慶厯相天子而某六年以進士得第嘗出造物之爐而未為造物者所識欿然乎其中垂二十年矣前日閣下鎮全魏某為縣令元城始得以屬官進見語未及竟而許以國士見愈數而其遇每加厚凡十人之受知於人其必有以取之也某自視無有間下於某乎何取若浮文曲學固不足為大臣道奉法履潔又士之常守其所晝夜惕恩度無以當閣下之遇方求為真可知者庶幾為閣下報已而閣下解魏印將行且曰必繼辟某以從審如是復備閣下官屬其期不數月故臨别之容不甚戚戚比聞閣下舍某而他取矣其復吏於左右未有期感知而戀德源源乎復來乎胸中矣屢欲一布其懇於下執事竊以為大臣新見天子顧天下有大利害與夫傑才潛德或未為國家用必將精思而力言之矣某雖苟布一書閣下其暇省覽耶近暏邸報伏審陛辭有日是敢少進其説嗚呼士之於知已雖在數千百里外常若造諸膝雖榮悴戚休寒暑事物萬變而感知之心獨在豈偶失其望少濶其庇而其心輒易耶某之區區直若是爾哉誠激語切浼噴台重不任戰汗待罪之至不宣某惶恐百拜謝運使司勳書閏三月二十二日具位某謹裁書百拜運使司勳執事某挾術甚短顧其才不足施之髙文大論之間獨為小詩以自喜然為之數十年未嘗輒出以示人非家藏瓦石而私以為珍也蓋自視猶不可矧求可於他人哉前日獲侍坐蒙道及鄙詩且俾少録以來因幡然以思與其深藏之而遂其短寧若經作者之鑒即受嗤於作者不猶愈獲譽於衆人又後進者執業於先逹則必被慮考卜以決可否及其門猶將前而復却不敢捉然以進為先逹者未必果好之今某不煩若之云云而乃蒙見索雖欲自匿其得自匿耶謹退而發舊稿去其甚惡而取其粗者得百餘篇輒録以獻恭惟執事學充器博操古道而行今世凡六經百氏之説其關於治亂而足以扶教厚俗者莫不囊括笥蓄以措諸行事又自陜而右凡四軍二十八州兵民事物之情吏屬廉汚勤怠之狀與夫嘗邉贍國之術莫不坐照而默計顧執事所觀而省者不小而大可知矣前日之獻是猶大樂在聽而么絃促管啾然作於金石摐擊之間豈足動賞音之耳哉而又語淳意局篇次不貫俗書惡紙殆非可以為上官獻者慙悸纍日謂將獲罪於左右而執事方且誘激奬貸賜之書以褒假之噫其激可勉也其褒非敢當也若乃上自三代下暨歷世風雅之作罔不極論其淵源使小子讀之不待受教座下而略聞詩要敢不拜執事之賜佩服盛德不任感悚之至不宣某惶恐百拜上荆南知府鄭舍人書某惶恐再拜知府紫微舍人執事去年詔舉宫中官伏蒙執事首以某塞詔事雖不允論感等爾何則方執事謀於心而發之於薦也不虞不中適偶與事戾成與否在某為休戚若執事之恩固不繫乎成否也嚮某居京師遊諸公之門凡六年或屢言以諾賤貧他日苟有論薦人誰子先若斯言也執事未嘗出諸口某固無望於執事矣重以執事負天下之望天下之士挾其所業而爭歸門下者類不下數百聞詔書初出其有求於此舉也袂相連而履相接方是時獨某去門牆四百里之外為邑朔方執事舍其門下日親而近者數百而一疏逺之是取不應其所力求而與某之無求使四方之觀邸報者必以某賢於數百者彼數百人者亦未必不自疑某賢乎其已也不然何舍彼而獨取也某失於諸公之所嘗諾乃得於執事之未嘗諾人天下莫不知有執事而莫知某也一日區區之名附薦書而遂以彰則執事之賜如何其重也某之重如何其光也嗚呼陷冗途二十年矣未嘗一日輒去學力勤而道逾逺尚不敢覬衆人之知今乃辱知於執事某今而後審不隨俗吏泯沒者恃有執事之知在若乃䇿具所未至期自奮乎功名之途雖老而益壯庶幾不沗前日之舉使執事知某為不謬亦未敢在門下數百人後也誠激辭切伏俟罪斥不宣某惶恐百拜謝盧郎中舉縣令書十二月日其位某謹百拜獻書知郡郎中執事某為官屬數月職在訊獄自餘公議一切不預又執事為治非囚黨蔓衍皆決之庭下使獄官果才其施設能幾况某之不才而無所施設於何求執事之知哉縱齪齪能以廉自謹猶待嵗月而後見又於何取信之速哉昨日伏蒙執事不以某不佞謂堪任一邑之政遽以上聞是執事知某不俟嵗月之久取人不求才節之兼古君子之用心也噫寄之以民與土百里之內惟所休戚彼一受賕皆坐舉者是國家授令之意既慎且重其保任之責不細而巨可知矣執事惜此舉以進能者宜矣今乃遽然取某以塞舉則執事之賜宜如何報惟勉所不能濟以素守之節少答知己於萬一耳無任戴恩荷德之至不宣某惶恐百拜與荆南鄭舍人書某初到魏既深鄙其土風又日負洪河決溢之憂圖所以脫去未能也止得易此而之他無不為樂地况以詩書為職業而無吏責於其間者此正某年生所願為而不可得也方是時忽聞宮官之薦不唯覬脫此以去後適平生之所欲為以是喜躍俟命而不暇自度夫不可為人師也已而報罷茫然愈失乎所從譬如陷深墜險者有人焉引綆而欲出諸危方一施手而綆絶其倣徨甚於未引綆之前者知施乎之難為力而出此之未有期也自被薦一年半矣蚤作而夜息其心未嘗忘斯舉獨無一言以逹區區者直以向兼數職又上官交以管記見屬每視牒訴簿領才暇且􅀈蹙囁嚅作四六矣實公私未嘗有少間矧某之德執事者大非遽云粗説之所能盡又筆未落紙而鬱鬱之氣已蟠於毫端使言不及竟日復一日不覺遂至於今也愚言不誣皎日所鑒不宣某再拜又某竊聞荆渚為天下遊觀之最足以坐鎮而縱賞一官之繫恨不得從公以遊然入輔大政期在旦夕豈能久與江山為主人也某再拜上提刑祠部書提刑祠部執事某為執事屬吏幾二年以區區之迹願收於門下者踰一年矣事久不遂私自謂保任之責在本朝為最重彼被舉者一受賕則舉者與之均罪某事迹猶未試執事知某宜未熟寧肯遽然薦之其必博訪廣聽俟可薦而薦焉自視無纎缺又有交譽旁贊者然後執事之知特深而薦某無疑矣以特深之知被無疑之薦抑將倡於諸公使薦之又薦之豈獨執事一薦而止也無何數日前有來告某曰有謗子於憲使范公者曰子之所為不逮於初子宜辨某對之曰夫不逮於初者非素然之謂也若先潔而後汚始勤而末怠翻然易之之辭也噫不欲為良吏則已如欲為之必曰終身焉惡在一嵗再嵗而易也猶千里之逺不求及則已如欲及之必極於千里而後止惡在五十步百步或半途而畫哉始某之來浦江也嚴一切之防革積久之弊政惟恐不得為才吏節惟恐少虧於古人今日省昨日之所行後月修前月之未至豈暇易初耶夫小人固有易常者或為士修飾以求為大夫得大夫而忘士之操為大夫修飾以求為卿得卿而脫大夫之守某選人而求為京官者也設其心誠小人獨不能勉強俟得京官而後易耶奚若是之速也雖謗言日來范公必不聽某何辨既而又有告者曰有謗子於范公曰尉所為因循而令縱之且與之同波子宜辨某對曰自某之來浦江也聞尉有不善則必苦言切責未嘗絶於口乃有傳某榜署門以召言尉過者恐此言遂行則陷名於好訐以是外和其色而示同內堅其節而自處且尉方少年初仕此任無所立猶有他任某年既踰壯而又得第近一紀若榮與悴在此舉爾設尉所為因循烏肯縱而同之也某在身無赫赫之譽身外無強近之援初掾泗舉者凡九人今又得二人是無他拔獨謹亷以得之也雖然彼十一人者寧不傾耳以聽某之善否今同郡而仕者不下三十人某之不佞守倅交薦彼三十人者寧不駐目以窺某之舉動浦江雖僻陋而強宗橫族不啻數十戶今皆束手不得騁彼數十戶者寧不張口以待言某之非是雖欲為不謹獨不畏十一人之耳三十人之目數十戶之口哉設謗言日來范公必不聽某何辨已而自咎曰以旦聖而被流言以參賢而遭投杼况其下者乎何恃而不辨今夫薦京官者才五人而又其間又未知果用成某之迹者獨望范公爾萬一謗言之行則愚望絶矣安得自默耶因敢布前之云云執事以為然則某之枉灑然無餘矣如曰不然願行麾一日臨按遣左右家到而戶詢之或千百人之言有一與謗者合則請暴某之罪亟黜而速去之以警類某者果千百人言無一合謗者則願呼謗者使前叱而數之然後收孤迹於薦書之上㑭知無根之謗能惑於衆人而不能為大賢君子惑也執事之美不亦盛哉意迫言直冒瀆威重不任戰汗待罪之至上運使盧工部書運使工部執事去年春執事按部過婺某得伏謁境上伏蒙降車為留賜坐與語問吾民之利疚輒以某事某事對言未卒而稱善隨之且曰還寫所言來因謹寫一通以進復親筆諭之曰善某退自喜夫部吏之見上臺有所問必立對今乃賜坐與語執事禮某為過矣而又部吏之欲以言徹上臺者不為少皆鬱而不得通今乃辱先問言獲徹而千沮百詆者亦甚衆今乃辱稱善執事知某為深矣已而自尤曰禮過而知深而遇不常得不於此時以一言及身計是果於自棄爾因作詩一章具道所以願舉之心以獻復蒙親筆曰深悉乃意以是家人賀於內曰盧公必薦汝僚友賀於外如家人之言某亦私自賀既而事久不遂繼獻以書復不遂於是向之賀者反相唁曰噫豈有短子於公者耶抑公將拔部吏之尤異而不及子耶不然何遲遲而不薦耶某曰否使誘舌之巧惡能誣伯夷以貪而毁栁下惠以濫哉設拔吏必尤異而執事嵗取二十人雖某甚愚極陋獨不足塞二十人之數哉偶未及某爾以韓愈氏之賢猶三上時相書今書再上而遽相唁慮某亦過哉矧識足以超萬事之表明足以照千里之逺某之所為固已深詳而密察以言乎考格則尚少一嵗爾以言乎舉者則尚缺一人爾是玉成之德猶有望於執事也恭惟執事仁義充諸心黜陟繁諸手振某於汙塗之中劇反掌之易倘矜憐而成就之使不為家人僚友唁則縻軀碎首弗足論知已之報也冒瀆威重無任戰汗待罪之至不宣賀發運金部賜進士出身書伏覩邸報主上以進士賜執事出身大哉朝廷此舉其有意於教化哉昔成周以事言德三者升造士之秀進而官諸位其養之有素考之以實故所得皆良材今有司乃以聲病儷偶為法度進者又猝然而聚苟能以曼辭麗句中程品則決科第如拾芥雖三代之文有一不與法度合棄不復顧以是執事用髙文大筆嘗試於有司而輒屈焉亦曰以言取人其失之逺今朝廷能知執事文章事業所施者大彼有司法度烏足較其萬一直以此科賜執事天下有道之士如執事者知文章事業能屈於有司而朝廷不能屈益髙其為人矣噫成周之制稍行今日則三代之士有為時而出者某故曰朝廷此舉其有意於教化哉延頸麾下不任抃賀之至不宣上運使王工部書某竊嘗謂知人不以古君子之道不足稱知人為人知不以古君子之道不足稱知己古之知人者在盜囚徒𨽻而知其賢落魄困衄而知其非常材千百人譽之不加重千百人毁之不加輕為人知者以道自處而不苟終始一節而不奪雖榮悴萬變而知已之分不移也今知人者或始德而終凶或始收而終棄目顯榮者謂之賢顧卑賤者為不肖一常人譽之唯恐知之不深焉一常人毁之唯恐黜之不早焉求知於人者松筠不足語其操氷霜不足語其潔惴惴焉唯恐人之不已知幸一知焉則向之操反為殆向之潔反為汚故改節首舉之弊興焉然則孰為然哉蓋古之人以誠今之人以不誠噫豈古之人皆誠而今之人皆不誠哉其之言主乎人不主乎時處合而行古之道豈必不誠哉在古而反若今之為豈曰必誠哉繫乎其人爾恭以執事文章事業與古賢並知人之明有過焉者矣若某之愚亦似豈宜以古知已之説干左右蓋其他誠不足采也若一節不變自謂無愧色是敢進説於大君子之前若乃執事之全德其美揚諸當世而甚白故略而不講凂瀆威重伏地待罪不宣某惶懼百拜上河北都運元給事待制書七月十五日其官某惶恐百拜奏記都運給事待制某四厯州縣三任部屬今兹一官始飄然去此道千里之外後辟西上雖然豈如他人朝離門牆則蹤迹暮疏蓋鄉里之愛無有逺邇不移也恭惟待制文章德業致身法從出入更履聲光益懋久勞於外時論所鬱行聞趣召置帝左右使晚生故吏訖託鈞冶功名之塗萬一自奮庶幾知奬拔之公不獨緣鄉里私愛而止也庚伏在序伏望為國自夀犬馬之戀豈忘故軒引領馳誠曷勝愚悃不宣某惶恐百拜上提刑司封書竊謂犬馬之為畜賤矣人所以芻豢而仁之者必其有守警馳載之效爾彼犬馬者豈特厭粳飫秼荷其仁而自惰亦欲展所效於人爾設有犬馬雖獰健趫悍非韓獹之比顧其聲足以守警也盜且至不幸傷其吻不能吠而齧焉為其主者將叱而扶之歟抑豢而哀之歟噫吻之傷非犬之所欲然也豢而哀之宜矣設有馬馬雖驍騰蹀􅞃非驥騄之等顧其力足以馳載御且至不幸跪其足不能負而馳馬為其主者將鞭而毒之歟抑芻而憐之歟噫足之踠非馬之所欲然也芻而憐之宜矣夫州縣之為吏冗且卑矣上官所以拔用而思之者以其有奔命任事之勞爾為下吏者豈特竊祿飽食幸其思而自安亦欲伸寸勞於上官爾不幸命適至體適病不能勉而從焉為上官者將咎而斥之歟抑撫而恩之歟噫體之病非下吏之所欲然也撫而恩之亦宜矣某不佞𨽻執事麾下且嵗餘雖欲朝夕趨走以愚自效余所守之邑介在僻壤其路亡繇而自進前日伏會越之疑獄執事使景覆劾而考察於時負薪之疾發於彌月而又明不足決疑似之狀智不足究是非之實雖然譬之犬馬是亦效守警馳載之秋也方將強起而行悉意乃事無何綿力弗逮訖以病告伏蒙執事諒其懇迫惻然開許猶踠足傷吻雖主人知非其欲然若鞭與叱尚未能忘犬馬之憂也意逼辭鄙干冒威重無任戰汗待罪之至不宣某惶恐百拜答董太傅書某頓首某所學失其原方少壯時不幸以辭賦得名於世今雖老矣猶將更為強勉以追救厥初以故遇博雅有道之君子必喜與之遊庶幾講論規劘有得於萬一爾今閣下之來正適愚顧又以生事不足汲汲有謀於人凡某之有望閣下者皆所未暇何私懷之難耦而講劘之益不易得耶相見才一二閣下遽以胸中所欲為傾盡於愚略無毛髮間外真相知之速而相期之甚重也有可以出力愚何憚而不為昨日雨不能往少頃當得拜誨言矣上提刑舍人書某聞為下者心有所欲言情有所未盡必告於為上者酌其所以言究其所未盡以聽於下故民有疾苦必訴於州縣吏之庭吏有沈鬱必伸於部使者之前州縣吏之庭去民近可日往而訴也部使者之前去吏逺不可日往而伸也可日往則民見吏以為常不可日往則吏見使者以為非常之遇也某官於窮山僻壤之邑且二年矣欲拜使者之威采尚不可得矧聽其誨言哉聽其誨言尚不可得矧卜其奬顧哉是三者俱不可得雖有絶人之治不世之才從何而自露矧某之斷然無似其抑塞濡滯不為上之取宜矣前日聞使車臨境上竦然奮袂躍然出門以為得一拜威采一聽誨言一卜奬顧在此行矣無何積雨溪漲乏船以渡倣徨溪涘仰天而呼曰噫豈天之欲某沈鬱不遂固虐之耶不然何使車在境而溪潦為暴絶其往見之路若此之甚耶已而自辭曰天徒能絶某之路烏能絶某之筆哉使某攄區區之意於纍紙之上不猶愈一見一言之詳哉是敢犯不測之誅少布其愚某之作此邑也雖政無尤異視古之良縣令間或有慊色其奉法飭已較一時為縣者固未敢自議其先後也今考限垂滿而舉者猶未足此正吏之沈鬱宜就執事而伸之也儻執事酌某之言究某之情而垂聽之惻然哀其冗且滯挈孤單之迹一挂薦章之末則某之沈鬱灑然無餘矣生成卵翼之惠豈在他門哉若乃報事之全德逺業揭諸當世而甚白此則略而不講焉干冒威重俯伏待罪之至不宣某惶恐百拜上提刑祠部書某聞有適萬里之塗者跬而起寸而進所未徹者數舍之逺爾不幸足力弛焉裹糧匱焉得輿馬之代兼宿之儲則萬里可以徹否則喪前勞死道邉無日矣與夫五寸步而畫或百步半塗而畫者均焉爾適有力者居傍其家之富不知其糧幾囷輿幾兩馬幾駟也目斯人之厄將哀而救之歟抑忍而遂其死歟噫斷無仇讐於斯人而欲其死者其必假輿馬貸裹糧以濟其行也某困銓選之塗有日矣其髙非在天也其險非在山也陷穽滿眼未見平地行之數年尚未能徹然而本朝著令繇縣令而遷京秩者其考限必六載其舉者必五人某必六者既五矣必五者既四矣是猶萬里之適所未至者數舍爾知已尚缺其一是亦足弛糧匱之厄也捨執事將赴訴何門哉恭以執事雄剛偉卓名重當世而又一軍十四州部吏升絀之柄當執事之手其勢非特有力者之比不假輿馬裹糧之救而拔集汚塗之中置之霄衢之上劇反掌之易寧獨萬里而止也第懼勿為爾是敢借前之云云一布左右儻執事哀憐而成就之使不貽道邉羞則翳桑結草豈足為門下報也冒瀆威尊伏地待罪不宣某惶恐百拜祠部集卷二十六
