body:
  text: 祠部集巻三十三宋强至撰雜著夀聖節人使三幅書右番大使誕聖膺期方祝岡陵之夀協隣遣使遹觀原隰之華遐冒冬嚴益番時祉右番副使流虹紀節㑹聖厯之開祥乘驛相儀亞使旜而修慶載惟妙履茂擁龎休右番大使祥繞電樞紀書王之首月命䖍星傳赴誕聖之先期載惟跋履之勤益介綏將之祉右番副使國夀開先紀千齡之震夙使才登貳動六轡之輝華順履隆寒亶膺多福又左番大使比者電樞紀瑞行臨誕節之良星傳増華來奉慶儀之好仰惟妙履參萃繁褫左番副使比者國夀有開鄰懽胥講適屆流虹之節遹勤飛驛之行順履冬嚴載蕃時祉右番大使比者華渚發祥紀聖期之震夙寳鄰講好飭使傳以馳驅遐冒隆寒倍綏吉履右番副使比者誕聖膺期睦鄰講好參使軺而戾止奉信節以勤斯征轡甫休粹襟滋鬯同天節國信三幅書左番大使虹渚發祥臨聖期之載誕星軺講好飭使傳以遐驅適冒時暘愈完氣宇左番副使繞樞紀瑞符聖誕之初辰將幣相儀奉協鄰之雅好適臨近服滋鬯粹襟右番大使千秋紀節適符祝嘏之期四牡戒行爰奉張旜之聘載惟菲薄諒協釐祥右番副使乘離首月出震初辰肅將信幣之來參示使軺之寵載勤長道聿集繁禧與賀同天節人使三幅書左番大使里社發祥舉罄岡陵之祝軺車將命遹勤原隰之行適冒時暘諒安福履左番副使國夀有開符聖期之載夙隣懽胥講持使節以偕來將事云初綏祺無爽右番大使火行在候符誕聖之初辰星傳戒行奉睦隣之重好征驂甫舎泰宇惟寜右番副使流虹紀節㑹聖厯之開祥乘驛戒行亞使旜而相禮適臨近服滋鬯粹襟代邵興中賀正旦人使三幅書皇太后大使某啓伏以嵗時云始肆儀㑹於三朝原隰其華通懽恩於二國載馳嚴馭甫戾近圻屬寒籥之貫辰諒粹襟之廸吉皇太后副使玉琯肇和方慶嵗功之起寳隣修睦乃勤使驛之來多厯郵程比臨㡬次神明所相福祚其蕃皇帝大使斡旋斗位㑹王嵗之開端修講隣懽寵使華而將命冒風霜之餘凛驅騑傳以少休増固生經茂迎時福皇帝副使五始遹臨百嘉滋鬯爰講邦家之好以均天下之休禮意交伸使才登選征騑遐御良多跋履之勞寰服甫臨益介綏將之祉排食遐冒霜稜肅馳星傳已次神畿之近竊循主道之常敢羞庖餐以勞車從不腆之禮有慙在顔攀違奉幣成儀啓塗復命顧官居之有守躬祖席以無階少駐行暉觕塵禮具代留守侍中契丹賀正旦人使三幅書左番大使玉琯肇和謹王春之此始寳隣修睦嚴使節之斯來星傳載驅天祺參嚮左番副使嵗厯更端春祺備舎協隣講好交修禮意之勤將幣相儀登貳使華之選沍寒云冒福祚其蕃右番大使比者邦家相慶甫王嵗之闓端原隰其華繄使才而相命載厯闗河之邈豈無車馬之勤審次近圻亶膺多福右番副使天地發春邦家均慶榮命使旜之出肅將信幣之來矧寒籥之貫辰諒粹襟之廸吉代王尚書契丹賀正旦人使三幅書左番大使蒼震發春行講三朝之㑹皇華將命來通二國之歡甫舎征驂益依泰宇左番副使遹新正嵗開天地之大生登貳使才奉邦家之相慶適臨寒籥兹鬯粹襟右番大使王春謹始仰新璿運之觀使節講和増固寳鄰之好隆寒云冒純福其蕃右番副使華嵗闓端具慶儀而有舊寳隣修睦簉使節以斯來六轡載馳百祥備舎代滕元發北使三幅書皇太后大使某啓伏以吹律宣和方謹嵗時之始協隣講好思同天地之休爰寵使華交伸禮意載厯闗河之邈竊惟車騎之勞順氣自持與時廸吉皇太后副使嵗厯更端春祺備舎惟使車之修睦於鄰國以交懽星傳載驅適持於信節霜稜尚厲益固於粹襟皇帝大使蒼震發春行講三朝之㑹皇華將命來通二國之懽冒霜序以勤斯聴車音之戾止仰惟妙履參萃繁禧皇帝副使王春謹始遹新璿運之觀使驛講和益固寳隣之契適増華於原隰行稱慶於軒墀霜氣餘嚴天和參嚮代馮内翰北朝賀登寳位人使三幅書皇太后大使炎運紹休肇御天飛之極皇華奉慶遹䖍星駕之行甫次近畿亶膺多福皇太后副使伏審逺持信節㳟致慶函驅星傳以少勤冒火旻之餘熾燕興遂適福祚其蕃皇帝大使嗣聖膺圖中天即阼邦家相慶増修鄰好之深原隰其華逺耀使才之美甫臻寰服兹鬯粹襟皇帝副使聖統纘寜使旜修慶載厯闗河之邈深惟車馬之勞兼冒秋炎諒雖時祉㸔詳知開封府縣度支郎中王克臣所進熈寜通議臣㸔詳政簡厚則民説而不擾是以有樂生之意而富夀臻矣三代所以得民心者也夫欲行王道而不先乎此者戾也是以簡苛禁厚仁術戒吏察之為明而本乎恕知民力之有限而用以節皆為政之所宜急者臣㸔詳君子勸不待賞沮不待罰惟賞罰所以待衆人然賞過乎輕不惟失勞而又沮為善之效罰過乎重不唯失罪而又賊人㤙之大兹二者實近世尤病願詔有司審處之臣㸔詳冗兵之可汰戍卒之可損固已汰其所可去而損其所可留矣若方今未革之弊知理財之為急而不知耗財之所漸者増置官局是也以其所得而不補所失者數易利柄是也置苟不一則財不勝耗矣易苟不已則失不勝計矣望員品之清府庫之實難矣臣㸔詳有警則嚴兵備無事則惜邉費類皆能言之殊不知費有不得已者而備不可一日弛也譬如巨藏之家曰固吾堂室而藩墻不足守曽不知外圉既虚則固於其内者將不能獨恃噫備之不可廢於邊也如此况近年戍卒其分此近郡者不為不多矣若又損外而益内安知契丹專利吾金繒而不窺邊備之虚實也判官舉詞本官行實利資為衆推與自主幕畫舉有所長觀其政能無施不可推官舉詞本官精明謙㢘敏於從事他日采用必有可觀代王龍圖舉李國博詞伏覩郡人國子博士李庠操守堅正博極墳史塵游不雜風度自逺孝友行誼推高鄉黨屢辟藩臣幕府邊事尤所通曉與之論議實有深識亦既倦仕方退里閈急才之際庠不可失盱眙周尉忻第二考詞夫志大而位卑者謂小官不足效往往則從而弛前件官位以文進道為時屈官修而職舉其志何患不伸哉政成再幕直書無愧招信馬主簿第一考詞夫已嘗為之而使治其所嘗為者疾苦必知焉前件官列於搢紳深悉民事故主簿於一邑而一邑之民頼焉政雖朞月已足稱能吏臨淮李縣尉第三考詞官無巨細材患大塞職瀕河之地寇賊多有尉無他焉捕冦其職前件官悉力乃事冦亦衰減三載書績於職亡愧焉王司户第一考詞户掾之職甚卑而其事不得專視糾之與奪以為可否雖有過不至大咎前件官欲善其職而小累焉勉哉自力以圖後效其考可書中中杜主簿第三考詞前件官勾稽一邑告政三年成績可嘉直書無愧其考可書中中聶司法第一考詞法之大原縁情而度中及弊者去之或刻而好深或寛而務出前件官舉得中道可謂能吏效職一載無愧直書其考可書中中盱眙周縣令第一考詞夫與民親而其責備者無若為邑積日累資之制行而昏懦貪墨者得以進故民殃而政弛朝廷患其然間下新格須舉乃用前件官由舉得邑悉力於政朞嵗成效其往孰量哉其考可書中中馬主簿第三考詞前件官佐令再嵗情與民通寃枉疾苦必即而告其考可書中中招信馬主簿第三考詞夫主簿之於邑唯才者能究政之是非與令議可否其次不越勾稽簿書足以保無過前件官掾邑三載訖無敗事秩滿而去弗媿直書其考可書中中推官第一考詞前件官操履純潔識度沈逺自賔幕席宻有嘉畫不求聞於人而薦者交許其材也歟政已及朞直書亡媿盱眙周縣令第二考詞百里之邑有民與社民之休戚繫令之才否前件官為邑再嵗究心乃事職修民豫無愧直書其考可書中中賈繹充堂長牒詞稽於衆求學行完懋而可以為諸生長者咸以前件人為言迺詢羣議以補斯職其勉力以贊學事益副諸生之所望楊祖益充學録牒詞學録於一學之事無不與凡齒于生員者又得以佐學官而教諭之其責任重不可委非其人前件人經明學充行信鄉里而諸生比名合議請補斯職爰稽衆言俾録學事李常充學訃牒詞學訃主出納用度其職近於有司雖然非得樸茂㢘實之士則職隳而弊生前件人性潔文敏衆謂可委他日從政其肯忽有司之守乎劉大雅充典客牒詞前件人學術該敏儀矩修飭賔客之事可使主之噫赤也立朝聖門所取雖在庠序其可忽諸王新轉孔目官牒詞前件人能法而吏庀司有年兹以序陞良允衆議勉翰乃職以圖厥終秦恭等補官牒詞前件人㢘以飭已勤以服事出入公府能厎無過嵗月既久茲用序遷宜勉爾勞以國成效代王龍圖祈雪文嵗云窮紀氣則長晹顧宿麥之待滋恐新年之作癘農憂于野縁旱暵之相仍神食此方冝戚休之與共矧曰聰明之徳實參造化之權願乘臘天速降時雪啓田疇之有望銷疫沴於將然豈専神休兼塞尹責尚饗記惡癸已嵗予待次吳江親舎客有過邑下者動眉睫揺唇舌其類則人也承臺省名朝籍其貴則士也即而見之彼方鱠鮮鱗以恣大嚼頂烏紗而曵華袍極笑言以談時事將枉道以興賈販徐而睨之獨布其帶若有喪者叩其端而曰親柩在南今將往矣噫聞喪之禮見星則奔乃往道以與賈販三年不見齒古之達禮乃笑言以談時事衰裳厭冠孝子之服乃頂紗而曵袍三日水漿不入於口乃鱠鱗而恣嚼嗚呼今蚩蠢之氓有一以非孝抵罪為吏者必瞑目而怒抶之唯恐不加毒戮之唯恐不加嚴若之何使斯人之徒坐㕔事以風細民不敺親而胥效幸矣尚安張國家孝治之本哉將置之以不孝之刑乎則予非立朝者將讓之以名教之罪乎則禽犢不知愧苐隂憤而黙誅作記惡云惜木窮山之崖有木焉幹修而挺風剥雨蝕外無皴理樵豎過之弗知其材棟梁也操斧熟睨隂有戕意苟材脆幹弱早為㸑中灰矣頼其高累丈非一豎之力能制其圍合抱非一斧之利能斷爾噫斯木也使幸而生匠石之園匪梁則棟為明堂之用久矣不幸而託窮山掄材者猶未遇為樵豎之所睥睨惜哉祠部集巻三十三
