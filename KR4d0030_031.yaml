body:
  text: 祠部集卷三十一宗強至撰書賀昭文相公書竊審圖任真賢進升上宰埏鎔所及慶慰維鈞伏惟某官函德淳深秉彞淳大鬯元猷於台路懋偉績於王家萬化經懷多識廟堂之故事羣生順理久躋區宇於大安素望日充清衷愈簡首寧天縡就専尹氏之秉鈞永翊帝圖當邁汾陽之書考格太平之極致殫康濟之初心成命既行私誠竊忭賀集賢相公書竊審顯膺徽册對掌洪鈞廊廟登賢寰區均慶伏惟某官器函剛實識貫幾深才猷兼濟於百為智略可酬於萬變制兵樞幄方運留侯之籌論道宰庭遽隨蕭相之畫矧云賢業夙簡睿心君臣一德之所同古無與擬禮樂百年而後作今也其時行鬯偉謨亟躋極治側聞新命增忭丹悰賀富相公判西京書竊審屢抗囊封懇辭宰柄輟中階之論道委近輔以優賢素志獨諧清風逾逺伏惟某官誠明正性忠亮一心久於社稷之宣勞數以翰垣而均佚復歸冡席比符周尹之具瞻曽未期年連謝留候之多病上方急治倚以鬯謀諒緣誠請之堅遂許老成之去鎮安雅俗暫兹為福於一方寤寐宗工更覬蒙休於四海仰髙第劇展慶無從劉待制問候書近者使斾之東客亭云别冒風霜之初徑厯道路以載勤甫稅征車諒完泰宇暌違未久企仰尤深宅兆奉安良增於永慕朝廷倚任倍冀於自持瞻禱并懷名言非喻回提舉郎中書竊審專倚周才共經外計就膺邦選出按邊儲伏惟某官學造聖源識通治體已試財闈之效屈從守紱之行清議未安休聲愈劭賢業可兼於數器惟所設施兵須肯責於一端别當簡擢冒霜稜之初厲擁時祉以載蕃敘慶尚稽占書云及其為感忭奚究名言回韓內翰書審膺恩綍登踐禁扄內相得人衆賢胥賀某官性恬榮利學造淵源嚮羽翼於東朝旋表儀於近侍進以直玉堂之祕足罄忠規繇此調金鼎之和始符公議聊藉演綸之大手即攄澤物之初心未列慶函首紆榮牘永言感忭曷盡名云回邢州狄閣使書審即便時已班寬詔宿官兹限馳慶無從伏惟某官偉略沈雄傑才膚敏蚤膺世選寖服使名壯嵗專城更邁昔賢之盛事元功仗節行追先烈之英風即聼召還靡需報政首紆誨牘仰佩謙懷某下情無任欣忭感銘之至回衛州周郎中書審即便時肇班新治未逾期月已浹歡謡伏惟某官望厚周行才兼數器十年禁局備紓風力之強千里輔藩聊布政條之裕行膺迅召亟陟要塗未列慶函首紆誨牘永言感忭奚罄悃悰謹奉書陳賀兼謝回提舉承旨端明王侍郎修實録畢轉官書竊審國史終篇春官進秩真儒之效多士所榮恭以某官序冠禁塗職尊袐殿早以文章之大手簡於神聖之淵衷會仁廟之一朝載信書於百世編年幾易實資才識之長奏御甫成訖被龍光之懋稽修慶問首枉珍函感忭并深名言非悉回昭文相公賀冬至書天陽云復已慶問之先馳台座且遙猶鄙誠之未徹敢謂自存謙矩垂貺音函荷禮意之過隆寫感悰而增劇伏惟某官山河間氣社稷宗工首陟宰塗力平王路代天工而調化兹鬯辰猷對日景之履長茂膺純祉回南京王宣徽書自濶風徽忽驚嵗晏雖政事已修之前迹無所更為而音題或至於厯時缺然不講敢圖雅眷特枉珍函兼審偃息别都撫柔媺俗神明所右福祚其蕃伏惟某官勳濟王塗望尊台路政成五月猶司留鑰之嚴册拜三篇行秉宰鈞之要益綏寢餗少慰瞻祈回成都府陸龍圖書審即便時肇班寬詔治行千里歡浹兩川某官風績宏長器資剛實歷紆賢業獨簡睿心識延閣之河圖殿會藩於井絡撫柔逺俗行聞最狀之成延拜近司靡候更書之滿尚稽修慶首辱占音感懌并懷文陳非諭回昭文相公書元朔更新嘗首馳於慶問上台存舊乃交貺於音函仰謙矩之過隆寫感懷而增劇伏惟某官道光宰路勳濟王塗極治是經元猷益壯首運化鈞之妙寅代天工遹臨嵗厯之端亶膺時祉回趙參政書泰通云始嘗先布於慶音謙德所存亦交垂於榮問載欽禮意增戢感悰伏惟某官道具大醇氣函間傑參斷萬幾之化措世既安遹臨三朔之辰對時協吉回侍講呂惠卿學士書審拜異恩兼升美職經帷勸講書殿校文陳睿選於一時壯儒林之偉觀某官傑才高爽明智該宏潛心自得於聖微操術動居於物表雖文章已任已博極於羣書而事業躬行當亟躋於顯用長箋垂貺丹慊增銘回樞密侍郎書久總帥符實託鴻樞之庇第瞻台坐良疏尺牘之音首枉誨函自存謙矩兼審坐籌勝算舉集蕃禧伏惟某官才貫幾深德含簡厚蚤重端朝之望向煩陪幄之謀兵本已撡底方隅於無事帝心所注佇廊廟之有聲益護燕興少符企頌回陜西運使陳學士書審對宸緡出持使節矧惟茂器蚤履清塗弗專事於空言欲兼施於行事虛承明之直舍果被僉言領全陜之計文暫圖碩畫勢非久次歸置近班逺枉書音增銘感臆回彭城知縣太博書審對明恩亟遷美秩未修慶問先枉誨音伏惟某官雅量淳夷傑才膚敏庇身大邑尚屈髙賢之資掌故曲臺有開榮路之漸永言感頌奚盡名言亳州判府富相公問候書頃聨政柄實依盛德之末光今濶台符尤切下情之勤嚮貢音不數負愧兼深比惟偃息善藩綏將泰宇伏以某官行參古烈道冠時宗挺然金石之純誠休有鼎鐘之偉績脫宰鈞而弗顧自養崇髙心王室以無忘孰為內外矧屬寧期之急治行從元老以咨謀伏望益調燕興仰副眷倚回越州通判曽學士書居留少睱衰病相仍缺馳書舍之音增企儒林之範逺紆榮問備戢髙情矧術業之表時號文章之貫古優遊法從潤色辰猷兹茂器之所宜非别車之可屈行祇嚴召倍冀珍頤回賀參政韓侍郎書伏審輟二神樞就聞幾政羣言久穆竊忭惟均伏惟某官函德淳深秉彞惇大才兼文武之術識照安危之機本五兵以鎮四夷比參陪幄之制勝財百工而調萬化旋贊宰鈞之鬯謀世選有光睿心所賴曽慶函之未列遽榮問之先臨欣感并懷名言非諭回荆南知府元龍圖侍郎書向圖綏御兼撫列城之師寖濶晤言永懷延閣之老過形盛意逺貺珍函矧惟聳望端朝垂光近侍藩條坐布議者謂先於一州國論入聞行矣當抵於二府益調燕餗少副傾祈賀副樞書寵膺明制進二鴻樞矧辱已知倍深距躍恭以某官誠明正性忠亮一心早被華纓旋升顯服久懋猷為之盛洊揚事任之煩撫全蜀之提封遹綏逺俗司大農之經費方瞻中都會宥省之虛員擢傑才而登選物論惟允神機所參矧玉璜之慶宗有金鉉之舊物坐籌勝算佇光賢業之施行副具瞻以踵相門之烈賀吕副樞書伏審顯承明制升二鴻樞伏惟慶慰恭以某官天資偉謨世濟盛德蚤進更於膴仕旋登踐於皇僚歷宣外榮休有茂績比領大農之計獨當真主之知會帷幄之虛員慎樞機之制勝方權綱總攬之際親核臣鄰正賢傑彚征之期擢參宥密曽是相門之傑矧為國器之華佇聞英衮之元猷以紹青氊之舊烈永言企忭奚盡指名代回王尚書書審即便時已班寬詔方依鄰庇增忭襟悰伏惟某官世濟忠勤天資英果蚤陟廉車之貴旋增將鉞之雄奕葉重侯茂華宗于隴右擁麾方伯襲勝氣於山西眷銅雀之故封付玉麟之新命肇開尊府並建髙牙緩帶輕裘兹適偃藩之樂昔襦今袴行騰載路之謡佇報政成復光册拜答便糶句都官書伏審大計倚才朔陲按糴適聞新命頗愜丹悰備形禮意之勤首枉書辭之貺矧郎垣之間傑行被選求豈兵食之常須可煩施設代元給事回知兖州鞠學士書總漕符之煩使寸慮日勞企書殿之清流尺緘坐曠敢期謙矩首貺音函審素籥之貫辰保粹襟而迪吉伏惟某官器函剛實識際機深久輟紬書之才纍彰行事之效守麾易地殿鄒魯之巨藩民頌載塗蹈龔黃之遐躅行祗迅召歸映近班答瀛州吳待制重書素籥貫辰黃華應節阻奉登髙之樂遽詒修慶之音恭以某官親會聖期早躋法從邊關倚重暫煩綏御之才國典疇庸行罄弼謨之藴回河陰提舉贊運王比部書久去近班再司北漕唯是輸將之冗缺然音問之修首枉書辭良欽禮意伏惟某官郎垣碩彥王國偉才督舟運之萬艘方圖碩畫助邦須於一道行奉膚功霜氣比嚴天和參嚮回新知邢州成少卿書伏審顯奉宸緡榮紆守紱前旌在道俯邇於治封兼幅貽音過形於禮意良勤冒涉益固福綏伏惟某官當世傑才為時俊老繇風力之強濟增治功之懋明九寺名卿寖登於貴重萬家媺行賴於撫柔回永興司馬端明書審擇剛辰已開尊府兼百城之師帥撫一道之兵民恭以某官名世真儒禁塗碩德不患寵榮之苟失一以愛君自全忠誼之所存挺然許國眷咸秦之奧壤邇虢略之故鄉方兹垂組以班春更過懷章之歸日封部安薦飢之俗聊布上恩朝廷思直道之言即還大用首紆誨牘增戢感悰回濵州張郎中書肅即剛辰肇臨雅俗環封千里歡頌一辭伏惟某官風績宏長才猷膚敏奉行條教暫專瀕海之城趨走召音行覲中天之闕未修慶問先枉誨函感忭并深名言奚悉謹奉書陳賀兼謝回青州趙資政書移殿巨邦肇開尊府提封所暨歡頌維均伏惟某官經世元猷際天傑識孝悌甚髙之美行早取重於朝廷忠純不倚之亮誠比同寅於廊廟適遂偃藩之樂未容坐席之安亟被宸緡旋更帥節東海賜履聊藉百城之表儀南山具瞻行副萬宇之傾屬尚稽慶問首枉誨音感喜并懷名言非諭回鄧州韓相公書暫輟政鈞適臨治屏詔條云布福祚其蕃伏惟某官勳濟王塗道包民極稟山河之間氣挺金石之純誠參斷萬幾蚤仰追於先烈協恭一德旋昭冠於中階方注意以綏邊實鞠躬以扞患未殫逺業俄屈更藩小醜尚存實夙宵之所憤大忠自信奚出處之能移一方雖被於仁風四海奈思於霖雨淑旗啓路聊煩觀政之行英衮熙朝即復調元之舊羣心所企衆論維均暑氣尚煩台光正阻伏望上為邦社精調寢興再任謝史館諸公及樞密侍郎書向沐朝恩初還鄉守適更清漳之卧理遽以韓魏之居留事物之來實兼他郡之數倍精神欲耗勉及流年之再周抗章願息於衰疲易地少圖於間曠乃推異數殊失初心西雍節旄幸獲辭於新命北門管鑰猶仍撫於舊封愚分粗安厚恩有自此蓋某官力陳宰論密啓睿衷誤寵不居俾自全於所守殘軀可退未即置於無庸重寄復當餘生奚補賀曽侍中判永興軍書竊審進被明緡往開尊府抗使旌而就道露公冕以觀風成命既行羣言胥穆伏惟某官鈞衡舊德金石純誠才兼文武之資身繫安危之託留範廊廟書功旗常間館優遊方養崇髙之福屬城節制遹圖綏御之經撫鶉首之巨封賴貂冠之元老雖曰長城之所倚豈容坐席之少安列郡後迎行見晉公之再入中階登冠復歸周尹之具瞻慶忭尤深名言非悉回謝曽侍中賀加恩再任書某稟生多病假守再期庶少息於殘軀遂懇求於間郡乃蒙過寵殊戾本心亟更帥節之新不易留符之舊上恩誠篤愚分未安數拜封章始許追還於優渥再司管鑰訖令強䇿於衰疲敢圖兖路之並遊首枉鈞函而垂慶辱賁飾之相假識謙懷之所存待命纍旬報書差晚載惟弱植常懼疾顛全退處於無庸得自全於所守睿心誤奬猶未棄於餘生宰論借優俾尚叨於重寄誓殫綿力少答厚知代上楚兵部書就膺嚴詔趣覲清光屬部百城舉懷戀結學宮一介尤失據依旋審簡圖碩畫之長登二大農之劇涓辰視事順序養和恭惟某官望重本朝才兼數器洊揚中外之選並懋事功之成造膝危言曽無議論之阿世致身要路獨有猷為之濟時比更西道之使符尋調北方之兵食甫安坐席俄被溫書造財省之浩煩諒非久次置禁塗之清切行副輿言俯惟材器之疏晚陟門闌之峻一見許與固已殊於衆人首垂薦論益難酬於厚德唯祈大用訖託孤蹤伏望上為廟朝精調寢餗回保州王騏驥書涓辰其吉布治云初千里環封一辭均慶伏惟某官才兼文武學造聖賢繇甲科以踐郎垣遽投定逺之筆適丁時而提將鉞佇拜淮陰之壇顧是一麾決非久次慶函未列榮誨首詒感佩并懷文陳奚諭回諸新恩學士書竊審落筆禁扃紬書藏室英廟盛崇文之選詔近弼以舉知聖朝謹先志之承從新書而試可某官學術該洽材猷懋明隨問納忠䇿條當世之所急按題析理論發諸儒之未明固非一日之空言要在異時之行事飛步儒館垂光士林首貺長箋過形盛意永言感懌奚盡指云回瀛州安撫龍圖書留都假守曽密接於風聲記室占書辱過形於禮意矧惟厚望獨映近班要劇洊揚猷為益懋領帥符於一道兼撫兵民對宸詔之十行佇陪丞弼炎威方熾時祉載蕃企頌感銘并深悃臆回渭州經略待制諫議書一揆賢範俄洊歷於炎涼各領帥符遂相望於西北首貽尺牘增戢寸襟矧德問之推髙賴威聲而經逺閫外之制已坐懾於戎心廷中之謨行入裨於王體益綏宴起少副傾祈回北京通判髙駕部書顯奉細書榮升别乘側聞成命竊忭丹衷伏惟通判駕部經世偉才端朝碩望關決名都之治豈盡設施延登要路之華乃云宜稱載惟厚幸將庇末光首枉音函備形謙槩其為感慰奚究名云賀宫使司空侍中書伏審纍抗奏封懇辭幾政遹增台序之峻茂對恩章之隆禮册誕揚朝紳胥忭伏惟某官格天偉業宰物元功秉心不回應變無滯君陳之謀猷后德歷更三朝公旦之勤勞王家逺過一紀忠至竭力功成退身何有鈞衡遂還印綬進班宏父之位領使列真之居灑然清風惟髙懷之甫適仰止元老恐靜退之難常就慶莫遑馳情第切賀吳副樞書竊審茂對上恩榮隮右府君子得行其道衆人相賀於朝伏惟某官巨業適時傑才周物蚤紓素藴寖服皇僚主計大農方底京師之贍給代言中禁甫追典誥之坦明更賴猷為旋升宥密五兵之本參運留侯之籌萬化所調行隨蕭相之畫側聞顯命增忭鄙懷回判銓記注陳述古學士書謁告上前暫閣載言之筆問安親側適拜登慶之堂遐冒霜稜載蕃時祉首紆榮檢備戢謙懷矧近侍之凝嚴加中銓之要劇難遂晨昏之養即瞻咫尺之顏益冀自持行膺大任賀南京留守王宣徽生日書良月甫周凝乾坤之正氣元精所萃育社稷之宗工伏惟某官業履崇髙智謀光大留符居守雖知出處之均宰柄登庸實稽中外之望方冬云孟生德維時俾夀而臧聊次詩人之頌式宴且喜阻持賀客之觴瞻禱并懷名言奚悉回新運使楚兵部書審膺邦選就領漕符維外臺鈞號於劇煩而北道倍勞於運給矧望著本朝之重以才兼數器之周霈心計之有餘暫繄碩畫豫邊須於有備行底丕功首枉誨函過刑謙槩愧慶音之未列戢感臆以逾深回延州經略郭宣徽書留符所守巳再見於嵗陰治屏且遙第增思於台範特紆榮牘備戢謙懷兼審靜制一方翕臻百福伏惟某官謀宏博識度沈雄蚤暢徽猷久宣逺略禦戎閫外繄坐振於威聲制勝幄中即進司於宥密益綏燕起少副瞻祈陜西宣撫韓參政問侯書宣𨗳詔音煩宗工之西撫發施廟算俾強敵之外攘遐歷關河良勤車馬神明所祐福祚載蕃伏惟某官經世元猷際天傑識方圖新於百度會有警於一方台席暫虛往總裁於疆事冦巢即殄還登進於冢司伏冀上為邦家益綏寢餗回新鄆州邵資政書守北門之留鑰洊歷暄涼企東里之治封曠咨燕起旋聞易鎮仍缺馳書荷厚德之隆謙枉珍函而垂賁審丁寒籥增迪粹襟伏惟某官才貫幾深器函簡厚嚮二樞廷之密袐屢更督府之雄威兼撫兵民未睱溪堂之式宴復參丞弼即符海宇之俱瞻伏望上為邦家益調寢餗回郭宣徽書竊審視公衮之絶班就膺異數仍帥符之重寄坐鎮雄藩伏惟某官經逺偉謀濟時明略寬朝廷之西顧輟帷幄之前籌疆事久勞繄外平於戎索詔音垂及行入總於神機旋録膚功亟加顯命末繇修慶首辱占書感愧并懷名言非諭回判大理寺崔司勳書復來北道介立羣居拙直無機都與時情之異嚮據依有地獨蒙賢者之重知旋濶髙風遹經纍月敘戀未伸於尺紙馳誠常結於寸襟敢謂隆謙猥先賜教復此卧疴之有日職兹修報之不時尚繄恩憐特以情恕伏惟某官才兼數器望厚本朝陰德固多曷涯於顯用睿心所簡益懋於華章順履春陽載蕃時祉更祈珍重少副瞻依代魏公回曽子宣學士書竊審發藴治朝垂光書殿家聲繼美士論稱榮伏惟某官偉業濟時醇文貫道疾陋儒之無補唯事空言會真主之有為自圖實效讐訛文於簡册講長利於家邦兼屬周才良階顯用未諧修慶首辱占書愧忭并懷名言非諭回賢良吕屯田書審䇿危言旋隮異等士林聳勸賢業增光伏惟某官方格淳修器資夷逺知周事物之變學際天人之交落筆大廷悉指時而無隱奏篇中扆皆措世於可行豈依褒陟之恩能稱詳延之實即聞顯用少副輿言首貺長箋深銘丹臆回越州通判曽學士書二氣交泰百家寖亨荗對嵗端亶應時祉恭以某官學探聖際文醇古初頡頏嚴塗久積士林之望徘徊别乘尚深賢器之藏年籥更新召函垂至首紆慶問倍戢感悰代魏公集賢相公問侯書向司留鑰獲庇宰鈞比緣輔弼之勞神遂至寒暄之違俗慮煩省覽曠箋牒之問安旋稔善平與邦家而均慶伏惟某官器函剛實道貫幾深昭安危之大方更文武之二柄謀謨廊廟曽勿失於蕭規利澤幅員實具瞻於尹石伏望倍綏燕餗仰副倚毗回吕舍人書審對制函榮升詞掖矧惟巨業獨映本朝凜然臺中之風休有天下之望籠財北道頗違澤物之初心落筆西垣遽屬演綸之大手追坦明於三代掩深厚於二京聊鬯壯猷可量顯用永言愧忭奚盡文陳回林學士書審對恩函旋登書殿矧大猷之髙世繇逺業之傳家是正訛文甫訖羽陵之蠧簡校讐祕館兹云王氏之青氊物論所榮霄程可測特存髙誼垂貺長箋喜切感銘兼深鄙抱回賀省主吳內翰書審膺制檢就陟禁扄曽未列於慶函遽首貽於珍牘矧以傑才髙世厚望端朝鬯儒學之淵源稱辰猷之潤色元昆舊物繼書綸綍之溫辭多士美談曽耀衣冠之盛事況大農之要地實近輔之便塗行服荗恩進聞幾政賀賈魏公還節罷侍中仍受舊左僕射加大觀文書伏審懇列封章蘄還節鉞俞恩易地徽册造廷進升祕殿之華臨長中臺之劇伏惟慶慰恭以某官樞衡舊德金石純誠才兼文武之資身繫安危之託留範廊廟書功旗常比均北道之久勞得請陪京之舊治抗雙旌而入勤方倚老成辭六纛之啓行遽刑露奏自養崇髙之福益敦恬尚之風左相絶班仍表儀於列辟文昌要地便咨訪於元猷企忭并深敷論非悉賀陳副樞書入奉恩緡進升陪幄伏惟慶慰恭以某官才包王佐勳濟聖時蚤歷華塗旋躋顯服比讓鴻樞之亞出宣逺略之勤二敵以寧鬯威聲於邊閫五兵所制著雅望於本朝遽趣介圭之還復參宥省之舊行膺册拜乃副輿瞻與機宜安厚卿著作書就被辟書屈從幕府兵民一道聊煩樽俎之謀賔主相歡應適詩書之願矧收名於異等即飛步於嚴塗得庇末光尤深竊忭代元給事答成都府趙龍圖書籠財北道轉粟中都顧無煩使之長賴在髙賢之後尚容竊幸可踵成規甫舍征車未馳謝幅歡然禮意之相厚首以誨音而逺貽用布寬條靖綏遐服神明所相福祚其蕃恭以某官美行甚髙至誠自信升諫垣以開忠亮之藴總漕節以見輸將之才直內閣之圖書帶西州之印綬兵民兼制政任實繁坐鎮有餘惠浹兩川之舊召還可待治幾五月之成柄任云歸輿言所協答并州唐龍圖書解麾南服總計北陲方休道路之勤即董舟車之運稽郵音而講好煩記室之占書仰戢謙懷中藏感臆恭以某官誠明正性忠亮一心蚤被華纓寖升顯服擊邪扶正自全國體之重輕執憲班條不計身謀之進退適繄逺略云殿劇藩維薄伐之故區實徑兵之要處境控二敵地綿百城暫煩細侯往護諸將矧威聲之素著加治迹之頻優行奏膚功入揚休命代魏公回曽舍人書審對制函進升禁掖訓辭鼓天下之聽詔命見聖人之心維時代言僉曰宜職某官道結真主學通先王盛際親逢於有為貴名自取於不次兼提數局奄有羣才之所長屢抗至言力齊衆論之不一聊屬演綸之手未殫澤物之心勢匪久居議當大用適叨封國之假守側聽治朝之得賢未列慶音首紆榮誨永言感愧奚盡文陳上杭州知府沈諌議書頃者為令屬封託公餘庇一以恩私之煦曽何位貌之論常獲坐隅之進趨不知縣道之疏冗幕府連從於西北門闌敻阻於東南積是朝夕係仰之誠缺然寒暄起居之問蓋術業不長於他政唯管記見役於上官欲為一書翻苦少暇抑中年精力之有限非盛德須臾之敢忘尚蘄髙明或貸罪戾恭惟知府大諌道德之老朝野所宗才究百為之長識通萬事之變洊揚中外並建事功時論愈歸風績時懋二浙會府矧在歷居之已勞七人近班不應補外之宜久行祗嚴詔入輔寧朝俯惟孤生尤切勤禱雖躬被善化阻預鄉人之間而口頌壯猷肯居國士之後風霜正凜旌棨方遙上為邦家倍綏寢餗代魏公回宋次道諫議書宫符久領居常多病而少間函訊每來滋用負暫而懷感方嵗律之遒盡惟生經之粹安某官才貫幾深德含簡厚蚤進升於法從比臨長於諫工博極羣書多識朝廷之故事參聞大政行追家世之先芬益護燕興少符傾祝回新恩通判賀郎中書竊審顯承宸恩榮二尹政曽未單函之修慶遽先纍幅之惠音祗服謙懷增銘感臆伏惟通判郎中秉彞簡厚操術精深淹回不歎於郎潛恬約自髙於物論名都劇治暫勞關決之才要路華章行懋延登之寵春期將半時祉載蕃瞻頌感藏不勝下懇回劉道叔祕校書曽是晚生獲親盛德忘年相厚契緣出於士科聞道固先禮止容於兄事違離幾月倐忽中春伏惟心遊六經躬享百祿未睱一書之敘戀遽煩纍驛以寄聲方真主之急賢矧宿儒之抱道行聞延訪起備咨詢瞻頌感藏并深下悃代魏公回發運羅少卿問侯書留符所守使範且遙敢圖雅愛之存遽有珍題之貺兼承近履參嚮蕃禧惟望重於本朝矧才周於數器久煩碩畫總山海之輸將屢懋丕功贍邦家之供億行祗明詔歸踐嚴塗感頌并深名言非悉與二府書向勞重任遂乞餘生得守故鄉甫安坐席一奪清漳之卧治再叨全魏之居留矧惟北門實控朔野素號多事罕常少休黽勉三年智與力而俱困支離四體疾乘衰而屢攻苟復徘徊則將顛隕載念朝廷之極寵莫如將相之兼榮曽是罔功久兹空食慮役坐戕於神觀量盈陰懼於鬼誅所以洊露封章仰干旒扆懇還旄節願易麾符愚衷雖堅睿聽猶隔自非四近之協助曷使兩端之畢諧顯勞合被於褒嘉公纍遂諧於湔滌未容贊善先辱惠音行聞九寺之進丞續具一書而修慶永言感忭曷盡名云回磁州朝大卿書不聞餘教苐驚日月之屢更常跂下風缺敘寒暄而上達簡惰若是擯遺乃宜敢圖損卿老之達尊眷郎曹之晚進首詒勤誨備戢謙懷仍審順履春和載蕃時祉伏惟知郡大卿德函渾厚識貫幾深沛然風力之有餘砥厥事功之甚懋清門濟美矧追迹於先芬嚴詔趣歸行垂光於近署代魏公賀富相公致仕書竊審顯册造廷安車就第兼榮將相增快公卿素志一時清風萬世伏惟某官德尊台路勛在王朝忠亮丹誠屯夷共貫頻年辟位鬯謀未及於道行晚嵗偃藩知止漸圖於身退遽舍臯夔之偉績遂諧箕潁之初心宏父進班聖君優老動清洛之喜色追香山之舊遊某早庇末光比間成命激懦衷而竊慕愧勇退之云先企忭并深名言非悉代王龍圖賀郭宣撫書伏審上注睿意出宣詔音惟時列城咸企前纛伏惟慶慰恭以某官傑才髙世偉略絶人襲忠誼於世芬洞機鈐於兵要比自廉車之貴亟躋宥府之嚴方繄壯猷曽未纍月會小戎之玩塞資厚望以臨藩繇密勿之廷中往籌多算専慰安於閫外坐制一方佇銘鐘鼎之勳增重邦家之望水行貫序時祉叢休代王樂道龍圖回環慶副總管張團練書伏審延奬膚功就膺寵命增使名之峻秩二帥路之劇權未列慶函首詒珍牘往乘邊障方倚於傑才出擁戎旜即光於美拜永言欣感實倍常彞上北京通判兩郎中書向者備員屬邑託庇副車官書期會之間未嘗檢察公事起居之際為霽威嚴訖由恩臨得以理去逮從事於幕府益馳戀於門牆素籥兆涼粹襟迪吉恭惟通判郎中才兼數器名重本朝二尹治於别京巳登最狀擴賢謨於要路行懋休功伏望上為邦家精調寢餗代與蘄州吕兵部和州傅戶部書向此為州遂有米鹽之細務居維企德實疏竿牘之常儀自履冬嚴諒蕃時祉伏惟某官心惟忠誼學有本原危言朝忤於九天清議夕傳於四海要官美職視如一羽之輕大節髙名坐若泰山之重暫分符於淮右行趣召於朝端左右嘉謨旦夕顯用伏望為國自厚副時所瞻代張待制回鄭學士書伏審上方給筆甫程試可之篇麗正讐書遽踐入優之等鶱翔兹始欽忭逾深惟儒館之盛遊實治朝之華選豈特文章之諸彥於爾為羣由來公相之貴人此塗所出某官學探聖閫名重士林鼓掞庭之雄辭中入彀之上第緑髮方壯矧致身之自髙青雲在前信舉足之可到尚稽馳慶首辱詒書愧荷并懷文陳非諭代王龍圖賀王待制書竊審就奉制函總提使節伏惟慶慰恭以某官用兼數器望重本朝才猷懋明風力強濟間引兩部之漕旋二大農之籌贍給中都翺翔內閣遹圖藩寄允穆朝言剖北道之帥符甫溫坐席餽西方之兵食遽趣行臺佇碩畫之少施即膚功之茂建續須大用訖副輿言上二相公書某逺略本疏忝寄忽驚於彌嵗舊疴間作貢書遂至於曠時仰兼度之有容顧下誠之自愧伏惟謨明王體翼戴帝圖一德同寅百祥胥祐恭以某官器包民極道濟王塗挾重計以尊本朝履正德以儀庶位稷契諸已唐虞吾君崇賢絀姦興利革弊謀猷為之未詔舉教化於可行廟堂之間日修輔相之能事鐘鼎之上行紀太平之極功聳動搢紳光華典册凝嚴貫序燮理經懷倍保崇髙仰符眷倚郭樞密逺迎書伏審樞廷虛位陛墄違顏出宣布於上恩行節制於諸將適臨寒籥遐履征塗陰有神明來相福祚恭惟某官略包英逺氣挺沈雄襲祖烈於汾陽授兵符於圯上才不世出名為主知方借前籌參制幄中之勝復資多算聊為塞外之行諒敵冠之望風懾威聲而遁迹某適縻州守佇展郊迎欣企并深文陳非悉賀王觀察仲儀書竊審易祕殿之禁聨就廉車之寵秩仍更劇鎮并服華恩伏惟慶慰恭以某官經世壯猷端朝雋老揭聲光于白日享富貴于青春大公相之高門蚤紓巨業撫兵民於西徼方懋膚功以文武之兼才遽班聨之易地解平涼之舊紱換成德之新符佇繇蕃閫之雄歸秉鈞樞之重永言欣頌曷盡名云賀陳蔡二提刑書伏審顯對恩函就更使部側聞成命竊忭丹悰伏惟某官識際幾深量函夷雅擴長才于仕路藹偉望於郎垣奉詔中宸體睿心之欽恤按章列郡多陰德之平反行登踐於嚴塗寖發舒於逺業永言欣頌曷盡文陳祠部集卷三十一
