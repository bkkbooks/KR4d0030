  text: 欽定四庫全書集部三
  hash: sha256:f07461303fab15c789ad7c1df69e91ba77e3a1645c0ea5d385f94292466f69db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0030_WYG_000-1a, image: WYG1091/WYG1091-0001a.png}
body:
  text: 祠部集别集類二宋提要臣等謹案祠部集三十五卷宋强至撰至字幾聖錢唐人官至三司户部判官尚書祠部郎中宋史不為立傳曽鞏序稱其為韓琦所知常引入幕府自助今世所傳韓忠獻遺事即至所撰其歷官本末見於集中者大約登第後謁選得泗掾以薦令浦江東陽元城諸邑又嘗入為京曹從韓琦辟入陜西幕府其上河北都運元給事書所云四歷州縣三任部屬者可以見其生平大槩至為大賢所嘉契其才品卓有可稱而所作奏牘之文曲折疏鬯切中事情尤為有禆世用杭州志稱韓琦出鎮時上奏及他書皆至屬稿琦乞弗散青苗錢神宗閲之曰此必强至之文也因出其疏以示宰臣新法幾罷是固琦之忠誠惻怛足以感動人主而至之文章懇摯亦有以助之集中諸體詩沈鬱頓挫氣格頗髙在北宋諸家中尤可别樹一幟觀所作送邵秀才序稱初為鄉試舉首賦出四方皆傳誦之既得第恥以賦見稱乃專力六經發為文章有譽其賦者輒頸漲面赤惡其薄已是其屏斥時好力追古人實有毅然以著作自命者宜其根柢之深厚若此也宋史藝文志馬端臨經籍考俱載祠部集四十卷文淵閣書目尚著於録其後遂湮沒不傳近時厲鶚撰宋詩紀事僅從髙似孫蟹略方回瀛奎律髓採録二詩而其他均未之見今從永樂大典各韻中裒輯編綴得詩文數百篇雖原目久佚無由知其完闕而準計卷帙當尚存十之八九謹分類排纂釐為三十五卷而稍据其出處之迹以為詮次庶知人論世者猶得考見其崖略焉乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀祠部集原序幾聖諱至姓強氏餘杭人幾聖字也為三司戶部判官尚書祠部郎中既沒其子浚明集其遺文為四十卷屬豫序幾聖少貧能自謀學為進士材拔出輩類出輒收其科其文詞大傳於時及為吏未嘗不以其間益讀書為文尤工於詩句出驚人世皆推其能然最為相國韓魏公所知魏公既罷政事鎮京兆及徙鎮相魏常引幾聖自助魏公喜為詩每合屬士大夫賓客與游多賦詩以自見其屬而和之者幾聖獨思致逸發若不可追躡魏公未嘗不歎得之晚也其在幕府魏公每上奏天子以歲時慶賀候問及為書記以通四方之好幾聖為屬藁草必聲比字屬曲當繩墨然氣質渾渾不見刻畫逺近多稱誦之及為他文若志銘序記䇿問學士大夫則簡古典則不少貶以就俗其所長兼人如此魏公數薦之朝廷以謂宜在館閣然未及用魏公既薨之明年幾聖亦以疾卒幾聖之遺文在魏公幕府為最多故序亦特反復見之覽者可推而考之也其行治官世已著於志幾聖之葬者故此不著元豐三年七月五日亳州樗堂曾鞏序
