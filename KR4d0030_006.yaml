body:
  text: 祠部集卷六宋强至撰七言律詩立春北風已作東風客昨日何如今日暄造化有期尋萬木陽和無迹走千門土牛陌上摧花杖玉燕叉頭墜綵幡獨我題詩添意緒又看殘臘委氷㾗春日山中感懷春中酣酣破宿霾春心衮衮㵼長淮無情草樹相看久得意親朋一笑乖世俗冰霜誰暖眼古人金石已枯骸愁來獨對青山坐唯有東風入舊懷贈楊尉純甫君家茂族出關西壯氣長干萬丈霓斥鷃羡鵬舒海翼駑駘觀驥騁霜蹄詩才多慕謫仙逸宦緒猶嫌梅福低千里霄程方䇿足莫云今日是卑棲若師院詠筍戢戢新芽迸舊林才生有節便虛心已鄰佛界黃金地更學仙家碧玉簪失灌要須防倦僕偷餐切莫聽饑禽憑師養取成修竹截管終令作鳯吟席上次韻純甫牡丹絶豔濃香一倍繁青春歸去巳珊珊障風護恐檀心損和雨攀應玉手寒今日我來頻舉爵明年誰共憑欄干盛傳京雒多名品未得尋芳洗眼看寄湖掾楊浩然新持手版苕溪掾應恨浮名别故鄉澤國幾瞻飛鴈序令弟公濟在杭春風自入墜鱣堂坐曹未改平生好開卷能如往日忙龍首主人監郡樂定蒙賔禮考文章送春年年不㑹春來處疑自深紅嫩白間今日卻從何處去明年依舊待君還不堪眼見鶯花老安得心同木石頑身外韶華猶可再其如緑鬢與朱顔經和靖林先生舊隱獨行先生舊隱荒大名寧受一棺藏能詩秀骨應無朽近塜間花亦自香卷軸門人收篋笥嵗時族子奉蒸嘗隱居不娶諸妷承祀逸民未許先賢傳猶說梁鴻有孟光贈陸元象文學漢世最優文學掾因君官稱復榮今青春事業收名路白首光華照士林風月每邀花底醉乾坤共老水邉吟安車正好追先烈子舍唯增二百金陸賈五男今君愛嗣六人依韻和陸文瑞香花花下詩翁已富情愛花相詠句還成才開秀格能殊衆到老清香不負名世上流芳歸幾處江南傳價入中京乾坤定是憐馨德那許風前趁落英競渡畫鷁追風千楫動錦標翻日萬人呼驕龍戰水爭先後采蜃橫川半有無波底魚蝦愁破窟岸傍車馬看盈塗競心猶出功名下吟倚扁舟為一呼謝純甫惠筆管徑毫尖匠製宜故人珍贈我何為分殊定逺初投日得似文通舊夢時大手愧無才翰用正心惟見友朋規紛紛紙尾方勞署辜負詞林視草詞次韻和純甫秋隂悶書乾坤泱漭作秋容節物情懷兩莫窮山雨欲來隂竟日溪雲不斷氣浮空賴存樽酒時傾緑更有歌裙可醉紅偶爾登臨愈興感朱顔容易變衰翁再次前韻暗曖秋旻氣象濃對時覽物兩無窮才開又合煙光重欲落還收雨意空直恐客頭先老白卻思日腳帶斜紅天真不擾無餘感誰似前溪下釣翁純甫出近郊以梅花未開成篇見貽因次元韻奉酬朔吹鳴時萬葉黃獨留瓊蘃擅幽芳水邉野外開雖晚臘後春前賞未忙素豔若敷應雪妬嫩心猶閟已風香此花更是梅仙詠消得花間飲百觴過練湖湖畔難尋使者麾湖光猶照旅人衣氣蒸澤國能無潤隄貯雲天别有圍楊栁經霜相對老鳬鷖飽食自由飛繫舟索紙題詩句更把間愁付落暉題吳山伍子胥祠江上胥山古木隂祠堂氣象亦蕭森江雲不散憂君色山月猶明死國心遷史簡編今斷缺吳人牲酒日肥深鄙懷異代悲忠烈一拜威靈淚滿襟資國山口石橋前日枯槎接斷溪今朝白石跨完隄牧兒靜立牛磨角詩客間驚馬駐蹄澗雨漲來流淺瀨山風掃過斷纎泥十家豈乏相如輩當有人從柱上題立春魚尋細脉上輕澌鳥趁微和哢好枝多病强傾春日酒苦吟還接暮冬詩江南信息梅應蘂京國風流栁未絲最有佳人隨節序叉頭綵勝競垂垂送朱郎中得謝歸淮南二首一束衣冠四十春公今收得自由身朱顔出仕看同輩白髮歸榮有幾人何處覔金分素里只聞行路羡清塵扁舟急解隋河纜猶恐京埃汙葛巾天香猶在入朝衣早見都門解綬歸晚歲高風增慷慨今宵列宿動光輝誰供白酒開談笑自向滄洲洗是非從此淮禽相看喜沙邉不復背公飛次韻酬答胡一之六科頓網索豪雄巖穴賢羣為一空夫子獨沈窮巷底故人多列要塗中君之交遊多在顯貴志行應在功名早欲大難為富貴充年未平津學朝董佇觀晝繡耀江東立春輦下作雪意徘徊收臘尾風光迤邐上花梢强傾浮蟻嘗春酌終似南禽憶舊巢愁裏年華侵短髮吟邉生意滿東郊玉盤絲菜無消息索寞空齊畏客嘲依韻和擇之惜春何門織婦為春魔幾聽啼鶯暗輟梭美釀入唇宜莫算芳期屈指已無多迎風栁絮飄都盡著雨花枝落半過正好狂歌對餘景休因節物嘆蹉跎寄陳介進士聖門顔子最稱貧猶有簞瓢奉一身罕似饑腸游太學獨將生意託洪鈞常時閔笑遭流俗今日依歸得主人早夜從容咨道誼切防事業去青春次韻和秋扇形如圓月色欺霜曽許佳人掩靣藏袁守揚風方慰愜班姬中道忽悲凉自知掌握初經用豈顧塵埃此暫傷只恐來年清暑殿别將紈素上君堂月卿大師以書抵豫言到自永嘉今將還杭因索詩送行聊書短章塞來請之勤京洛多年作意游撇然歸思滿林丘塵衣才洗吳中水吟錫還尋海畔州還杭未幾復游永嘉獨夜揮弦泣山鬼師能琴幾旬談妙動藩侯溫守劉侯延師講經孤雲高跡真無定又理輕裝買客舟由永嘉赴婺女復將還杭菊花濃新出黃金礦枝軟輕垂緑玉條正色逢人何太晚清香到酒亦終朝籬邉此意同蕭瑟霜後無言對寂寥凡卉不為孤艷地淵明真賞欲爭邀立春殘臘新春判此朝斗寒猶未動寅杓白催曉色融氷片緑轉風光入栁條絲菜落盤隨玉手鏤花垂勝壓金翹六年不見江梅影長覺歸心似斾搖次韻丁評事春雨溪樓燕子懶飛飛一鼓輕雷漸作威細濯林花紅抹淺低濛岸栁翠光微偶穿縱步尋山屐且解銷憂貰酒衣華表有人還未得更堪取次送春歸送王文玉歸浙插旗打鼓放船頭二紀蓬萊一夢游回首誰能顧庭鷺收心自可近江鷗盤堆玉縷鱸初膾盞溢金波酒旋篘嘉興酒有名金波者摩詰定懷廊廟弟新詩未免到皇州維弟縉也依韻和逹夫泛湖之作雨氣隨雲却上天山頭已掃欲晴煙栁條不盡空圍岸荷葉猶新未礙船時序百年催樂事乾坤一笑入詩篇主人著姓平原後莫惜金樽醉綺筵賈麟自睦來杭復將如蘇戲贈短句春風那解繫狂遊朝醉桐江暮栁洲大手千篇隨電掃孤蹤四海學雲浮榮名不落間宵夢退築聊為晚歲謀老橘殘鱸猶有興片心還起洞庭舟題於潛張明甫愛拙堂髙灑潛川愛拙翁堂閒雅與拙情同宦塗恥用機心達聖世寧為直道窮千載姦纎羞白骨一時夷坦擅清風邑人三歲觀賢化巧詆銷萌訟缿空月夜與陳行父楊公濟吳常甫出詣蔡子難月色無雲喜共看葛衣藜杖到君邊宦遊易作浮雲散人事難同好月圓菊露凄清吟可老竹風幽灑坐疑仙明年席上天南北行父常甫各將赴治合破高齊此夜眠丈人生辰才過中元九日期人間最重早秋時當年間傑凝天粹此際生賢作吏師候屬金行資義節氣鍾庚宿究兵竒願公大用齡盈百歲歲長吟祝夀詩依韻和楊公濟嘉定帥王待制移成都把詔心先劒外飛一身與國繫安危玉關落日辭金印錦水春風轉繡旗厯見本朝歸秉軸多由全蜀出分麾少陵漫為知音喜行到花溪已恐遲聞楊公濟冒寒訪契嵩上人凍雲朝濕萬峰寒鑿齒辛勤訪道安世外更無吳水石林中還有晉衣冠襟期飄灑隨煙靄詩句縱橫出肺肝見說松門長不鎖夜凉猶過别山看楊公濟歲暮惠酒紺瓶白酒下吟堂洗盞傾瓷肯漫嘗寒屋自融春日靣暖杯能轉少年腸山妻相對驚愁破稚子無端笑飲狂百歲光隂空自逺醉時苦短醒時長經春久雨未嘗尋芳舟次黎驛始見桃李紅白成陳愛而有題春風不散三冬雪暖日猶明五月霞病眼漫開常見雨客顔新破始逢花故園何在情還劇舊驛空存使轉賖白白朱朱今頗驗退之詩句亦天葩曉出一聲殘角繞千門霜氣涵空亂宿氛車馬往來無僻地星河收去有間雲余生慘淡身宜佚人事﨑嶇足反勤漸喜太陽浮海靣羣鴉鳴噪尚紛紛依韻和酬楊公濟澄江見寄長句子美幕中贍暇日喜傳幽事到京華地偏浙水開孤壘風散江雲覆萬家日出魚蝦來早市潮空鳬雁落晴沙羡君吏隱能終歲却恨吾游未有涯九日至嘉禾登高時節異鄉中回首家山隔亂峯白酒莫辭今日醉黃花不似故園逢苦嗟節物經秋老贏得情懷為别濃卻愛紫微詩意好笑歌開口强為容杜牧有塵世難逢開口笑之句知郡都官示答盱眙周令詩有感而作臨淮郡事素稱繁太守才明此典藩每歲欲甄羣吏狀是人思出大賢門孤生自恨方趨走末跡無緣被薦論異日願公持大柄畢身猶足望洪恩送前水監王仲賢郎中赴闕素節清明照水臺夷塗行騁忽徘徊驚人險句何妨露向闕丹心未可灰馬勒春風朝辨集雞呼曉日禁門開從來早賜清閒對不信君王肯棄才病起偶書病眠官舍趣方高强起區區視冗曹當世纎機漫蝸角除身萬事盡鴻毛田園歸去古稱逹軒冕儻來人自勞汩沒青衫踰壯歲窮通一任大鈞陶感懷寄楊公濟身世飄颻水上萍時情暗淡草邊螢百年日月空憂喜一笑乾坤任醉醒此外浮沈俱委命相逢汝我即忘形尋山各有襄陽馬莫遣題詩筆暫停冬盡日睢陽感事天邊愁緒細如毛眼底詩情付濁醪張許忠魂空日月河隄巡逺雙廟在焉鄒枚樂事委蓬蒿積成鄉思心頻折送盡年華首重搔杜子南賔猶此日主人恩意覺徒勞依韻和尹嗣復仲春㑹食船場野色寬圍四繚牆一穿林徑百憂忘濃花細草青春半語燕游蜂白日長寄興不知詩筆倦惜時猶喜酒杯香席間數㸃殘英墜萬片隨風此濫觴次韻酬禮之見貽慶厯天王設網羅君時遺俊我登科當時未識名猶熟此日相逢分固多摩戛青雲知志在驚嗟素業怵時過朱顔皓齒偷歡處暫置功名任酒􅋳再次韻禮之見貽之什傳家素業志雄軻烏足區區羡决科以道自尊今古少不才而第葦麻多聖門奧閫期君至賔館清談許我過文酒有時留劇飲長教阿買到醺酡豫不善飲次韻禮之淮上吟泗上風宜舊罕傳邦人誰說貢鱗鮮隔淮小市若古畫接楚逺山疑宿烟民舍卑窪多困水農疇磽瘠少逄年顧豫居里號繁勝舉目只為鄉思牽董役河上風霾繼日奉遲地冷日蕭騷野曠林疏風怒號畚鍤一聲趨蟻垤旗幡四靣落鴻毛黃埃成穗坐還積緑鬢欲絲歌漫勞暫閉柴荆如避寇江湖歸思入漁舠排岸判官以荷花為貺書五十六字以謝江國芙蕖夏最繁臨隄每見尚盤桓清淮况是稀疏有江蕚爭教取次看曉艷不隨生意絶孤根寧減舊時安主人知我江鄉客弗忍池邊獨自觀九日上兵部重陽無酒上高臺冷對西風笑幾回雖信佳辰從古重不知今日為誰來忽聞天外清歌發云是淮邊曲晏開自歎弗如籬下菊此時翻得伴吟杯謝徐屯田惠海味儒腸多病怯肥羶海産從來獨所便淮甸風宜乖素嗜江鄉水品憶經年分甘已佩公情重加飯寧須俗禱䖍食箸不停資大嚼免教饞吻鎮流涎常尉擕酒饌就部役所見勞酒蟻清香緑盞飛河魴雪縷玉盤肥三春花草殊南北一笑乾坤外是非膏血生民勞版築筋骸薄宦走都畿陶潛此日方蕭瑟那啻籬邊遇白衣詠鴈乾坤搖落滿風霜候鴈來時道路長玉塞哀音驚逺戍滄洲寒影伴殘陽燈前客鬢愁雙白天外鄉書斷一行莫倚善飛江漢闊暗中矰繳絶須防立春後連雨東風自動故園枝未見終朝不雨時遮莫年光浮水嫩定應春色上花遲山川慘淡隨人意車馬艱難誤客期萬瓦煙青猶足慰始知井屋有晨炊春日感懷壯年不覺登三紀正月如今過一旬人夀短長難定凖春期九十更逡巡縱當簿領無餘暇自合眉頭且强伸况值山城公事簡不謀笑飲是癡人獻知府張少卿當年直氣吐虹霓因使平津位晚躋大筆驅馳爭化匠纎機擺落得天倪名隨婺女雙溪逺詩壓休文八咏低官是諸卿郡山水志完寧獨在公圭邑齊偶書作邑窮山奈拙何簿書期㑹損天和卻緣衆醉獨醒甚翻覺同舟敵國多豈顧有人張巧舌第憂無術拯頺波偏親垂老妻孥少獨愧淵明歸去歌寄題甘露寺文嶽上人環翠閣鐡甕城邊古道埸近來人說贊公房江盤北固山形轉雲抱南朝樹色蒼世外青鴛誰結構坐間紫鴿自回翔十年滯客空吟想未識諸天在上方送吕貫中陋邑相逢樂且敖一枰才了又丹醪酒因校户知君大棊為論饒覺我高忽對溪山揮别袂卻憂棊酒寡同袍勉哉各努當年力無使功名見二毛寒食值雨山城寒食已冷落更值暴雨過園林餘花似對晚春泣好鳥時傍殘枝吟况逢節物宜笑飲莫待老大惜光隂明朝雖晴未可出溪水溢路浮泥深送郡判鄭世表庫部奉使陜西心馳關右氣軒軒笑著征袍謝别樽靣對延和知逺器力城東洛是名門邊需前去勞多算疆事歸來聽一言洮隴居人瞻漢使此行知不為河源久雨不果行樂偶書短篇自戲年來窮山少見日十日陰雨一日晴春色于人既無分酒徒與我宜違盟林花及時亦自蘂山鳥應節猶知鳴况復吾生異花鳥何為對景如忘情粹中先輩以甘雨時降兆為豐歲過形雅什猥推凉德輒次元韻以答來貺字人亡狀序宜愆何意天心獨不然甘㴻未嘗差十日豐儲應使足三年井廬但覺塗歌溢水旱寧憂牒訟煎自是化工蘇百榖誤褒多謝邑中賢元卿舟次丹陽讀豫與諸君前年送别聮句因作以道南還愆期之意逺垂寄示輒依元韻和答歸舟南過練塘時重閲前年送别詩人世闔棺方始定客程流梗固難期君還里閈尋三雅諸君尚在東白我尚山城守一枝今豫獨處浦陽涵碧春來應倍好何緣吟對舉清巵以詩還府推楊學士無為編辱佳篇見答謹次元韻和酬貪諷高吟日幾回辭珍轉覺意逾瑰子雲天祿慙餘地工部花溪掩舊才渴肺喜因秋水療病眸驚對夜光開今朝那獨誇榮貺更貯私囊耀後來秋日詠樓感懷公踰四十氣方强未怕秋風作鬢霜人物此時仍富樂襟懷無事可悲凉嚴塗行取青氊物末路寧同白首郎滿目溪山宜曠望醉提北斗挹霞漿搖落秋旻一望長浮空皓氣白如霜樓頭待月郡城晚水底有天江國凉郤恨人生如寄客未容年少即衰郎除非爛醉酬清景莫惜千金換斗漿和人食橘洞庭一夜落清霜枝上新苞葉底黃摘去金沙搏作顆剖來玉露結成囊嶺頭梅小酸無味渭北梨粗冷缺香合薦甘馨調鼎實未宜登俎奉君嘗戲贈孫師尹是非不到酒樽邊樗散誰呼小謫仙天上浮查空有路人間種秫獨無田花明緑野吟毫秃月近青樓飲帽偏姓字未勞金簡記聖經方倚大儒傳程舅夜見過風雨衡門此夜開羊曇喜報謝安來病眸強對題詩燭感淚頻添話舊杯江上索居空嵗月渭陽故事未塵埃不眠且聽寒更坐日夕相過復幾回苦寒南雪今年幾尺高林飛壙走亦嗷嗷閭閻易冷無煙火巢穴雖空有羽毛對客懶能傾凍酒令人自愧著溫袍何當萬丈縫狐貉寬作良裘覆汝曹謝知郡郎中惠酒祿鍾不滿俸錢慳伏臘才周聚族艱僅足晨羞供色養未能日飲樂慈顔醇醲獲奉偏親夀珍重緣從太守頒詩雅百壺誇寵贈豈如公惠敵丘山梅牆邊幾樹玉參差照眼幽花冷自宜香陳晚交風破蘂粉花朝濕雪融枝故人消息從誰寄造物生成似我遲且慰蹉跎盡詩興江樓間笛不須吹寄劉道祕書夫子文章老更工六經俱逹一身窮為逃州縣時情薄不問田園歲計空别酒正思傾夜雪書郵忽喜寄春風遙知父子傳家樂郤笑當年論異同子舍良賢尤得家學春盡江花飄去不留春海燕飛來獨語人局促年光花過眼飄颻生理燕謀身壯懷已入雙蓬鬢樂事還成一窖塵唯有濁醪存妙趣不容憂喜擾吾真涵碧閣東陽山水佳處豫聞且久獨未能往近得進士與邑官唱和詩讀之景物依然如暫經目因次元韻附諸篇之末云山水相和碧色鮮中間飛閣插雲端水聲噴薄如孤瀉山勢巉巗復對盤吟恐昔人精魄笑劉禹錫方干詩在焉到疑盛夏骨毛寒流觴已往雙魚在懷古探竒兩事干依韻答元卿手把君詩愧暗投為論昔㑹覺難酬巨杯既醉行無算大句相鏖敵固求别後溪山應故態近來寤寐憶前遊致身不早真吾恥猶喜清歡尚黑頭某蒙太守盧公惠酒因作詩以謝公子仇香遽賜光和復次韻叙事酬答豫懷天地惠何慳賴有仁侯念拙艱塵土未嘗輕俗狀風霜多為霽嚴顔兵厨美釀才嘉貺子舍清吟繼寵頒詩酒而今諧素嗜更兼春雪滿羣山張君枉道顧豫因書短篇以答來貺煌煌肉食有高冠附者如馳順坂丸吾子與時誠異嚮窮山為我肯相看更煩溢幅投璣琲自愧無門借羽翰努力窮年求祿仕而今行路倍云難某前日以鄙詩叙謝通判國博特垂寵和謹復依韻上答夫子文章卻異端橫流遏盡見平湍間于風雅能臻極粹甚圭璋不假刋纍句輒嘗論盛美賜篇還與作榮觀起豫自愧無商學何敢言詩向杏壇送同年周濤赴吉幕廬陵風物素稱繁幕府雄誇列郡間從事有才詩筆健平時無警檄書間清吟良足償風月曲宴應頻醉髻鬟行矣功名及年少未宜留意屬江山和通判國博和金華著作陪知府少卿遊北山韻盛府年來訟缿空等間深入亂雲中驚禽引避前驅斾寶剎幽尋數畝宫飛蓋塞塗溪影雜行歌聒地谷聲通東陽屈指風流尹前有休文後有公旱秋喜雨風吹旱葉作秋聲凉氣微從雨腳生赤地黃埃歸一洗寸心逺目覺雙清乾坤應救街前暍黎庶如逃釜內烹我喜南窗無俗物葛衣飄灑體還輕東陽九日寄浦江同寮重陽獨步上層巗目斷吾疆尚載瞻人世只能愁杜牧菊花豈解憶陶潛吟無舊友辭多感飲為佳辰量倍添旅宦七回逢此節旋銷壯歲似磨鎌次韻國博九日秋光未老已風酸還似春來料峭寒酒盞莫辭今日醉人心况是在時歡佳辰從古逾金重逺岫登高見黛攢且學牧之開口笑休因菊蘂淚䦨干白傅有眼看菊蘂重陽淚之句東陽吳氏昆仲並薦詣闕豫昔嘗推二子能試篇每出輒嗟驚文章即日開鵬運兄弟同時醉鹿鳴樂善自憐心不負知人獨喜眼偏明來春早附登科録甲乙應聮舊姓名題公節醉鄉亭莫向醉鄉尋畔域古今容盡太平人沈酣天地來同處脫略衣冠去卜鄰一境斷無車下土四時惟有甕頭春虛亭未敢從君飲猶缺陶公漉酒巾冬末郡學感懷和韻我向榮塗倒足行折腰尚可代深耕嗟君二紀差高第猶爾三冬伴後生壯志幾多成墜鵠明年四十趁啼鶯金章衮衮從韋布窮逹何時不遞更祠部集卷六
