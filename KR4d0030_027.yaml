body:
  text: 祠部集卷二十七宋強至撰書賀鄭毅夫內翰書伏審就奉茂恩入司內命比傳睿選始厭羣言竊以翰林諸公禁路元老文有體要代為訓辭凡詔書之諭臣民或贊册之除將相惟廷中誥令之所出雖海外豳荒之必聞導宣上心粲如星斗之揭鼓動羣聽肅若雷霆之馳豈文章之獨難抑論議之兼賴恭惟內翰秉彛惇大涵德極深學造聖賢力跂列科之回賜量包公輔蚤名未仕之臯夔及出而冠天下之英翹進以立朝端之風采道誼時懋聲光日新掌王言者數年追聖作於三代適圖西掖之舊更直北門之嚴大筆足以寫造化之微情密謀足以贊太平之偉績居常被前席之問威嚴最親由此踐中階之尊足迹相躡聊演彌綸之大手即諧經國之初心謨明四鄰宰制萬類某聞命竊忭銜恩未酬懼泯功名隨衆人而空老第形歌詠喜君子之丁時東望門牆不勝竦躍賀王中丞充翰林學士書伏審顯對明恩榮書內命朝倫胥慶物議惟均恭惟某官名世挺才際天藴識懷直道以執中憲履正德以儀庶工白日貫誠實高忠諒之結主青雲隨步便仰文章之致身方開納諌之聰遽屬演綸之手訓詞鼓動於天下兹鬯辰猷謨論參陪於禁中益紓賢業矧內相之要地即中台之便塗南山之峻維瞻徐膺徽册淮水之流不竭增衍清門企躍并深文陳非悉上益州趙龍圖書伏審已即便時肇開尊府兩川父老淪肌浹髓以識曩時之恩千里士民延頸拭目以觀今日之政盛德所砥私心竊歡恭惟知府龍圖道誼可師文學之老以孝悌甚高之美行起於鄉黨而汔至四方之知以忠純不倚之亮誠信於朝廷而遂為多士之服率謂蕃宣之寄決非嵗月可期得賢使君未足為蜀人之賀輔明天子行當隨漢詔之歸代賀陳副樞書伏審顯對制函進陪宥省出帝心之慎選允天下之公言伏惟慶慰恭以某官學造聖賢器包公輔早升華於近侍寖服采於皇僚危言正色以立乎諫垣密禆王體碩畫周才以總乎漕節增羡邦財方假尹於都畿旋登賢於陪幄屢形囊奏懇請州麾爰倚重於邉藩復兼榮於祕殿唯太原風物之古領一道兵民之權茂績休成清衷簡在會洪樞之虛位被嚴詔以還朝付之繁機時乃舊物有生相慶知聖王之用人至治可需幸君子之得主賀新知邠州閻諫議書竊審峻躋要秩移守劇州伏惟慶慰伏以某官精識際天偉才名世蚤論撰於祕殿旋翺翔於禁塗風聲有休時望愈重乃陟諫垣之長以臨豳土之民行布教條復餘風於貴儉即聞詔召輔新政以告猷欣頌并深文陳匪悉賀致仕趙少卿書竊審懇列封章許還印綬冠名三少追迹二疏進退無虧古今有幾清議皎若髙風灑然伏惟某官挺才碩膚函德渾厚坐參國論常㑭萬化之調成出布藩條靡俟三公之入拜致其君事以去信矣老成之賢側聽歸榮祗增榮羡賀正上許州賈相公書伏以嵗厯闓端兆二儀之載育春祺備舍與萬寶以俱新恭惟某官勳濟王塗器包民極履正德以儀庶位挾重計以尊本朝宰廷三事之司首調元化宥省五兵之本旋總繁幾措邦體於既平隱廟謨而弗有享崇高之極而自均出處之致斂康際之大而樂就蕃宣之勞露公冕以觀風坐訟堂而聽治一相在外思周伯之未歸萬民俱瞻願晉公之再入遹臨開祚參嚮純禧莫前夀斚之稱乃後慶函之獻台光在望愚抱焉依賀正與職官書右某啓伏以天吏肇和王正謹始稱漢觴而薦夀欽堯厯以授時恭以某官植操端方賦才肅給早傳家府之慶暫屈幕廷之謀屬獻嵗之膺辰期自天而集福永言祝頌曷究指云代回相州李太尉賀正書嵗功肇起祗列於慶函禮意相仍嗣紆於榮牘仰銜勤眷第劇銘藏恭惟某官茂略濟時純忠衛社出臨藩閫繄寬詔之奉行進陟樞廷佇壯猷之施設伏望為國自輔副時所瞻賀正書伏以春秋之一為元肇謹嵗端之起天地之交曰泰遹觀物象之通恭惟某官業履崇高智謀光大慘舒萬物躬調造化之鈞翼戴一人日入泰平之域維春祺之所嚮與嵗厯以咸新某假守關中馳誠門下適阻夀觴之獻曷勝頌牘之虔代王尚書賀富相公出鎮河陽書伏審懇求便鎮思解繁機比奉俞音誕膺徽册揭使旌而就道露公冕以觀風伏惟慶慰恭以某官業履崇高智謀博大更元猷於二府被隆遇於兩朝勳濟王塗道光台路君臣之有一德入平泰階文武之憲萬邦出倡羣牧請盟津之守寄鬱巖石之民瞻衮衣之留周公難全西土之願舟楫之命商相行副巨川之求代元給事河陽判府相公賀冬書恭惟某官山河間氣社稷宗工謨明二府之宗登翼兩朝之盛屢形露奏蘄解神機太師維垣倚重河喬之鎮一相處外增高巖石之瞻陽德初升天和參嚮永保貴福益康夀祺某職總計臺迹疏材館莫從慶列徒瀝頌言三司端明侍郎賀冬書恭惟某官才包王佐道貫民彛名躋日月之高學破鬼神之奧擅中都之調度坐懋豐功揭四海之儀刑行膺徽册迎長云始介福攸同某迹繫河濵心馳門下適阻夀觴之獻第虔慶牘之修代回諸郡賀冬書寶册履長雲臺視朔復太陽於七日亞儀會於三朝恭惟順履令辰誕膺厖祉慶函未列珍札先貽感頌交深名言非悉代元給事賀蔡舍人書伏審入對王休進司帝制伏惟慶慰竊謂訓辭之任尤資體要之工導宣上心明如星斗之揭鼓動羣聽震若雷霆之馳唯時傑才乃稱華選恭以某官氣涵渾厚道際醇深蚤勸學於宗藩久讎書於儒館出領江湖之寄歸瞻天日之光賢業素高主知逾重諌垣納誨方開當扆之聰禁掖代言遽屬演綸之手曷涯大用增忭丹衷賀宋舍人書恭以某官學優聖閫名重士林蚤踐列星之垣久提太史之筆繇螭頭之注録陟鳯閣之凝嚴讀書五車極多聞於編簡掌誥三世增盛事於衣冠忭躍殊深文陳曷罄賀韓舍人書恭惟某官性恬榮利學造聖賢朱邸裁箋方綴應劉之賔客紫垣演誥遽歸蘇賈之文章潤色皇猷發揮素藴取鴒原之舊物紹鳯閣之清門時論所榮朝遊胥抃代賈魏公賀致政宋相公書伏審懇列封章蘄還印綬重違確請旋發俞音徽册告廷安車就第進上公之極品光信史之直書高風凛然當世仰止恭以某官重名照映耆德精明緑髮青雲蚤冠士科之選鴻樞黃閣厯更台序之嚴遽收富貴之身以養夀康之福偶一相之處乎外得謝以歸與二疏之嘆其賢較美無愧側聞盛事增快丹衷賀致政范侍郎書竊審拂衣榮路脫屣禁林高風可激於一時逸軌絶攀於千載某官文章大手忠亮丹心屢貢危言之誠不虗內相之職顯官厚祿視如一羽之輕盛德高名坐若泰山之重志確還於君事年未及於禮經邦家失賢朝野興嘆側聞勇退增聳懦衷賀致政曽太傅侍中書竊審確還君事訖被宸俞增峻品儀之尊弗離進退之正伏惟致政太傅侍中際天傑識許國純忠蚤紆圭衮之偉謨厯冠鈞樞之重任建册萬世奮庸三朝不居大勳懇避元宰勤勞逾紀乃心固在於王家出處隨時維翰遹臨於帥路遽渴老成之燕見方祗詔召以旋歸驟爾引年久而得謝雖清衷之逾眷以素志之重違顯册告廷拜絶班於帝傅安車就地畢能事於人臣將相兼榮公卿增嘆俯惟晚景常與並遊勇退先諧懦懷內愧泛謝書短才所賦逺略尤疏一隨從事之辟書三入上公之幕府用兵西夏常參與於戎機總帥北方復専司於軍檄甫諧就職未暇馳音豈圖謙矩之勤首舉慶函之辱厚辭相假雖非涼德之可當重意所臨敢不珍藏而自貴回相州傅待制書審即便時已班寬詔何幸故鄉之父老獲觀新政之神明某官道際大醇氣函間傑經帷勸講非帝王之道不陳諌霤弼違以忠義之心自處聊就更於治屏行入贊於熙朝欣頌并深名言非悉回懷州吕大卿書兹審涓辰已諧視事首貽榮牘備寫謙懷矧風力之素強加治功之連最再屈公卿之重俯臨民俗之繁佇善政之告成即寵章之增懋永言欣頌曷盡名云回真定陸待制書竊審前騶將之劇鎮甫次都畿之近首紆函訊之勤承冒春暄載蕃時祉别京無事誠病守之所冝重客見臨庶欵言之可接餘需瞻挹併敘欣翹回知博州杜郎中寄詩書比守别都兼綏北道初膺重任首枉長篇載研大雅之餘風真謂少陵之後裔仍親紆於妙翰尤取稱於佳章不無溢美之過情第用珍藏而為好回權發遣棣州馬都官書比藉長才暫臨劇郡旋承交印纍辱詒書行入對於清光佇前膺於渥寵益希保衛少副願言回洛州通判宋郎中書比承交印逋邇還臺首枉珍函多蒙盛意矧治功之尤最諒恩奬之加優感頌尤深諭言非悉回京西提刑康左藏書久暌使範滋渴於晤言比總帥符益疏於訊問豈圖高誼逺枉珍題戢感尤深諭言非悉回深州竇學士書頃繇冗掾得備屬官趨走下風每荷嚴顔之為霽違離數載敢忘盛德之所蒙起居之禮不修疏逺之蹤分絶夫何容貸弗爾瑕疵首占教文過形恩奬跽然拜賜益以懷慙恭惟知郡學士學際聖賢器包公輔坐安流瘵矧利澤之冝民入罄論思行忠謨之致主炎威云兆時祉載蕃伏望上為邦家倍綏燕餗回洛州通判范純熙比部書比緣天幸行覯風期别席未終行騶亟引方劇賢規之跂遽蒙誨牘乏詒審履初炎誕膺蕃祉伏惟某官才猷膚敏風績宏長暫屈二於藩條行進承於邦選永言感頌曷究名言代魏公回司馬內翰逺迎書竊審虔承詔文出案河役屈禁扃之清重勤行道之阻修甫次近圻即瞻前斾首詔榮誨增戢感悰回越州通判曽學士書適懷清範遽獲盛箋粲然辭意之形宛爾聲顔之接會稽請去暫虛嚴助之直廬宣室歸來行對漢文之前席炎威寖劇時祉載蕃集賢相公往西京問候書伏審奉二宗之神御云往别都勤十舍之啓行乃煩元老緬想車之既飭扈真駕以載馳宜有神明隂懋福祉伏惟某官格天偉績經世壯猷蚤箋宰塗協平王路聖朝眷倚矧久賴於謀猷原廟妥綏兹兩完於忠孝益祈夀重少慰依瞻問候集賢相公往西京還書竊審寧神元廟告大禮之熙成復命明廷慰上心之永慕甫休道路還宅廟堂幾政多餘善祥備舍伏惟某官格天丕業經世元猷謀謨厯罄於三朝利澤遍孚於四國唐虞之際圖極治於無前邴魏有聲肩一心而永砥炎威在序燕餗惟時回南京王宣徽書竊審圖任宗工保釐寰服比諏吉日肇布寬條伏惟某官經世壯猷際天傑識洊揚兩禁厯事三朝徽府鬯謀重少煩於元老别京均逸聊兼拊於吾民濬淮水之慶源積商巖之素望未暖居留之席即持入覲之圭登踐鼎司協平輿議慶函未列榮牘先臨感忭并深名言非悉回新富順監雷判官書竊審特緣精學亟拜茂恩遂去家居將參幕畫側聞新命增快宿心伏惟某官風度甚高塵遊不雜心潛藝苑自成篆籒之一家名在薦章獨繼颷流於先世逺跖此始喜情可量修慶未遑占書猥及永言感忭曷罄文陳回新知成都府陸龍圖書審膺睿選就拜恩章領印綬於蜀門遷圖書之禁閣某官氣函渾厚才貫幾深屢更帥節之行厯砥治功之懋往綏逺俗繄威惠之兼孚入置近司殆後先之相躡未馳慶問首枉珍題感忭并懷名言非諭回邠州閻諫議書符守相望每聽風聲之懋函音遽及特緣年契之深審順履於歊炎益茂迎於戩穀矧惟舊德克著壯猷樂土勸耕方爾陳書於七月追鋒促召靡須告政於三年倍護燕興前膺眷任回絳州宋舍人書審即便時已頒寬詔矧惟厚望獨映近班早懋淳修之聲世傳該洽之學垂光禁掖未殫澤物之初心布政善藩聊輟演綸之大手甫溫坐席當被詔函逺枉書音增銘感臆回西京李給事書審被恩緡出司留鑰已班條教首枉箋函惟識度之深閎加才猷之膚敏優遊延閣矧侍從之久勞偃息别都適中和而自樂佇甄新治益治褒章回濵州經略馮端明書向者府罷西方道繇東里會簿書之未暇阻談席之相親仰止高風惄如終日僅領故鄉之守紱旋兼諸路之帥符多病所緣一書不講詎謂禁塗之傑首詒音尺之勤賁飾過情謙詞溢幅矧惟俊德夙簡睿心眷薄伐之故心實徑兵之要處境控二敵地繇百城比煩細候並護諸將暫往宣於逺略即歸置於近司感頌并深文陳奚悉回殿前郝太尉書自暌英概頻領劇權日圖綏御之經坐曠寒暄之問首紆訊尺備戢謙懷某官偉略沈雄傑材超敏早疏榮於勇爵旋拜寵於劇壇入衛殿廷提禁屯之紀律行躋樞幄陪近弼之謀謨順履秋嚴載蕃時祉回皇叔祖橫海太尉書多病蘄間誤恩治劇日勤綏御以先帥路之諸侯坐厯暄涼從企宗藩之元老敢圖謙矩逺枉音函兼審順履蕭辰翕臻茨福伏惟某官籍尊天屬望重王家信厚夙成衆仰翰藩之重寵靈益懋早分節制之榮倍衛燕興永綏戩榖回蒲學士書審奏書篇旋登文館惟聖神躬嚮於儒學俾丞弼各言於爾知曽是傑才首當清舉騁辭甚盛占等絶優不同無用之空文可贊有為之至治方欽逺跖遽貺長箋欣佩兼懷文陳非諭賀蔡副樞書竊審寧朝經逺陪幄登賢成命既行羣言胥穆伏惟某官際天傑識高世元猷纍年勞鎮於蕭關小醜絶窺於漢壁乃眷本兵之地適圖制勝之才參總神機一歸睿選卓然多算方運留侯之籌皎若成規即隨蕭相之畫某適司留鑰阻叩賔除企抃并深名言非悉賀路分駐泊張供備改正使書肅承宸綍顯正使名側聽褒升載深抃躍伏惟路分供備才推膚敏氣稟純雄襲慶名門躋榮顯爵蚤懋四方之壯志暫提一道之徑兵富貴自如行發紓於逺略公侯必復坐追繼於先芬感頌并深指云奚悉賀焦總管書就被宸緡參提師律矧北門之要地乃朔野之會都彈壓強鄰方賴上公之逺略訓齊鋭卒實資亞帥之傑才成命既行羣言胥穆俯惟懦品將庇末光未列慶函首詒誨牘永言感忭曷盡敷云代王內翰上前兩府書嚮託大鈞與書內命無禆王體奄遘親喪䘖哀苫塊之間假活江湖之上了無生意絶貢音函比至祥除勉隨詔起存幽憂之餘息舊學逾荒踐潤色之華塗復來滋愧惕然就職迄此踰年旋兼領於他司得少陳於寸臆逖懷恩紀增跂台儀伏惟順履春和懋膺時祉坐致邦猷之盛百度其熙出觀藩政之休羣情猶鬱行膺徽册還陟黃堂代賈魏公答徐州王綽龍圖書伏審移疾自陳露章得請解臺端之要職領藩守之便麾鯁議嘉謨雖進思之未足長才逺用抑卧理之有餘甫飭行騶遽占溫教永言感戀曷既名云謝耀州雲陽知縣陳端祕書伏蒙高誼特貺華箋賁飾過情巽言溢福重惟盛禮之所屈殆非鄙人之可當伏以某官氣博以深行醇而潔小而一邑已施惠而在民前有諸公即文章而為地勉綏福履行服恩榮企頌并深名云非悉代張龍圖謝二府書井絡奧區既就紆於守紱河圖內閣仍進直於禁聯寵溢於涯據非其地惟本朝之講治重全蜀之分麾長材多擇於近班撫衆要明於逺略如某者賦資甚拙應務尤疏曽風力之不強於事功而何有洊揚三紀無補萬分頃乘單傳之行嘗引兩川之漕叱忠臣之馭得少慕於昔賢剖刺史之符幸復臨於舊俗而且江山雄勝風土寬饒班詔其間叨榮為甚顧乏致身之術良階造物之私此蓋伏遇某官甄品官能謨明王體特屈朝言之重俾膺邦選之華亟委劇藩載遷邇職敢不博求利疚勤布教條安輯兵民撫柔遐邇覬續中和之詠少酬鎔埴之思代王尚書回兩制賀到任書比解藩符旋司宫鑰才休道路之勤頓即有詔條之奉行曽謝懇之未敷遽慶音之先墜美辭賁飾之相假厚誼謙懷之兩存念素寡於猷為第久塵於侍從絶毫毛之云補驚齒髮之漸踈止覬代歸丐僻州而間放曷圖居守委近器以保釐胡然邦選之誤優得匪朝言之借重揆能自愧戢感愈深伏惟翔步禁塗日奉前旒之對致身臺路行膺徽册之延銘頌并懷文陳非諭回近上軍知州官員書居守别京坐班寬詔云初視事未逮馳音敢為高明自存撝抑重鄰封之講好飭記室以占書爛然兼幅之盈殊有美辭之溢發函以感置袖為榮伏惟望重本朝寄隆巨屏出觀民政矧登治狀之優入對王休靡俟更書之滿欽銘勒頌并萃于懷回唐龍圖謝轉大龍知并州書伏審并門印綬延閣圖書雙拜恩華一均慶抃伏惟某官性餘忠諒學有本元危言朝犯於雷霆高祖夕摩於星斗不計身謀之進退自全國體之重輕流離江海之城轉給舟車之運換麟符於戎閫遽趣諍臣之歸領烏府之憲綱方開真主之聽會東藩之擇帥倚逺略以勞賢往提萬兵坐制二敵兒曺喜細候之至夾道拜迎王命嘉申伯之功匪朝褒賞愧寸誠之未布荷尺牘之先詒感抃所叢名言非悉謝文侍中答書比貢單函懼塵上衮敢謂捐鈞衡之絶禮飭管記以嗣音伏讀誨言深藏感臆恭以某官山河間氣社稷宗臣蚤登台序之嚴嘗宅宰司之冠繫安危於天下自任非輕謨左右於廷中上知逾重遽析麟符之寄往臨鶉首之封擁方伯之旄旗帶上公之印綬付以西略倚如長城靡須五月之政成復被三篇之册拜到任謝二府書别京要重留鑰謹嚴輒宣布於寬條得撫柔於雅俗兹為厚幸奚稱茂恩伏念某才可語中識非輕逺自洊揚於三紀思少補於萬分向為朔野之極州曽是中山之故地兵皆素練民復久寧適丁無事之時略諧綏御比及終更之嵗訖享安間敢謂詔除就膺居守增以冡卿之秩寵夫更道之行致此假人出於造物此蓋伏遇某官股肱一德體貌兩朝持循宰柄之公登翊王塗之正坯治所暨方圓畢成贊行睿選之華圖任從聯之舊付之都會倚以保釐敢不祗訓兵韜博求民隱保閻閭之安堵絶疆埸之驚塵上酬乾造之仁次答化鈞之賜回孫運判書承被茂恩出參外計用才兹稱為慶良多矧風力之素精加治功之屢試仍繄碩畫二山海之輸將即砥顯庸贍京師之調度逺貽書好殊戢謙懷回賀安肅軍通判吳職方書伏審嵗課陟明郎曺增秩伏惟慶慰恭惟某官學探聖閫名重士林别乘雍容聊二軍城之治祕文紬繹行從儒館之遊豈兹序升可稱賢業首蒙書貺苐劇感悰代沈兵部回賀相州李太尉禮上書伏審已即便時肇班寬詔伏惟慶慰恭以某官傑才高邁偉略沈雄履親賢之所兼享富貴而能守詩書結客莫非天下之英弓劍絶人固有山西之氣繇亷車之茂秩啓齊鉞之壯猷出擁戎旜環萬兵而開府坐紆守紱屏四國以為蕃寧閫制之久勞即殿廷之驟選慶函未列榮牘首臨感忭并懷文陳非諭代回謝三路安撫并知澶相等州答賀冬書近以陽德初升冝茂膺於蕃祉書辭胥慶輒祗率於常彛煩管記之嗣音損緘縢而答貺仰欽謙矩增戢感悰恭以某官名世偉才禁塗碩德觀風治屏暫繄綏御之經入覲嚴宸行倚弼謨之略代王尚書謝二賢良書伏審䇿當工心名在優等榮開賢躅喜動儒林竊以士固有極忠之言而不逄欲治之主抑自陳而曷繇工渴聞至直之對而不得非常之人或後言之是悼遭時以進竭慮為難某官學際聖源識該治體能條教化之所阻莫匪邦家之可行隨詔以登廣廷有可言之路悉心以奮大筆皆毋諱之辭觀進説於此時知立朝於異日未遑修慶首辱占書感忭并深名言曷既代賀李駙馬太尉書在復之來七日陽德初升建子之貫三微王心所慎恭惟某官氣鍾間傑世襲重侯自潛詩禮之精不溺綺紈之習茂仙枝於厲曲增大清門問主第於平陽蚤光盛選屬景長之啓候惟時萬以叢休某適領漕符正遙賔閣苐馳慶牘阻薦夀杯回謝接伴并逺迎書右某啓伏審進承詔音出迓鄰使冒風霜之正凛飭車馬以良勤首貺書函益銘謙矩即諧瞻晤增劇欣翹代答提刑沈主客書陽德初升慶音首列計方塵於齋几遽嗣辱於誨函禮意備行感懷增劇恭惟某官風力強濟才猷茂明北道按章固多於隂德要塗被用行藉於老成欽頌并深名言非悉代元給事回二賢良書伏審隨詔造廷竭忠奮筆耀士倫而甚盛躋䇿等之最高竊以六科之擢異才聖王憲祖宗之用三道之陳大要賢者條教化之原伏惟某官猷為懋明道誼充擴親遘鴻圖之紹首承清問之臨正論危言著厥篇而毋隱逺謨重計措諸世而可行上當睿心優入華選側聆榮問適總計文曽未列於慶函遽先紆於珍牘并深愧忭曷究名言代賀新省副王郎中書伏審就膺恩綍進二財闈伏惟慶慰恭以某官名重本朝才兼數器洊領事權之要纍凝風績之優華省握蘭正郎垣之美秩西州轉粟懋使節之膚功旋隨中詔之嚴還任大農之劇坐籌碩畫佇仰給於京師行服徽章即進參於侍從側聞成命竊忭丹衷賀新判都水監楊待制書伏審顯對詔函進升法從兼膺茂幄榮總劇權伏惟慶慰恭以某官才貫幾深器函剛實親遘聖神之會蚤紓賢業之光董淮海之輸將備圖碩畫贍京師之調度方二大農風力其凝智謀有裕遽當睿選登踐華班增峻官儀直雲章於內閣佇或績用統水利於庶邦實允僉言行膺柄任某方棲暉庇倍極欣愈燕賀方深蟻私曷罄上北京王尚書書某東南孤生左右寡援向從鄉里之便仕罕識朝廷之顯人比為令於河濵始拜公於棨下一見許以國士從此知名相遇踰於幕賔特然加禮以至奉清樽而侍飲授華楮以騁辭唯蒙恩紀之山丘不知位貌之霄壤方台光之下燭遽辟命之西來迓兵及門征馬在道色不忍去言猶欲留屈千騎以榮臨加百壺而寵餞命僚從以供都門之帳假車乘以濟道塗之行仁浹諸肌感深以泣載念官能之短了無民政之長訖由保全乃免瘝曠忽身居於幕府駭迹逺於門墻盛德未酬寸心如結恭惟某守安撫尚書元猷經世偉績光朝領袖百工聊掌别京之鑰爐錘萬物即持當國之鈞俯惟單庸乞望成就報知恐後敢效古人之所存託庇雖遐肯緣故吏而自外上運使盧工部書右某啓某性得滯固學迷本根戢翼泥塗之中抗心霄漢之工無媒仕世所持謹亷以直投人或逄嫌怒向從銓管補掾淮洲于時使車按臨未嘗虛月民口臧否易見鄙材較諸孤宦之流最辱上官之薦今兹陋邑越在窮山雖牒訴究懷時有一得而衣冠過境嵗無幾何尚安善治之聞以動當塗之聽因竊念居雖獨必加乎慎室雖暗猶不可欺愈自操修庶全始卒迄兹再考敢有二心豈謂伏遇運使工部識度內融聰明外照視千里猶跬步之近無一吏遁潔汚之形察知介愚意欲採拔齒牙讒啓羽黨隨生念微躬成就之期在此舉耳捨盛德挈提之力更何門哉况運使工部夙簡上衷甫成最狀朝僉所屬柄用其歸行優詔之趣還懼薦章之弗及伏望曲矜濡滯亟賜甄收庶使垂成之蹤免懷不滿之意斯辰題品儻一出於厚恩異日埏鎔願復依於巨造捨是而往未知所裁回都運孫待制書洊枉珍函備形勤思登車攬轡承甫次于近封挽粟飛芻行總圖于碩畫冒早春之餘凜萃妙履之多休良晤非遙倍深欣企回賀秦州馬給事謝到任書審即便時肇開於幕府未馳慶問首枉于箋函惟望重于朝端加任雄于閫外兵民一道繄綏御之大方文武兼才佇設施于逺略罔須纍日亟砥丕功回華州桑少卿書自濶風規已更月律方阻晤言之接俄欣音問之來承履春和益蕃時祉甫告成于治績行入對于恩章餘覬珍頤少符勤禱回延州郭宣徽書自聞開府嘗獲布書喜條教之已頒知兵民之有賴旋紆珍牘備寫謙懷審順履于春固載蕃于時祉伏惟某官純忠許國偉略絶人緩帶邉藩方坐籌于勝算運樞陪幄行入暢于元猷益護燕興少符頌臆權延州薛司勳書恭惟運使司勳才兼數器望重本朝自結主知益紆賢業付之西略倚若長城勳鼎待銘鬯無前之偉績詔函趣覲膺不次之徽恩茂對令辰載蕃景福某心馳闕下迹繫幕中徒虔慶牘之修實阻夀杯之獻代魏公到任謝集賢僕射相公樞密司空侍中書被遇三朝榮躋二府無補乾坤之造但驚嵗月之遷矧冠宰塗恐妨賢路屢陳封奏始解繁機仍叨帥節之持將耀里門之入兩轓北去未容翁子之還鄉六纛西來已繼召公之分陜并護諸將兼綏爾民實謀謨之久勞殆思慮之都耗曷經逺略可稱劇權此蓋某官密啓睿心力陳宰論稱某忠藎之所守苟有使令而弗辭遂易守符乃付兵要上慿神聖之妙算賴鈞樞之偉謨庶幾薄才克濟大事中丞誎議書伏審就膺朝紱進領臺綱成命既行羣言惟允恭以中丞諌議器函剛實才貫幾深學到聖賢之歸性兼忠義之守誎垣謇諤職衮闕之彌縫禁掖翺翔寫綸言之溫厚旋登憲府之長獨立治朝之班臺中之評補聰明于真主天下之望聳風采于諍臣企抃并深文陳非悉謂渭州蔡待制書往嵗從知踰年參畫在平時之無事猶曰匪才方今日之用兵復云何補會上台之開府總西略以議邉勢難苟安誼合引去隨辟書之新選矧自有于諸公仍戎幕之舊居但免為于逐客豈謂禁塗之元老不遺冗路之孤生特屈謙尊過垂慶問百拜伏讀仰佳貺之所臨一言賜褒獲珍藏而何幸代魏回回趙參政書藩條初布嘗諧謝懇之敷國論多餘遽荷慶音之墜厚辭溢美隆禮過謙惟參斷於萬幾益順綏于百福伏以某官學優聖域名重王朝挺公中不倚之亮誠履孝悌甚高之美行二洪鈞之宰制未攄真相之偉才敡徽册以登庸行畢大臣之能事倍調燕餗少副瞻祈祠部集卷二十七
