body:
  text: 祠部集卷九宋強至撰七言律詩依韻和判府司徒侍中雪霽登休逸臺環臺雪後從公登四顧乾坤表裏明粉水半消池日薄玉枝相戛竹風清園林灑落人間世樽酒逍遙物外情寫景不須搜畫筆詩參化匠自天成依韻奉和判府司徒侍中壕林星榆落種還生地營栁移根總傍壕夸父林稠宜較盛太師垣峻敢爭高歲科充蠧疲民産公詩首句有鹿角科民歲甚勞之句城守勝提壯士旄長與萬家添外圉鄴人心結此思牢留守司徒侍中寵示上巳屬疾鈞什謹依韻奉和上巳曽陪宴後池風光一匝又花時當年簪履誰猶在今日門牆獨未離步怯園林雖晚到恩深草木已先知都人不省憂民病只訝行春繡斾遲和登金銅門高門締構自何年朱栱金鋪麗目前樓上台光臨暇日座間涼氣失炎天草涵宿雨濃如染林曝晴曦燥欲然早晚定歸黃閣去剩移夏榻就風眠某伏覩判府司徒侍中置酒宴客即時雪作謹成七言律詩一首上獻相君東閣冒寒開朔雪貪隨樂事來臘信未通先漏泄台光欲近却遲回勢輕漫擬凌歌袖片小才能綴酒杯寂寞相如孤客在定應授簡屬鄒枚某不度輕僭始以鄙句塵獻判府安撫司徒侍中特屈威尊過賜寵和伏讀榮荷謹成律詩一首代啓上謝司馬當年侍兔園只攄祕思奉清樽豈如下客吟飛雪繼屈三公賜雅言句揣物形雖有迹筆鑱天巧獨無䀶豈惟一府誇榮玩猶得他時耀子孫依韻奉和判府司徒侍中望宸閣雪後雪中氣象但漫漫雪後乾坤淨好看零落瑶林晴照裏參差銀闕暮雲端疑開粉墨圖新就猶灑樓臺筆未乾萬井都人蒙煦育恩深不覺夜來寒再和公到層軒雪已殘蕭林素節曉相看山融愛日酥千點地接頑雲縞萬端曽有金樽開兔苑况無鐡甲戌桑乾清風落紙成佳句身世渾疑在廣寒春日送王明逺馬蹄乘興急離秦輕雪初消塞外塵談笑暫來趨幕府文章猶記從車茵雍雍妙畫平邊徼衮衮清言服座人詩句不須論别意臨岐探破故都春依韻奉和司徒侍中春隂席上未消殘雪在牆隂晝景昏昏似日沉土凍轉愁花信逺天寒唯仗酒分深笑談四座相歡色富貴三朝不動心詩句一傳人競寫也應潛購到雞林别王彥祖宫贊别襟曽判宋王臺魏北相逢一笑開帥府紅蓮曽入幕公堂黃菊偶􅔷杯未應許國全無䇿秖恐趨時自有才且置功名歸度外詩筒頻附塞鴻來奉和龍興燈夕結綵仙山對淨坊曵珠賔履捧台光燈搖夜月天形動歌聒春風物態狂刻燭詩成傳魏國吐茵酒釅醉程鄉今年始徹清宵禁倍覺都人樂意長河朔上元久不放夜依韻奉和司徒侍中上元遇雨即席金絡香軿匼匝來門闌徹禁夜無猜正憐舞曲隨風轉驟覺燈花冒雨開屏翳呼雲何倐忽嫦娥收月漫徘徊相君未放春宵醉倒盡宜城第幾罍依韻奉和司徒侍中春雪草木空催造化忙六花先出壓羣芳酒寒玉斚消春味煙濕金爐減晝香地暖落霙堆旋失風和亂片舞初長相公更好調元去已兆豐年在此鄉送河北轉運燕刑部被命充三司副使億萬供須仰縣官大農選造遍朝端外臺心計推公最中詔恩除副帝難文石近班趨玉筍紫絲新帕覆銀鞍行攄仁義裁經費天下征繇不日寬晝眠酣酣枕上息吾形日過南窗第幾櫺所得高眠容幕府為無深責繫朝廷苦遭浮蟻催來熟忽被幽禽喚得醒却整葛巾尋晚酌竹間呼客盡吾缶留守安撫司徒侍中生辰七月穹旻大火流元精信宿降伊周公師一品儀型重將相三朝德業優桑梓鄉邦兼鎮撫苴茅封國正居留人間盛事仍難老富貴功名未白頭宰衡倚賴更三聖神器傳歸定兩朝幾御銅符雙在手尊榮金印六垂腰流民相率歸仁政疲俗新蒙罷橫徭夀考轉隨隂德逺開倉纍萬活黎苗凛凛威名逺邇知去年談笑屈西陲平時旌節臨全魏計日朝廷起一夔狎賜綵衣今禮數待還繡衮舊麻詞佇看來歲稱公夀荀令依前在鳯池走筆謝司徒侍中惠柑十年空憶滿林香今日堆盤得恣嘗摘處嫩苞金隱粟剖來清液露盈囊自堪珍玩誇羣目可惜餘甘落俗腸拜賜愈知公意重不同設醴望元王安正堂居守園林氣象間堂成壯觀入躋攀三朝力輔乾坤倦一國身偷歲月間傾座語驚邪説破勒碑詩召正風還險夷出處皆公迹不動公心似泰山飛飛燕雀倦簷牙繡栱雲楣鬭彩霞樽爼燕間歸相閣鼎鍾勳業在王家直紋惜破牆隂竹巧笑嫌開席外花今日正風傳魏國平居詩思亦無邪酬楊立之進士見贈詞場緑髮競才雄幕府朱衫覺道窮孤憤掃除詩句裏壯圖流落酒杯中宦遊已倦年將暮人事隨生日又東珠玉滿篇勞寵贈建溪風格襲文公立之實翰林文公族弟依韻和酬王明逺見寄一日論交坐席間肯平壯氣就衰顔篇章漫欲窺滄海道誼從來仰泰山白日聲名君籍籍青雲意緒我斑斑元戎幕府那能久太學諸生已望還送河北提刑王詹叔郎中被詔充開封府判官人物神州雜五方平明京兆坐黃堂民投牒訟千狙詐吏抱文書百鴈行幕府要人關聼斷朝廷自昔選才良朔陲使者聲名久隨詔南轅佐趙張次韻通判都官和諸公雪中席上之作龍沙千里絶纎埃銀色渾疑王母臺宴席此時驚酒薄曉枝無處認梅開騁辭梁苑客方至乘興越溪人自來從古六花長一色化工應不費培栽和判府司徒侍中喜雪朔雪飛花趁歲隂喜看不覺酒杯深應時自合蒼生望澤物真同上相心未怕春風融粉水恍疑江國見梅林西山一夜千層白那復能留寸碧岑送王敏夫判官赴舉京師韓魏公壻却公門下識羲之風骨無塵聳秀姿壯氣海鯤翻碧浪逸才天馬脫金羈旋憑辭律趨明試首聼文衡中有司太學舊遊應刮目青衫事業盛當時伏覩留守安撫司徒侍中鎮魏三日遂獲甘雨吟成律詩一章上薦相衮前年撫雍民下車飛雪滿咸秦陕右屢年不雪公眂事長安之日時雪大作風行魏國才三日雨作商巖恰半春二月十五日兩忠節此生存社稷誠心是處感天人二方豈合偏蒙潤四海思歸舊化鈞即席依韻奉和司徒侍中上已會許公亭二首禊事初修樂未涯晴陽濃淡薄雲遮風光轉入庭前栁春色隨來席上花千載風流追曲水萬人遊豫掩長沙杜工部有著處繁華矜是日長少千人萬人出之句相公今日携諸吏那比山公醉習家三春樂事揖蘭亭駐斾名園敞繡扃酒盞緑深須露白花梢紅少已多青賔裾特盛人間會公衮能忘物外形化筆暫歸詩句裏清風一誦醉還醒上巳飲許公亭通判錢郎中以詩獻因依韻和呈丞相開筵御水頭席間别乘擅詩流特誇元巳從公飲不比常年結客逰淡色雲隂籠日薄暖香花氣傍人浮篇章唱絶雖容和酒盞恩深豈敢酬和推官壓沙寺惠詩上相行春樂有餘繡旗朝共宿雲舒特教紅袖停妍唱為許朱衫託後車肯説大烹專鼎食旋容小摘薦園蔬多才幕府論榮遇詩句飄飄動客裾走筆依韻和楊進士倜登南樓之作當年割據屬英雄樓觀誠奢物産窮藩鎮一歸平削後關河盡入照臨中離宫此日號大壯織杼無人歌小東全魏萬家今樂業衮衣惟恐迓周公瓦亭偶書城中塵土眯人眼隄上風煙醒客心沙擁河聲時斷續雲含野色屢晴隂平蕪點白鷺雙起細栁弄青蟬一吟魏北古來車馬地此亭偶爾得幽尋送謝先生歸紫霄峯不同賣藥入都市又異執帚見相君冠蓋臨門求上劑公台解榻叩多聞應思夜鶴侣蕙帳却笑伯鸞家布裙藜杖還尋紫霄頂無心出處似山雲送傳宣李子範供奉歸闕曽共征西幕府來相逄今日魏王臺喜情重把論交袂感淚頻添話舊杯此别情懷無限惡他時談笑尚容陪馬蹄歸趁春風急應有花先禁苑開依韻奉和司徒侍中西園初暑之什夏木參雲百尺長晝隂籠日一軒涼雜追楚榭迎風袂冷笑淄川作雨滂歌扇參差立燕趙客裾容曵赴原嘗坐來詩句清人骨勝抱冰壺飲玉漿聞參政王侍郎令子著作登第復除崇文校書宫壺移刻對延英文帝從容問賈生儒館旋承恩詔入士林尤説御批榮丹山鳯出寧無種滄海鵬摶遂有程漸待青氊歸舊物區區羲獻漫家聲依韻奉和司徒侍中苦熱未雨乾坤五月氣炎歊丞相憂農心更焦思脫塵埃遺暑濕擬排寥廓御風飈穴中戰蟻空知驗雲外晴虹尚肆祅下土顒顒望霖雨好回天意慰黎苗韓魏公生日上公拜表請休官中使傳宣未聼聞雍府遙兼新節鎮鄴城重領舊山川左弧共記生賢始右席誰居獻夀間隂施在人天報逺蟠桃三熟鬢毛斑依韻和趙晦夫書記將替寫懷芙蓉幕裏住三年鸚鵡才高動四筵風月漫勞吟杜曲文章自好紀燕然朋簪會合愁分手官簿縱橫待息肩直道先難終易偶近聞知已薦書全代上余大宰生辰瑞挺真儒翊聖時溈山秀氣育丰規慶符昌運千齡會前應中秋十日期天上光連奎昴宿人間身占鳯凰池枌榆暫領旬宣寄榮誕衣冠祝夀眉送公度赴詔歸闕兩京三仕並交遊有道從來慕太丘白日聲名隨詔召青雲家世踵飈流數程去路朱蹄駿一曲離筵翠黛愁材力如君當拔擢敢辭幕府獨淹留依韻奉和司徒侍中庚戌秋分金氣才分向此朝天清林葉擬辭條三秋半去吟蛩逼百感中來醖蟻消候早初逢旬甫浹月圓前距望非遙十日秋分如今晝夜均長短占録無勞史姓譙晉天文志云蔡雍譙周各有撰録奉和司徒侍中中秋遇雨韻要盡賔歡醉繡筵凖憑良月作夤緣孤光巳蔽浮雲外衆目猶傾小雨前聲入鬢毛同颯颯潤生林葉自娟娟宴杯才撤寒蟾露疏影參差魄正圓依韻奉和司徒侍中中秋筵散雨餘微見月色待月開筵細雨侵月來賔去意空深未容午夜瞻全璧先隔微雲漏碎金萬户漸宜歸一望重樓恨不起千尋應須潤澤周封內始放清輝出暝隂依韻奉和司徒侍中重九會安正堂茱萸綴席落新堂丞相詩鋒不可當九日繡筵吟節物十年黃閣運隂陽酒邉和氣忘公衮風外清歌出女牆賔去每來安正坐泰然德宇發天光萸杯引滿宴公堂病客偏容泛淺觴為愛菊花驚晚節不羞蓬鬢插秋香衆賔談笑誰傾座上相風騷獨擅場來歲鳯池吟此日夔龍高會耀辭鋩和重九晚登騎山樓登臨樓觀一重重下客追隨豈易逄九日燕私同愷樂三台禮數極優容自酬佳節揮鴻筆誰詫元勳載景鐘只恐斜陽催勝事時時回首望西峯依韻和崔伯憲謝王正甫遺三靈丸蜀茶一丸道士曽投藥七碗先生亦愛茶事見玉川先生詩服久有時輕俗骨味新應早摘靈芽病軀自健遺藤杖睡眼全醒耐燭花可是兼饒詩力壯芙蓉幕裏句堪嘉依韻和伯憲九日感懷隔霧南山愁漠漠破煙東日淡暉暉風欺白髮勤吹帽酒妬黃花故點衣九日淚兼踈葉落幾時身逐短篷歸青雲欲早秋先晚更惜登高樂事違依韻奉和司徒侍中壓沙寺梨誰將氷蜜共囊封結實祇園顆顆同蔽芾舍傍思召伯周流林下賦揚雄長楊賦云周流梨栗之林花經春月千層白頰傅秋霜一抹紅江橘空甘得奴號果中清品合稱公讀尹師魯集章句橫行古道堙先生筆力障頽津高文簡得春秋法大體嚴如劍佩臣氷鐡剛顔低獄吏雲風壯略竦邉人謫官竟死空名在一讀遺編淚滿巾依韻奉和司徒侍中辛亥二月十五日去去春光鳥翼過雲隂風惡更相和屢探花信猶全閟擬借鶯聲肯暫那鈴吏事來須緩報相公賔退正間哦九旬已是中分了詩酒尤宜併一科和司徒侍中清明會壓沙寺詩野寺尋芳二月殘弄晴幽鳥自關關堤沙壓雨迎金勒斾繡翻風蔽玉顔官妓隨車翠幄飲張花雪底綵舟歸漾水天間五年貪戀行春樂不覺移文笑北山依韻奉和司徒侍中同賞梨花千株綴雪紺園中數頃花開幾度逢體瑩直憂春欲妬色孤猶喜月相容香浮翠蓋台光近瓣落清樽飲興濃公恰徘徊吟妙句不須忙打寺樓鐘送大名府簽幕吳都官幾復移倅安肅相公樽爼納豪英使者封章薦姓名落日送愁離幕府翔雲隨眼入邊城萬蹄宛馬休南牧一嘯燕姬慰北征敵頸憤來還請繫雒陽前後有書生送朱傳道推官赴刑部詳覆文章自老齒獨壯富貴偶遲名最先冷落官曹按丹筆風流幕府别紅蓮高談傾座逈無敵清骨照人長欲仙好在胸中書萬卷校讎四庫續登賢依韻奉和司徒侍中辛亥上巳會許公亭許開壯觀舊平津今日還延相閣賔茅社一臨封國地花亭三見禊杯春隨車和氣蒙魚鳥即席高吟動鬼神西北連年參幕府東風長忝從逰人依韻奉和司徒侍中同賞牡丹按譜新求洛下栽朱欄圍土事深培半粧曉日爭光照一笑春風喜競開得地自依孫相閣飛香欲繞鄴王臺繡簾對賞猶嫌逺翦上金盤近酒杯依韻奉和留守尚書會六同年感舊詩鼎科第一䇿名人金榜誰能躡後塵三紀鵬圖猶緑髮纍朝龍首最青春同懷談笑宜開口間代文章各致身古詩有惜無同懷客共登青雲梯句醉倒不知歌舞罷杏園舊態恰如新好傳此會詫時人歌揭青雲動暗塵霄漢得仙同白日風騷寡和敵陽春笑談未減題名地富貴相高報主身誰向衣冠增盛事龍頭結客事尤新依韻奉和司徒侍中辛亥三月十八日遊御河玉勒牙旌駐水湄萬人齊看柁開時此朝河伯想增氣去嵗國公還賦詩岸蝶偶然穿翠箔沙禽曽不避紅旗旬餘即報行春足可厭歸軒暮雨隨此日河生舊俗傳相公同衆樂沙堧迎舟戲羽來低岸罥席遊絲落半天佳句獨高珠履上貴名都忘玉樽前明年盛會知難再行看還朝百辟先遊河遇雨翠幄初防日影侵春雲送雨信無心莫愁客散妨車馬且喜農安得砭針侍妓點衣重結束遊人霑蓋尚追尋臨歸未盡杯中興却放船頭醉裏吟依韻奉和司徒侍中喜雨應禱合書時雨奏銀臺潤澤從今遍九垓應禱豈惟三日後為霖曽是十年來巳逃虐魃知何地自起乖龍不待雷無數公堂森賀笏盡同秋種荷陶坯依韻奉和司徒侍中辛亥七夕末伏七夕三庚共此辰風迎西火轉南薰金盤瓜果隨時俗玉盞笙歌勸相君月下巧心空自競天邊私語復誰聞早歸肯效東方朔待看星橋夜度雲依韻奉和司徒侍中元城掃行河一鼓千夫下揵聲缺堤漏穴幾時平盤渦倒吸湍流住巨浸疑浮厚地行舉鍤每年勞衆力治河無䇿貢愚誠賴公自有安邦德何處風波敢更生行河道中風起秋河吹斾旌林梢初日露微明壤歌接野知堯力水害橫堤想禹平無數焚香迎使節不妨傍轡問農耕江湖未敢生歸興為戀車茵每侍行即席再賦樂事遙追戲馬臺高吟節物縱天才三朝致主誠心竭九日携賔笑口開白酒似隨秋露滴清歌疑喚曉雲回放懷不有公台貴慣得萸枝首賜來祠部集卷九
