body:
  text: 祠部集卷二十宋强至撰狀代上張刑部狀顯承召節榮解利權俯惟囂冗之縱素出奬題之目遽違大庇曷諭丹悰藐如嬰兒驟奪慈母蕞若疲馬止思故軒溯恩館以增勞進公函而差緩伏惟盛寒貫序冲履餐和恭以某官器識閎通材猷髙亮挺純誠而結主懋巨業以熙朝嚮持使節之嚴出領計臺之劇邦須仰給嵗課頻優旋被詔音進圖心畫佐財闈之經度聊藉全才參政府之訏謨行叨顯命代上審官密學狀伏念某學古不優語能至薄嘗備屬官之列過䝉國士之知一出品題遂階榮進亞守麾于淮上曽靡定居瞻恩館于日邊略諧拜伏奔命勞止貢書缺然伏惟順履新陽翕膺景福恭以某官鍾氣間傑為邦老成蚤結聖神之知益加體貌之重飛綏禁墄久居侍從之聨班詔邊藩纍布中和之治疏恩黼座進直鴻樞審覆官能暫繄于定鑑敷宣王化行秉于大鈞代上運使度支狀近承崇斾出接屬封俯惟陋藩最處要壤或官書之弗整與民瘼之未蠲宜舉上臺之威以警他邦之闕尚繄寬假不汝咎疪去德未遙佩恩良極仰惟純履舉集休祺恭以某官才為吏師名重物論行甄風績驟被褒華代上許待制狀近者伏值某官奏輸將之大計入覲京師還留止于屬封殆彌旬浹獲修版謁屢叩坐隅特忘位貌之殊俾親燕語之重伏惟新陽貫序粹履餐和恭以某官才為世生道先民覺宸篇彬郁方躋潤色之班國計羡盈行被褒嘉之渥上趙屯田狀嚮列冗曹日叨巨鹿洎赴中銓之集方聞嚴斾之來雖甚傾德誼之髙不逮事階墀之未旋拏舟而東下獲斂板以前趨伏䝉削去常儀過存優遇兩紆騶從特顧旅居自違逺于門牆鎮淹徊于道路瞻風惟日進記不時恭以通判屯田行潔文醇才周業巨關决要邦之治聊以康民延登祕館之華乃為宜職上樂職方狀嚮為賤掾方托仁侯曽不終朝遽然滿秩伏䝉忘其位貌之隔視若子弟之親逮赴集于中秋復寓家于盛府惠周幼艾日賜撫存旋補邑以南還獲趨隅而下拜許陪宴豆之末申貺公庖之珍越去恩麻洊彌月所淹徊道路濶略箋函伏惟靜治善藩舉綏泰宇恭以知郡職方忠諒許國文章世家試劇要邦暫班于寬諂垂光近署行服于華章上蔣侍郎狀適貢蕪音仰塵棐几方省瀆尊之咎遽䝉賜教之酬恩奬過優公言加重拜而伏讀藏以為榮昔魯經尊仲尼之褒有踰贈衮楚諺珍季布之諾不啻得金此越舊聞尤深厚幸兹蓋伏遇致政待郎主盟吾道惇勸士倫弗遺簮履之微特屈王公之重親占勤誨俯及冗員永矢糜軀仰酬知已又蕞爾微生缺然善狀蚤繇寒士之目嘗出大賢之門旋試吏于淮州復調官于京轂一違台坐五見嵗隂恩紀敢忘第及肌膚之鏤公函不講懼干爵德之尊伏惟順履蕭辰翕膺茨福恭以致政侍郎才謨深亮識宇閎通珍䇿熙朝已底山河之固安車還第自遺圭組之榮為物論之稱賢矧上心之圖舊就咨大政當叩於元龜覬保粹襟庶全於永祿代上知府章學士狀竊伏盛德於兹纍年緣習簿書之勞絶攀臺閣之軌俯惟敝邑獲爾善邦如鄰洪河日所䝉潤不逺數舍缺然貢音伏惟溽暑貫辰粹襟迪吉恭以某官直清不倚莊重自居蚤光書殿之游克踵相門之烈尚稽顯任屈有寬條然才如弱翁寧久外補而上念賈傳行當召還倍綏燕興前對休寵代上元屯田狀近遇齊舲俯經敝邑獲風期之覯止出天幸之使然歊暑尚留燕居增裕恭以通判太博量函夷雅氣迪中和掌故曲臺深明典藉之奧贊條方國佇洽海圻之安尚阻趨承倍綏寢味代上仙尉楊袐校狀瀕江之别纍月于兹待次彌年任懶成性坐曠尺書之奉第勞寸臆之傾辱教甚勤寄顔無所恭以仙尉祕校天資夷爽士檢淳修方美職之勤行被褒書之薦達尚遙瞻挹倍衛燕興代上北京文相公狀伏念發蹤巨冶實台庇之焉依出守孤城已嵗陰之載易比終吏課嘗進公函違逺門牆之趨缺疏竿牘之獻並紓梗概仰瀆髙明竊料郵程之弗稽當歷鈴吏以兹久逮驅車于道路方稅鞅于京師區區塵容衮衮人事别都在望翹館非遐惕就謁以無從第銜恩而有素伏惟坐班寬詔參萃繁禧恭以某官簡厚凝姿宣和迪德抱精忠而致主懋顯績以光朝兩冠宰衡首謀王體濶儀墜典率圖講于明廷偉烈豐功復蕩平于外閫既殫能事弗有元勳懇列讓封樂還幾政旋開尊府出尹留京五月之治告成適煩君重一相之尊居外尚鬱民瞻佇歸宅于上台以永康于四海上越州知府待制狀伏審就膺細札移殿巨邦已即便辰榮開尊府伏惟慶慰恭以某官量函簡厚識貫幾深自結主知歷紓賢業總東南之大計蚤懋膚功暢左右之偉謀尚稽寵拜嚮露章于黼扆獲均俟于蕪城風績愈凝嵗課連最思匡微俗旋易名藩雖買臣懷章歸驚于守邸而望之為郡雅在于本朝行對詔函進調台鼎俯惟寒士之目素出大賢之門恩紀未酬愚衷曷諭上興國知軍陳郎中狀頃從初仕獲庇仁侯鄙鈍自持羇單孰援遽收寒士之目俾出大賢之門旋去嚴麾挈來小邑三嵗僻壤僅絶貢書之偕一心恩閎未知論報之地伏惟坐班寬詔誕擁繁禧恭以某官為邦老成作吏師表觀風軍壘尚鬱于賢謨熙績王朝行光于帝簡代上蔡三司狀某實令之愚自少則任席嚴父之餘寵寢叨臺郎誤宗工之重知彌愧國士曽乏寸長之録屢䝉清譽之加顧舟楫之攸同號簿書之兼冗度不能而雖止荷所賜以惟均一來河濱久去門下左右之供子職不知嵗月之遷起居之奉公函都失寒暄之問仰賴恕情而曲貸少寬廢禮之嚴誅伏惟發抒偉謀臨總大計弊竇幸門之出已閉塞以無餘利源寶路之藏復開通而有裕民財內贍于國兵食外豐于邊膚功遹成能事云畢行聽都俞之命告厥廷中坐開康濟之懷擴之天下爾時孱陋訖望埏鎔代青州相公先狀伏審入覲明庭出臨巨屏油幢周匝益知丞相之尊行路歡迎將慰邦人之望俯惟冗列方冒劇司督運淮邊適當于使道趨風節下即拜于清塵日企台儀曷勝愚悃恭惟某官忠誼結主文章致身蚤慮康濟之才少見太平之效雖廟堂之上皆利澤之素行而藩翰之間欲化風之親被樂班寬詔洊撫遐氓坐席未溫行聞于趣召元台之舊亟復于升庸俯惟疏外之蹤訖託埏鎔之造李密學先狀伏審將辭魏闕已整齊艫鐃鼓沸川允極行暉之盛壺漿溢路前知輿望之濃拜德有期實天與幸恭以某官氣鍾間傑道具大醇由妙年而取甲科不纍日而都顯位幅員億姓久濡霖雨之沾藩屏一方聊藉仁風之扇餘留瞻伏併叙傾翹代邵興宗北京相公先狀受君言于國勞使聘于郊仰企台光甫入别都之境深繇天幸將瞻上衮之戚竦抃兼懷文陳非諭瀛州澶州知州先狀逺迓使車前經帥閫塵容載被行干典謁之司德範所瞻庶釋傾風之藴其為抃幸奚盡敷論題轉先狀將命以行勞賓于外獲道使臺之便即登客廡之嚴餘在趨承併紓翹嚮代許州賈侍中先狀得收小邦請塗寰服台躔在望魂已愧于熒煌賔袂如歸迹自忘于踈冗矧預薦紳之列嘗居巨冶之間寖竊官榮率緣恩素兹趨風之有地信獲幸以由天俟稅征車即干典謁屬嵗陰之凝沍仰德履之綏將文武兼資已極宗臣之貴邦家所賴行還上宰之嚴瞻覲有涯欣榮偕極上龍圖狀恭以某官瑚璉茂器河嶽上靈以忠誼結主知以文章重時論翺翔華序暉映清時嚮臨邊閫之雄洊總漕臺之劇進榮班于延閣升茂績于本朝金榖要司暫繄于心計鈞衡顯命佇奉于詔音荆南張龍圖狀自違治屏寖易嵗時適便道以趨官第望風而懷德伏唯靜布寬諂翕臻純禧恭以某官識蹈大方氣陶至粹雍容近綴暉映本朝內閣升華厭邇臣侍從之事外臺分寄詠太守中和之詩然而先一州乃大用之階為三公由此塗而出行聞爰立以副具瞻知府龍圖狀恭以某官莊重自居直清不倚言經邦國之體學際天人之交出對休辰進更顯仕旋升延閣密侍邃旒京邑四方之表儀方騰于尹政宰廷百辟之師師當被于朝僉咫尺聰聞旦夕冊拜甫臨首祚誕擁繁禧某適縻漕局之煩莫逮夀杯之奉其為瞻企曷可名言上知郡都官狀右某言比者知郡都官解麾南服奏課中宸藐如嬰兒驟奪慈母苶若是馬止思故軒仰跂恩暉第零感涕惟齊舲之遐遡固德宇之中安恭以知郡都官才貫幾深器函剛實政不火烈民自畏之心猶衡平事罔欺者行光循吏之目親受聖王之知匪朝甄躋協時傾屬某短才初仕嘗備于使令裕度兼容靡尤于鈍拙更繄餘末之庇曲保孤單之蹤不由他門以畢大造伏望上為邦社精調寢興上貴池仙尉狀自阻風期倐彌嵗所奔馳掾局常若少閒將迓使車曽無虛月因曠起居之間仰咨燕餗之安豈謂注存首貽音諭不忘雅素第切中藏暑氣方炎晤言正邈倍祈愛重少慰瞻翹代上何舍人狀備位冗官副車下郡冠蓋旁午鎮事于將迎案牒沈迷坐成于勞辱望長安之日第悚遐心傾西州之風阻瞻粹矩伏惟雍容禁列熙暢沖襟恭以某官亮直蹈彛中和迪哲文經邦國學際天淵載筆記言方書萬世之法秉鈞調化猶鬱四海之瞻行被詔音驟光冊拜參政趙侍郎狀恭惟參政侍郎為國雋老受天元精自結主知備紓賢業坐陪幾政㑹月月之休明仰對慶辰贊乾坤之茂育翕膺時祉增煥台躔某職總使臺跡疏賓廡永言瞻頌曷盡敷論福州密學士郎狀就奉明緡擢司外計顧短材之非稱賴巨庇之焉依已即便塗行登尊府恭以某官夙鐘間氣親遘熙辰秉忠諒之一心出誠明之正性備舒賢業自結主知踐碧落之華班兼鴻樞之祕直差緩登庸之册聊分鎮撫之符邇恭梓之巨邦布坐棠之美化江山有助不廢于清吟圭衮儻來靡嬰于素志風猷增邵時論確高然而先一州乃大用之階為三公繇此塗而出行膺迅召入踐嚴塗餘遲瞻承並紓翹緒范資政狀瑣焉近器效此冗官念案牒之沈迷坐縻俗狀企旌麾之嚴密阻拜台儀伏惟鎮撫巨邦有宣寬詔神明所右福祚載蕃恭以某官社稷宗臣山河間氣道誼行已忠諒致君傑立當朝究悉能事出綏邊略進二宰廷收已試之豐功厭居台路分唯良之寵寄連換守藩行奉溫書亟躋上衮同事邵學士狀繆叨恩諂與領計符朝廷弗棄非才駑蹇以為可使席衣冠之餘緒寢竊時榮視金穀之要司懵無素術俯伏承命兢慙失圖賴夫聫事之賢兹有乞靈之地風期伊邇天幸居多恭以某官學造聖微名高士論籠財外計似非職業之宜載筆嚴塗行代訓辭之出盧楊二侍講狀自去德誼漫踰嵗時鎮鞅簿書之勞絶踈竿牘之問仰惟福履俯順生經恭以某官道具粹淳學際元本發先民述作之奧中當世修明之科暉映端朝雍容近綴屬聖王崇儒之際得君子逢辰之光翔步赤墀備天臨之顧問解經內閣廣上德之聰明行副眷懷驟膺升擢孫內翰狀近被宸綸出從吏局馳心翹館之下回首長安之遙遐企恩暉第盈感抱維侍從之豐暇固神明之頓還恭以某官道具粹醇德函剛實早居仙籍之髙選兹冠禁林之貴游體詔意而裁訓詞方見真儒之效柄台衡而圖政教行畢大臣之能曽是冗微最叨知奬諒其愚介謂可甄題事雖迫于他端恩已遇于衆遇恭以某官夙鍾間氣親遘熙朝論不詭于聖人言有補于當世蚤揚華貫登踐禁扃密詔深謀或內參于坐論髙文大冊皆進候以立成潤色宸猷發揮賢業矧北扉之上笏即黃閣之便塗視草玉堂靡客于久次調元金鼎行副于具瞻張祠部狀向陪朝謁阻逺賢規仍引紱以竊榮將還鄉而待次優游故治倐爾彌旬復為人事之勞美緩公函之奉仰惟純履誕擁繁禧恭以某官莊重自居直清不倚逢辰熙穆筮仕光亨尚淹册府之游聊寄漕臺之柄下車視事列郡傾威運心計于無垠方繄幹濟被恩章于不次行步顯嚴海州通判盛寺丞狀逖違英範增鬱塵襟徒然燕語之傾缺爾箋縢之致豈圖情照首占音書意在逺而彌親禮由謙而益厚仰銜勤抑第切銘藏歊溽向闌標儀猶邈勉綏寢餗前荷寵榮錢塘鄭寺丞狀之官江裔去德嵗餘幸治境之相望惕音函之不講日棲濃蔭坐企高風韶煦貫辰燕興迪吉恭以某官材猷膚敏方格淳修較藝禁扃賜科詞級試才劇邑休有美聲翔步嚴塗佇還舊物益綏寢味少副瞻祈施發運狀某備位守藩託身使節日有詔條之奉缺然箋牒之修仰料燕興舉臻禧祉恭以某官民靈先覺王佐偉才早升天閣之華兼領諫垣之祕提衡外計兹鬱于具瞻秉軸上台行聞于爰立伏望為國自夀協時所傾發運施待制狀近者伏遇某官假塗屬部奏計中都某適二小邦獲瞻上笏旋齊舲之遐遡固德宇之中安恭以某官才貫幾深量函夷雅由妙年而取上第不纍日而居要官利柄浩穰暫倚濟時之略宸篇彬郁適繄潤色之才方入對于王休佇驟光於冊拜伏望為國自重以時考祥施龍圖狀西州一命支郡下僚託使斾之末麾沾恩疇日列公函之兼幅叙感後時伏惟鎮撫巨邦綏寧泰宇恭以某官知謀光大術業崇髙道誼致君忠諒行已偹紓賢藴厯踐班榮蚤為聰哲之知出總東南之漕風猷益茂嵗課頻優掌宫鑰于留都未溫坐席改守符于邊閫聊倚長城行被召還驟光册拜又自去恩麻洊更月所委質草茅之賤嘗備下僚馳心旌棨之嚴第增勞想向抗塵于臺牒缺進記于鈴齊伏惟班詔多餘擁休彌裕恭以某官中和迪哲洵直懋功由髙文而掇異科不纍日而都顯位名重時論才為主知早年立朝有臺閣之風采頻嵗成績董江淮之轉輸尚淹徽冊之榮聊屈寬條之寄行膺柄用大副巖瞻上二漕狀某一竊科籍久糜祿鍾走官路而非常悼親瑩之未卜露章得請襄事言歸鄉里以恩意往來板輿以登頓勞苦仍懷喬木之戀不覺還轅之遲在私欲而更安致王程之淹引日虞按舉以詰稽違賴外臺軫惻之仁全末路孤危之迹此蓋伏遇某官恩推再造量極兼容特寢見行之文靡尤既往之舊使朱轓家守獲訖于恩榮皓首偏親同終于孝養欲報知已敢忘捐軀金華知縣國博狀伏審解印還臺促裝首路驟違巨庇增鬱丹悰聞赤子之攀轅第欽遺愛參諸公之供帳莫遂愚𠂻恭以某官風業宏長襟致夷逺試才劇邑適善治之告成第課明廷行茂恩之優及瞻祈戀結無諭下情省副王郎中狀恭以省副郎中盛德之後元精所生甘泉之課屢優茂恩行及淮水之源方濬逺用奚涯順履天陽載蕃時福莫遑為夀第劇傾風代問候屯田狀右某自紆守紱逖阻朋簮近繇愚息之行嘗致幽緘之問伏惟布行寬治臨撫善邦鎮靜多餘神明永復恭以某官禀氣間傑為時聞人父母一州不足充天下之望旦夕中詔將以副上心之傾回翔顯近燮理元化伏望為國自夀以時考祥代問候丁憂李端明侍郎狀某自冒仕階嘗出門下奔馳吏役邈矣一涯契濶台光倐焉纍月第馳心于恩館曠聚感于書縢坐跂標儀鎮勞悃臆仰惟孝履俯順禮經恭以某官名世鍾賢際天藴識以忠誼結明主以文章重當時輝映端明翺翔華貫以至載筆法座代言禁廷上直文昌之垣榮兼祕殿之秩旋出觀于藩政俄入宰于銓衡品題庶官時所稱允師帥百辟上方注懷遽遘親闈之悲差淹台衮之拜然萬鍾及養足以慰夫生平細札奪情可金全于忠孝永言瞻禱曷究指名代問候許發運狀竊玷茂恩獲監便郡使麾所屬官次焉依伏惟順履蕭辰誕膺茨福恭以某官纓紱奕世文章冠時上知甚明自結益固金穀登羡備紓富國之才朝廷寵嘉行付經邦之任某適棲暉庇倍切傾祈久曠台光尤深戀結代問候程密諫狀被命中宸效官南服門牆愈逺慮遺冗外之蹤箋牒不時懼瀆高明之聼仰惟坐鎮俯順生經恭以某官亮節在廷懿文表世早紓賢業自結主知升諫署之華班兼樞廷之祕直中外洊歷明哲維均父母一州猶鬱于清議領袖百辟行副于具瞻俯惟下僚嘗備屬吏庶終坱圠之造以就生成之恩吳司諫問候狀右某伏念竊玷茂恩獲臨便郡逖仰諫垣之貴列嘗同鄉閈之昔遊日企標儀坐勞悰臆伏惟居得為之地有結主之資咫尺清光啓居純福恭以某官術藴經濟學該本元親逢聖期獨中賢選雄文珍䇿早奉對于大廷至論昌言兹弼違于當世匪日爰立協時具瞻陳州相公問候狀右某比者叨承明命獲假便麾去國匪遙盡出大鈞之賜貢書差緩懼干上衮之威伏惟靜布寬條翕臻純祐恭以某官體凝方重道著將明結真主之深知極大臣之能事幅員億姓已躋富夀之區藩屏一方聊布中和之治行膺宸照還秉台衡司農張待制問候狀右某近被詔書就移藩服方休道路之勤頓即有教條之奉行阻叙暄凉仰咨寢味恭以某官夙鍾間氣親㑹熙辰咫尺清光翺翔近禁宸篇彬郁方繄潤色之才農府登盈行被懋庸之賞驟歸柄用少慰輿瞻伏望上為邦家精調燕起承㫖內翰問候狀右某伏念假守小邦瞻風上笏惟侍從之豐暇諒神明之綏和恭以某官道具粹醇量函夷雅頃居仙籍之甲選兹冠禁林之貴游體詔意而裁訓詞方見真儒之效柄台衡而圖政教行畢大臣之能安撫資政問候狀右某近奉音郵計塵台座仰惟福履誕擁休祺恭以某官經世髙才薦紳碩望厯更華要之選備極將明之才天下之安暫休于廊廟方面之計屈布于藩條諒五月之政成即三篇之册拜伏望上為邦社精調燕興李刑部問候狀右某言竊念使麾所屬旅次焉依如鄰洪河日所䝉潤不逺數舍缺然寓音伏惟順履歊炎誕膺禧福恭以某官德函剛實才貫幾深親㑹聖辰備處賢業登車攬轡已澄序于官聫挽粟飛芻復羡盈于邦計行旌幹濟驟陟近嚴代問候提刑郎中狀右某自逺麾符屢更弦晦仰惟純履倍集龎褫恭以某官經世巨才搢紳碩望進持國紀當寧器其詳平出按刑章列城竦其風采行當秩滿佇聼詔還伏望上為邦朝精調寢餗候青州安撫大資狀右某自違鈞庇日企台光伏惟鎮撫之餘福祥所萃恭以某官際天藴識名世標才宰樞廷之密謨専將閫之外制悉殫碩畫訖致大寧以至屈領守麾榮兼使節將天子惠綏之意慰安元元詠太守中和之章述宣晏晏行奉星召亟還上台俯惟衰遲鎮託鎔造問候通判都官狀學古不優涖官無狀備使令于庇下䝉顧遇于尊前居常親承教誨之言不覺身在州縣之賤二車言邁浹日于兹惕孤宦之疇依企餘光而獨甚仰惟純履舉萃醲休恭以某官莊重粹溫剛明精敏關掌郡事屈領簿書之繁鈎深聖微行司典籍之祕代問候荆南知府狀自逺鈴齊寢移圭籥惟淮壖囂冗之地有官簿沈迷之勞曠繼奉于音題以究陳于感愫伏惟布宣寬詔集受繁禧恭以某官業履蹈中和猷彪外聳動端朝之望雍客內閣之華惟荆渚之雄藩據洞庭之勝壤厭居祕殿之侍樂駕兩轓之游圭衮儻來靡嬰于素志江山有助不廢于清吟諒五月之政成即三篇之冊拜祠部集卷二十
