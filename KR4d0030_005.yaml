body:
  text: 祠部集卷五宋强至撰五言律詩北都春日日出車馬道風來城市塵關河應自昔花草不知春雲靜鳥翻翼冰消魚動鱗太平無一事把酒勸耕民出大名府北郭驅車出近郭野色感年華河靜水猶凍地寒林未花細風吹斷桞殘雪隱虛沙鄉思東南闊歸飛羡暮鴉馬上口占出郭塵埃少驅車節物便歸心忘澤國病眼豁霜天鳥雀飛荒圃牛羊卧晚田吟邉搖落意踈木起孤烟二月過半猶未見花昨日逢之珍云已有小桃因成短句不覺春過半開花始見桃年光雙鳥翼世事一鴻毛有興撫清景將愁付濁醪家林應爛漫南望首空搔偶書呈公勝朔吹朝還暮繁雲凝復開不能成雪意只解作寒媒薄宦家千里長吟酒一杯西鄰鄭夫子乘興幾時來走筆送楊正臣先輩還吳客衣沾魏土歸馬望吳雲一紀困游宦異鄉愁送君驊騮行得路鴻鴈去成羣歸省元昆何日江天酒重論别後文居魏嵗餘未嘗見江鄉故人今無悔如雄過此相見甚喜席間率成短篇呈之經年大河北終日故鄉心入耳欣吳語開懷慰越吟天寒裘領薄日暮酒杯深早晚論邊䇿長纓試請擒新秋夜月寄故人客心宜靜夜月色淡新秋影落三湘水詩傳八詠樓何窮對酒望幾處捲簾愁若問相思意隨君萬里遊依韻和留臺崔庫部局中自遣儒林文雅作蕭散欲揮金老去安時態秋來慰夙心誰陪黃菊酒自喜白頭吟賔客霜臺少詩成每獨斟自零口夜至渭南縣作月黑征途暗羸駒傍險行村遙微認火縣近忽聞更落寞殊鄉意喧啾小市聲故園流水在想像見冰清婦翁嘗宰此邑作渠引水以溉民田今享其利送長安僉判鮮于子駿還闕相望蜀父老應嫌駟馬遲三冬辭幕府千里走京師富貴那能滯文章自有知關山含雪意别酒對秦姬長安春日白入雙吟鬢衰侵一病身年光不貸老春色似欺人鳥破日邊霧花飄風外塵還將感時淚對酒灑咸秦題光和年西嶽碑瘦硬光和字崔巍太華碑鐫模森骨立㸃畫宛鱗差內有通神筆前無絶妙辭茅齊千載後玩古獨心知唐賢嶽廟題名華嶽金天廟唐賢石闕題姓名留篆刻冠劍落耕犂字體諸家雜函封數驛齎幾行猶壯觀丞相討淮西裴晉公征淮西與將佐西下皆題名石上斷碑何代經兵火終年委雪霜文章誰黑白首尾自參商琬琰那淪翠塵沙漸變黃人生異堅石撫汝重蒼茫依韻奉和經略司徒侍中上已㑹興慶池千載蘭亭後風流宛目前竹昏煙冉冉花泣露漣漣筆落詩推將杯行酒有仙水邊佳麗少春草謾芊綿杜工部有三月三日天氣新長安水邊多麗人之句小閣西山落日天地埀埀暮殘陽似有情未催全嶺暗猶放半山明逺樹微茫見孤煙慘淡生流年從此老對酒急須傾翻經臺失道從僧指窮高聽鳥呼千山四回抱一徑百盤紆人事空今昔臺基儻有無吟邊嵐氣夕落日伴猿狐題華臧環峯閣精藍已塵外飛閣更雲端只見蒼山合寧知紫宙寬客遊追汗漫詩思等㠝岏大士安禪後何人此倚欄羽師院假山纍石作危峯軒然曲沼中山形在眉睫人意自衡嵩影駭魚蝦避路疑猿鳥通宦途尤巧險匠手莫言工京兆府初赴同天節宴詩四月薰風轉三天瑞景舒歌從歸唘後夀起祝堯初詩喜南山對身甘北闕踈九韶音未作朝野自歡如五帝今云六君王合萬年日長遲漏水風細駐爐烟想像聯朝珮歡呼捧御筵喜深恩更逺不竭似秦川哭王仲密四首相逢初北闕並試復南宮失意春風裏謀歸汴水東行藏他日異笑語此生空不掛青雲籍聲名野史中羣居三益友再拜十年兄一别長南北相逢遂死生淚流添渭水心折注江城聞訃悲尤劇書成僕未行豫將遣僕持親朋書南去而君書在焉忽聞其訃場屋行遲暮田廬卧寂寥壯圖藏翰墨高行落漁樵㑹哭諸朋盛銜哀一奠遙繫舟江岸絶愁望定山潮多金空舊産短褐盡平生蒿里閟春色桐江流哭聲人憐天不與婦少子猶嬰如有山濤在應忘顧後情依韻和酬鮮于子駿郎中見寄昨在王公幕同時輒仰攀論情昆弟等知巳友朋間渭北孤交臂淮陽慰客顔王公今牧陳復留兄居治下長卿看駟馬父老望西還趙龍圖自西川擕鹿兒至秦相惠軟毛金縷暗細㸃雪花勻林下逺思母階前愁傍人澗聲微可聽野性漸能馴公惠成愚好他年伴幅巾長老鳯師新作四照亭以其環顧洞徹無纎翳礙目故名云從豫乞詩因即其說以寄題大士安禪外孤亭曠望中物無形可遁心與境俱通日月光應倍江山氣更雄寧須面壁坐到此即觀空留題太平寺鄉落少人煙精廬獨巋然香花真佛界棟宇始唐年鳥啄齊餘食僧參夜半禪清凉數畝地巳是隔塵緣留題東巖院仁祠倚巖腹無處入囂氛古像棲深殿高僧傲白雲山花暖自發溪溜逺猶聞我正為名縛翻羞猿鳥羣數日前伏蒙吳先生留飲旋辱尊什喜某之來謹依嚴韻奉獻昔荷齒牙論今猶骨髓淪報知虧國士高第濫門人墻仭欣重到眉頭為一伸却嗟夫子疾是日卧漳濵依韻奉和司徒侍中仲春釋奠先聖祠逾重尊儒世適丁上公儀最熟太學祭頻經曉月衣冠净春風爼豆馨魏人休請頌在泮已言形梨花舊愛樂天句今逢帶雨春花中都讓潔月下倍生神玩好張瑶席攀仍贈玉人莫開紅紫眼此外盡非真雨夜舟中岸鳴連夜雨舟繫數家村防盜頻敲柝愁吟早閉門呼兒陳小酌憶弟動歸魂安得晴風起吹開波浪渾御河舟中浮舟不用力一水靜於山沙鳥晴相喚河雲晚更間微吟窮有象清思入無間河策誰云補從公漫往還屐好在登高屐東西類此身游頻齒幾折用久蠟還新晚步憐今日幽尋憶古人莫隨珠履客且伴白綸巾夜坐城裏更籌急窗邊竹影微掩書雙淚迸撫事寸心違嵗月辜華紱風霜感彩衣陶潜空自賦何處有田歸韓魏公生日三秋開爽氣七月降元精致主鈞樞遍尊賢衮鉞輕顯庸歸社稷隂相在神明漳水流無竭年年伴夀觥九日霜净乾坤闊登高極古臺秋聲楓幾落客眼菊三開短髮頻看帽寒吟間引杯籬邊空意緒難得白衣來庚戌嵗除薄宦三冬暮殊方一紀餘笑歌筋力倦勳業鬢毛踈道路紛乘傳軒墀遝曵裾無庸看半百搔首嵗云除依韻和張文通中舍寄韓師元判官從容須陛對蕭灑待家居近閣從戎筆間裁寄舊書青衫逾一紀黃卷尚三餘聞說山齊好何時遂曵裾送談供奉丹山靈鳯質偶别帝梧飛忽憶華林好還收倦翼歸緑深宮樹合紅薄苑花稀重到回翔地卑棲嘆昨非次韻仁叟禁中清曉禁廬休夜直瑞靄向朝敷華闕辨雲氣紫宸低斗樞帝梧鳴彩鳯宮漏息銅烏日出將臨扆天光冒海隅送陸覃校書赴選西上朝飲送春酒暮吟傷别詩豫愁鶯語亂君興馬蹄遲五府何時辟三銓㑹早辭回鞭晉陽道不負細侯知次韻盧六員外避暑城市苦歊暑尋凉到水窮環林得高䕃解帶取微風渴肺舉杯緩汗膚兼酒紅當年河朔㑹舊事豈全空中秋京師對月今夜皇州月秋光共幾分未全成皓魄猶勝隔浮雲白髮愁偏照清樽喜獨醺遙憐江國弟北望首殷勤悼承天月禪老祖意生來達詩心老去專傳燈與誰子絶筆在何篇朝客散談席野禽窺法筵唯應軒北石秋後自依然送蹇磻翁都官赴倅梁門豫與磻翁同年進士南宮同舍復北都幕府交承共昔登龍客仍今同舍郎後先趨帥府南北重離觴塞角催秋月邊烽落曉霜軍城看趣召能久賴王祥久雨初霽對酒偶作彌月窮山雨昏昏氣蔽天南榮初見日萬瓦已生煙節物驚殘臘歡期减去年愁來搔短髮對酒且陶然仲冬十六日祭馬步提轡傍險徑喜隨雙炬紅薄雲籠淡月苦霧捲嚴風馬害誰云屏神休覬所蒙晨門未開鑰殘夢續齊宮齊宮獨酌待曉入城青燈頻照面黃卷懶低頭危坐自醒醉孤斟誰獻酬簷前落星宿城裏息更籌上馬即塵事欲歸欣少留贈杜咨祕校唐代詩人傑家居世杜陵祖風今不墜君學善相承氣直橫秋鶚文雄絶漢鵬風騷如命將壇復讓誰登杜以詩和答依元韻贈之子美沒已久正風幾替陵上天憂道喪逺裔以詩承駑足輒追駿鷃心聊慕鵬微之重堂奧努力願同登送范令巽之赴陜縣陜人西望眼唯認馬蹄東桞縣追陶令棠郊謁召公問農游手勸聽訟下情通千載萊蕪後傳家有素風送同年張正臣赴海陵幕早年登甲選從事又東藩地與淮流絶城連海氣昏好山供健筆暇日樂清樽多著太平策歸來奏帝閽寒爐偶坐戲呈任道人事車輪轉年光木葉摧交情論晚嵗生意共寒灰未足勝寬褐那能暖凍杯知君尋氣類不為附炎來依韻和仲靈禪師喜賈丞相趙翰林見稱輔教編之什浩蕩藤州老雄文鼓大編聲名元自重述作許誰傳成誦慙空久相逢偶未緣承明內外相交口譽師賢送覺上人還霅卞山風月古秀發在詩人之子含清骨禪師託後身千篇收篋藁一夢繞鄉蘋知巳大丞相無勞揖縉紳依韻和彭九及之歸飬之什江南春自好蜀客亦思歸淚與花俱落心隨燕共飛露章還子舍孝理副宸闈禁署風流後謀漁未有磯送宣州太守沈司封宣城從古勝謝守擅風流夫子名當世君王付此州訟鈴間郡閣吟筆動江樓莫憶窗中句能詩今隱侯送王天常太祝詩雨洗春枝冷鶯愁晚更啼感時雙淚落送客片帆西淮隰逢鴒羽令弟祕校先之儀真京塵縱馬蹄有才無殿課安穩步通閨方殿省示惠逺祖先生詩集先生名不死三百幾年間白首吟唐世清風起越山遺編流自久異代許誰刪遠裔傳能事斯文氣欲還屬疾壯懷衰獨早樂事病全稀靜聽聞花落欹眠見燕歸冠裳成外纍塵土汩真機强起親曹事遙慙舊隱扉豫纍日卧病適張文通惠教亦云服藥漫成小詩呈之功名心寸折嵗月鬢雙蓬病畏酒杯緑愁憐花蘂紅杖藜成暇日行樂步春風唯有張公子翛然此意同暮春被病感書孤直難知巳才華反誤身流年銷壯節多病對殘春酒到心如達花空眼亦貧賢愚通塞理誰與問洪鈞聞升甫南池觀魚所獲無幾戲成小詩奉呈巨鱗非尺澤多目漫汚池網漏從今日筌忘復幾時饔人顏慘淡漁子興參差豈似任公捷羣鰲一釣絲病起觀盆魚戢戢駢頭戲悠悠掉尾行莫言盆盎窄猶勝網羅橫競觸浮萍亂時吹細浪生嗟豫遭病縛羡汝遂微情送王明叟起秀州法掾去去持丹筆當官議是非壯心低仕路戀涕濕親衣汲浪檣烏急吳霜稻蟹肥論文杯酒後從此故人稀行叟權秋掾比回正老以詩寄之因次韻奉和郡獄乏掾屬君才盛府依犴牢煩暫掌鸞枳復卑飛盡室輕裝去新吟滿篋歸風流傷别處粉淚灑紅衣送石亢之莭推赴廬州幕府執政昔曽祖滯才今令孫三遷才大幕萬石已高門阮瑀妙草檄毛公深誰言度支毛伯鎮典合肥相從賔主樂淮月共清樽送子立榮侍南歸有客就征驂風前别酒酣慈顏依膝下歸意滿江南去路草初歇到家梅正含短書無惜寄别後抵清談上何太宰生日斗杓西揭柄南呂巳飛灰芝室占熊夢蓬山挺梓材世欣金鷟見人慶玉麟來天意非難料行看位上台皇穹符寶運嵩嶽降真賢明月中秋後黃花九月前潭潭新紫府疊疊舊青氊遐想靈椿慶春秋合幾年漁者身世扁舟裏飄颻可奈何萬生勞白日一笑屬滄波濶網施能幾間機用未多余顏自憔悴莫作楚臣歌對雪六首幾尺江東雪同時户北風全家愁坐外寄命苦吟中已分書帷冷偏憎酒盞空漫將豐嵗兆去問白頭翁草樹驚全失山河望轉非片時藏地險底處極天圍樓半輕相逐簷前急自飛乘風還有意故去㸃人衣飄灑三冬暮蒼茫一氣凝寒威斗自壯空色曉逾澄狂走尋岡兔飢呼失樹鷹年來交態淺有興即誰乘影亂侵書幌花輕輟酒杯襟懷同落寞氣象亦崔嵬屢折參雲竹偏凌照水梅紅爐方爾附未可論寒灰色浮千里白氣逼萬家寒獨鳥飢猶啄癡兒喜自團向風初舞急入夜轉聲乾此味同誰冷吟窗映素冠朔風吹不盡皓氣入無間市井人喧息江湖鳥翼頑酒邊驚晚嵗吟外失羣山溫室便高卧明朝任塞關次韻答承天月長老方外得師晚相逢出古心交成真合水意在始知琴宦路塵泥久禪扄嵗月深清風貽絶唱一誦快煩襟塗中書四十言奉寄武陵則師師有知人術一言珍萬金聖門防取貌吾道素論心越樹秋聲起武陵歸思深桃源千載事此說更難尋書香嚴屋壁呈寺主隆師莊嚴模淨域金碧照晴霓土木有時竭樓臺無日低林泉藏好處巾屨得安棲我魂陶彭澤煩師數過溪詩送長老芝公歸靈洞昔以醫名著今兹祖意傳衆生如不病大士自安禪貌等澗松古性同山月圓應防猿鳥憶却指舊林泉贈净土嵩長老林泉久安住心境兩無塵禪外牽餘想詩中老此身虛懷延海衆雄辨服談賔偉特如師少相逢悟宿因贈霞長老大士本宿植妙年離世紛定心馴海鳥詩語淡秋雲與物曽無著收聲恐有聞唯將諸祖意晚嵗𨗳迷羣酬齊上人不見湯師久病眠時序深忽驚朱夏過真負碧雲吟他日虎溪約同時鳯闕心未論應去住杖屨且相尋景山無思二大師埀和鄙詩復依前韻奉答西北塵遊倦東南野興深帳空慙鶴怨山暝憶猿吟大士真交臂連篇契夙心㑹須携蠟屐雲嶠陟千尋送臻上人還雲山半嵗風埃地終朝雲水情身兼飛錫健眼向故山明不改禪衣色從來野橐輕煩師伴猿鳥兩耳厭車聲詩贈圓公大士恐是逃名客因為出世流人間雲不定心外佛何求醉喜形骸放詩嫌偶對囚我應遭竊笑聲利乃身讎仲靈禪師以詩見邀輒走筆依韻附還使奉和世好元難合便甘或棄辛喜師同肺腑偶爾異衣巾文約牽常俗詩情逺過人相邀松下别山意入秋新送李講主還維揚定憶婆娑樹雙埀滿地隂院有雙樹春風吹社燕歸意逐淮禽帆落橫江盡門開小院深先撾大法鼓續震海潮音師之來杭實幹法鼓仁宗皇帝挽歌辭四首未乾宮硯墨猶暖御爐烟雞唱空催曉龍飛忽上天攀髯三月暮灑淚五雲邊盛德無容報塵埃萬壽篇飛帚飄宸翰𢋫歌縱睿才歌歡三閣燕聲轉兩宮哀人世金縢祕天門玉鎖開年年初夏月寂寞夀山杯輕徭寬日力橫費惜秋毫臨諫天容晬尊賢聖體勞乾坤收化育弓劔入悲號十月西陵伏愁雲隔赭袍聖運一千載君臨四十春寶圖先與子妙斷獨如神瑞表虛南極哀聲動北辰天鍾堯舜性廟號訖稱仁石太保挽詞許國三朝老傳家萬石君乞骸章未報沒齒訃先聞挽鐸搖秋露銘旌卷暮雲龍岡逢古壤馬鬛寄高墳王廣淵郎中挽詞一門新茹痛八座近云亡禍故近賢者風流失望郎葬帷籠淡月挽鐸訴清霜祖烈繫誰紹三槐老北堂王子直挽詞二首流水身飄忽青雲意濶踈儒林看作傳使者合求書野月隨丹旐山煙濕素車寢門今日淚一灑為無餘王氏仍淮水賢人減潁川風流今盡矣天理舊茫然親涕霑封篋交情動絶絃公卿誰不到偏夭賈生年晉陽郡君挽詞畢丞相之孫諫議宋大夫之妻法度居無失圖書動有稽不偕君子老空美大夫妻淡月臨新兆清風在舊閨哭聲摧隴水山鳥學人啼夫賢微子後身貴畢公孫獨棄斑衣飬空餘象服尊悲風纒挽鐸苦霧濕銘幡誰謂靈香驗何曾見反魂祠部集卷五
