body:
  text: 祠部集卷二十八宋强至撰書代魏公賀昭文相公書伏審進膺顯冊復秉洪鈞廊廟登賢寰區均慶伏惟某官山河間氣社稷宗工挾重計以翊本朝履正德以儀庶位措今師古早攄珍䇿於可行尊主澤民久鬯偉謨於已試向辭幾政之要洊布教條之寬顧西土之具瞻遹歸帥尹煩東山之强起實為蒼生行宣經濟之元猷坐格太平之極致某側聞成命竊忭丹衷賀王參政書竊審茂對制恩參聞幾務君子得行其道衆賢相慶於朝伏惟某官函德淳深秉彛惇大體溫辭而書命三代之風可還對清問以傳經一時之論無苟天下之望蚤名未仕之臯䕫廷中之謨暫二有聲之邴魏側聞睿簡增忭鄙懷上相州傅待制書此參戎幕未逾匝月之期再頒軍書復應上臺之辟審開尊府適在别都既不能備一日之使令得稱故吏於門下又不獲釋纍年之願望略聞餘論於坐隅遐企末光增深愚抱伏惟某官量包公輔學際聖賢廣譽令名仰若泰山之重危言珍䇿措諸四海之安蚤臨長於諫垣旋出觀於治屏上心圖治矧聞獻納之前規中詔趨歸當鬯經綸之偉業春韶過半時祉載蕃願為國家精調寢餗代魏公回劉郎中書比總帥符益疏賢範宣本朝之利澤方究寸懷枉順驛之飛文過形厚意矧惟巨業夙簡淵衷佇馬政之有成被龍光於不次餘惟輔衛少副願言回趙參政書比領守符兼提師路才奉行於寬詔即論謝於單函國論多餘郵音繼及過形賁飾增重常彛惟參斷於萬幾諒翕膺乎百福伏惟某官端朝碩望經世元猷天下表儀仰淵騫之德行廷中事業贊邴魏之謀謨益保粹襟行膺徽冊回王宣徽書比緣病質丐領僻州帥路别都遽䝉於委寄守符留鑰遂忝於交承賴善政之有條容鄙才之循跡尚期必告得盡所聞又遄馳卓馬之朝入赴蒼龍之闕方懷盛德稽布尺書忽前墜於誨音第中藏於感臆伏惟某官道包衆美氣禀元精出入三朝備紓於賢業東西二府行慰於民瞻伏望上為邦家益綏寢餗代馮內翰回廣州余尚書書伏審被明詔之溫辭陟中臺之貴秩官儀益峻物論僉榮敢圖自損逹尊首貽寵教仰服謙懷之厚苐藏感臆之深恭惟某官道德宗工文章雋老才周數器名重本朝危言早動於丹墀偉績近光於銅柱兼倚逺略暫提南海之要封若咨升庸當簡曲江之舊德伏望上為邦社精綏燕興代王內翰上賈梁二相書某擢始孤生躐躋近侍與材散木繄化匠之為容獲器寒金繇宰鈞之所鑄旋冒復門之華選寢疏翹館之盛遊居企台儀間勞禁職曾缺音函之獻莫􅖴德宇之寧伏惟靜鎮會都樂班寬詔神明所右福祚其蕃恭以某官識交天人誠貫日月帶上公之印綬擁方伯之旌旗威行列城令肅外閫身任安危之重逺俗猶聞才通文武之兼萬邦以憲雖衮衣願封於東邑欲留周公而舟楫能濟於巨川當用啇相行膺徽冊還秉元鈞程宣徽書阻拜台符屢環歲厯實首承於內命且兼領於他司間裁詔誥之餘旋汩簿書之冗單函不講盛德焉依竊恃誤知之深尚寬苛禮之廢伏惟坐觀藩政翕受天祺恭以某官道具將明體凝簡厚抱廟堂之偉業挺金石之純誠二政鈞樞少見大人之能事班條屏翰未收真相之極功矧徽省之臣區即宰塗之便道節趨非晚柄任其時抃躍維深文陳曷罄王定州君貺張南京安道錢泰州子飛書逖阻珍羣屢遷華序思綸言之對掌深慕昔游玷詔㫖之首承實虧時望牽禁扄之職業事官府之文移寸慮日勞天書坐應念惟妙履參嚮龎禠恭以某官忠諒一心誠明正性髙文典冊以甲乎科等危言至論以根夫治經潤色辰猷蚤攄不世之藴謨明王體久具有生之瞻旅析左符遹臨臣屏矧講求於新治方咨納於嘉謀靡須五月之政成即被三篇之册拜唐龍圖子方書伏惟衆臨大計誕擁繁禧恭以某官名世標才際天藴識蚤紓賢業自結主知開正論於煉垣竣榮班於延閣時議加重風聲有休董北道之輸將暫煩碩畫贍中都之供億佇報膚功行奉詔音驟歸柄任吳仲庶孫次公王至之張文裕書久濶朝游載瞻賢範禁塗視草適居侍從之勞訟舍坐棠諒樂中和之職伏惟某官當世雋老為時聞人猷謀可師德業甚懋總列城於一道節制攸歸嚴督府之萬兵恩威並暢行祗迅台益衛粹襟李西臺書嚮職禁扄久違德字伏惟踐文昌之貴秩樂素里之平居益介康祺彌餘逸韻恭以某官得氣間傑為時老成識逹聖賢之歸言該名理之要柏臺留務遂清尚以優游李蹊慶宗襲餘芳之止足倍慎高言之飬行光大政之咨郝殿後問侯書總師西來百為所繫懷賢東望千里而遙馳誠則深布問差緩矧惟雄略夙簡睿心節旄蚤進於榮班陛㦸久提於禁旅行膺徽册入贊鴻樞益護燕興庶符瞻頌回懷州傅待制書承臨便郡已布寬條髙誼逈存珍函昔及矧惟厚望早服近班筆下極言嘗論治亂之體禁中勸講久格聖人之聰諒坐席之甫溫即鋒車之趣召渭州蔡待制問候書帥符所守顧燕語之莫同使驛之來反函封之繼相比惟福履誕擁龎禠緩帶輕裘坐銷邉鄙之警長轡逺御益重朝廷之威更冀珍頥别膺寵數回新䕫州路提形李少卿書竊審被命中宸按章左蜀首詔尺牘增戢寸襟矧厚望之端朝加傑才之經世躋榮卿寺久懋於風聲擢職使臺行光於時論回吕省副書審承召節進二財闈解守紱以還朝抗使旌而就道嘉謨造膝行入對於清光賢業致身期坐追於先烈沭音函之叙别企德範以馳誠益護寢興少符瞻頌回諸處知州寒食問候書木行貫序禁火丁辰首枉書辭備形禮意矧惟治績洽著歡謡佳節遹臨蕃禧參嚮其為感頌曷盡名云回楊四廂書向承高誼逺枉盛箋論志意之欲為顧言辭之甚壯知是仁者之有勇可使懦夫之聞風間又相規正如所願其為欽感尤劇銘藏回郭宣徽禁烟問候書木行貫序火禁丁辰首枉誨音備形禮意伏惟某官位光台路勳在王家龍虎兵韜自坐籌於方略貔貅將士皆逺服於威名臨履春和益蕃時祉回王介甫內翰書入相三朝坐彌一紀以有限之才而應無窮之務豈惟精力之已疲以嘗試之身而妨未用之賢抑亦寵榮之太久懇陳軒陛得守鄉邦功名弗居雖暫往哲之趨進退粗得偶合至賢之心喜素節之護全枉盛辭而溢美適來總帥遂緩布書旋承違樂職之高懷屬演綸之大手前席論議密簡聖人之𠂻本朝文章行追典誥之體春暄未過福履自持卑情無任瞻戀依馳之至回新知虢州田大卿書比承高誼特貺辰箋攄經世之逺謀條御邊之上䇿析文武為二道既破據儒之談講兵戎之大幾有禆陋識之見不時布謝惟日懷慙春序過中坐經增裕更加精嗇以對寵褒賀提刑雷左藏書審承恩詔出按刑章矧風績之久凝加時名之素著首膺拜選允穆朝言佇聞庶獄之平反庸副上心之欽恤下車視事列郡瞻風忺欣攸深敷云非悉趙參政韓副樞卲副樞問候書遹來總帥訖此踰時乏文武之兼資統兵民於諸道內收已竭之慮外役久勞之軀殆無少間遂缺通問伏某官德函惇大才貫幾深經世有為擴初心於康濟致君以道鬯偉蹟於太平行膺徽冊之光以副薦紳之屬春韶云暮時祉載蕃益保燕興少符瞻頌賀北京王宣徽書竊審誕膺制冊增竣台儀成命既行羣言允伏伏惟某官器函惇大道貫惇深早更要路之遊遍歷禁塗之選司别都之管鑰再倚保釐秉二府之鈞樞久稽登用聊褒崇夫偉業繄宣鬯於徽猷行肆命於三篇以圖寧於萬化永言忭頌曷究悃悰答賀慶陽李水部幾宜書竊審逺赴辟書比臨戎幕高材所處大府之光伏惟機議水部識度惇深性資夷曠屢違藩鎮之薦自樂丘園之居宜難退身起為知巳兵民胥賴喜婉畫之必從賓主相權計成功之可底行疇顯效進服華章依頌并深名言非悉回河隂提舉輦杜比尚書伏審顯膺明命榮領劇司未列慶函首貽誨牘欣服謙矩增銘感悰伏惟提舉比部風力素强時才兼懋董河放於一道方賴底功按舟運之萬艘遽更重寄行旌顯效進服華章欣頌并深文陳非悉回賀吳舍人書審被制函進升詞掖矧惟厚望蚤映端朝重潤色於辰猷首廷登於俊德文章獨擅榮司綸綍之言伯仲相望增盛衣冠之事其為欣慰奚盡敷云回相州謝祕監謝到任書審即便時已班寬詔矧惟耆德早懋風猷望所舍之甘棠阻觀新政喜故鄉之喬木亦被深仁首墜誨音增銘感臆回降州薛郎中謝到任書竊審涓辰其吉布治云初曾慶問之未修遽榮緘之首及矧惟風力卓建事功卷百城澄按之才就一郡撫柔之寄寧久班於寬詔必當復於要權感頌并懷名言非諭回前知虢州李大卿謝得替書辱紆纍幅承解左符行路遮留感惜仁候之去還朝進對佇剔明主之休矧治最之告成即恩章之增寵勉加導衛庸慰攀祈河北運使張兵部問候書帥府所總遂成訊問之踈使範且遙第悵燕言之隔惟輸將於北道方贍給於中都心計坐經事功日懋甫交春夏未適寒暄宜益護於寢興即前膺於進擢回張度之書比以强敵玩塞重師宿邉爰咨近臣俾護諸將方安陽得守之後甫爾北歸以康定用兵之間嘗參西略命曰俞往義何敢辭竊自視短踈之才阻相從論議之益或上慿睿算粗寧疆堠之繹騷則再請鄉邦稍覬病軀之休息辱書云及見意良勤懷戢欽銘兼深悃臆回京西提刑徐郎中謝到任書審即便時已臨重職逺紆珍牘備諗謙懷矧風力之素强加時名之兼劭按章列郡獄將底於無寃翔步要塗門佇符於必大回提刑康左藏書比審涓辰巳諧視事逈存勤意首枉珍題矧素著於能聲復深懷於壯略參按刑章之劇佇登治狀之優欣佩并深名言非悉鄜州潘皇城鎮潼桑少卿問候書向總帥符每懷賢範方悵晤言之􅀈遽欣音問之來春夏甫交寢興良適矧久凝於風績行荗對於恩章益覬珍調少符勤禱回徐州趙觀文問候書向處近司最叨至契青雲當日既得路以同升黃閣此時復請麾而繼去春言暌隔積有寤思檄書頗多函訊遂缺此惟妙履益介龎禠伏以某官勳懋三朝道光一德懇辭要路暫收康濟之偉才樂就東藩自飬夀臧之盛福未繇清晤曷罄丹衷回徐州趙觀文書竊審屢陳封奏始解政機爰均佚於善藩仍躋榮於祕殿素懷兹適清議逾高伏惟某官道際醇全德涵渾厚千載台路一心王家舉至治於可行避成功而不有宰鈞咫尺弗須徽冊之登庸守紱優游自喜黃堂之卧理未修慶禮先枉誨音感忭并懷名言非諭回种作坊書逺煩専介埀致長箋承謙短之持循列遜辭而刻責佇觀後效庸紹先芬欽服尤深諭言非悉回南京李太尉問候書向總帥符益疏賢範比缺音函之奉仰咨德宇之安敢謂隆謙遽先惠問肇臨夏籥增固生經伏惟某官偉略冠時純忠許國慶傳相公之後望重親賢之間出布寬條兼領别都之管籥行膺訊台對司有府之樞機更冀珍頥少符䖍頌謝韓魏公書今月五日伏奉敕命就充前件差遣者大丞相之尊矧出専於逺略諸從事之後乃容有於孱生任非所長愧不勝數如某者下科二紀孤宦四方未為造物之所知已分委身於無用向參戒於一道甫備位於再期顧吏課以曾無於軍書而何有忽聞邊釁之啓函賴廟謨之平特煩上公並護諸將幕府諸彥各懷所有而從行江鄉鯫儒合謝不能而引去弗為逐客已曰幸人况辱薦章之留更形褒字之寵隨降俞㫖實緣重言恭惟文武之兼資當此兵民之大寄凡塞外地形之險易如探諸懷每筆端疆事之指麾不勞餘力就有屬寮之一得曷禆精慮之萬分夫何妄庸亦被收采此蓋伏遇判府經略司徒侍中以升絀天下士倫之手為進退幕中賓從之心聰明所臨賢否俱判察介愚之有守發慰薦於無疑敢不慷慨功名激昻志氣誓堅素節圖報厚恩舍此以還未知所措答陜府知府祕堅書跡繫關中心馳門下自嗟仕路之晚輩未識儒林之丈人屢欲一書之上陳率因多事而中廢簡疏已甚罪戾是期敢圖恩容逈出意料首頒溫教垂領寒蹤捧讀以還感慚尤劇仰惟舊德夙懋壯猷坐布寬條兹繼召公之聼訟行追先烈豈専邢晏之多才伏望上為邦家精調寢餗下情無任激切感頌之至代魏公問候青州歐陽尚書書並游台路繼領守符道誼之尊矧平生之所慕晤言之隔因終日以載思順履煩炎誕膺茂祉伏惟某官乾坤間氣社稷元勳力辭幾政之繁樂布教條之裕功成不處一州暫卷於經綸治間多餘大筆時爭於造化行謨王體還慰民瞻益護粹襟前迎徽冊回滋州朝大卿書竊審最狀告成更書受代扶老携幼莫挽鄧候之來進直納忠將前文帝之問伏惟知府大卿器涵渾厚才貫幾深蚤收時名履想風蹟藩條宣布已副朝廷之長人國論謨明佇還家世之舊物遽違芘藾方劇攀瞻首枉誨音仰銜謙德益調寢餗前服寵休感頌傾祈不勝下懇回新提舉雜使司李郎中書竊審祥琴甫御恩詔隨頒實藉周才復司重任行棲餘批增抃丹衷伏惟提舉郎中望厚本朝用兼數器劇繁之委中外以更富國强兵蚤講明於利術飛芻挽粟洊董按於邊儲行底茂功函膺顯用尚稽修慶首辱賜書感躍并懷名言非諭河陽富相公書出刺劇州遽彌於嵗歷坐疏翹館增跂於台躔懼干上衮之威遂缺單函之獻伏惟布宣寬詔偃息重藩隂有神明來相福祚恭惟某官樞衡舊德金石純誠才兼文武之資身繫安危之託辭神機之制勝露公冕以觀風太師維垣均佚河喬之鎮一相處外增勞巖石之瞻寒籥貫辰生經迪吉上副眷倚益康夀祺與順安知軍王太觀崇儀書向吏别都獲依大幕披肺肝而相照均手足以逾親兹方君侯改授於使名而䝉鄙繼從於帥辟朋簮一散官路相望北塞西州邈焉異處前車後乘那得同游朔風巳寒尊體無恙恭惟辭才該敏術業宏長勳代素高有光華於國史軍城非久即振發於家聲功名在前富貴如拾倍綏吉履少副愚誠樞密司徒侍中書董輸將之大計罔知輕畫之所繇復侍從之舊聨逾覺寵榮之為重竊以四方置使三路難才每至才端之選掄尤難河朔之付畀蓋强敵限北洪流貫中金繒之所嵗縻芟楗之所時賦連營數萬餘卒既廣軍須綿地三十六城乃繁吏稍轉給中費澄清具員宜求兼能以委重寄如某者受性固滯與時濶疏曾乏器資之長屢更事任之劇財闈倅職頃嘗左右於大農漕節宣風比厯東西之煩使了無金穀之要術絶底涓埃之細勞更容短才當此一道靖言所自良有由來此蓋伏遇樞密司徒侍中首贊神機協宣宰論進人欲勸其後所以先録匪功與物不求其周所以兼收片善遂令駑猥訖冒龍光敢不講圖利源區序官品岡有二事少酬大鈞代史館王相公答高麗王王徽書使節度朝専逹鄉風之悃台使備位隨叨隆禮之辭祗服謙懷逾深感抱伏惟某官器函剛實材挺沉雄弗蹈近規自存逺識詩書襲治盛文雅於一方琛賮輸勤因寵榮於百世春和所履時祉載蕃瞻企所縈敷陳匪悉又代參政馮諫議答高麗王書斗隔天隅日傾風問逺沐音題之及仍頒珍貢之餘禮好兼隆銘藏逾劇伏惟某官傑才不世精識絶人面內本朝自出勤恭之禀身先一國蚤聞禮義之興倍順節宣永綏福祚其為瞻頌奚盡名言回知州州王夀朋職方書右某嚮者清衷擇守自付劇州吉旦臨民久開尊府曾是慶音之緩有如嚴譴之加伏惟知府職方名為主知才與時偶厯荷寵寄率收治功甫息按章之車未溫贊計之席遽會朝廷之簡擢往綏淮海之流離曾未踰時果聞速效班條之日巳布仁擴惠以徠之去貫之民俄扶老携幼而至者行甄最狀亟服異恩首枉誨函倍藏感臆永言愧忭曷盡敷云相州僉判韓都官書比䝉俞詔得守故鄉方少慰于初心將前資于婉畫甫懷章而就道遽改帥以出關事願兩違晤言載隔矧郎垣之碩彥實王國之美才即聼褒升倍祈輔育代韓玉汝到任謝兩禁而下書任劇非長輒領漕臺之要部投閒未幾復躋延閣之近班視職云初尸榮是懼竊惟朔野實控强鄰軍須吏稍之仍繁嵗斂月支之僅足且地賦之登有限而河防之費不資所以此方尤先他路董是外計可容短才如某者性迂以疏器淺而陋頃緣誤擢嘗左右於大農比復冒居厯東西之煩使終無利術蔑建事功矧中年多難之餘當一道要司之總愈云非據良自為容幸遇某官曲掩孱虛隂加奬與助穆朝言之允俾塵邦選之優既竊過恩兼還舊物誓圖薄效少答厚知問候新益州趙資政書竊審就奉朝緡再臨井絡行前登於長道首入覲於明廷適冒秋嚴載蕃時祉伏惟某官元猷經世精識際天挺忠絶不倚之亮誠篤孝悌甚高之美行頃鎮全蜀坐熙一方遽被丁寧之詔音竊比乖崖之治蹟維時華夏兼懷復慰於逺人當代趙張専美不容於前史靡俟更書之及即聞舊德之圖蓋飬天倪還謨王體回謝北京判府司徒侍中書久依門墻獨立幕府禆補奚云於萬一薦論以訖於再三每䝉重言隨蓋衆觀父母能生而不能成就豈如盡卵翼之始終王公或禮而莫或照知豈有洞肺肝之表裏此有感臆之中出無復儷詞之外文直書悃悰具述崖略既寬苛禮之不至又損逹尊而弗居飭管記以占寵褒之過辭紆親翰以灑恩勤之别諭拜而伏讀出誇僚友以傳觀藏以為榮期與子孫之相授恭惟判府司徒侍中德包衆美澤在羣生鍾鼎不足鏤萬世之勳未嘗挂口圭衮可以肆三台之體滋務抑躬矧朝廷之倚方深而海宇之瞻有在行膺徽冊復鬯元猷回淮南西路提刑潘華國都官書右某爰初詔還本繼高賢之後曾未升見已遷他局之間不容復守於成規是亦參差於幸㑹汲水唾涸淮舟亟行叙違不假於一言遂成輕别馳想忽經夫半嵗中抱沈疴向䝉惠誨之過勤職是報書之差緩春暄所履時祉載蕃仰惟傑才休有令問能兼數器寧専刑獄之重難勢匪久居别副朝廷之擢用兹衆人之望如此非下交之心獨然願調燕興飲食之宜庸慰禱頌瞻依之切回紫微李舍人書竊審恩賜函命詞掖登賢伏惟慶慰某官道貫醇深器㴠渾厚比屬祥琴之御遹從召節之趨言動以書威顔甚邇落黃堂之試筆豈特文章之工上法座之奏篇更臻訓誥之體慶音未列榮問首臨愧抃交懷名言非諭回蔡侍制書伏審廣屯戍守始盛築於塞垣甫訖工徒爰垂褒於詔檢建不拔之雄勢出無疑之偉謀丕績既成宜被歎嘉之諭片言何補過形遜抑之辭行議顯庸益光大用回徐州知府趙尚書書疏缺郵音比若舊疴之作優游藩政第勤盛德之思順履秋炎載蕃時祉伏惟某官壯猷經世偉業熙朝重德以鎮世浮至誠以矯物僞宣風巳屏方尊外牧之權議道中台行二上公之舊倍綏燕起少副瞻祈回慶州王給事晉州陸諫議成都府張龍圖書責重力疲屬舊疴之間作情勤禮厚枉榮問之遐臨矧惟近侍之先暫布要藩之治民風觀省已洽於頌聲王體謨明佇膺於詔召益綏燕餗前對龍光回兩府逺迎書比者蘄解帥符獲紆卿紱囊封瀝懇願從便道之行召節垂音趨赴明廷之覲載軀征馭甫次近圻敢圖鼎席之崇首枉鈞函之重恩勤既渥勞來仍周仰止台光喜接辭之有日叢然愚悃苐戢感以無涯賀杭州胡觀文書伏審已即便時肇頒寬詔伏惟慶慰恭以某官量函惇大道際醇深天下中庸遹追于先烈上前智略蚤鬯于偉謀體貌兩朝股肱一德蘄解繁機之劇請從更鎮之行重違左右之弼臣乃付東南之都府峻官儀于祕殿兼領左魚大榮觀于故鄉逈踰駟馬靡俟政成于五月行膺册拜之三篇回昌州張都官書向者某官擁麾劔外取道關中愧主禮之缺然嘉賢規之覯止暌違既久瞻繫良深遽首枉于珍函審巳班于寬詔勉綏福履行對恩章感頌并懷名言非諭吳副樞問候書伏念假守關中居有詔條之奉馳心門下坐疏竿牘之修比蕃外除甫當入覲神明所右福祚甚蕃恭以某官惇大有容直清不倚富賢人之德業貫夫子之文章奮筆以對大廷早攄珍䇿飛緌而步青禁寖服皇僚方尹治于神幾遽二謀于樞幄股肱一德體貌兩朝銜恤家居矧祥琴之既御掦休陛見佇徽冊之所延翼載丕圖緝熙盛化得伸素志允蹈昌言回崔直講書比審庠序師儒取德進以居其位廟堂公相推經明以薦諸朝而某官學術精深履行純茂遹當盛選以式諸生行將擴道誼之淵源極聖賢之㫖趣惇成善教續履華塗首貺長箋增名寸抱賀郭副樞書伏審肇開幕府總制邉藩條詔所班兵民胥悅伏惟慶忭恭以某官傑才高世偉績熙朝擁都統之旌旗帶中樞之印綬出護諸將暫煩樽俎之籌坐制小戎行紀於常之烈某方縻守紱阻叩賓閎就慶烈以無從馳歡誠而苐劇回集賢相公書始布詔條繼馳箋牘不謂郵程之緩未塵凡次之觀念鼎席之久同枉均函而首及溫辭賁飾之相假厚誼兼懷之兩存仍審順履春寒首調天縡神明所祐福祚其蕃伏惟某官社稷宗工廟堂元老得位行道擴經濟之初心尊主庇民鬯泰年之偉績倍祈自夀永副具瞻相州王祕監問候書適提帥節益阻賢規眷言父母之邦幸被神明之化班春伊始嚮福其蕃伏惟某官才貫幾深量函夷逺夙懋元龜之德行聞大政之咨倍保夀康少符瞻禱相州都監魏文思書比䝉朝綍得守鄉邦望鄴下之多賢將親英槩總關西之諸將遽失初心順履春寒益臻時祉更希精嗇以迓褒章回絳州薛司勳書比聞移郡遽辱占書惟望重于外臺固才兼于數器竭寵財餽食之效懋瞻國實邊之謀行之纍年富有大計忽假藩條之宣布就煩疆事之處裁然功名之間雖古人而多忤而得喪之際惟賢者之能平舊績甚彰要塗行復回陜西都運孫待制書審對恩函就更使節抗嚴旌而在道已久屬封枉珍牘以飛文良銜重意伏惟某官才猷煥發業履精純物望胥歸帝心特簡此暫煩于外計行歸涉于近司遐冒餘寒倍綏妙履即諧晤揖尤據欣翹回晉州陸待制書比承墜翰審已班條矧惟厚望端才傑望高世入躋延閣之要出帥邊藩之雄收經逺之壯猷以臨一郡報宜民之善政豈俟三年行被詔音進參柄用回北京王宫保書始辭宰柄避當路之妨賢旋領守符許故鄉之均佚不圖乘章之吏忽起開邊之師遂改帥于關中俾總戎于閫外節制諸將撫綏此民苐巳布于寬條曾未周于逺略敢謂保釐之多暇首煩管記之占書禮意過勤謙懷滋厚不忘永好尤劇中藏代王給事賀判府司徒侍中書伏審懇避洪鈞榮歸素里剖麟符而作鎮露貂冕以觀風適揆剛辰肇開尊府伏惟慶慰恭以某官誠明正性忠亮一心揭日月之貴名協風雲之盛㑹道光台路勳濟王塗二府洊更巳畢大臣之能事三朝允賴弗居真相之極功力抗奏封請還政柄許辭尊于廊廟聊均佚于鄉邦駟馬云歸掩蜀人之偉覲百壺所餞小奕奕之前詩寧久衮衣之留即聞綈檢之召復由外相入冠上台某適守關中方遙門下阻陪慶列第劇歡誠集賢僕射相公書伏審具告治廷誕敡贊冊進升揆路增耀宰司伏惟慶慰恭以某官社稷宗工山河間氣久亞宰塗之序力躋王路之平崇賢黜姦寬役均賦底休功于甚盛鬯偉績以無前謨左右於廷中三朝所賴繫安危於天下一紀于兹侔伊尹之保衡近汾陽之書考上台絶禮已殫體貌之隆左相極班更益儀刑之重某身疏材館職繫州麾趨慶莫遑馳誠第切樞密太史侍中書伏以西京講物允重三朝之辰東國著經實尊五始之月恭以某官勳高盟府道濟治朝外鎮四夷峻具瞻之尹石同寅二德永相比之星台上日始和繁禠備舍苐切夀康之祝阻修拜伏之儀二副密書恭惟某官際天傑識經世元猷總制五兵參密謀於帷幄發揮多算重强勢於朝廷順履王正永綏天祿某久棲台庇適領守符就慶列以無從瀝頌言而苐劇河陽判府相公書恭以某官鈞衡舊德金石純誠太史維垣早調元於台鼎一相處外聊觀政於輔蕃開祚膺期對時納祉某適膺守紱阻奉夀杯苐瞻黃閣之嚴曷罄丹函之祝三路帥書恭惟某官任雄方面道秉上心兼制民兵矧恩威之並著外攘敵寇固勳業之逾高順履一元載蕃百祿企賓閎而且邈薦夀斚以無從郭副樞書恭惟某官傑才閎博偉略沉雄暫虛樞廷實賴經謀之逺都統帥路行觀偉績之成上日斯臨荗祥攸介某把麾兹土望履無階苐䖍慶牘之馳莫遂夀杯之奉回兩制以上賀書領關中之通漕曾乏寸勞守劍外之劇州遽叨寵寄罔功自訟匪報尤慙惟是短才屢更煩使諸公並進晚躋侍從之班比嵗再遷驟直圖書之閣復被䝉於渙渥俾鎮撫於坤維陳避無從為容有自此蓋某官力開公論坐政官榮遂使無庸之資亦當不次之任未攄感臆先墜慶音愧戢并懷文陳非諭代王龍圖上中丞書向以詔條所布風力不强間抱舊疴有愧昔人之卧理親占溫教過煩長者之憂思積感殊深布書差緩恭以某官氣資方徑業履淳修足臨長於諍臣爰疇咨於俊老毅然正論巳聳臺中之評沃乃清衷行收天下之望西京韓龍圖書爰初王府嘗備祿漕止同衆人粗了一職敢謂去離於左右尚䝉記憶於姓名比從宦於關中復拜公於棨下不遺故吏之賤俾厠大賓之筵拜嘉再三賜語良久聿來帥幕亦有軍需論謝懇以稍稽銘感懷而獨在伏惟保釐居暇福祚膺時恭以留守龍圖給事道德可師勳業自任垂光近侍直延閣之圖書倚重老成掌别都之管鑰行歸柄用即聼召還回省副吳工部書審承詔綍登賦財闈伏惟慶慰恭以某官識逺量宏文醇行潔具青雲之賢器覘緑字於書林旋擁守麾比持漕節眷大農之經費贍給拜家實外計之委輸淵源金穀從來選造尤曰難才碩畫所圖僉言惟允即雍容於法從亟潤色於辰猷未列慶函首台榮牘永言感忭曷究文陳九日與四路帥書素籥貫辰黃華耀節阻奉登高之樂苐增懷逺之勞恭惟某官經世偉才濟時距業出臨帥閫暫資綏御之方入覲王朝行罄弼謨之藴霜稜倍厲時祉載蕃祠部集卷二十八
