body:
  text: 祠部集卷十九宋強至撰狀代上施待制狀右某自督漕舟鎮繁使部居靡定所日無少間職是音縢之缺然曠咨德履之安否恭以某官稟氣間傑為時聞人由妙年而取甲科不纍日而都顯位外臺重使誠曰藉才之司內閣詞臣決非久次之地行膺迅召亟踐元台顧惟孱微有所棲倚代上潤州知郡曹殿丞狀右某近者伏遇某官駕言于藩道出兹土輒緣門下之舊履獲坐隅之親方敘感悰遽零别涕惟兩轓之稅駕聳雅俗以瞻風仍審剛辰已開尊府宿官兹限馳賀無階恭以某官職貫幾深量函剛實雄文取重于時論大雅追還于古風圭衮儻來靡嬰于素志江山有助不廢于清吟而况先一州乃大用之基為三公繇此塗而出行甄治狀入對王休列職近嚴副時傾矚俯惟孱懦最辱奬題企頌兼常文陳匪悉代上本州知郡虞部狀右某自除近屏久偃故廬輒緣恭梓之由屢叩訟棠之下備蒙優顧隂激懦衷為郡事叢貢書禮曠仰惟坐鎮俯順生經恭以某官親遘熙朝洊揚膴仕紫垣應宿早厯于清郎秀野班春聊蘇于雅俗行膺宸選少慰人言伏望上為國家精調寢餗代上致政相公狀自領守麾日棲鈞庇仰惟吉履俯萃醲休恭以某官道著將明量函方重出應千齡之旦來翊兩朝之功天下既安巳休于廟略宸衷得請遽致于官榮代上新知南京歐陽龍圖狀某士鄉近器儒世緒風頃繇天幸之然獲綴賢科之後輒階素分嘗覯清塵旋緣位貌之殊邈有霄泥之隔自視冗外不敢貢書而瀆尊日聞軒翔徒爾望風而竊抃伏審祗承恩詔出尹留都某適督漕舟矧往來之皆道復欣里開將鎮撫之焉依榮幸兼常企瞻倍切恭以某官際天藴識名世標才中外洊揚明哲一致主盟吾道於變文章之淳昌言當時幾臻風俗之厚尚緩台衡之拜聊司宫鑰之嚴然父母一邦不足充天下之望而領袖百辟行以副上心之傾代上栁侍郎狀叨紆守紱獲邇侯封如憐洪河日所蒙潤不逺數舍缺然貢音伏惟鎮撫雄藩綏寧泰宇恭以某官早紆賢業親會聖辰挺忠諒之一心出誠明之正性華要之選翺翔巳周訟樹班條寧容於滿嵗公槐正位行在於匪朝代上錢內翰狀徘徊未路荏苒外麾日為吏事之勞分絶朝遊之齒自視冗散罔敢片言之瀆尊豈圖高明遽加餘論之垂飾諒其愚介謂可甄揚遐佩恩暉陰盈感愫恭以某官忠諒許國文章世家親逢聖期獨膺賢選究國體而指人事巳極著篇之竒潤化神而輔帝猷佇觀行事之效矧禁林之上笏即台衮之便途匪朝登庸為世休福代上昭文相公狀適抵官局遐企台光去國非遙盡出大鈞之賜貢書差緩重干上衮之威伏惟燮調氤氲翕受禧福恭以某官際天藴識名世標賢以文章取甲科以忠誼結明主向專將渥之制力砥冦巢之平衣冠百工大大臣之能事富庶四海見真相之偉才代上潤州曹殿丞狀奔馳吏部密邇侯封間輒貢書而瀆尊遽蒙記室之還教拜而伏讀藏以為榮伏惟鎮撫善藩綏寧泰宇恭以知郡殿丞夙鐘間氣親遘熙辰父母一州不足充天下之望旦夕中詔行以副上心之傾徊翔顯途暉映當世俯惟孱懦鎮託甄題感臆所懷名言匪悉代上王承旨狀一違牆宇尋蒞方州有簿領之裝懷寢成冗瑣顧音縢之布問坐致濶稀伏惟某官業術精奧方格淳修學足以挹軻雄之源行足以蹈淵騫之軌親逢文雅之會優冠秀廉之科華要洊揚聲光以綽視草玉堂之署密奉辰猷調元金鉉之司行被神化代上交代郎中狀伏審入奉宸緡出紆守紱夫何榮幸輒預交承善政缺然靡尤於既往高賢繼者當俟於更張方覩除書之來因馳賀牘之晚恭以某官學際聖閫才為吏師泗當淮服之衝佇凝於治狀嵗上甘泉之課首被於恩章咨覯非遼欣瞻倍切代上留守龍圖狀就蒙恩詔移領邑章往來江淮顧舊學之幾廢委寄民社於有政而曷施尚幸單蹤早棲大庇髙明有造諒舊物之不移鎮統焉依幸孤生之有託行瞻大斾增忭寸襟代上栁龍圖狀把麾侯服遠迹賓除徒然德誼之傾缺爾箋縢之奉仰惟純履舉萃醲休恭以某官盛業熙邦雄文經世席兩朝之宸眷夙著耆明踐內閣之官榮行聞登用代上潤州曹國博狀猥瑣無堪蠢頑惟舊乘以吏曹之冗缺然箋牒之修伏蒙自損達尊時占勤教而復諒其孤進之自絶有先容之為府矜滯蹤力發薦口常自策於駑猥庶託稱於奬提伏惟鎮撫善邦綏安泰宇恭以某官直清不倚莊重自居才為吏師名重物論東南之屏聊布於寬條左右之廷渴聞於正議行承溫檢驟陟顯塗代上南京歐陽龍圖狀某早會石文寖階下列出繇寒士之目樂聞大夫之賢若夫作世之宗師立朝有風采逖聽輿論率歸巨公如揭日月而行孰不仰望居為秦楚之隔未嘗進趨比者伏遇就奉詔音出觀藩政夫何恭梓之里獲被訟棠之風敢緣幸會之機以紆平素之願恭以某官德函剛實識貫幾深道簡上心聲聞天下而自振藻書殿代言禁廷文章大醇坐復古道制作一出立為人模固宜暢鈞軸之弼謀廣幅員之休祉尚淹符册屈布寬條然祕殿侍臣寧久外補而上台貴仕行被外庸副國倚毗協時瞻矚代上知郡郎中狀比者知郡郎中得請宸疏奉安親兆暫還仙墅兼侍夀輿自使斾之戒塗即秋霖之綿日稔獲晨昏之奉諒忘跋履之勞仰料沖頤翕臻純祉恭以某官體凝簡重氣迪醇深親逢復旦之期寖踐列星之位晝繡旋里兹極於時榮昔𥜗興謡方繄於風治代上端公狀近者伏值某官臨督通漕留止屬封俯惟冗遭適備下吏獲委草茅之賤屢趨旌棨之嚴使車南轅倐兹纍月官簿盈案曽無暇時第馳戀於門牆廣布誠於箋牒伏惟坐籌大計舉萃龎禠恭以某官道具粹醇器函剛實早紆賢業自結主知總金穀而贍中都久茂風績秉鈞衡而調大化遲膺册書眷言單瑣之蹤訖望埏容之賜代上宋內翰歐陽龍圖狀祗奉臺移往提河役奔馳俗狀留止治封伏蒙忘宗工之顯嚴顧郎曹之散冗外厨五鼎靡獨享於豐珍清酒百壺並曲加於撫勞比需訖事亟往拜嘉一瞻體貌之尊少敘腹心之感遽被上官之命俾從他郡之行鄙願頓違愚衷第切伏惟坐班風教翕萃福禧恭以某官上天元精清廟偉器高文經世亮節在廷鉤姬孔之聖微發為事業輔勳華之主德動罄謀謨暫淹公輔之才出鎮藩垣之寄行膺徽册登冠中階益隆宸扆之知庶協朝紳之議代上文相公狀伏審還印宰廷領麾藩服肅使旌而就道露公冕以觀風仍即便時已開尊府恭惟某官器函剛實才貫幾深出對休辰進更顯仕密藴廟堂之略往分邊閫之憂旋總計於漕臺亟升華於延閣殿坤維之劇部尋被更書掌樞幄之繁機未嘗坐席遽膺宸詔改二台司值強敵之不咸嬰孤城而自守獨形忠憤請殄姦妖果廟算之萬全破冦巢於一舉晉公平蔡宜位絶於官師傅説賚商以道開於人主登庸賢俊振拔滯淹拒塞幸門追講闊典少見大臣之能事弗殫真相之偉才懇瀝讓封願還幾政雖斷章趣戒重違金石之誠而俞命隨頒聊付圭符之寄加尊八座均逸陪京諒五月之政成復三篇之册拜代上兩轉運狀寄身節下日棲蔭宇之濃董役河濵斗曠音函之奉抗塵客而亡狀企使範以增勞伏惟主計多餘嗇神增裕恭以某官郎垣碩德王國偉才親遘光華之辰備伸久大之業綢繆利柄矧風績之茂焉趨走詔音行恩章之嘉止代上張端明狀昨者沿牒上臺假塗大府企門牆而竊抃將卜嚴趨貢箋牒以瀆尊預紆下悃伏惟被細書之溫厚移巨屏於東南阻叩坐隅徒瞻廷表豈謂廟堂之量廣不遺塵土之迹疏首占鈞函仍頒釋部拜嘉甚渥撫巳增榮伏以某官方格淳修業術精奧髙文大策蚤踐於賢科至論昌言有禆於聖世旋持荷槖道陟嚴塗司內命於禁扃方殫儒效暢偉謀於計府巳集邦須輟祕殿之華班分左符之重寄民瞻滋切上意方傾遽遘親闈之悲差池公衮之拜然萬鍾及養足少抑於哀摧儻細札奪情庶兩全於忠孝上徐都官狀昨調天銓始官淮服風波起乎萬狀初驚宦路之艱塵土萃于一身因識掾曹之辱若乃接人情之至術治獄事之大方侗然而愚罔所知嚮備蒙教朂僅保傾危以至陰沸滯蹤力開薦口皆重恩之難報第孤抱之知歸去德彌年瞻風惟日悵簿書之犯慮汩沒無休顧箋牒之問安缺疏不講分從譴怒自爾擯遺何長者優容之深出微生忖度之外兩頒勤誨愈篤曩懷固始望之大踰加積憂之頓釋仍審協宣寬詔增裕沖襟恭以某官莊重粹溫剛明精敏關掌郡治尚鬱高賢之資鉤深聖微行躋太史之局其為慶幸曷盡敷陳上陳主客狀某承學不優宿官亡狀當淮州之雜會決囹圄之重繁慚磔鼠之微能訖無智慮挾籠狙之小數間得事情其如鄙訥少文羈孤寡援第慤亷而自守雖顛躓以誰憐散木之出溝中匠無顧者棄芻之委道上人皆踐之尚繄吏局之卑正𨽻使旌之下時矜寒素弗忍擯遺坦然開至公之懷舉以堪一邑之寄發蹤自始論感無涯遘外計之需才遽嚴麾之易地心傾恩館戀極疲軒伏惟順泛齋舲具綏泰宇恭以某官器能膚敏風業宏長親對休辰洊揚顯仕按簡書之輕重方及期年董金穀之輸將驟移南服矧時論以剛明推重主上以忠誼知名行聞被優詔於塗中趣還轅於闕下亟更大任少副羣言代上揚州張學士狀千騎過郊向諧瞻覯二車監郡鎮若將迎間參決於簿書因寖稽於箋牒伏審肇開尊府肅布寬條密接化封日聞治狀歊炎貫序燕寢餐和恭以某官學造聖微識探經奧對休辰而逢吉躋顯仕以揚光預計財闈茂經畫宣風漕節多所澄清久簡帝宸洊紆守紱露章按罪巳著於威明增秩疏恩行膺於甄擢代上省主并二漕狀庇迹崇麾尸官再嵗五能俱短固乏於寸長一個無他或矜於小善被文移於計府鬻籍入之民家奔走道塗淹徊日月覬成拙效罄竭微勞以訖事經敢希賞格偶獲免於瘝曠幸不辜於使令報知已之心雖堅於金石助公家之利何啻於涓埃遷次一官兹誠始望之外挈提孤迹更賴剡章之明恭以某官道廣進人恩隆成物開推轂之言味多所揄揚發踰衮之褒華願加慰薦庶令駑猥足企龍光苟無似之叨榮則有能之知勸深懷厚德第劇愚誠上廣德知軍袁郎中狀頃以諸生最蒙優遇居常策勵報稱奬憐再舉登科尋喪慈母一官來泗遂為冗曹迹久去門牆之嚴名不徹左右之聽謂由疏賤從爾擯遺企軍壘之剖符自淮州而假道首傳勤誨愈篤曩恩損齒爵之達尊屢紆騶御顧州縣之勞職俾侍坐隅而復垂憫滯蹤許開薦口始終被惠感服無涯恭以某官才貫幾深器函剛實守麾最樂聊布於寬條公衮儻來靡關於素志行旌善狀亟陟嚴塗上代許州相公狀伏審繼列讓封願還幾政奉宸緡而得請露公冕以宣風因瀝愚誠仰陳台眷況朝廷有達尊之訓廟堂有絶禮之嚴豈料厚慈兼持謙德親命記室回貺鈞函拜伏究觀驚惶失據恭以某官天民先覺王佐偉才出對休辰進揚顯仕更弼謨於兩府聳烈業於本朝寖簡上心登冠羣后拔賢俊以開治路抑權豪以閉幸門佐闊典之未行殫豐功於巳試懇辭上衮出鎮巨邦矧巖石具瞻尚思於鈞造而陜郊處外行被於詔還代上龎昭文狀自塵下士之列蚤出大賢之門旋庇台光寖升郎位悉心圖報思樹立以無階造物誤恩亟甄提於不次擢自計廷之末董兹漕節之繁去國非遙誠荷洪鈞之賜貢書差緩懼干上衮之威伏惟坐論猷為力宣利澤神明所相福祚載蕃恭以某官業履崇髙智謀光大抱廟堂之偉器挺金石之純誠出對休辰進揚顯仕更弼謨於兩府聳風烈於本朝獨深真主之知首宅元台之序圖講至治薰陶太和百度清明羣生舒暢稷卨視已儀刑列辟之先堯舜吾君拱揖法宫之上躋宗工之極致光信史之直書曾是冗微最叨奬遇庶成毫髮之效訖稱埏鎔之仁代上栁龍圖狀嚮緣崇斾戾止陋邦適佐郡符幸通謁舍不遺門下之舊屢獲坐隅之親造使車之西還倐彌年所顧官簿之堆積缺貢信音伏惟坐布寬條誕膺純祉恭以某官沖襟有裕亮節不回明哲于躬具存大雅之美典刑在事允藉老成之資獨臨端朝自結真主履官階於延閣冠鄉列於禮司藩服一麾暫勞於王事詔音三節行簡於帝心代上李兵部狀比者進承恩詔往領計臺自江而東厥賦彌夥矧惟封蔀鄰小醜之繹騷宜有經謀贍一方之支度豈圖繁使遽假菲才獲幸於天借棲有地恭以某官器函剛實識貫幾深早邀聰哲之知出總東南之漕剗去宿弊樹成親規董淮海之輸將適凝風績副京師之供億行被褒章紀美王常增光相閥代上安撫舍人狀伏審宣命列邦著聲近署揭使旌而就道聳侯服以傾風拜德有期實天與幸恭以某官器函夷雅道具粹醇言施當世而可行學質古人而不謬帝念東南之郡民罹水旱之年屈邇臣侍從之華奉承明詔將天子惠綏之意慰撫羣元某適守陋藩行瞻上笏永言企抃曷究文陳代上張學士狀早繇寒士之目嘗出大賢之門尋冒俊科寖升閨籍第銜恩而有素怵論報以無階而且迹久去師牆之嚴名不徹閽人之聽謂由疏簡從爾擯遺會督府之剖符自陋邦而假道獲瞻威采愈篤顧憐何天幸之復然續恩暉而有所外臺轉給方渴於英才明詔褒優亟還於要職俯惟官次得𨽻使麾新命傳聞寸襟竊忭恭以某官道先民覺學貫聖微夙躋朝辨之華久列書林之選主知物論率髙恬退之風賢業忠謨行罄將明之效代上揚州知府學士狀伏念向從遠宦方復故棲夫何恭梓之邦獲被坐棠之化巳浮單舸將次近封拜德有涯實天與幸恭以某官才謀高亮器識宏通早升朝辨之華旋被書林之選郎垣久次素髙恬退之風帝詔趣歸行懋褒加之典餘須瞻伏以訖悃悰代上致政杜相公狀南郡下僚西州末介被臺符而奔命曾靡寧居遡材館以馳心第勞景仰曠修箋牒上瀆燕興恭以某官河嶽上靈瑚璉茂器懿妙文而表世端亮節以在廷股肱兩朝體貌一德厯豐功於巳試避要路而弗居珍䇿熙邦備見將明之效安車就第益全恬退之風素里揮金聊追於逸致青編載筆增美於臺書代上江寧府郎待制狀冒職云初究心乃事仰止燕言之美缺然箋牒之修伏惟吉壤觀風沖襟育粹恭以某官識深經奧學造聖微言施當世而可行道質古人而不謬厭司內閣之待樂駕兩轓之遊圭衮儻來靡嬰於素志江山有助不廢於清吟行被詔歸驟光柄任上南京通判都官狀頃在鄉閭嘗依師席訖無優學止綴下科遂參冗吏之遊誠玷先生之誨當淮州之雜會決犴獄之重繁迹久去門牆之嚴書不徹左右之聽謂由疏賤從爾擯遺近偶北轅輒嘗進謁伏蒙忘其位貌之隔視若子姓之親曲以顧存優于奬最旋違盛德增企寸心恭以某官學鉤聖微聲重時論關決名都之治聊以康民延登袐館之華乃為宜職代上田省主狀近緣臺檄往督漕舟止神甸之近郊無由越進企恩閎於一舍第效臺趨因紓瞻嚮之懷仰瀆高明之聽願登翹館釋戀疲軒遽錫公移俯從愚悃逮通名於謁舍旋拜德於賓除伏蒙損計相之達尊顧郎官之冗列虛襟引納更僕優延省已毫毛之輕衝恩山嶽之重自還吏局增想台儀伏惟坐籌邦計之繁翕受天和之粹恭以某官民靈先學王佐偉才親遘重熙之辰蚤躋特達之選兼禁扃之華序領財府之劇謀富國康民皆出著篇之舊經邦致主行登秉軸之崇代上青州文相公狀伏審出臨治屏巳整齊艫鐃鼓沸川允極行暉之盛壺奬溢路前知輿望之濃矧在冗僚最叨巨造淮壖雅守獲在於便塗道左瞻風庶伸於下拜日需台斾竊忭愚襟代上判監檢討王學士狀自阻緒言旋嬰細務第瞻書殿之貴差緩公函之修方春肇和所履綏福恭以某官術業經遠文章世家親逢聖辰早暢賢藴訛文缺簡參藏寶之刋修善教素風兼成均之早育少殫儒效行被帝咨亟踐嚴塗繼升顯仕伏望為國自籌以時考祥代上王承旨狀枵淺之資冥頑惟舊頃緣吏役嘗拜台儀鈞造特深有容一介之技天幸何薄不出大賢之門殆逺二於州符復纍從於臺檄奔命弗暇貢音絶疏尚繄全度之寬靡誅苛禮之失伏惟總司內命誕萃繁禧恭以某官識宇閎通才謨髙亮蚤甲俊科之選亟更書殿之遊洊厯班榮密謀邦體以至提綱憲府作尹天京旋出殿於邊藩益茂凝於風績甘棠勿翦方惠政之化民零雨既濛既介圭之修覲上心宿注時論僉歸金鼎調元行顯持於宰柄玉堂視草聊首暢於宸猷上裁造太博狀右某自逺師牆鎮膺吏局日臨鞭撲之囂冗坐致音縢之缺疏仰跂恩暉第盈感戀顧歊炎之在序諒燕起之惟時恭以某官識貫幾深德函剛實出納關慮誠屈髙賢之資校讎需才行歸太史之局俯惟孱陋永托甄題伏望上為邦朝精調寢餗代上省主張端明狀右某向奉朝參嘗修板謁世蒙授進之賜迹免瀆尊之嫌濶絶台光倐焉纍月棲遲旅次邈矣一涯曠敘暄涼仰咨寢味恭以某官夙鍾間氣親遇熙辰秉忠諒之一心出誠明之正性入尹京邑進居樞廷允極將明之資以基太平之業然而國朝重選主計為艱金穀大司得才則濟意先財府之充給即議册書之寵加匪朝登庸為世休福伏望上為邦社精調宴興祠部集卷十九
