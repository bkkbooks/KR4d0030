body:
  text: 祠部集卷三十五宋强至撰志銘桂州司法參軍贈太子中允葉君墓銘君諱某字杲卿姓葉氏世為杭州錢塘人曽祖諱某避亂唐季故名不載仕牒及錢氏王吳越祖諱某考諱某始受僞爵後吳越以國歸京師凡陪臣之從行者皆受命於朝獨其父中道以事辭歸不得命已而自悼曰吾悔其可追耶當擇吾兒之秀使應舉覔官他日吾家有天子命士與身得均耳君生而頴拔遂讀書成父志凡三試開封府進士而考官率以高等處君訖用嘗試御前恩授鄭州長史後司法桂州參軍慶厯六年十月二十八日以疾卒官所年五十九方君之在桂有閩人吳謐死象州武化縣令謐妻挈二女欲歸閩至桂而其妻又死時本道轉運使杜公祀在君父子間為知己哀吳無所歸欲妻君二子君曰為子娶婦豈勢利之娶而舍孤窮耶從之人以為義家故饒財諸弟用之殆盡且求異籍君喟然曰家道至此繇吾不能取厚祿以聚親族汝曹何咎耶惟汝欲其寬厚多此類師事郡人林先生逋先生篇翰為當時二絶君盡得其妙天禧末年錢塘有巨石浮於江太守異之即問先生此何祥也未有以對先生以問君乃按譙子五行志以應曰其為萬乘之憂乎未幾真宗棄天下於是益服君多聞而始知譙子之志為奇書君早以經術自任晚傳其學於二子二子者昌言祕書丞昌齡尚書屯田員外郎同年取進士第皆有學行政術知名士林聞次子先登朝始用祀明堂恩贈君光祿寺丞纍至太子中允君配宋氏封萬年縣太君三女長適漳州判官周彭孺次適常州司理參軍朝端仁季適邵武縣尉徐簡孫君初與英宗同諱沒後凡若干年追改今諱二子於某同年生同既卜以某年月日葬君於錢塘縣履泰鄉北山之原因以銘屬其銘曰有寶於此積勤蓄久三出以鬻不豐厥售衆人之得君獨無有維其不偶是以有後尚書都官郎中盧公墓志銘皇祐二年冬十一月十九日將葬贈尚書都官郎中盧公諱咨於濰州昌樂縣長壽鄉鳯林里祖塋之庚地公子泗守比部郎中某名屬吏司吏參軍强某語之曰吾父世濰人纍以明經舉鄉里不第因太息曰士之仕也欲行道其進也欲及時吾時過矣吾道不行矣寧若教吾子以成吾志乃授豫以經不復言仕進間嘗語豫曰夫經豈空言哉居者守以治其身仕者傳以行於事吾止得治身之效而不及行事之深切汝齒尚幼汝學不已二者俱享焉豫懼不能成吾父之志故夙夜强學以自勉一舉而中第比豫登朝而吾父死矣始用郊祀恩贈為大理評事纍贈至今官卒時年五十三人皆謂善有餘而壽不足今也將葬子其為我銘之某再拜曰唯銘曰生公孔難宜深而蟠志卒乃完子榮公官公宅既安公後其蕃尚書虞部郎中曽府君夫人廣陵縣君朱氏墓志銘皇祐五年春晉江曽君諱濬由殿中丞知蘇州吳江縣是年冬十有一月八日喪其夫人廣陵縣君天長朱氏夫人於某為外姑既哭夫人於其官舍明年春公遣二子奉其喪往窆杭州之天竺山某又得相其終事後十三年殿丞為虞部郎中卒知光州卜以某年月日葬鄭州之新鄭二子者復遷夫人之柩自杭來合葬夫人之考諱㢲嘗擢真宗朝高第後為兵部侍郎贈某官夫人生而其父已顯又極為其親之所愛目所習見者盡富貴也身所嘗享者盡豐佚也入門事舅姑能左右不懈嵗時賔祭必嚴服潔具不敢後諸婦若素厯艱難然方其夫在州縣而食客嘗滿坐用一不給輒陰鬻奩中所有而辦之其享之而退者無不腆之語入而其夫無不足之色若慣處匱約然弗煩傳姆之教而女功善不失上下之歡而家道得皆天性之所自有也二子者用其世父丞相兖國公蔭孝綽今為光祿寺丞孝總太常寺太祝女三人某其最長壻次嫁衛尉寺丞王諶次嫁殿中丞杜諲於其葬也某又得銘其墓銘曰嗟夫人性慈祥式母婦宜壽域四十四奄云亡先族葬於南方後踰紀合夫藏汝南周氏夫人墓志銘夫人餘杭周氏女二十嫁郡人朱有安入門主饋上下相慶公姑曰能孝我僮媪曰能仁我閨房雍雍樂得賢婦朱氏素貧約夫人治生頗力家用是豐給生男四人宗顔宗孟宗閔皆富而有守其一曰仲琪為比丘有律行女三人長適姚宗雅次並幼夫人年五十六至和二年十一月二十一日以疾終靜柔淑祥性酷嚮佛朝不茹葷逮暝弗變遺命諸子鬻奩中所有以飯浮屠其真所為好善者歟將以明年三月二十一日窆履泰鄉顯明寺之山圃諸孤來乞銘因銘曰夫哭順妻子號慈母弗衍厥齡而德有裕將仕郎守杭州文學參軍陸先生墓志銘嘉祐六年夏四月丁已先生陸氏卒其子求古章革覃有方逢休將以某年十月已酉合其母夫人蔡氏履泰鄉龍井村之封以葬六孝子者聚泣以議吾父蓄道淳德生七十有六年其藴不得久施於時死矣獨世之大夫與鄉人之口有傳焉且吾父誼應銘其習豫父子間而應以文字銘吾父者宜莫如强君以書來求銘某因得次以銘先生諱滋字元象嵗方童已自如成人通毛鄭二詩易春秋既冠以文辭試鄉舉一鬻其業而售有司母且病不行後三年復在選察母面有難别色先生亦絶口不忍出别語已而自訣夫仕不獨為時亦為親苟戚吾親而去得仕如勿仕吾何為行哉時故相陳公堯佐使兩浙雅待先生厚手十餘書以遺之曰行矣持此足以遊公卿先生謝不受公亦不能强自是頽然自得顧天地間無足介吾慮者惟一肆其意於書不復言進取凡聖經賢史九流百家僻異祗說無不讀或引以答客問必章解句析卒不差一字問者退輒服以為終年讀書不如與陸先生一日語尤嗜風雅日哦樹石間有以家事關先生者急麾之使去曰吾方作詩無溷我皇祐四年詔録先朝遺士搢紳縫掖合百餘以狀白府請用先生塞詔府上之朝得杭州文學先生捧㫖喜自以不出屋廬間天子就官我又獲掾於父母之邦抑幸矣嵗時隨州吏趨公府或憫焉先生曰此跡爾惡屈吾心哉常治居材且具矣其鄰有以侵我地紿之者先生第笑與語吾忍取劵以白汝妄耶即為之縮材其寬厚多此類與故人飲必諧調笑歌賔主各盡歡若將樂之不厭然及賔去席撤復以嚴自處里俗襲吳越僞禮其甚者至僣惡不可聽先生為援典制家矯而户正之此敝遂革平生所著詩賦文論書志合二十卷自就學至垂沒目未嘗去書若先生可謂好古信道終始自篤而不變者歟大王父諱超以功為錢氏衢州刺史王父諱紹父諱承祖皆不仕女二人皆有歸銘曰於乎先生飬璞自少成而圭璋訖曰能照唯是羣籍我考其要矯革僞禮俾逭非肖與時獨行追古同調元龜云亡人哭人弔濟濟有子德罔弗紹於後其門當大有耀安府君妻趙氏人墓志銘嘉祐六年十二月九日大理寺丞知開封府右軍巡判官安君既喪其母夫人趙氏於官舍將以明年四月某日還葬其州之吳縣靈巖鄉吳山某原以狀與疏託銘於某曰不孝不能致封號之榮於父母之存今死且葬若婦儀母規又將泯而不克紀是重不孝之恨於已窮君忍不銘吾母耶某又何可辭夫人蘇州人三世無仕者幼孤隨母嫁張氏遂假氏以張既長歸安府君入門盡婦道舅姑喜嘗語之曰今若善事我他日當得賢子婦以為若幸已而長子及婚里人有甚貧者願以其弟之孤女為配府君議未决慨然曰彼欲以遺孤託吾兒納婦必勢資耶第娶無易府君於是不能奪已而其婦果賢卒如舅姑言府君始娶陳氏夫人繼之凡子男四人夫人出者長寺丞君也次翰早死次沆應進士學女四人其三出夫人而夫人概視之雖習於安氏者不知孰為孰出也享年六十八以疾卒吾嘗愛寺丞君當官不屈倚而剛介謹廉以自持亦夫人內教云銘曰我勤姑嫜夙夜左右男女我戒以順以守刻此銘辭以式母婦朝奉郎守尚書虞部郎中上輕車都尉賜緋魚袋曽府君墓志銘曽氏得姓最逺其族散在四方未聞有顯者繇泉州晉江之曽諱某始以文學取進士高第久之進修撰集賢殿復有子今丞相僕射兖國公能世科等既貴得追贈三代故自曽大父諱某逮修撰纍至太師中書令兼尚書令又命豫楚二國以公其祖父於是曽氏遂大顯公諱公望字武仲丞相之弟楚國公第五子用父任補太廟齊郎嘗一試進士不中曰安能事此求合耶遂勉調州縣後數年主明之鄞縣簿是時朝廷用兵西方詔舉材吏可為縣令關中者或薦公可任即拜衛尉寺丞知華之渭南縣由寺丞八遷至虞部郎中由渭南厯簽書寧海奉國兩軍節度觀察判官事去持楚國太夫人喪服除知舒州桐城改蘇州吳江縣知忠州通判江州遷光州以卒公囊蓄智慮視天下事無難者僅􅀈出罅見措之行事人固以為不可及渭南豪家置磑以擅水利嵗旱一勺不以與人公至即破磑渠水使得與衆共凡溉民田千頃杭州江堤壞水使極悍一州恐當立辦堤役諸從事莫可與者太守以屬公即白下諸縣調丁夫至則富陽人欲亡役撼衆公鈎得唱者捽致之罪衆懼且力堤亟成有詔褒諭忠州民負官鹽十七萬有破産不足於償者或負者死至子孫猶償不釋公奏罷之仁宗朝寬恤諸道民力遣公江西多稱上㫖治平二年淮察饑公適為光州流民聞仁政日輳其境募富家出倉實以食之人活數百萬煦窮恤弱一郡視公猶父母明年正月二十一日以疾卒於官凡閣封之人與旁郡之饑民食於光者哭數日不絶聲嗚呼公仁若此而壽止五十七官不過一州守豈其命耶其臨下氣嚴色厲若觸之立蹈於咎而中實寬然以恕與人交誠至誼篤滋久不壞雖甚愛物彼挈之以去不問即有所欲取於彼亦不為辭謝又天性强記文字一經目輒終身不忘好談前史事厯厯如指掌善刑名書或問某事若是法何如曰某事應某法聞者服其精嘗著軍政備覽二十七篇托諸家兵法為之說觀其方略三軍可將凡材之用用世者卒不一施其可悲也已娶朱氏封廣陵縣君兵部侍郎贈某官巽之女靜柔淑明先公十三年卒子男三人孝綽光祿寺丞孝總太常寺太祝孝緼大廟齊郎女六人長適某次適衛尉某丞王諶次適殿中丞杜諲餘尚幼公之在吳江夫人卒焉遂葬杭州之天竺山及公葬有日孝綽與其仲弟遷夫人之柩自杭至乃以某年某月某日合葬鄭州新鄭之墓原銘曰公初起家父蔭是承中則已致乃終有稱公在郡縣害寢利興豪奪爾破衆搖爾懲釋其負逋如解急繩哺厥饑口數不可勝惠於民人義於朋友裕其在已霈然自增强其在天則莫我能亶有餘祉後人是膺贈衛尉卿梁公夫人李氏墓志銘户部侍郎梁公諱某之冡婦衛尉卿諱某之夫人姓李氏其考諱著有寵真宗朝至濠州刺史緣藩之舊前後賜豫甚渥家以富盛夫人年十六歸梁氏方是時侍郎議審刑院及其季舒國公在翰林為學士合處京師族大用屈夫人入門能服勞履約如素習然事舅姑終日無惰容撫諸子人莫知為嫡庶者衛尉愛客樂施每鬻奩中物以佐之其來而享之於外者人稱所欲而其夫不見不足之色率不知費自奩中出也衛尉喪不衣采食葷以此終身焉一日感疾語諸子曰七十人壽罕至者矧吾年又加二吾死何憾獨乃父有志無命不克大耀以死吾所慊然者如有待於後汝曹其勉諸語訖不起嘉祐五年六月九日也夫人喜釋氏書且深探其理能頽然委順不惑於死生之際豈非效與夫貴封永安上黨二縣君後以子改封贊皇縣太君子男八人曰訪湖州德清縣令卒於官曰詠今為太子中舍人致仕曰詢今為尚書比部員外郎曰彥世今為廣安軍嶽池縣令曰誦曰咨並郊社齊郎曰諷梧州司理參軍曰翊鄆州壽張縣尉皆早卒女九人長嫁試將作監主簿李貫之次嫁尚書屯田員外郎王衛次嫁進士郭宗道次嫁右班殿直張倜次嫁進士武孜餘未嫁早卒熙寧四年九月甲午葬夫人鄲州須城縣登庸鄉調鼎里望南山之南原祔衛尉卿之兆銘曰來儀大家雍雍其鳴仰肅俯順婦道以成宜爾君子卒至正卿盛服文軒始從夫榮子籍在朝顯封載更壺則不外有聞維聲孰曰男子獨後有名請視銘章以較重輕太常少卿楊公夫人福昌縣君王氏墓志銘太常少卿楊公諱某之子曰元崇元忠將葬母夫人福昌縣君王氏於某縣某鄉某原合太常公之兆以至聫姻聞夫人宜最詳願有銘諸壙噫至固聞其賢矣方其歸楊氏也太常蓋嘗娶謝氏生二女矣夫人視之如己出比夫人生二男其愛行男女間未能有以毫髮窺原薄者後女嫁至竭奩中所有贍費且王氏故顯祖朴贈中書令父球任尚書兵部員外郎夫人獨能忘貴驕之習奉其夫以禮入門主饋無一日輒懈太常卒登州護其喪以歸非臨哭與祭未嘗不勉子於學以故二子皆有文元崇前大名府內黃縣尉元忠太廟齊郎至始見夫人於堂上環立而左右者無一有惰容既知其得家節也及其亡而往奠婦媵皆哭盡哀知其能以仁逮下也夫人達佛理故死無怛惻樂施與故斂無餘服得不謂賢也已享年六十三熙寧四年十二月甲子以疾卒其葬以明年三月某日其封君福昌也繇太常登朝用郊祀恩云銘曰事生送死盡禮君子出禮愛均鳲鳩之仁維此懿德母婦之式朝奉郎尚書司門員外郎通判大名府兼北京留守司畿內河堤勸農及羣牧事上柱國賜緋魚袋李君墓志遺事記尚書司問員外郎李君既葬之明年其嗣子鎬自雍以書至京師謂余曰先君之葬端明年公實銘其墓當時遺其可書者數字鎬食不下咽者亦既一年矣今得盡書之以碣諸墓遂使先烈不泯於後鎬無愧為人子矣乃從而為之書君初監密州稅一日同職為大適所紿閲貨不為實將稍隱其數以曲減征算君固執不可不聽遂往白州守時蔡文忠公守密特多君而沮其同職者復器以為能吏由是知名一郡故敢以少年視君後為縣崑山有監酒楚豫者貧甚能以廉自處君憐之先是縣主田獨酒官無有君議斤已田百畝主簿尉各半之以割𨽻酒官莫不以君議為當至今為例不改嘗與尉同得僞印尉圖免逺官願獨以為已獲君一聽尉便訖不復自言後州守桞公植轉運使葉公清臣聞之交稱斯二事皆刻己以與人亦常情之難能者鄭文肅公為杭守辟君幕府州事多所倚辦公移雍而代者宿望於公輒鉤托公短同幕吏有雅不為鄭禮者請索公庫副厯以尋其隙代者悅明日果索副本君曰庫有正厯奚用副為前此毁之矣代者無所得既而嘆曰天休雖去此幕中猶有人焉吾無能為己復從辟京兆謁丞相吕文靖公於都下見之喜意將用君未幾且坐事方是時朝廷専以文法升絀天下士一跌遂不復振君明果有餘而智慮無不足者遇事無問難易而一切敢為使君而得至於今之時棄瑕以録可用之才挾術舒藴馳騁從事於其間其進而取功名也未易可度於戲死矣豈其命歟君諱某字景仁若世次閥閲行治則具王公銘序云熙寧六年十月十七日權大名府朝城縣主簿陳君墓志銘君諱肱字叔良洪州武寧陳氏子生而諱嚴貌似仲尼衆目為陳夫子然其中亦自信不苟讀書務通大義其為文贍而有制舉進士中皇祐元年第釋褐鄂州江夏縣尉遭母喪去職服除主舒之懷寧縣簿又司法大寧監未滿去持父喪既又權寧國軍節度推官後補安州雲夢縣令未赴而縣廢改大名府朝城主簿闕君曰是亦為祿乃絀其資以就久之留守韓魏公知其賢本道都轉運使繼以事諉君且交稱君為才未及薦熙寧四年春役夫漳河君部役河上四月朔得疾以歸經三日遂卒享年五十三貧未克舉葬權窆浮屠舍後四年長子碩扶其柩歸以某年月日葬君先塋之次大略君為吏敏於舉職其行已廉於自進其在寧國也是州之寄倉蕪湖者於出納為最劇監司之委主吏常艱其選凡前後兩屬君一切務去宿弊而或有餘數其在江夏也嵗凶多盜君捕無遺類掾曹忌其功悉從末减故盜得不死賞典亦從而殺或不平之君曰捕盜尉職爾必欲害彼以利我豈吾心哉於是忌者聞以愧初君之主簿懷寧也考試黃州進士得今太子中允孫公素賁程文讀之喜即擢為第一明年公素登進士甲科且名在第八後籍籍為聞人於是人莫不以識鑒推君而君亦以此自負公素報君甚厚君死恤其家以其弟員娶君之孤女後君之所以得歸葬其鄉皆公素力也君於知言可謂無負矣然士大夫猶為惜者獨無位與年不及少紓其藴耳君曽祖諱某祖諱某父諱某皆不仕娶余氏生二男曰碩砥一女孫氏婦也銘曰嗟夫君命孰使莫或行輒此止用慊心術足已得一賢享衆美貽後慶在二子宅新宫安故里嗟夫君兹巳矣祠部集卷三十五
