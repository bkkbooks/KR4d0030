  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0030_WYG_008-1a, image: WYG1091/WYG1091-0075a.png}
body:
  text: 祠部集卷八宋強至撰七言律詩南都二月二日憶杭州去嵗之逰去嵗江頭對此辰花邊弄筆詠青春異鄉愁緒還隨客今日風光不著人蹭蹬宦名侵緑髮飄颻生理托洪鈞湖隄草軟辜遊屐空踏平臺陌上塵題姚氏三頭牡丹姚黃容易雒陽觀吾土姚花洗眼看一抹胭脂勻作艷千窠蜀錦合成團春風應笑香心亂曉日那傷片影單好為太平圖絶瑞卻愁難下彩毫端文懿大師院假山繞郭非無海上山更收紫翠入禪關竺峯飛過傳聞後蓬島移來想像間草樹細含生意足雲煙輕帶野情還主人髙卧嵩衡畔應放幽尋杖履間宋都憶梅古屋前頭幾樹梅長年臘後已全開自經逺别慿誰寄欲問清香無使來空與吟懷驚嵗月愁將客眼對塵埃棗林榆策粗踈甚索寞山東把酒杯留别西京僉幕陳子雍著夷門一别三年夢雒宅相逢二紀心人事漸隨詩筆老交情似共酒杯深從今日望青雲色寄逺時傳白雪吟不獨此間堪下淚秋風無處好開襟題魯司徒廟司徒精爽儼如昨舊史風流傳至今一雨能隨賢宰意石舍人頃宰中牟嵗旱有禱於廟不日甘雨霑足千年不死愛民心蟲緣壞壁青苔合鳥噪荒庭古樹隂桑雉逢人雖逺避近來僮豎殺機深迓漕臺感書郡縣齊瞻使者麾馬蹄行處是霜威前驅寧免為負弩髙謝未能圖拂衣顧已自知吾道在折腰甘被俗人譏古來䇿足皆貧賤伊起耕夫呂釣磯送竇彥法學士被詔赴闕緑髮傳家五丹桂青雲錯路兩朱轓鳯批天語來嚴詔馬躍春風候禁門造膝從容應有問披心慷慨不無言君王一見知堪用未厯財闈定改恩剛叔以雅言題拙稿輒依韻和酬每恨塵勞荒舊學更慙篆刻得初名聖賢閫奧期深入風雅源流庶一清短技示人方蓄縮雄篇鏖我太崢嶸君詩合作咸韶祕何爾輕酬鄭濮聲送江卿知徐州鳬繹州山繡畫開東方重鎮仗卿才過家喜氣隨行蓋入境歡謳接賀杯玉甃試尋彭祖宅金羈看戲項王臺都門送别無新句盡屬文通自賦來送程公闢郎中知洪州二首滕閣欄髙紅螮蝀章江水闊碧琉璃幾年氣象歸談笑一道藩垣繫指麾那待韓公來屬部無勞王勃寫雄辭使君自有文章手能與山川作好碑君王從此不南憂善付名郎第一州笳鼓出嚴千騎從旌麾坐制九諸侯城巔觀閣屏間見江底乾坤鏡裏浮門下賢豪常滿榻却應仲舉減風流送喬岑世俗誰誇晝錦歸鄉人應笑舊儒衣一言許與經詞伯三道聲名出禮闈天府試䇿特為主司所稱好在青雲須逺步莫愁黃鵠不髙飛還家便飬軒騰志當使閭閻見面稀題錢安道節推環秀亭嶫巘虬簷插斗飛乾坤秀色四暉暉晴江對酒平如掌晚樹開簾細作圍笑裏城烏啼月過吟邊巢燕掠花歸主人風骨爭森爽無處容塵到客衣送公濟還闕下不候關征滿嵗歸乞成資得請邑人徒爾挽行衣肯將淚對殘花落應自心先去鳥飛官向長安多富貴君當即日享輕肥緑槐隂合天街後恰輟辰班拱帝暉送劉伯夀團練致政歸雒陽舊隱幾年笑傲負緱雲一日重尋麋鹿羣歸老慢賢疏太傅不侯誰念李將軍霜天劒氣間中見月嶺笙聲醉裏聞回首功名今似夢逢人懶説守邊勤和唐林夫正字韻共是江山棄水雲更同魏北走埃塵官書斷手何多日樂事回頭已一春入夏解衣宜野逸幾時縱酒到天真由來朋字難為正莫漫剛顏忤世人初秋與趙無愧小飲下關河亭季秋送客復至其間偶成短句秋早津亭一笑歌紅粧晚景落清波重來霜後攀踈桞更向風前數敗荷物理盛時能有幾人生樂處亦無多不知當日樽前曲郤傍誰邊斂翠娥依韻和王立之中秋隂雲不見月更長不見水精盤搔首庭除夜向闌一氣人間清自轉孤光雲外好誰看關河夜色暗朔漢樓閣吟魂飛廣寒幕府病眠憔悴客獨無樂事可相干夜會洪方叔别杯曽破菊花期今夕相逢菊又衰宦路經年能會合人生何處免參差漸驚老態侵常日猶喜交情似舊時一笑形骸俱自失三更星斗席邊移再宿白巖院寺在踈林積靄間舉頭無處不蒼山老松怪石莫知嵗幽鳥孤雲相與間衮衮紅塵嗟宦路時時飛夢繞禪關上方大士觀空坐應笑喧卑數往還立之臨别連以佳篇見貺依韻和酬建溪夫子惠新詩雅道深慙未得知曲享鶢鶋真過矣吟成欵假復何之日斜留煮山家茗煙重愁燃客舍萁我繫一官君四海可憐出處不同時依韻和居方觀崔生畫古今畫手得名人一物才工自出倫字與丹青俱是絶勢關飛動不無神浪傳誤筆成蠅點那待青田寫鶴真侯鴈枯荷含逺意江湖歸興劃然新次韻知郡郎中應期喜雪公將民欲逹天心瑞雪如期白晝隂皓色恍疑霄宇接濃寒都為嵗華深辭妍席右人雄贍興盡溪邊客訪尋鈴閣唱髙宜和寡不才剛綴郢中吟依韻和答晉倅洪君然都官三益見寄别乘文章晚更竒全家才業繼前徽閨中蔡琰詩無敵魚軒善詩膝下劉歆筆有譏令子嘗論厯代頗有譏正歸意我慙彭澤桞清腸君愛首陽薇案頭簿領真流俗獨喜吟懷與世違丙午嵗與府中諸君重逰張氏園慨然成詩醉書曽記並遊人今日重遊墨尚新對酒年來驚白髮惜花時復數青春四方散落幾交臂萬事參差一病身傍水園林自蕭灑不須出郭逺風塵題余公亭公自披榛上築城以公題榜壯圖經名佳應與溪山久地勝渾疑草木靈到喜琴樽能滿意退嫌圭組只勞形異時邦俗思賢化還似甘棠愛此亭喜晴雷威無節雨霖頻倍喜晴陽照火旻野外芻蕘尋故道田間簫鼓賽間神亂苖豎似痿人起積靄披如舊屋新更待髙樓今夜月一樽且樂有涯身中秋對月有感西風入夜掃微雲皓魄來無一點塵樓閣通宵雙玉户水天隨處兩氷輪光搖樽酒清宜客影落關河思煞人我向乾坤違樂事孤蟾照淚滴衣巾送劉嗣復都官赴辟秦州幕府安西幕府藹聲華禮幣迎門促去家長日壯圖看劍氣隔宵喜信報燈花輕裝度隴由來慣逸轡追塵不待撾賔主禦戎俱有䇿只陪談笑却邊沙十萬強弓略未彎妖氛漸滅賀蘭山元侯把詔開新府上客隨書出故關詩酒不妨行樂外功名只在立談間主人待勒燕然石誰道能銘獨姓班幾載關西任醉醒一朝意緒屬青冥舌端江海傾談韻掌內風雲指陳形烏府中丞知國器中憲王公知兄最深嘗薦于朝鴻樞學士納邊庭二公逺近觀成效莫使旄頭尚有星入秦乘夏頗相宜笑拂征鞍盡别巵鸚鵡隴西迎賦筆芙蓉幕裏近花期祖琨清發能長嘯老杜冥搜有雜詩杜子美有秦州雜詩君去定應兼二美軍書暇日戍樓時走筆和楊蟠從事庭菊楊子門無載酒賔菊開誰共醉天真簷前寂寞逢吟客霜後蹉跎伴主人鈿帶綴花疑細翦金錢繞屋豈全貧東家早秀誇桃李今日空枝不似春河北送洪景之進士如荆南十年肝膽照交情朔漠相逢意轉傾蒼鬢飄颻豫薄宦青雲蹭蹬子諸生更同樽爼知何地漫與詩篇送子行南北倦遊那得定扁舟江外欲之荆依韻和答陳公度五邑季點道中見寄之什幕府清郎安在哉方冬行縣冒塵埃寂寥坐客思車樂點檢詩朋欠鼎來按吏最誰官簿整教民幾處戰旗開此行兼鄉兵未應輸我論文飲贏得新詩滿篋回北都春日漫書蓬鬢雙侵京國塵花枝五别故園春曉鶯莫漫驚遊宦夜鶴多應怨主人日月名遲愁攬鏡江湖興在憶垂綸天邊涕淚懷吾弟却恨衣冠繫此身苦熱羣鳥無聲抱翠條乾坤雖廣絶微飇魚龍尚懼滄溟沸草木甘從赤日焦只與火雲張氣勢未容霖雨解炎歊經時未雨猶間事莫放晴虹作旱祅觀蓮水仙也曝晚霞衣萬片鮮紅照緑池花近酒杯逾酷烈蓋隨舞袖忽欹垂且延勝賞觀靈匹好折清香贈侍姬苦被濁泥埋沒久題詩今喜相公知韓魏公生日早陪樞管晚持衡曽與君王致太平一代盡宗蕭相畫四夷猶服晉公名乾坤爽氣初秋動社稷元勳翌日生今嵗故鄉諸父老夀樽應喜得親傾功名冨貴舊元台誕日新歸故里來綺席重張孫相閣錦衣三照鄴王臺相望全魏榮封國不盡清漳伴夀杯最是銜恩門下客秀眉前祝落鄒枚榮歸堂堂就新紆上相車名尊為出紫泥書公以詔語名堂清杯燕喜三春半黃閣歸來一紀餘香徑生輝榮草木畫簷垂蔭樂禽魚官輕可笑江東老也漫懷章詫里閭嫩桞濃花圍舊圃朱甍碧瓦照春池黃金腰下還鄉印翠琰胸中報國詩乘駟長卿羞志淺懷章公子恨名遲知公觸事須尊主揭榜新堂是訓辭依韻和酬留别魏國山河氣自雄殊方客子一身窮靈文獨富肝脾內秀句連成咳唾中細數舊遊如俯仰俄驚新别又西東郡侯早晚論高行懶就秋闈望至公九日去嵗重陽踏路塵異鄉今日恨還新如何佳節長為客却恐黃花解笑人強飲破愁為樂酒自憐多病足情身龍山舊事知難問千載相期屬此辰漸老襟懷已足悲登高節物可無詩秋聲颯爽侵蓬鬢晚意蕭條伴菊枝故里江山尋好處重陽樽酒負當時天邊鴻鴈隨南望憶弟雙眸淚欲垂馬上見華山身寄秦川紫翠間舉頭行坐對南山忽來煙際逢仙掌更覺天邊慰客顔霖雨不知何日作片雲猶向此時間三峯信美那能戀自有家林未得還西距渭南二十里有佛祠曰梁田其主僧守遂者引豫登閣久之欲題名屋壁守遂遽阻曰有榜諭恐得罪于邑大夫願勿題又閣有韓玉汝赴洋州日留題詩板而書字猶新詢于守遂曰前日韓將漕本道亦邑宰令寫之詩也因感世態而作洋州太守駐雙輪佳句曽留渭水春一紀却題關右節二篇才出屋間塵濡毫忽聼山僧語題柱須防縣令嗔只道衣冠專世態炎涼也屬不毛人五路嶺一徑髙盤十里餘人心馬足厭﨑嶇只慿頑石專為險不識青雲自有衢地氣難通樹多瘦陽暉應近草先枯我行方欲奮遐跖顧爾安能礙坦途和梁潤之晚登繡嶺翠華絳節去忘還輦路宮墻壞舊山青史空文興廢後玉真餘恨有無間杖藜一笑緣危徑弄筆高吟望故關足力怪君強健甚慣行棧道不為艱依韻酬獻陳州王密學見寄觸熱初來太華西恐煩後命促佳期杜子美送李祕書赴杜相公幕有恐失佳期後命催之句兩人幕府叨同日裴晉公詩有兩人同日事征西之句某與張宮舍俱參幕下千載門闌值一時儲邸忽開趨詔召賔筵空在失棲遲念公詩句情無極更聼秦民話去思憶昨驅車始向西樊川又見菊花期滯留舊幕嗟今日淡笑清樽記昔時屢辟濫充賔客晚厚恩慙報主人遲淮南卧治那能久天子懷賢入夢思和張文通書懷仕塗衆偽雜吾真誰信千鈞重一身赫赫朱門公相逺寥寥黃卷聖賢親府居此日嗟孤宦鄉飲當年謬上賔猶喜故人同舊幕每容詩句續陽春依韻和張文通寺丞寄鮮于子駿職方西州夫子善談天語入精微服四筵子駿尤深於易交分正論詩卷裏别愁忽到酒樽邊馬衝雪片歸梁苑鶯喚年芳憶渭川盛事青雲看接迹衣冠鄉里舊多賢閬州陳氏在衣冠盛事為最多送隴州使君劉仲儀左藏赴治夾道濃香𢾗里焚隨車和氣一城薰兵民如見古循吏文武兼能今使君冷射祠堂汧水月晴飛郡閣隴山雲幕中知有才從事樽爼清談定喜聞雷從事實長安佳士依韻和酬順安使君王大觀見寄之什蒼鬢蕭踈並曲臺豫嘗與大觀同為博士太常北門笑口屢同開仲升投筆燕南去王粲從軍陜右來月冷戍樓悲短笛奉狀洏川天寒戎幕賴深杯更為後會知何地終日思君首懶回送人還闕談笑三年陪主帥文章二紀在公卿莫辭别酒傾秦地古詩冇秦地少年多釀酒之句且聼離歌唱渭城鞍馬入關侵臘尾宮鶯到闕破春聲朝廷拔擢賢才急合有當塗薦姓名依韻和逹守徐郎中見寄鐃鼓鳴船送出都中間不奉一行書荷公恩禮無時薄接物襟懷似舊虛久别近參元帥幕相逢屢枉使君車詩筒自附西來驛那要煙波雙鯉魚依韻奉和經略司徒侍中寒食後池詩二首放懷吟笑艷陽天誰似征西相國賢春酒丁寧終席滿風花點檢幾枝全桞間鶯踏柔條軟池面魚吹細浪圓東閣恨參賔客晚五湖那暇憶漁船置酒高吟禁火天主人勳德重韋賢廟朝論道看三入樽爼談兵已萬全曉竹洗煙叢玉瘦春池濺雨亂珠圓曲江壯觀今蕪沒不復紅粧照客船南軒小桃盛開皆言羣花未發而此獨先之偶成短篇呈諸君紫萼紅英細細裝新枝短短舊枝長未經曉日誰言艷可藉春風自有香却恐折殘妨把酒若為遮佳莫臨墻關中氣候由來晚二月花開豈是忙長安春日感懷誰道關中莭候遲晴川二月繡參差有期去燕尋歸棟不改新花發舊枝宦路飄颻無定所客顔憔悴異當時林花巢燕休相笑攬照懷鄉已自知保安楊公濟書來問疾以詩答之青雲意緒漸悠然白晝昏昏懶欲眠詩攪肺腸來暇日病驅腰腳入衰年春來把酒猶能強老去逢花秖漫憐童稚情親今好在逺煩問信到秦川次韻答方晦之昔時英傑未伸時胯下淮隂尚俯眉之子古心能自信衆人謗口不須疑討論直取遺經夲芟剔寧容異説枝聖世尊儒君冨學等間危涕莫交洟依韻奉和經略司徒侍中清明興慶池上之作後騎前騶拂曉晴風光初轉繡旗明功名上相班春樂談笑西戎計日平煙際飛禽屏上見水邊遊妓鑑中行勸公急趂花時醉宰席猶虛主意傾春日興慶池上作韋杜風光掠眼明南山秀色入重城林端衮衮晴煙起氷底濺濺亂水鳴載酒小舟聊晚泊隔花幽鳥忽春聲漢唐壯觀今何在惟有新蒲細草生奉和經略司徒侍中埀蘿洞之什洞裏流泉過幾家洞門一醉興何賖桐飄欲下題詩葉桃笑猶存誤客花清結晚隂堪宿鳥緑牽春蔓擬藏蛇相君宴喜緣賔樂滻上誰人合姓車和司徒侍中上已會興慶池韻熒煌台座隔魁三杜工部詩冇君家最近魁三象之句喜對新詩見二南好酒似聼山鳥勸落花真惜野蜂銜天光不斷連春水月影初來破夕嵐紅斾欲歸珠履散逰人猶愛盡船攙依韻奉和判府經略司徒侍中上已晚遊九曲池詩地勢盤紆巧鑿開當年匠意亦多才池名不逐唐宫廢岸折猶如蜀阪來水落有時逢舊石草深無處覔遺臺行春丞相尋陳迹往事空嗟浩劫灰長安上巳日對雨憶杭州三月吾鄉三日盛一春盛事一時傳山花迎笑探芳騎水鳥驚飛張樂船今對清樽看細雨更搔短髮數流年曲江蕪沒不堪覷那復麗人來水邊經春長在幕府今日偶出見花幕府文書日日同愧無長䇿議平戎但驚蓬鬢看雙白不覺花枝巳半紅宦意蹉跎侵晚景客愁散漫逐春風古人枉説從軍樂興在江湖短艇中逰寶掌院當年祕寶巳無形獨有層峯似舊青不許俗人留轍迹却應神物護巖扄山腰猿嘯孤煙暝洞口龍歸暴雨腥今日一來探絶賞始知全勝考圖經登塔身世如追汗漫遊丹梯一步擬三休漢唐前後漫陳迹城郭是非勞寸眸寒日微明飛鳥背孤煙漸起暮山頭姓名滿壁今空在登此幾人忘百憂杜子美登塔詩有自非曠士懷登兹翻百憂之句依韻和尹嗣復祕校登回鑾寺閣有感之什尹子辭才兩崛竒家聲好繼漢翁歸人間茂器無施設天畔危欄獨據依詩興逺隨孤鳥逝客心間傍片雲飛登臨不比江南節何事徘徊怨落暉依韻奉和判府經略司徒侍中春隂馬上之什濕雲落地未回天墜絮將飛力尚綿霧重自侵旗尾潤日髙誰傍甕頭眠行田嵗望三登穀按轡詩成萬選錢霖雨長應隨出處春來只見月光圓送成都舊尹趙龍圖至驪山作阻傍嚴公住浣花喜從秦地見高牙致君前去心逾赤撫俗歸來髮未華路出錦江乘夜月騎停繡嶺揖朝霞自憐二紀遊門下今日聊能託後車依韻奉和判府司徒侍中賞西禪院牡丹之什花蒙一顧重長安從此時人洗眼看留艷徘徊供燕席飛香迤邐上貂冠露苞含曉宜三嗅風朵搖春似七盤便好移歸東閣種免教來嵗隔欄干依韻奉和經略司徒侍中過湫馬上始見終南紫誥泥封墨未乾暫班全陜詔條寬舊來霖雨從神覓好在晴山立馬看翠入重城朝自潤勢吞平野夏猶寒公師巖石同臨鎮關右人心轉覺安依韻奉和司徒侍中留題靈泉觀壞道頽墻繞舊山空餘繡嶺鬱巑岏庭柯引蔓長垂蓋林莢遺妖尚合歡觀有垂蓋古藤溫泉之側皂角生輒相並俗謂楊妃皂角云清渭不隨人事改溫泉那解客心寒唐宮蕪沒今何在漫拂津陽石記看題靈泉觀閣山腰碧瓦鬱參差勢壓開元觀閣基野氣欲來雲拂地天光不動水平池飛簷鳥道愁相逼故國人煙入俯窺便擬幽尋隨杖屨清秋幕府事文移韓魏公生日勳名一代俱稱首將相三朝愈飭躬雅意自安台鼎外羣生長願化鈞中破除白髮留賔醉收拾黃金濟士窮舊鄴山川齊夀考秀眉何獨魯龜蒙天地開秋氣兆涼當年大昴降星芒溢城鼓吹迎恩賜傾府衣冠望寵光馬出上間牽駿足衣頒內府疊濃香令孫今日方傳詔更待曽雲捧夀觴依韻奉和司徒侍中戊申西雒中秋對月白玉盤從海面浮間雲一點即時收山川表裏無遺照天地尋常可是秋清景似偏孫相閣髙情更屬庾公樓暫紓化筆歸詩句不泯長隨洛水流澠池古邑人煙陜雒間馬蹄車轍許誰間不堪曉雨妨行興猶喜秋風慰客顔老去稍知筋力倦年來祇益鬢毛斑相如屈趙無遺迹獨有空名重泰山長安九日鴈落霜清對此辰蟻浮酒濁喚何人二年不見江南弟九日空憐渭北身白髮轉多羞插帽黃花漫好擬霑巾功名又逐秋風晚惟有登高詩句新離京兆日獨里人葉舜舉祕丞胡從道户曺逺餞至長樂坂兩經辟命住秦關府罷東隨相國還物態當時傾附後人情今日有無間青門雨送歸行色白酒風吹上别顏相見去留終不改秖應同里與南山嶽廟齋宮與崔伯憲都官王正甫殿丞飲别二君各以詩送行席上作短篇奉答鄉人分散幾流萍長樂坡頭巳涕零太華相逢聊永日故交漸少似殘星别杯猶恨樽前緩詩筆那容席上停車馬東西從此隔明朝惟見亂山青九月二十六日河上雪昨朝今日盡天風九月長河雪片中雲外誰偷榆莢種人間自滿菊花叢羣隂已鼓先時勇萬井應愁卒嵗窮亦欲蹇驢乘逸興灞橋何處覓詩翁祠部集卷八
