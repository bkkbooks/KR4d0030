body:
  text: 祠部集卷二十二宋強至撰啓賀韓魏公生日啓天地新秋山河間氣挺生上相允屬初辰恭惟判府司徒侍中一代宗工三朝元老大忠自任直道不回經世措時動以作民之膏澤積功纍業霈然享國之寵榮頃避崇髙懇圖偃息油幢仍嵗去為素里之光英衮何時歸慰蒼生之望遹臨誕日鈞祝遐年某待次京師馳情門館捧夀杯而莫及臨慶幅以徒虔賀中丞啓審膺邦選入總臺綱風憲有歸朝言允協矧為正德夙秉睿心偉業之致青雲遍揚要路精忠之貫白日行啓危言繇霜簡之抨彈參國鈞之宰制適聞成命竊忭丹衷賀梁參政啓伏審發詔神庭登賢鈞席埏鎔所及歡忭惟均恭以某官勳濟王塗器包民極嚮參憲府進二樞廷感會帝宸綢繆公路亞上公之劇序密贊邦權隱真相之偉才弗居廟略稷卨惟已羲軒吾君佇正宰衡之崇永堅尹石之望某職二藩服迹遙廟堂有地生成無階慶蹈又伏審帝詔登賢宰廷亞序埏陶所暨歡躍惟均恭惟某官才貫幾深器函剛實旦暮聖辰之會翺翔朝辨之華青琑之門蚤光於寵拜鴻樞之府參掌於藩機驟改恩書往陪鈞席圖講治安之䇿今也其時樹立太平之基決於匪日益紓賢業亟正台躔某總計外臺瞻風上笏側聞新命竊忭私悰賀北中韓侍中啓天地之交曰泰卦氣云臨春秋之一為元嵗功斯起恭惟判府司徒侍中際天傑識許國純忠擺落元勳而弗居徘徊舊鎮以自適一道之蒙和氣亦既有年三階之復台躔諒當匪日遹丁開祚誕擁龎禧某方佐財闈正遙恩館第劇夀康之祝阻伸慶謁之虔卑情無任激切瞻頌企忭之至謹具狀賀賀郭樞密改留後啓伏審顯奉宸恩峻遷台序凡叨暉庇均集欣愈恭惟某官偉略沉雄傑才英邁襲汾陽之祖烈傳圯上之兵符旋入贊於神樞亟出臨於帥路疆事所制輟帷幄之運籌國威以宣寬朝廷之西顧增重廉車之秩繼收盟府之勳行被詔音還圖廟略賀潭州任待制啓比承恩數出總利權鎮鞅簿書缺馳緘訊伏惟坐班寬詔翕萃龎禠恭以某官莊重自居直清不倚蚤聳端朝之望遄升延閣之華二職財闈有關經畫抗章法坐多所建明乃春長沙實惟叵鎮暫繄耆德往撫遐氓諒五月之政成即三篇之册拜伏望倍綏燕鍊少副瞻祈賀東陽侯祕丞啓伏審就拜上恩進丞中祕伏惟慶慰恭以某官氣鍾間傑道具大醇聊試治封之繁頻登功狀之最升名閨籍兹漸於華塗易地坤維行蘇於逺俗永言欣企曷究指名賀致政少傅啓伏審中詔推恩上臺得謝參青宫六傳之貴保安車賜几之榮休風穆然輿情仰止恭惟某官潛德邁種英猷濟時士林以師保而允懷王室繄股肱而是賴雖大雅作誦老成重於典刑而髙賢所存功名付之天道由是辭台鼎之機任即侯服而偃藩體貌之隆固不遺於黃髮止足之計乃獨得於素心遺塵垢於儻來即逍遙於物外揮金之樂不減於疏公挂車之榮足踰於廣德竹帛所載今昔同符跂聞英聲側深景行寓迹髙門之地阻親長者之謀仰瞻之誠一二奚既賀文相公出鎮許州啓伏審茂對詔音出觀藩政抗使旌而就道露公冕以宣風仍審肅柬便時已開尊府恭惟某官器包民極勳濟王塗感會嚴宸綢繆英衮宅元台之劇序密暢邦猷紓真相之偉才究宣廟略已見經綸之效弗居變理之功懇形讓封求避榮路即膺俞詔均逸陪京躋端揆之絶班加真封而衍食巖巖尹石未移率土之瞻兩兩台星佇復中階之首代賀毫州皇甫大諫啓伏審祗奉詔音肅觀藩政伏惟慶慰恭以某官道先民覺才為世生出入三朝體貌一德偉謀大政率咨訪於元龜茂業豐功因享延于優祿寖列諫垣之重洊更守紱之榮惟景亳之名封實右淮之巨鎮暫勞君重班宣寬詔之名行副帝咨陟降嚴塗之邃調元台鼎均福名區俯惟冗官適二支郡庇台光而有所就賀列以無階代賀龎昭文啓伏審廊廟須才朝廷倚德誕頒明制登踐元台徽册傳聞薦紳抃躍恭以某官夙鍾間氣親對休辰文章致身忠誼結主宣邉陲之逺略早砥豐功陪樞幄之偉謀旋承顯命陟降王塗之祕綢繆台路之嚴參正論於中階密禆政闕歸成能於上衮弗有賢能帝意愈傾物議加重果膺寵命升總大鈞行將専講政經深謨王體三光澄渙百度清明措國至隆比元和貞觀之治躋民有謐若大度赫胥之年示函夏之具瞻臻宗臣之極致某適縻守紱逖逺台符有地埏鎔無階慶蹈又伏審祗膺册命升總鼎司體貌益隆幅員均慶恭以某官清廟偉器上天元精早會遇於帝宸恭鼎謨於鈞席密禆宰論退隱賢謀苐觀幾務之成勿耀經綸之迹物論加重主知愈明果被恩緡首躋衮路圖謀治安之䇿今也其時樹立太平之基決於匪日追臯夔之極致永民庶之具瞻某職守侯邦迹遙台座側間承命竊忭私悰代賀董度支啓伏審中宸降命外計委才行美廕之焉依增懦衷之竊忭恭以某官氣陶至粹識蹈大方以器業之深取重時論有公忠之實自結主知參財府之劇謀陟星垣之要秩董淮州之轉給素號才難議漕節之登延果膺帝簡行將攄發智略講求事經金穀羡饒力瞻大農之用兵民給足佇蒙細札之褒俟拜崇麾併紓丹悃代施大諫賀龎相公啓伏審就膺徽丹升總大鈞體貌益隆幅員胥慶恭惟某官器包民極勳濟王塗秉忠諒之一心出誠明之正性嚮綏邉閫進二樞庭感會帝宸綢繆公路亞元台之劇序密贊邦猷隱真相之偉才弗居廟略物論加重主知愈明果被明綸亟登上衮稷卨惟已講圖萬化之原羲軒吾君拱揖九筵之上躋太平之極致永普率之具瞻某職總漕臺迹遙政府無階慶蹈有地埏鎔代賀唐中丞啓伏審茂對制函榮躋憲府四方相慶萬口一辭恭以某官王佐偉才天民先覺毅然立朝之正色外嚴秋霜直哉致主之精忠上貫白日向收康濟之藴出總輸將之權旋倚重於邉藩曽甫安於坐席亟承宸綍入領臺綱彈疏未陳已破姦回之膽諫言即發當開睿哲之心至治之風復觀兹日俯惟愚品嘗庇台光抃躍兼深敷論奚悉代賀田諌議啓伏審疏渥宸緡升華諫闥側聞新命竊忭丹悰恭以某官莊重自居直清不倚以函一之德會泰寧之辰洊歷事權率凝績效遽由內閣之祕驟置七人之聯青蒲伏規佇禆當世之闕紫芝頒檢徑宅元台之榮曾是冗微最叨知奬矧聆進擢倍切欣歡代賀知郡屯田啓伏審善諏剛辰榮開尊府矧叨暉庇實倍欣愈恭以某官才貫幾深器函剛實親逢文雅之會優踐秀亷之科千里班條適攄於素藴一封祗詔行對於寵褒代賀運使祠部啓伏審光奉明緡就移要部側聞成命竊忭塵襟恭以某官識貫幾深器函剛實親逢文雅之會洊擢亷良之科緩書殿之貴遊領漕臺之重寄然金穀大計誠曰藉才之司而朝廷急賢決非久次之地俯惟孱品將託臣庥企引兼常名言匪喻代賀運使向郎中啓伏審祗承恩詔榮改使麾幸臣庇之焉依增寸襟之竊忭恭以某官夙鍾間氣親遘熙辰秉忠諒之一心出誠眀之正性登車攬轡行澄敘於官聯挽粟飛芻佇羡盈於邦計亟膺宸檢之褒擢追復相門之光華企頌交深指云非悉代賀運使吳舍人啓伏審運使舍人顯承恩詔就領漕臺大庇焉依寸襟竊忭恭惟某官德宏業巨行潔道醇學際天人之交文經邦國之體珍䇿重計施諸當世而可行要職美官不由纍日而自致陟降王塗之祕翺翔諫署之嚴買臣懷章方建守麾之樂孟博攬轡遽持使節之雄諒坐席之未溫即追鋒而趣召發揮國論潤色宸猷俯惟孱冗之蹤訖託甄題之賜阻從慶列第劇歡悰代賀新運使祠部啓右某伏審改命中宸提衡外計將繄暉庇倍切欣翹恭以某官名世標才際天藴識親逢文雅之會繼擢秀亷之科心計素明聊寄漕臺之任詔音行及亟從書殿之遊伏望上為邦家精調寢餗代賀運使度支啓竊審邦計須才朝僉議可榮膺震檢就改使麾伏惟慶慰恭以某官識蹈大方氣鍾至粹親逢真主之運早踐列星之垣上知素明自結益固屯夷殊致忠誼惟鈞班寬詔於兩藩未嘗暖席按祥刑於列郡方爾下車遽奉明緡往臨要郡然漕臺分寄誠曰藉能之司而宸扆念賢諒非久次之地某適緣奉會方託恩暉旋聞拜嘉隂懼奪庇喜戀交集名言匪終代賀運使司封啓伏審進被恩綸出持漕節行棲大庇竊忭丹悰恭以運使司封經世偉才薦紳華望按章侯服素號平反贊法王畿多所建白風績彌劭上知愈明果膺尺一之書專領東南之計登車即路屬部瞻威董山海之輸將方繄碩晝瞻京師之供億佇奏豐功升踐嚴塗聚光大任某宿官無狀守邑云初幸素斾之焉依罄愚襟而非諭權楊州運使刑啓某無堪之質棲庇有年備蒙務憐獲保孤冗念簡書之營慮曽靡寧居顧箋牒之問安坐成曠禮尚繄寬置弗爾擯遺恭以某官職局淵宏才謀膚敏暫屈使臺之重往臨督府之雄董金穀之輸將矧煩經畫布詔條之寬厚聊藉撫柔江東運使張學士啓伏審就奉宸緡仍躋仙局逖聞成命竊忭丹悰裁賀牘以尚稽愧珍函之首及恭惟外臺繁使頻成第課之優東觀昔逰遽復載言之選蓋上心之圖舊推恩數以旌賢領漕節之澄清諒非久次踐王塗之嚴密行服徽章代賀正上安撫舍人啓恭以某官偉略熙朝純誠結主早逢亨會洊厯榮班藴頗牧之材謀尚稽顯用將唐虞之仁恤以慰羣元行休乘傳之榮入被登臺之拜甫臨首祚誕擁龎禠某兹亞守麾正遙使斾祝南山而為夀適阻前趨貢兼幅以敘誠奚殫下悃代盧郎中賀冬啓右某伏以盛儀亞嵗實典履長魯史載夫望書羲易記其來復恭惟某官夙鍾間氣親遘熙朝兹道迎于令辰期集受於繁祉某適司侯服敻逺賔除瞻頌攸深文陳匪悉謝轉著作佐郎啓第課非優僅應有司之常格拜嘉甚渥遽參祕局之後塵才無一長顔有餘靦越對明命實尸寵章竊以此官置員由魏及晉厥初到職必撰次於名臣於爾為羣皆洽適之故老後世寖革空名獨存目不窺金匱之文足不踐石渠之地雖異實能之授亦沿舊選之華苟容冒居安允清議某也曲士今之愚人磔史裂經姑欲自售曼辭陋句輒為衆傳耻用是而獲名竊改圖而蹈道方將劇當世之務以為事業發諸儒之藴以為文章宣涉學之淺源及得科於下綴一落選部七經潤年間嘗補掾淮州字人巖邑再泣喪親之血幾灰向仕之心奈先王之禮制莫踰矧諸公之薦書猶在勉就銓集許從陛趨漫思昔官曽乏善最濩落待詔兩新華春兢虞黜幽都絶榮望忽甄擢於無意抑生成之有階此蓋伏遇某官樂育士倫力開公道市骨而圖駿隨器而取人仰體籲能之懷俯援振滯之手卒令駑質亦玷龍光敢不允蹈攸針益堅所守弗隨草木而泯滅誓竭涓塵而報償捨是以還未知所措謝密院啓濫被茂恩亟塵繁使揆能非稱受命惟驚况獄理最幽吏端多弊或考情不實煆煉以成辭於法未安芟夷而取當及具文而來上紛纍牘之盈前自非通敏之資奚究重輕之失竊念某天姿滯固才具迂空幸襲世芬早階仕級寖尸榮於祕館久與俊遊嚮假守於僻藩自安愚分思復寬間之地以全踈拙之圖豈謂天造誤知朝言曲奬俾按章於列郡副慎罰於中宸靖言忝塵厥有緣自此蓋伏遇某官協宣坯冶對掌樞衡興勸有能助開公道謂刑哉事重有軫朝廷之仁謂愚者慮專宜領簡書之冗至恩難報孤抱如何誓輸委質之勤力踐盡心之訓上酬覆燾并答埏􅀈謝通判國博啓右某啓纍日前伏蒙通判國博奉舉某堪充京官任使者僻邑效官方虞幽黜當塗薦士遽預名聞望有所踰幸無與擬竊以本朝圖講至治延登衆材尚慮援孤者或泯於當時業逺者翻沉於下列思盡甄升之實乃嚴保任之科及夫私謁既行公議不復髙門或被汲引悴族或遭棄遺間有非常之賢特排既久之弊言若衡石審量於器能心乎國家甄拔於寒畯欲允清舉豈容匪才如某者涉學淺源得科後綴謹亷自信竊類於古之愚峭直少儀弗宜於今之世嚮從銓管補掾淮州民獄固繁殫修於賤職使臺交至灼見於鄙心薦者凡五人奏可移一邑眷兹陋壤越在窮山雖牒訴究懷時有一得而衣冠過境嵗無幾何尚安善治之聞以動上官之聽豈圖采擢輒及鯫庸靖言載惟厥有攸自此蓋伏遇通判國博力澄官品協布政條隨器而取人市骨而圖駿遂收一介之技俾出大賢之門敢不允蹈攸針益堅所守刺求吾俗之瘼鋤剔厥民之姦庶幾立身以報知已捨是而往未知所裁代謝兩府啓誤奉朝恩越叨臺職揆能弗稱竊幸惟驚復念某擢質本微賦才非粹蚤緣曲藝進躐茂科字兩邑之遐氓孰宣上化補一官於赤縣遽遘親喪旋及外除復塵舊物短才未試善狀何甄會通漕之浩穰議增佐職蒙茂恩之升擢使備乏員夙夜協心毫釐砥績偶登嵗課僅免官瘝均異數以精勞愧無功而冒賞就加冗秩猶曰尸榮矧憲府之要資假計臺之煩使自量愚分兼恤人言懇列讓封願還新命繼頒中旨趣斷固辭欲避寵再三懼成於徼譽而拜嘉俯伏竊究於為容此蓋伏遇某官翼亮天工運平帝縡器人容有不備則長短之才異收匠物謂無可捐故分寸之勤亦采是令駑猥獲玷龍光謹當黽勉事為激昂志尚務或干於金穀敢不盡心言苟利於國家寧忘竭慮庶殫一介之效少答大鈞之仁代王給事到任謝兩府啓三秦重鎮七諫要班併忝冒於優恩適布宣於寬詔短能所據厚幸何勝伏念某素乏才猷偶承器使向二大農之劇遂參近侍之華解朔野之守麾調西陲之兵食坐席未定籠財曷遑遽被宸緡就分帥印按故都之千里提支郡之十城節制此方得便宜而從事慰安爾衆以綏撫而為名致此假人出於造物此蓋伏遇某官股肱一德體貌三朝持衡宰柄之公登翊王塗之政坯冶所暨方圖畢成本由睿選之須才翻以愚蹤而塞詔敢不博求民隱祗訓戎行允蹈古人之為庶幾循吏之自上酬乾造次答化鈞代轉諌議謝二府啓國家接統五聖推恩百工事順考於纍朝秩遞遷於一等亟繇郎位超長諫垣曽是罔功曷勝厚幸伏念某時名最寡風力不強屢從煩使之行旋二大農之劇遂叨法從仍領南服之輸將汔兹踰嵗瞻中都之供億何有薄勞會乾御之天飛覃渙恩而雨施一個之無他技類獲拜嘉七人之有諍臣遽蒙進位顧乏致身之術良階進物之仁此蓋伏遇某官體貌宗工股肱新政贊德音之霈發漸士類以畢周致此龍光及於孱陋誓殫忠藎少罄論思用答生成次酬鈞冶代上宋都官啓近日伏遇某官將朝京師暫館淮泗出於天幸覯止風猷使車比轅洊更月所官簿堆案懬奉郵音豈謂自損進尊曲敦髙誼忌賤官之么冗錫諄誨之丁寧伏讀已周銘藏苐切仍審餘寒貫序純履餐和恭以某官莊厚粹溫精明剛敏髙文取重於時論大雅追還於古風軒陛對敡方疇於最狀臺閣翔翥行陟於嚴塗代上交代郎中啓領藩卒嵗受代還朝奏課中宸愧絶陟明之覬解麾舊服嘗蒙敦遣之優契濶踰時跂瞻惟日伏惟肇宣美治誕擁龎禠恭以某官郎署碩才前朝舊德班條千里方懋惟良之稱祗召一封行膺不次之舉祠部集卷二十二
