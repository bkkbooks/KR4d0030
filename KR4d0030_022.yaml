body:
  text: 祠部集巻二十二宋強至撰啓賀韓魏公生日啟天地新秋山河間氣挺生上相允屬初辰恭惟判府司徒侍中一代宗工三朝元老大忠自任直道不回經世措時動以作民之膏澤積功累業霈然享國之寵榮頃避崇髙懇圖偃息油幢仍嵗去為素里之光英衮何時歸慰蒼生之望遹臨誕日鈞祝遐年某待次京師馳情門館捧夀杯而莫及臨慶幅以徒䖍賀中丞啟審膺邦選入總臺綱風憲有歸朝言允協矧為正徳夙秉睿心偉業之致青雲徧揚要路精忠之貫白日行啟危言繇霜簡之抨彈參國鈞之宰制適聞成命竊忭丹衷賀梁參政啟伏審發詔神庭登賢鈞席埏鎔所及歡忭惟均恭以某官勲濟王塗器包民極曏參憲府進貳樞廷感會帝宸綢繆公路亞上公之劇序密贊邦權隠真相之偉才弗居廟略稷卨惟已羲軒吾君佇正宰衡之崇永堅尹石之望某職貳藩服跡遥廟堂有地生成無階慶蹈又伏審帝詔登賢宰廷亞序埏陶所暨歡躍惟均恭惟某官才貫幾深器函剛實旦暮聖辰之㑹翺翔朝弁之華青琑之門蚤光於寵拜鴻樞之府參掌於藩機驟改恩書往陪鈞席圖講治安之䇿今也其時樹立太平之基決於匪日益紓賢業亟正台躔某總計外臺瞻風上笏側聞新命竊忭私悰賀北中韓侍中啟天地之交曰㤗卦氣云臨春秋之一為元嵗功斯起恭惟判府司徒侍中際天傑識許國純忠擺落元勲而弗居徘徊舊鎮以自適一道之䝉和氣亦既有年三階之復台躔諒當匪日遹丁開祚誕擁龎禧某方佐財闈正遥恩館第劇夀康之祝阻伸慶謁之䖍卑情無任激切瞻頌企忭之至謹具狀賀賀郭樞宻改留後啟伏審顯奉宸恩峻遷台序凡叨暉庇均集欣愉恭惟某官偉略沉雄傑才英邁襲汾陽之祖烈傳圯上之兵符旋入贊於神樞亟出臨於帥路疆事所制輟帷幄之運籌國威以宣寛朝廷之西顧増重㢘車之秩繼收盟府之勲行被詔音還圖廟畧賀潭州任待制啟比承恩數出總利權鎮鞅簿書缺馳緘訊伏惟坐班寛詔翕萃龎禠恭以某官莊重自居直清不倚蚤聳端朝之望遄陞延閣之華貳職財闈有關經畫抗章法坐多所建明乃春長沙實惟叵鎮暫繄耆徳往撫遐氓諒五月之政成即三篇之冊拜伏望倍綏燕鍊少副瞻祈賀東陽侯秘丞啟伏審就拜上恩進丞中秘伏惟慶慰恭以某官氣鍾間傑道具大醇聊試治封之繁頻登功狀之最陞名閨籍兹漸於華塗易地坤維行蘇於逺俗永言欣企曷究指名賀致政少傅啟伏審中詔推恩上臺得謝參青宫六傳之貴保安車賜几之榮休風穆然輿情仰止恭惟某官潛徳邁種英猷濟時士林以師保而允懷王室繄股肱而是頼雖大雅作誦老成重於典刑而髙賢所存功名付之天道由是辭台鼎之機任即侯服而偃藩體貌之隆固不遺於黄髪止足之計乃獨得於素心遺塵垢於儻來即逍遥於物外揮金之樂不減於疏公掛車之榮足踰於廣徳竹帛所載今昔同符跂聞英聲側深景行寓跡髙門之地阻親長者之謀仰瞻之誠一二奚既賀文相公出鎮許州啟伏審茂對詔音出觀藩政抗使旌而就道露公冕以宣風仍審肅柬便時已開尊府恭惟某官器包民極勲濟王塗感㑹嚴宸綢繆英衮宅元台之劇序宻暢邦猷紓真相之偉才究宣廟略已見經綸之效弗居變理之功懇形讓封求避榮路即膺俞詔均逸陪京躋端揆之絶班加真封而衍食巖巖尹石未移率土之瞻兩兩台星佇復中階之首代賀毫州皇甫大諫啟伏審祗奉詔音肅觀藩政伏惟慶慰恭以某官道先民覺才為世生出入三朝體貌一徳偉謀大政率諮訪於元龜茂業豐功因享延扵優禄寖列諫垣之重洊更守紱之榮惟景亳之名封實右淮之巨鎮暫勞君重班宣寛詔之名行副帝咨陟降嚴塗之邃調元台鼎均福名區俛惟冗官適貳支郡庇台光而有所就賀列以無階代賀龎昭文啟伏審廊廟須才朝廷倚徳誕頒明制登踐元台徽冊傳聞薦紳抃躍恭以某官夙鍾間氣親對休辰文章致身忠誼結主宣邉陲之逺畧早厎豐功陪樞幄之偉謀旋承顯命陟降王塗之祕綢繆台路之嚴參正論於中階宻禆政闕歸成能於上衮弗有賢能帝意愈傾物議加重果膺寵命升總大鈞行將専講政經深謨王體三光澄渙百度清明措國至隆比元和貞觀之治躋民有謐若大度赫胥之年示凾夏之具瞻臻宗臣之極致某適縻守紱逖逺台符有地埏鎔無階慶蹈又伏審祗膺冊命升總鼎司體貌益隆幅員均慶恭以某官清廟偉器上天元精早㑹遇於帝宸恭鼎謨於鈞席宻禆宰論退隠賢謀苐觀幾務之成勿耀經綸之迹物論加重主知愈明果被恩緡首躋衮路圖謀治安之䇿今也其時樹立太平之基決於匪日追臯䕫之極致永民庶之具瞻某職守侯邦迹遥台座側間承命竊忭私悰代賀董度支啟伏審中宸降命外計委才行美廕之焉依増懦衷之竊忭恭以某官氣陶至粹識蹈大方以器業之深取重時論有公忠之實自結主知參財府之劇謀陟星垣之要秩董淮州之轉給素號才難議漕節之登延果膺帝簡行將攄發智略講求事經金穀羨饒力瞻大農之用兵民給足佇䝉細札之褒俟拜崇麾併紓丹悃代施大諫賀龎相公啟伏審就膺徽丹升總大鈞體貌益隆幅員胥慶恭惟某官器包民極勲濟王塗秉忠諒之一心出誠明之正性曏綏邉閫進貳樞庭感㑹帝宸綢繆公路亞元台之劇序宻賛邦猷隠真相之偉才弗居廟畧物論加重主知愈明果被明綸亟登上衮稷卨惟已講圖萬化之原羲軒吾君拱揖九筵之上躋太平之極致永普率之具瞻某職總漕臺跡遥政府無階慶蹈有地埏鎔代賀唐中丞啟伏審茂對制函榮躋憲府四方相慶萬口一辭恭以某官王佐偉才天民先覺毅然立朝之正色外嚴秋霜直哉致主之精忠上貫白日向收康濟之藴出總輸將之權旋倚重於邉藩曽甫安於坐席亟承宸綍入領臺綱彈疏未陳已破姦囘之膽諫言即發當開睿哲之心至治之風復觀兹日俛惟愚品嘗庇台光抃躍兼深敷論奚悉代賀田諌議啟伏審疏渥宸緡陞華諫闥側聞新命竊忭丹悰恭以某官莊重自居直清不倚以凾一之徳㑹㤗寧之辰洊歴事權率凝績效遽由内閣之秘驟置七人之聯青蒲伏規佇禆當世之闕紫芝頒檢徑宅元台之榮曾是冗㣲最叨知奬矧聆進擢倍切忻懽代賀知郡屯田啟伏審善諏剛辰榮開尊府矧叨暉庇實倍欣愉恭以某官才貫幾深器凾剛實親逢文雅之會優踐秀亷之科千里班條適攄於素藴一封祗詔行對於寵襃代賀運使祠部啟伏審光奉明緡就移要部側聞成命竊忭塵襟恭以某官識貫幾深器函剛實親逢文雅之㑹洊擢亷良之科緩書殿之貴游領漕臺之重寄然金穀大計誠曰藉才之司而朝廷急賢决非乆次之地俛惟孱品將託臣庥企引兼常名言匪喻代賀運使向郎中啟伏審祗承恩詔榮改使麾幸臣庇之焉依增寸襟之竊忭恭以某官夙鍾間氣親遘熙辰秉忠諒之一心出誠眀之正性登車攬轡行澄叙於官聯輓粟飛芻佇羨盈於邦計亟膺宸檢之褒擢追復相門之光華企頌交深指云非悉代賀運使呉舍人啟伏審運使舍人顯承恩詔就領漕臺大庇焉依寸襟竊忭恭惟某官徳宏業鉅行潔道醇學際天人之交文經邦國之體珍䇿重計施諸當世而可行要職美官不由累日而自致陟降王塗之秘翺翔諫署之嚴買臣懷章方建守麾之樂孟博攬轡遽持使節之雄諒坐席之未温即追鋒而趣召發揮國論潤色宸猷俛惟孱冗之蹤訖託甄題之賜阻從慶列第劇懽悰代賀新運使祠部啟右某伏審改命中宸提衡外計將繄暉庇倍切欣翹恭以某官名世標才際天藴識親逢文雅之㑹繼擢秀亷之科心計素明聊寄漕臺之任詔音行及亟從書殿之游伏望上為邦家精調寢餗代賀運使度支啟竊審邦計須才朝僉議可榮膺震檢就改使麾伏惟慶慰恭以某官識蹈大方氣鍾至粹親逢真主之運早踐列星之垣上知素明自結益固屯夷殊致忠誼惟鈞班寛詔於兩藩未嘗煖席按祥刑於列郡方爾下車遽奉明緡往臨要郡然漕臺分寄誠曰藉能之司而宸扆念賢諒非久次之地某適縁奉㑹方託恩暉旋聞拜嘉隂懼奪庇喜戀交集名言匪終代賀運使司封啟伏審進被恩綸出持漕節行棲大庇竊忭丹悰恭以運使司封經世偉才薦紳華望按章侯服素號平反贊法王畿多所建白風績彌劭上知愈明果膺尺一之書專領東南之計登車即路屬部瞻威董山海之輸將方繄碩晝瞻京師之供億佇奏豐功陞踐嚴塗聚光大任某宿官無狀守邑云初幸素斾之焉依罄愚襟而非諭權楊州運使刑啟某無堪之質棲庇有年備䝉務憐獲保孤冗念簡書之營慮曽靡寧居顧牋牒之問安坐成曠禮尚繄寛置弗爾擯遺恭以某官職局淵宏才謀膚敏暫屈使臺之重往臨督府之雄董金穀之輸將矧煩經畫布詔條之寛厚聊藉撫柔江東運使張學士啟伏審就奉宸緡仍躋仙局逖聞成命竊忭丹悰裁賀牘以尚稽媿珍函之首及恭惟外臺繁使頻成第課之優東觀昔逰遽復載言之選盖上心之圖舊推恩數以旌賢領漕節之澄清諒非久次踐王塗之嚴宻行服徽章代賀正上安撫舍人啟恭以某官偉略熙朝純誠結主早逢亨㑹洊厯榮班藴頗牧之材謀尚稽顯用將唐虞之仁恤以慰羣元行休乘傳之榮入被登臺之拜甫臨首祚誕擁龎禠某兹亞守麾正遥使斾祝南山而為夀適阻前趨貢兼幅以叙誠奚殫下悃代盧郎中賀冬啟右某伏以盛儀亞嵗實典履長魯史載夫望書羲易記其來復恭惟某官夙鍾間氣親遘熙朝兹道迎扵令辰期集受於繁祉某適司侯服夐逺賔除瞻頌攸深文陳匪悉謝轉著作佐郎啟第課非優僅應有司之常格拜嘉甚渥遽參祕局之後塵才無一長顔有餘靦越對明命實尸寵章竊以此官置員由魏及晉厥初到職必撰次於名臣於爾為羣皆洽適之故老後世寖革空名獨存目不窺金匱之文足不踐石渠之地雖異實能之授亦沿舊選之華苟容冒居安允清議某也曲士今之愚人磔史裂經姑欲自售曼辭陋句輙為衆傳耻用是而獲名竊改圖而蹈道方將劇當世之務以為事業發諸儒之藴以為文章宣渉學之淺源及得科於下綴一落選部七經潤年間嘗補掾淮州字人巖邑再泣䘮親之血幾灰向仕之心奈先王之禮制莫踰矧諸公之薦書猶在勉就銓集許從陛趨漫思昔官曽乏善最濩落待詔兩新華春兢虞黜幽都絶榮望忽甄擢於無意抑生成之有階此盖伏遇某官樂育士倫力開公道市骨而圖駿隨器而取人仰體籲能之懷俯援振滯之手卒令駑質亦玷龍光敢不允蹈攸箴益堅所守弗隨草木而冺滅誓竭㳙塵而報償捨是以還未知所措謝宻院啟濫被茂恩亟塵繁使揆能非稱受命惟驚况獄理最幽吏端多弊或考情不實煆煉以成辭於法未安芟夷而取當及具文而來上紛累牘之盈前自非通敏之資奚究重輕之失竊念某天姿滯固才具迂空幸襲世芬早階仕級寖尸榮於秘館久與俊㳺曏假守於僻藩自安愚分思復寛閒之地以全踈拙之圖豈謂天造誤知朝言曲奬俾按章於列郡副慎罰於中宸靖言忝塵厥有縁自此盖伏遇某官協宣坯冶對掌樞衡興勸有能助開公道謂刑哉事重有軫朝廷之仁謂愚者慮專宜領簡書之冗至恩難報孤抱如何誓輸委質之勤力踐盡心之訓上酬覆燾并答埏􅀈謝通判國博啟右某啟累日前伏䝉通判國博奉舉某堪充京官任使者僻邑效官方虞幽黜當塗薦士遽預名聞望有所踰幸無與擬竊以本朝圖講至治延登衆材尚慮援孤者或冺於當時業逺者翻沉於下列思盡甄陞之實乃嚴保任之科及夫私謁既行公議不復髙門或被汲引悴族或遭棄遺間有非常之賢特排既久之弊言若衡石審量於器能心乎國家甄㧞於寒畯欲允清舉豈容匪才如某者渉學淺源得科後綴謹亷自信竊類於古之愚峭直少儀弗宜於今之世曏從銓管補掾淮州民獄固繁殫修於賤職使臺交至灼見於鄙心薦者凡五人奏可移一邑眷兹陋壤越在窮山雖牒訴究懐時有一得而衣冠過境嵗無㡬何尚安善治之聞以動上官之聽豈圖采擢輙及鯫庸靖言載惟厥有攸自此盖伏遇通判國博力澄官品協布政條隨器而取人市骨而圖駿遂收一介之技俾出大賢之門敢不允蹈攸箴益堅所守刺求吾俗之瘼鋤剔厥民之姦庶㡬立身以報知已捨是而往未知所裁代謝兩府啟誤奉朝恩越叨臺職揆能弗稱竊幸惟驚復念某擢質本微賦才非粹蚤緣曲藝進躐茂科字兩邑之遐甿孰宣上化補一官於赤縣遽遘親䘮旋及外除復塵舊物短才未試善狀何甄會通漕之浩穰議増佐職䝉茂恩之陞擢使備乏員夙夜協心毫釐厎績偶登嵗課僅免官瘝均異數以精勞愧無功而冐賞就加冗秩猶曰尸榮矧憲府之要資假計臺之煩使自量愚分兼䘏人言懇列讓封願還新命繼頒中旨趣斷固辭欲避寵再三懼成於徼譽而拜嘉俯伏竊究於為容此盖伏遇某官翼亮天工運平帝縡器人容有不備則長短之才異收匠物謂無可捐故分寸之勤亦采是令駑猥獲玷龍光謹當黽勉事為激昂志尚務或干於金穀敢不盡心言苟利於國家寜忘竭慮庻殫一介之效少答大鈞之仁代王給事到任謝兩府啟三秦重鎮七諫要班併忝冐於優恩適布宣於寛詔短能所据厚幸何勝伏念某素乏才猷偶承器使向貳大農之劇遂參近侍之華解朔野之守麾調西陲之兵食坐席未定籠財曷遑遽被宸緡就分帥印按故都之千里提支郡之十城節制此方得便宜而從事慰安爾衆以綏撫而為名致此假人出於造物此盖伏遇某官股肱一徳體貌三朝持衡宰柄之公登翊王塗之政坯冶所暨方圖畢成本由睿選之須才翻以愚蹤而塞詔敢不博求民隠祗訓戎行允蹈古人之為庶幾循吏之自上酬乾造次答化鈞代轉諌議謝二府啟國家接統五聖推恩百工事順考於累朝秩逓遷於一等亟繇郎位超長諫垣曽是罔功曷勝厚幸伏念某時名最寡風力不強屢從煩使之行旋二大農之劇遂叨法從仍領南服之輸將汔兹踰嵗瞻中都之供億何有薄勞㑹乾御之天飛覃渙恩而雨施一个之無他技類獲拜嘉七人之有諍臣遽䝉進位顧乏致身之術良階進物之仁此盖伏遇某官體貌宗工股肱新政贊徳音之霈發漸士類以畢周致此龍光及於孱陋誓殫忠藎少罄論思用答生成次酬鈞冶代上宋都官啟近日伏遇某官將朝京師暫館淮泗出於天幸覯止風猷使車比轅洊更月所官簿堆案懬奉郵音豈謂自損進尊曲敦髙誼忌賤官之么冗錫諄誨之丁寧伏讀已周銘藏苐切仍審餘寒貫序純履餐和恭以某官莊厚粹温精明剛敏髙文取重於時論大雅追還於古風軒陛對敡方疇於㝡狀臺閣翔翥行陟於嚴塗代上交代郎中啟領藩卒嵗受代還朝奏課中宸愧絶陟明之覬解麾舊服嘗䝉敦遣之優契濶踰時跂瞻惟日伏惟肇宣美治誕擁龎禠恭以某官郎署碩才前朝舊徳班條千里方懋惟良之稱祗召一封行膺不次之舉祠部集巻二十二
