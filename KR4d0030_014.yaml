body:
  text: 祠部集卷十四宋强至撰表賀乾元節表臣某言伏以維夏肇和厥月幾望欣是穀旦實生聖人罄率土以騰歡比南山而稱夀臣某誠歡誠抃頓首稽首恭惟皇帝陛下神靈天縱文思日躋驅民仁夀之中登治唐虞之表重熙復旦載誕膺辰九五君臨肇洪基於不拔億萬天算綿景祚於無垠臣無任瞻天樂聖聳躍歡呼之至代泗州盧郎中謝到任表戚休千里宜求外牧之良忝冒一麾兹實下臣之愧揆恩至渥引分何堪臣某誠惶誠感頓首稽首竊念臣學弗名家器難適用尸榮僅四紀出守者數邦罄竭鄙才訖微善狀而況沿汴置郡臨淮據衝舟車往來之繁曽無虛日金榖運輸之入率由此途俗薄好爭地卑多潦雖賢守長猶艱智力之周若臣愚蒙曷稱要繁之委此蓋伏遇尊號皇帝陛下乾坤其量何細不包嵗月之勞雖微亦采使之治劇敢不究心宣布詔條之寬變移風俗之厚庶幾一得云補萬分賀明堂禮畢表精饗告成湛恩隨布庶邦聞慶億口騰歡中賀竊以合宫之祠厯代不講肇自有唐之際迄于我宋之初議者欲興寢而弗暇邈哉墜典舉在熙辰恭惟皇帝陛下紹三聖之休御九圍之廣洪造天冒盛猷日躋行教化之所未行紹禮樂之所未紹祭典咸秩治具畢張謂夫布王政者在明堂爰修曠制示民孝者由宗祀乃奉嚴禋逮乎訖大禮於總章坐中天之嶢闕追肆赦於往中許自新於吾民靈心顧歆並貺多福渙渥汪濊一清賤牢人神共和遐邇均幸臣迹縻守土籍逺侍祠第聽德音之宣阻觀帝饗之盛代泗州盧郎中明堂大禮陳乞次子恩澤表伏遇國家詔舊禮之常修合宫之饗稀闊之典事遽復於我朝疏逺之臣澤庶霑於厥嗣輒披愚欵仰瀆聰聞臣有次男某生㑹右文少知從學以其本專儒術未能自致於榮名欲乞特受文資所覬不違於素願兼臣厯任以來並無贓私過犯伏望尊號皇帝陛下廓如天之造推延世之私曲軫聖慈俯從臣請如是則人神胥慶喜曠制之舉行父子知榮荷茂恩之均及代謝進職表恩數推優禁聫增峻名浮已甚寵至惟驚中謝伏以本朝敞宸構以藏書憲羲圖而署目因名學士之職以擢從臣之才所宜職際聖微術鉤經奧俾塵清選乃稱徽章竊念臣一介單寒片文猥瑣蚤緣曲藝輒冒異科幸既出於逢辰仕不由於纍日參憲臺之風議無所見明預財府之權謀曽何經畫如守愚而斂分敢蠟等以越思亟叨內閣之華密奉前旒之邃固未能發揮儒效藻潤帝猷㑹邊閫之須人假州麾而出守朴忠自信已誤簡于睿心暗懦少機弗過防於讒口果飛疑似之語仰瀆神聖之聰蓋孤根之易搖致謗焰之肆起尚賴睿慈垂惻皇鑒照微止頒尺一之書移總東南之漕荷知臣之至哲堅執國之初心雖金榖數藂江淮間歉力經大計未始寧居旁均百郡之輸仰給中都之費偶充嵗課僅免官瘝遽收采以寸勞加顯嚴於近署況臣間關官路久去於清光鞅掌利權恍迷於舊學拜嘉非稱竊幸居多此蓋伏遇尊號皇帝陛下天造曲成帝暉下燭以臣夙因㑹遇嘗備使令簪履之舊弗捐靡遺於煩使毫髮之功亦奬示勸於勞臣特假寵光濫延疏外敢不激昂志尚究悉事為誓策疲駑庶酬覆露代馬察院謝表昨叨寵數因揣器能弗稱徽章乃呈讓奏靡回成命豈敢固辭勉强拜嘉兢慙失措中謝伏以憲府之選官材實艱論朝廷是非舉臣寮過失秩輕責重受易才難専一意以謹司尚虞敗職假他官而兼授豈曰慎名竊念臣發跡寒鄉策名昭世最為平進絶少他竒畿縣補官未施於寸效庭闈遘禍偶及於終喪宦緒間關生意衰落㑹曲恩之延被佐通漕之輸將而且金榖數藂江淮嵗歉僅充舊課遽録微勞弗循官次之常俾預臺中之列布衣奉詔有愧於祖風赤芾貽譏深防於物議臣所以厯披悃愊懇避龍光渙渥不休尸榮為甚此蓋伏遇尊號皇帝陛下乾坤覆燾日月照臨采臣銖兩之勤欲有功知勸加臣紏察之目欲雖逺竭忠敢不力樹壯猷思稱上意經營大計之暇圖講當今之宜國家之事可言雖危不避君父之恩欲報之死無他代泗州陳郎中待罪表臣任叨守土職在長人不能宣諭教條發揚孝治曽無善政副共理唯良之稱是致下民抵五刑莫大之憲竊以古之良守名布册書因昆弟之忿爭尚閉閣而至咎而況子之毆母事越常聞傷教悖倫莫兹為甚未能投紱引去以謝匪才是敢拜章自陳恭俟出典代待罪表長人亡狀致條教之不行匹婦何知抵刑科之莫大中謝臣聞古之刺史名在册書悼昆弟之訟田謝吏民而閉閣矧茲同産輒爾相殘有傷孝治之風其實守臣之罪左符所繫未能投紱而遂歸甲令有文是敢拜章而自劾代賀冬表臣某言伏以雲物望書因豫知於祥祲天陽來復方漸發於孳萌中賀恭惟皇帝陛下握斗披元對時凝命遹臨慶序翕受鴻禧鳴玉造廷儀亞三朝之盛測圭視日景同萬夀之長臣適領守符方遙陛墄阻預捧觴之列第䖍拱極之誠代王禹玉內翰謝兼侍讀學士表右臣伏蒙兼侍讀學士特賜衣一襲金腰帶一條金鍍銀鞍轡馬一匹者玉署代言之地老於文學之所居金華進讀之聨通厥古今而後與兩塗踐一已為儒者之極榮孤宦獲兼兹實聖時之盛遇而又華韀良駟以安其體美衣博帶以文其容難俯傴以循辭輒服乘而拜貺竊以珮服與德而相對始免於譏車馬稽古之所蒙可誇乎寵而臣者學未到聖賢之奧處論或剽父師之緒餘蚤緣科選之誤優寖辱禁嚴之首據侍牲幣告豐之聖饗何有駿奔之勤敷雷霆作渙之王言復無潤色之狀詎意上恩之博遽加中講之崇御府頒衣天間授駿申錫副帶環之麗餽金增韀葉之光載省無堪深虞不稱洪私甚昵屈名器之大公危抱如丹竭涓塵之少效代包孝肅公謝樞密副使表臣某言伏以疏恩至渥懼大取於時譏瀝懇維勤弗少移於詔意勢不遑讓寵其可驚免服華章難安悸魄中謝伏念臣仕以孤進術無他長獨信朴忠之可持不知徼幸之為利蚤際聖世頃塵諌員遇事輒論以身當怨殿邊隅之巨屏曷暢逺圖專江滸之孤城訖無善狀旋膺迅召假尹中畿近則賴天子之聰明逺則學古人之鉤巨雖奸豪之稍戢於暗拙以何功誤聽朝僉擢持風憲紀綱之地未能為國體而一言金穀之司猥以付邦須之大柄事端萃止心計茫然方虞曠􅟂俄正使號列讓封而懇避曽未踰旬綴陪幄之後塵遽焉易地在責愈重揆才弗勝然有時乎為貧尚且辭冨以前日不受是抑恐今非而況主計惟艱運籌不易識曉治亂方能合四輔之謀略具武文始可究五兵之本自視近器曷參繁機厯開不可之端庶寢已行之命愚衷第確天㫖靡回俾附樞躔之末光許聞廟算之餘論此蓋伏遇尊號皇帝陛下大明如日全度惟天乃眷孤臣不遺造物舍盈庭之衆哲特取菲能忘假器之煩言專融睿斷敢不夙夜重寄渴飢一心切平世防微之圖凛聖經慎戰之戒誓畢餘齒仰酬上仁謝生餼表載誕丁辰方集已孤之感匪頒列品俾供式宴之私出拜王人之命於庭入聞宗黨之慶於室恩榮相照喜幸交深中謝伏念臣偶以朴忠驟當睿選智小不足以識大體才近不足以經逺猷自坐論於中階殆空餐於厚祿第懼煩言之起敢希飫賜之臨豈謂尊號皇帝陛下分篤君臣禮優丞弼記其生日將以歡恩均肥㫖之醪牽加精甘之麴蘖仰對需雲之施愈慙鼎食之浮飽上德以何厭醉皇慈而難酢唯勤夙夜稱今日之所蒙稍立事功庶爾生之無忝代沂國公主明堂禮畢賀皇帝表伏以聖人唯能於饗帝並侑五精之神嚴父莫大於配天兼風億姓之孝合宫訖事罄宇均歡中賀伏惟皇帝陛下紹淳耀之烈光享重熙之盛福念物蕃俗阜兹二氣之所以降休謂德大報微非一純莫可將意以至徹鼓吹以盡齊容之恪潔圭幣以謹靈心之承臣民欣睹盛儀隨霑渥澤兒妾夙蒙睿訓亟被皇慈側聞玉輅之旋誠切素襟之忭代媫妤俞氏才人朱氏賀表伏以德産至大惟至䖍可以上交孝思無窮非昭配不能自達於穆宗祀維時總章人祗普和恩禮並洽中賀伏惟皇帝陛下暢配天之偉績秉順帝之清衷乘泠露之感懷傃旻穹而謁欵玉帛薦潔粢盛報豐靈心顧歆協氣充塞妾等陶生盛世玷號後宫竊觀熙事之成同慶洪私之布代曽魯公辭加恩表合宫已事罄宇均禧首眷近司併推蕃數罔功被奬匪服懷慙在義未安獲辭乃止中謝伏念臣蚤緣家學繼竊朝榮策足冗塗致身華貫始校文於書殿尋勸講於經帷進司西掖之言起視北門之草以至攝治大衆參聞萬幾往冠斗宫曷坐籌於勝算旋登台路第隨講於成規迄是踰年居然備位伏遇國家風示民孝靈承天儀尊推先君昭配上帝並升圭幣之潔益凛廟祧之嚴祼將于宫樂徹乃俎熙成禋禮霈發德音慶浹人祗寵先丞弼既疏美號并衍真封而況克濟上儀實非一力有主計之臣以助乎經費有陪祀之衆以供乎駿奔禮率按於舊常事動咨於睿訓夫惟彼相於此何功翻兼冒於王明懼弗容於物議尚繄確讓可弭煩言伏望尊號皇帝陛下全度天涵大明日照洞微衷之必至追成命於已行特寢誤恩俾諧愚分第二表贊書錫寵録相祀之微勤讓牘敬陳具假名之大略靡回宸㫖促拜恩章雖前蹈於嚴誅難少移於確請洊披危悃決俟俞音中謝竊以輔相乃表儀之司匪義則動將安仰慶賞無巨細之異當分則處之勿疑而況捍難者是謂功臣固非虛號進律者抑存王制莫重真封豈有陪原廟之天臨扈屬車之雷動陟降九筵之次雍容萬玉之先密奉清光縱觀盛禮顧粢盛之豐薦益抃時和省俎豆之前聞頓還舊學兹為厚幸復敢叨恩矧聖饗之先期有王言誕告具咨列辟毋上鴻名而臣則地在具瞻誼當一德侍嚴祠而何力儻爾尸榮思明詔以何顔甚於得責伏望尊號皇帝陛下如天縱欲與物終仁念志莫奪者匹夫且賞不妄者人主亟追繆寵以勸有功代魯公謝生日禮物表門弧設左親生適記於初辰邦詔發中君賜遽頒於多物拜嘉有腆萃感無涯中謝伏念臣南服孤生端朝平進偶緣朴學寖厯華塗器不兩周安適方圓之用才無一可矧兼文武之資自樞幄之冠謀即宰庭而亞政未竭股肱之效已驚齒髮之衰亶畏人言曷禆王體惟載生之始旦第自謹於私門敢謂睿明亦煩省記敇身枝而將命俾手舞以揚休鏤器織文殫巧工之精制華韉良駟分寶技之餘輝榮動比閭先生豐蔀仰寵章之特異知恩紀之由來此蓋伏遇尊號皇帝陛下與物終仁為邦隆體乃眷四鄰之輔謂同一德之親爰舉舊常併推蕃數皇慈甚渥惠固絶於能名愚抱如丹誼惟知於欲報代賀皇帝登極表大明相繼景命維新凡在懷生熟不稱慶中賀臣聞帝出乎震品物所以咸蘇龍飛在天聖人所以有作恭惟皇帝陛下至仁生禀盛德日躋孝悌恭溫發於主器之際聰明睿哲廣自承祧之初人祗交歡宗社永賴雲行雨施矧雱霈於德音乾端坤倪率薰蒸於喜氣臣適提外計久去邇聨第深欣戴之誠阻預歡呼之列代謝加恩轉官表官榮不次列讓讀以啓還宸㫖莫回降批章而促拜寵靈滋極涯分深踰承命若驚撫躬莫措中謝伏念臣日蒙樂育天與朴忠才不足以濟時誼唯知於許國因緣資序寖厯禁嚴孤立公朝固絶心於朋勢久登宰路常持慮於滿盈建功無塵露之微負責有邱山之重遘昌期之相繼膺景命以惟新霈發德音並均澤浸特舉便蕃之數示優燮理之司遽進崇階仍躋榮於鳯閣驟加庸品將取刺於鵜梁竊揆誤恩愈知厚幸此蓋伏遇皇帝陛下至仁丕冒大度兼容曲眷柄臣務全邦體苟筋骸之可强誓效微勤在肌髓以寧忘仰酬洪造夀聖節賀表臣某言伏以陽春之首四時既謹書王之始月魄之成三日聿臨誕聖之期罄海㝢以騰歡擬岡陵而薦夀中賀恭惟皇帝陛下心游道祕躬攬乾綱宴然享函夏之歸坐以須大昕之旦雷霆號令常必信於四方天地生成曽靡遺於一物躋時極治與古同符㑹嵗籥之更端紀電樞之啓瑞大開路寢普見羣臣萬笏稱觴前祝無疆之算八音奏雅間歌既醉之篇喜動明廷事光甲觀臣比司留鑰久去從聨未望清光敢嘆周南之滯阻陪盛禮第勤嵩極之呼代趙都運夀聖節進奉功德疏表嵗聿發春月兹成魄當五始書王之後乃千齡誕聖之初繞電流虹蚤開於瑞應普天率土均沸於歡聲臣是敢叩金地之莊嚴靣玉毫之竒妙恭延淨侣積演祕文覬不盡之勝因資無疆之睿算第切後天之祝曷勝向日之誠代元給事夀聖節進功德疏表右臣伏以王春謹始遹臨月魄之成聖運發祥嘗紀電樞之繞蒼精出震炎厯承乾㑹載風之初辰洽均歡於率土臣是敢躬趨金地靣對玉毫命淨侣以薰修誦祕文而演暢所覬離明照耀與世界以無邊睿算延長等河沙而莫數第極後天之祝曷勝向日之誠代韓魏公賀淮陽郡王進封潁王表臣某言伏覩邸報皇子淮陽郡王進封潁王者真封易地徽册告庭遹增王爵之光載發宸闈之慶薦紳聳聽罄宇均歡臣某中賀恭惟皇帝陛下一德溥臨萬機獨運性堯仁而睦族躬禹度以儉家乃眷天支曰咨國典以主器莫尊乎長子而擇日以命夫有司寵換舊蕃進疏新渥孝恭天至克謹問安之朝文敏日躋靡煩在傅之日側聞盛禮大愜羣情臣跡限居留心馳慶列無任瞻天樂聖聳躍歡呼之至代王君貺尚書北京謝上表臣某言環封千里開府萬兵坐制此方據非其地班條云始負愧于中中謝載惟全魏之區遐控强敵之境洪河襟帶於其左朔野咽喉之所衝自罷郡以置都常擇人而作屏地望滋重朝僉愈艱曽紆兩府之印章方付北門之管鑰授之近侍誠曰曲恩伏念臣少也短能初無遠業先朝親試之次榜甫冠首叨於甲科臺省回翔藩維偃息犬馬之年尚壯鵷鴻之序遍揚蒼鬢嚴塗靦顔空食嚮領中山之一道兼提支郡之十城尤幸菲才適丁無事日常安枕嵗聿更書未瞻天日之清光敢圖省録又乏涓塵之素效何所甄升就畀别京弗沿曩制仍加冡宰之秩以示邦人之榮此蓋伏遇皇帝陛下神造曲成乾綱獨運懋法宫之新治念仁廟之舊臣特蠟彛章俾尸甸服敢不刻求民瘼搜講武經謹視河防之虞豫嚴邊鄙之備報償恩施猶知今日之能為揭立功名豈獨少年之所慕代謝傅宣撫問表貂璫中使因將命於别京管鑰守臣辱記名於丹扆俯宣溫諭增感危悰中謝伏念臣僅有薄材亶無竒節朴忠自信竊蹈古人之為孤直誰容特膺先帝之遇洊揚中外奚補毫分自聖統之紹臨即帥符之遐部靡須受代旋易居留固未能舞抃廣墀一瞻天日之表論思近署少竭涓埃之愚矧全魏之奧區實朔方之㑹府控制邊瑣繕完河防總一道之戎鈐𨽻萬屯之兵籍前有元台之舊老巳建成規上繄真主之睿謨第行寬詔曽微善狀可格淵聰秪自顧循敢圖省録適遘星軺之降遽聞天語之傳出如絲綸仰撫存之甚渥暖於布帛愈蒙被以為榮特越常彞誠知厚幸此蓋伏遇皇帝陛下至仁丕冒大度兼容念法從之典藩屢更全節乘皇華之至部親𨗳玉音下堂拜嘉守土增耀敢不深為恩假益勵忠勤誓畢微生覬酬洪造代王尚書謝傳宣撫問表使臨所部傳溫語之丁寧跡逺於朝荷清衷之省録才微自恨恩重難勝中謝伏念臣受性至疏逢時獨早勵孤忠而自進堅一節而靡踰用不兼人曷周臺省之務拙於從政漫厯藩維之行自龍德之天飛即虎符而州守決需滿嵗歸覲清光就移全魏之封漸近長安之日神都南望未一拜於帝暉星傳北徂遽再垂於天語噢咻斯至蒙被為榮念久冒於華塗復纍更於劇鎮第勤夙夜曽乏猷為止虞物論之非罔禆毫髮敢謂主知之誤曲記姓名每常遣於皇華即𨗳宣於睿誨此蓋伏遇皇帝陛下至仁天覆大度海涵以法從之近聨實先朝之舊物念數經於事任弗忍去遺思特示於恩勤洊加存撫誓圖薄效仰答洪私代謝添公使錢一千貫文表公須匱乏輒請益以上聞天㫖矜從遽增多而下濟仰蒙曲賜內激危悰中謝維全魏之要都當朔陲之孔道軍校之所犒設使人之所勞迎向除兩府之舊臣有緡謂之隨使苟待四方之過客在禮不致闕供臣比忝於居留事頓裁於往例去者太半不承權輿捃遺利以相兼恐傷大體告常資之不及妄叩淵衷伏遇皇帝陛下至德包涵大明臨照飾厨傳以自喜知臣不為損府庫之有餘如臣所請乾坤施大塵路報微敢不益勵乃心自矢清冰之節庶幾勉供厥職上酬洪覆之仁祠部集卷十四
