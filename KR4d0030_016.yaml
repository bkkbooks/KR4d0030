body:
  text: 祠部集卷十六宋強至撰表代魏公比京謝上表獨當一道尚容粗竭於微才兼撫連城實恐難勝於重任肇班寬詔深愧厚恩中謝伏念臣風力不強器能實譾致身奚識於枉道接物惟存於至誠朝廷非繫于重輕將相輒更於出入且所臨皆劇精神已耗于當年而其得過多疾病遂乘於今日方戢倦飛之翼少安舊集之林甫爾涉春遽然易地大稱全魏之部比控強敵之疆比雖水旱之稍平兹尚民流之未復冀蘇疲俗爰屬老臣顧無惠術以安人慮乏威聲之服敵始懇辭而弗獲訖冒處以為慚此蓋伏遇皇帝陛下政在圖新任先求舊特自清衷之所簡不惟綿力之不堪敢不搜講武經道宣利澤殘軀黽勉倘偶立於事功睿旨丁寧庶弗孤於器使代謝遣使齎詔賜藥表詔旨趣行方就所封之國聖心垂軫俯憐多病之軀爰飭貴璫特頒珍劑捧受惟知於恩重報償愈覺於命輕中謝伏念臣自效孤忠纍更大任俱殫智力勇為不復於當年兼撫兵民劇用尚蒙於今日靡容辭病豈敢圖安勉去故鄉亟來會府恤民寬詔奉行未及於彌旬將命輕軺傳問已臨於所部賜細書之溫厚加靈藥之光輝此蓋伏遇皇帝陛下愛篤老臣念深舊物以驅馳之即舍俾服餌以扶衰仰戴睿慈曷勝愚抱代魏公謝都知傳宣撫問並賜龍茶表北門居守未宣駑力之寸勞南土貢珍遽鍚龍盤之上品仍屈王人之長親傳天語之慈恩重難勝感深以惕中謝伏念臣初無逺業訖至近司間緣疹疾之乘方避寵榮之極勉來全魏且兼撫於兵民幸邇故鄉猶少安于習俗一叨師領屢拜君言存問既勤匪頒尤渥矧靈芽之異産豈俗肺之易嘗此蓋伏遇皇帝陛下克念老臣弗遺舊物埀睿音而下及加寵賚以俱霑載省衰疲奚從報塞代魏公謝賜生日禮物表親生在旦方萃感於巳孤君賜維時遽拜嘉而至渥寵榮所集震厲無從中謝伏念臣底滯天資迂疏時用特緣一介之術業洊歷三朝之弼謨罄竭短才猶坐兼於衮鉞徘徊重祿未歸就於田廬左弧第謹於私庭中詔忽傳於子舍衣頒內府馬鍚天間韉葉有輝器文加鏤生而維翰實慙山甫之降神今也所蒙又異桓榮之稽古此蓋伏遇皇帝陛下愛深舊物禮厚孤臣垂記始生猥加異數敢不益殫駑怯少答龍光庶逃不稱之譏仍謹且乘之戒上恩既重臣命逾輕代謝歷日表日月所纒天地之紀會成密課例被誕班中謝恭惟皇帝陛下握斗宅尊撫辰凝命靈承乾縡首飭人時黼坐儲精長茂在躬之數清臺考法順稽合體之元臣適守留符與觀明訓豈敢失墜唯謹奉行代賀正表伏以東國著經謹春秋之五始西京講物覽圖籍於三朝於皇盛時尤重令節中賀恭惟皇帝陛下欽修人紀茂憲天心七政之察璿璣四氣之和玉燭方對時而育物屬獻嵗之發春星拱臣鄰稱慶嵗元之會日章聖德同符歷紀之新臣適守别都正遙丹戺阻預夀杯之獻不勝魏闕之情賀同天節表粵若首夏肇惟浹旬是生聖人克享天命傳祖宗相受之業六五帝以御圖竭臣子仰祈之心億萬年而慶夀中賀恭惟皇帝陛下聖躋維日德肖乎天發威斷之神明藏政幾於鼓舞虹流電繞臨載誕之初辰日永風薰亘無窮之協氣臣欣逢慶節阻望清光適縻北土之居留徒罄南山之頌祝代謝詔書撫問表念臣衰之多病適履歊炎煩主聖之推慈有加軫恤詔音開諭使指親臨中謝伏念臣蚤備近司初無逺業猶兼將相之過寵盡出聖神之誤知忠與生俱罄厥股肱之效疾隨老至僅乎皮骨之存溽暑貫時淵衷閔舊因曲頒於睿旨俾自補於殘軀此蓋伏遇皇帝陛下盛德海涵至仁天覆治恐傷於一物欲盡安全愛尤篤於四鄰弗殊內外特垂清問爰及孤臣代謝詔書賜湯藥撫問表舊疴荏苒乃貽君父之深憂溫詔丁寧更屬王人之曲諭言頒靈劑俾輔殘軀中謝伏念臣學昧聖賢名兼將相祿既浮而量溢福不勝以災生忠激一心雖曰股肱之自力疾攻四體僅乎皮骨之獨存敢圖皇慈特遣使指形十行細札之訓分五色一丸之輝豈云衰遲可稱矜恤此蓋伏遇皇帝陛下愛偏舊物義篤老臣為憐犬馬之嘗勞不輕螻蟻之至細始終乃眷逺近弗移儻積疹有瘳喜敢言於勿藥顧大恩欲報命何啻於如毛代魏公謝進仁宗實録賜詔奬諭表大典告成實虞漏略細書垂諭猥被褒嘉伏讀載周兢榮失措中謝恭以仁宗皇帝稽古文思憲天聰明髙拱博臨享國既久至仁廣澤入人者深威惠之漸外夷命令之孚羣聼忠賢哲輔之參用墜禮濶儀之並修可著無窮悉歸所載編研之手固曰難才典領之司尤非易處而臣叨榮有日逮事當時久居幾政之間親奉德音之數雖見聞之靡惑終才識之非長妄董諸儒獲成信史比塵聖覽方悸愚衷伏遇皇帝陛下祗服孫謀遹追祖烈以天地之德難紀赦其托實之非工以嵗月之積頗多因以念勞而加奬欽承寵賜唯謹榮藏代謝生日禮物表親生在旦方追顧復之恩君賜維時遽被寵榮之數拜嘉既渥萃感兼深中謝伏念臣自任孤忠遂階顯服萬錢之享十年已負於空餐六印之歸一道尚尸於重寄適臨誕日垂記淵衷賜出帝庭命銜子舍織文鏤器以光其玩繡韉良駟以飬其安蔀室增輝羸軀動色維周之翰固慙山甫之生稽古所蒙何有桓榮之力此蓋伏遇皇帝陛下至仁天冒大度海涵曽舊物之弗遺省初辰於載育遹頒多物併及孤臣敢不粗建事功蓋循涯分既謹且乘之戒仍逃不稱之譏庶答洪私曷勝丹抱代魏公謝歷日表清臺密課緑檢細書既叨拜貺之榮又被勸民之訓中謝竊以布治正月雖萬俗之具觀頒朔諸侯欲四方之皆曉恭惟皇帝陛下乾綱總攬王事遹新户牖儲精自坐知於天道璣衡則象復敬授於人時臣適忝居留與聞辰告當仰虔於詔意使畢懋於嵗功又臣某言伏以西京講物萃圖籍於三朝東國尊王書春秋之五始臣誠歡誠抃頓首稽首恭惟皇帝陛下至仁天冒盛德日躋宴然享函夏之歸坐以須大明之旦蒸民觀象會嵗歷之更端上帝降康宜春祺之備舍臣懷章北道方階偃息之求稱夀南山阻與歡呼之列賀同天節表臣某言伏以日御盈旬風薰報夏髙厚協贊聖神挺生慶節誕臨歡聲四起中謝伏惟皇帝陛下纘烈淳曜宅心太清濬堯思之欽明懋禹躬之勤儉清和首月震夙丁時六五帝以御圖傳祖宗相授之業億萬年而享祚對天地無疆之休臣適守宫符阻陪廷著第罄岡陵之祝一均海宇之情代劉希道待制謝上表獨當一道兼拊六城初見吏民敢言師帥第奉行夫寬詔奚取稱于明恩中謝伏念臣比自孤生驟叨近侍進不由於纍日幸實出於遭時言責所司那避貴權之側目計文云總初知功利之究心僅此再期訖無寸效會坤維之缺守荷乾造之曲成簡自淵衷畀之重寄食君之祿義難取於便安以親為辭情蓋緣於危迫露章既上悸魄弗寧不能叱馭以為忠方爾闔門而待罪適逢廣愛特緩嚴誅眷朔野之奧區號常山之劇鎮弗離舊部就付要麾侍慈母板輿之來近踰十舍觀居民雲屋之盛雄視四封竊寵尤多載恩有所此蓋伏遇皇帝陛下至仁天冒大度海涵孝治之行不欲一夫之闕養睿慈所及尚容千里之班條敢不圖講政經刺求民瘼庶集涓埃之績少酬覆載之私代謝賜生日禮物表左弧之志四方日記親生之所始細書之行一札時蒙君賜之云臨期服寵榮彌深震疊中謝伏念臣素無逺業特恃孤忠夤緣誤恩塵玷重任出入將相萬錢久負於空餐綏御兵民六印洊叨於兼綰適逢載育之旦方軫已孤之懷奉將溫辭垂遺愚息衣出內府馬分上間帶飾光軀器文溢目降神之美維翰既慙山甫之生稽古之誇所蒙又匪桓榮之力此蓋伏遇皇帝陛下不遺舊物曲示厚恩名器所司輒容於假寵服乘以拜唯有於論酬誓訖餘生少償洪造代魯公謝男授龍圖閣直學士表臣某言伏奉聖恩除臣男某龍圖閣直學士者愚息進秩就加舊閣之從聨老臣退居愈幸私門之榮觀仰承乾造俯劇震驚中謝伏念臣歷事三朝蚤更二府遽至禮經之七十未償恩紀之萬分印綬寵名悉上王朝之久圖書寶構誤延子舍之微何意頺齡與逢顯渥此蓋伏遇皇帝陛下至仁天覆盛德海涵博延衆材畢取介善不遺輔國之舊遂及趨庭之私敢不教忠俾盡馳駑之薄效庶其論報弗辜舐犢之微情代魏公賀明堂大禮畢表臣某等言九月日明堂大禮畢者伏以聖人唯能於饗帝並侑五精之神嚴父莫大於配天兼風億姓之孝合宫已事罄宇蒙休臣某等誠歡誠忭頓首稽首伏惟皇帝陛下詔浮耀之烈光享重熙之盛福九榖登富二儀降康益謹靈心之承勿專聖德之有遂沿報本之故事參講思文之曩篇既欵殊庭載假清廟爰及宗祀維時總章百靈居歆六樂備奏乃薦鬯之夕昭格神光之靈瘞幣之時歘蒙天表之應思共蕃祉隨宣湛恩協氣交流一均雷兩之施歡心各得並浹人祗之和臣等適聼休成倍深竊忭方祗留務異興歎於周南莫克駿奔第馳誠於魏北臣某等無任慶幸忭蹈屏營之至謹差某官齎表詣闕賀以聞代謝加功臣食邑實封表熙事遹成湛恩隨布載加寵號兼衍真封賦仍進於爰田懼實深於維谷中謝伏念臣素慙逺業自信孤忠朝廷非繫於重輕將相輒更於出入平生許國竭愚慮而不無連嵗撫民論治功而何有伏值寧朝展宷陽館奉禋四海各來莫克陪祠於夙夜九州畢獻尚安助費於毫釐逮推神貺之均首及宰司之舊蕃然異數萃此罔功飭詞臣而賜書遣族孫而將命禮踰常矩恩激危衷此蓋伏遇皇帝陛下靈承天儀風示民孝雖鴻名弗受自存聖德之全而丕祉所蒙嘉與臣鄰之共敢不勤宣睿訓勉懋壯猷庶逃空食之羞兼塞假名之議賀同天節表臣某言伏以火德兆時協契景炎之運虹光薦瑞挺生睿哲之姿慶節誕臨歡聲四起臣某誠歡誠忭頓首稽首伏惟皇帝陛下德符乾健治對離明性循仁義之行躬發神明之斷風薰報夏日御盈旬厥月清和維時震夙觀文太史喜逢箕翼之明稱夀羣工願等岡陵之固臣迹遙廷署守在宫符第虔就望之誠阻與歡呼之列代百官謝御筵并傳宣表順理大川實由王道之正推慈廣燕益盡臣心之忠馳遣使人宣傳法語涵濡睿渥鼓舞輿情中謝恭惟皇帝陛下總攬萬機畢張百度眷言二掃之決尤動數城之憂塞故開新雖交陳於羣䇿取長舍短繄獨斷於淵𠂻亟興厥工隂有所相如期底績飛奏告成蓋建中克應於天心故潤下不違於水性爰即會府以頒慶筵廣坐多歡同聼鹿鳴之什寧朝信史復紀河平之年代魏公納節表躬荷兵民之重任既非有疾之能勝生蒙將相之兼榮抑豈無功之可據比懇還於印節庶僻守於麾符蓋髙未動於物情宣諭遽煩於使指洊敷危悃決俟俞音中謝伏念臣四紀逢亨三朝竊寵良自寡能而厚祿遂罹多病以久衰一辭東府之鈞衡再領北門之管鑰莫非強勉以濟劇繁心雖云勞力有不逮以至河齧舊防而失備民逃常産而未歸職由冒居皆合引去然猶徘徊嵗月偃息朝昏庶幾小康翻覺筋骸之漸憊若曰微效訖無毫髮之足甄於兹不能可以遂止苟尚貪於要地將不保於餘生唯有至仁能全微欲伏望皇帝陛下俯憐舊物特軫孤臣許上戎旃并收貂冕小邦簡靜俾專近於方書悴質支離免即填於溝壑瀝膽願回於天聼沒身期報於君恩第二表由衷叩露納節矧緣於疾辭冀上哀憐改麾兼賜於可報物情必至天意未回苟避雷霆之誅恐先溝壑之委敢殫危懇決俟俞音中謝伏念臣生賦朴忠早塵顯服不惟智力之可否但務私恩之報償甫及中年遂罹多病自叨再任之後已是久衰之餘雖復親近簿書繕完城府蓋一日效昔人之必葺固非樂為且三載乏往典之陟明自宜引去况兵民非卧疴而可治將相豈尸祿而得居更勉強以貪榮將顛隮而速禍弗全殘喘有纍至仁伏望皇帝陛下日月照臨乾坤覆載任别圖於衆哲志曲就於匹夫許上戎旃免司留鑰息肩間郡俾士意之稍完沒齒盛朝庶皇慈之可答第三表罔功納節以疾請麾再嘗自陳一切未許行恐餘生之不保敢千萬死以有聞中謝伏念臣中實枵然生而戇甚寵榮欲報勇於遇事而輒為筋力既衰失在知難而未止比救將顛之質疊傾必至之誠厚祿戒貪願上淮南之旄鉞小藩乞守免當河朔之喉襟尚遲矜從尤激危懼蓋殘軀不息漸歸溝壑之為鄰空食寖深轉愧涓埃之無補伏望皇帝陛下特回天聼俯徇物宜不遺螻蟻之微情各任鷦䳟之常分有民人足以為政畀支郡足以養疴許將相之辭隆絶公朝之假寵既完素守仍息久勞恩施難名報償何有第四表病難任劇職合辭隆開可不時顛隮無日危迫敢殫於血懇哀憐願軫於皇情中謝伏念臣起自孤生初無逺業祿常過量寵榮最早於他人福不勝災疾疹遂纒於今日所以懇還將相之印力避兵民之權庶就間州少舒瘁質私計已決愚誠不移雖委寄誤深不謂三年之已久而衰疲待報翻嗟一日之為長矧是戎旃固非虗器無功以領於義未安使老臣兩失於寸心豈人主相優之本意伏望皇帝陛下特回天鑒曲盡物宜就更麾符許上旄節馳驅駑足免令濵死於未休偃息殘骸或冀餘生之可保大恩難狀丹抱奚論第五表重負未釋日寖久而力窮疾呼欲聞天轉髙而聼緩敢罄論於懇追願畢賜於矜從中謝伏念臣自信直誠所羞枉道寵利雖豐而宜取未始輒辭事為至劇而可當曽何少避唯是戎旃兼一品之要留鑰守三年之餘得既過多處亦云久且無功而享厚祿雖貪夫有所不為多病而荷重權在老者尤難自強所以納節以逃空食之恥乞守以息殘軀之勞凡經危悃之五陳未賜德音之一可苟遂循於緘默是坐待以顛隮伏望皇帝陛下曲貸餘生洞明孤抱知辭隆非出於飾偽念避劇實緣於負疴就改麾符并收旄鉞親近醫藥免令溝壑之即填養安形骸悉自乾坤之再造謀心巳決得請後休代謝再任表悃愊纍陳從欲許還於新節衰疲自力竭能勉撫於舊封委寄逾陳顛隮是懼中謝伏念臣本緣一介之曲學歷被三朝之誤知自解宰鈞繼紆守紱早年遇事風霜不計於殘軀晚嵗纒疴藥餌乃同於常膳比引揣躬之分數裁辭劇之章力丐間州少安病質而恩生望外事與願違俄更西雍之帥旄仍赴北門之留鑰所以極陳去就仰瀆聰明幸寵利非事君之宜必冀寢加恩之命䇿疲駑雖老臣可強敢不拜再任之休訖奉諭音兩諧愚懇此蓋伏遇皇帝陛下至仁天冒盛德海㴠器使庶工愛偏舊物雖俊傑甚衆並試有為之時而尫瘁之餘惜投無用之地敢不勤宣條教兼拊兵民儻溝壑之未填尚乾坤之可報代張景元龍圖知成都府謝上表優加職任特私名器之大公初見吏民即諭朝廷之廣德才微責重寵至懼深中謝竊惟益郡之奧區兹實坤維之劇鎮有江山之控帶兼民卒之撫綏從來守臣多采宿望如臣甚陋自視無堪侍從最為晚躋技能奚適時用更計籌于內外乏政績于毫分及此踰年遽云增秩顧巨藩之所委非小器之可當而又煩使向臨于兩川先臣嘗列于近職領蜀門之印綬曽是昔遊直廷閣之圖書復叨世選何乃微躬之幸獲兹數事之兼此蓋伏遇皇帝陛下躬攬乾綱日新睿斷眷先朝之舊物記通漕之孤臣躐等班行之間推恩屏翰之寄敢不博求民隱祗訓戎韜坐布寬條砥輿情于安集力圖靖治副聖訓之丁寧代人謝知成都府表初見吏民即宣條教重任而力不逮寵過而心若驚中謝伏念臣江海微生朝廷孤士當龍德離潛之始方參二于大農洎天心求治之間復總司于外計未嘗伸愚瞽之慮得以補聖神之聰忽蒙誤恩起置華選矧頃馳於單傳嘗歷使于兩川今兹守封實乃故地叱忠臣之馭雖愧於古人剖刺史之符獲綏于舊俗倍為榮幸尤荷生成此蓋伏遇皇帝陛下躬攬權綱首敦勸嚮不責已試之驗而觀其後效特屈非常之命而激其壯圖遂俾短能亦叨劇委而且徑從便道祗領嚴程阻瞻前旒弗克稟睿謨而後往務靖逺服庶幾虔詔旨以恭行代謝進和御詩奬諭表案此表以下俱據宋文鑑增入參羣篇而奏御𢋫載非工被優詔之發中褒嘉甚渥惕然拜君父之賜藏以為子孫之榮伏惟書曰帝庸作歌所以極道明良之意雅云臣能歸美所以上酬福祿之辭惟千載一時之逢踰三王二帝之際乘太平之多暇講稀濶之盛遊歷寶宇以披祖宗相受之文御飛帚以縱神聖有餘之學以至置酒别殿賦詩中宸于時從聨咸續睿唱如臣者有朴愚而植性無文采以表身自陪風憲之要司都廢微言之舊學妄抉鄙思綴成斐章大樂在前發哇聲而接響太陽臨下衒爝火以交光既瀆邃旒若臨深谷敢謂兼容之度例形過奬之辭遊聖門者謂之難言矧繼堯文之後踰華衮者重夫褒字况蒙漢訓之加夫何孤臣叨此厚幸此蓋伏遇尊號皇帝陛下齊德乾覆育材士倫善雖小而弗遺力或矜其不逮誓竭講劘之效庶酬勉朂之仁代都運趙待制謝上表小材而臨大計不知經畫之所從薄量以函厚恩唯有思勤而可補竊以今之北道重曰外臺邊宿徑兵境控疆敵嵗支洪河之備而民力幾屈所以艱於賦輸地列數鎮之師而吏負益繁所以要在刺舉宜擇精明疆濟之器以付轉給澄清之權若臣空孱於事迂拙嚮引兩川之漕近二大農之司率粗竭於愚衷訖罕通於利術敢期煩使乃委孤臣此蓋伏遇皇帝陛下廓天地之容收涓埃之細特加不次之命而欲勸來者弗責已試之效而俾懷後圖得不夙夜以思始終乃職豈敢專聚斂之最以上纍於君仁亦當拊凋殘之餘庶下蘇於民瘼祠部集卷十六
