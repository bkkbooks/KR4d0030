body:
  text: 祠部集巻三十四宋强至撰祝文皇帝登寶位告諸廟祝文秘書省請作荷慶基之託踐皇極之尊祗率先猷敢忘遺命用孚神聴其體予𠂻並薦吉蠲遹來顧享南郊禮畢祭神祝文謹以清酌庶羞之奠致祭于某神國家以上帝訖饗人神均慶凡在祭典徧秩明祀神其歆承以對詔意尚饗明堂前祭告千里内諸神祠祝文國家嗣聖享禮物具庀辛月維吉将展熙事事預孚神聴宜有以相之尚饗扁鵲神應公廟挂牌祭告祝文祕書省請作神以醫妙前世實為後世之頼天下之言脈者必稽焉昔我文考曰嘉遺功追進公爵肆朕纉極不敢怠先帝之命令新厥廟榜而致祠於神聿來歆承永孚庇於後人尚饗泗州龍王祝文告于某神曰惟泗介淮汴之間以為州今二水交激幾圮城堞勢遂不已則州民之命未可保也刺史憂民之憂以告神神職在水事宜察刺史之憂以為民之福使水平堵廟食無愧尚饗代祭水平王祝文告于某神之靈曰農訖力于甽畆苖未暇穫而雨乆不止疲農之力殆敗於垂成則國之租税與神之享祀將無以供給神食此土見民之急而必加救焉使陰霾廓然農得以歛穫永永廟食宜無愧也敬獻牲羞伏惟尚饗贈司徒兼侍中龎籍祭文祕書省請作維靈以耆徳碩望為時宗臣嘉猷偉謨實相先帝還印綬以去其位賜几杖以休於家進退大方始終一節吁嗟故老不及體貌於生前稽案舊章猶得哀榮於殁後𦵏車云邁奠觶爰傾爾其歆承體厥嘉悼尚饗贈侍中許懐徳祭文祕書省請作贈侍中許某之靈嗚呼惟左右臣衛甞一日勤王家及其死者猶悼以恤矧有自踐行五迄統禁旅始終㳟瘁垂五十年予思及勤莫此為乆今祖爾殯特深朕悲尚饗淑妃董氏贈祭文祕書省請作故淑妃董氏以柔明之範為後庭之率以静端之性謹中閨之承允執婦順參基王化聿懐内助曷忘永悼猶有彤管可鑑媺蹟故夫四妃之號亞后之寵所以極哀榮之典而且慰吾懿主之悲也爾其歆承祗我休命尚饗祭潘太保文惟靈資畧沈毅為時虎臣乆次環衛終始一節某頃與公子甞聨官局今邑境之内攢柩在焉敢縁子契以致薄奠伏惟尚饗祭青州劉元瑜待制文學有淵源志存廖廓憲府横飛霜秋一鶚正論所擊姦邪膽落其佐大農慮精器博金穀坐計毫釐較若屢典劇州憲平俗樂聿來帥青自有方略勸其民人載勤耕鑿束其吏兵無敢驕矍惟厥仕官淹速誰度始驟中緩終止延閣用不及境舟藏夜壑青人哭之聲動城廓士林之嗟才豐報約追惟昔游慈恩宴醵三紀於兹年契所託迸淚朔風寄哀㝠漠庶幾歆承亦有肴酌祭左藏韓則順文徃來塞上協濟疆事暑行遇疾遂報不起子㓜室逺孤魂異地後事之責庶幾盡力瀝酒以告其無有憾尚饗祭文學陸先生文維年月日具官某謹以清酌庶羞之奠恭然于故杭州文學陸先生之靈某辱先生諸孤命輒以不工之銘汙先生墓石道盛徳衆有所漏而不盡紀縱紀之又才弱辭俚將不能暢其美于無窮而取貴于後世是未足為先生報而適足負先生也某時以少年出窮巷鄉黨無知而禮之者先生一見獨忘其齒之尊納以為上客日規月誘其後意未有一日而不繼前事者既而某得薦於鄉得第於廷州以掾於縣獄以令於民莫不去受先生教而歸拜先生賜也前年來京師先生飲以别徹酒把袂眷眷有不忍分之色今某官此而先生死且𦵏矣不得泣送先生之柩見其入於土中某之恨何時可已耶尚饗祭致政薛郎中文嗚呼徳業涵演氣質渾厚百未一施竟虚其有眡如涕涶省郎州守時弗我用矧曰冠綬褫之以歸日縱杯酒人琴俱亡已則不朽君有仲氏毋䘏于後尚饗代馮内翰祭田樞宻文天故生公其必為時道徳之積仁義之持不暇公年乃奪其施人事可悼天理可疑公未入官曠懐萬世孰成於治孰敗於弊涵飬閎肆奚發科制人始知公志在康濟帝嘉奏篇策公臨軒筆應大問江河倒源講始見本擿弊至根人乂知公不獨有志而且有言華纓長裾陟䧏清禁言必允蹈重亦自任正論所激諛口隨噤四海之歉利津未浸乃使三司乃副樞使兵哺邦蓄既富不匱民足戎贍仍縮不肆匪唯志言又驗行事行乗大均峩冠中階以公取之如探諸懐寒暑之沴生理有乖霖雨弗作樞躔竟埋人之悲公止以不相若某之悲夫豈有量姻好之末矧託無状瀝酒叙哀庶公來饗代王尚書祭賈魏公文初公以教帥太學生其後以經術講禁中始知公道徳文學之藴充然其閎以茂也已而長臺府登皇僚秉鈞制樞而百工以職四夷以寧又知公經濟輔弼之業自任乎其重而有餘裕也公之去魏某實承其後聞三撫魏人而一煦以恩魏人徳公若赤子之愛慈父母訃至之日塗驚巷嗟或老㓜相持以類然後益知公恭已施人其佐天下之大而臨夫千里之内其政之所施得民心若此其固也嗚呼起儒服至台衮始終無一毫失道公其賢矣乎出入將相餘二十年六換節旄而卒公享大國勇骨强體幾以壽終公其具福而無憾矣乎其所以南望而致哀一奠者徒以為國惜老成人而且慰魏國之悲公爾尚饗代祭范資政文惟公先識逺業發於天資再命京寺言高位俾書抵相府琅琅厥詞謂治先急育才練師位晩自得言十九施飛緌諫聫鋤姦救疵作尹京邑權豪沮衰讒口狺狺構成駭機公足一蹈顛䟦弗支朝為大尹暮從小麾旁顧驚惋公甘若飴既黜而寤詔㫖趣歸西戎㓂邊兵要執持朝廷議才曰公是宜敵聞公名膽縮魂飛相戒以退無干公威凱歌言還參貳衮司欲主堯舜期身臯䕫功業未竟太平始基案此下原本闕代祭張宻學文嗚呼厥有木焉材堪棟梁而他室是用不克搆乎明堂與夫賢人器也經綸而官止近侍不及秉乎大鈞可同悲而共辛噫明堂之不搆豈木之陋實掄材之弗偶大鈞之不秉豈賢之病實有生之弗慶惟公業履純正材謀偉奇鼎司衮章陰實與公期宜而弗為其命也歟俛惟孱弱姻婭是託泣遡西風飾疎酒薄聊一薦於由𠂻慨哲人之不作尚饗祭俞户曹文嗚呼愎姦顯榮而端善梗閼不仁永年而仁反夭奪嗟嗟叔微而止於斯若壽與夭其偶然歟將籍已素定而不一可移魂也莫詰孰平予悲頃愚與君同旅京國予負宿狂奏書自直時乆不報相視以惻既而洒然喜動君色春風鮮鮮遊騎並鞭秋月娟娟飲㡌對偏君朝顧我我暮君邊一日少濶惄如經年富者逺貧奚啻避㓂君獨親我忘已之富寒餓水火將蹈而就繄君出力援手以救始君調官版掾赤城君出銓門予賀以迎廣文鄭䖍有唐先生猶昔官此實為君榮未幾東下我送於野餞壺欲傾别淚盈把躊躇道旁意不忍捨都門獨歸凄然匹馬南望寫懐兩寓音書曽未我答君纒中虚賀客旅踵弔賔在廬哀樂反覆止於月餘訃音初聞駭怛幾絶厚徳未酬胡然永訣殮不哭棺殯不臨穴一慟寝門心焉寸折將盛以奠寄哀以辭嗚呼叔微知乎不知尚饗祭崔郎中文嗚呼一府衣冠莫盛北門君實貳尹質厚氣渾羣處公議言寡出口静固宜壽胡然獨否服金餌石結憤蓄懟發而為疽徃徃在背云胡不然而有斯疾以迄不起終莫之詰不鄙謂予可以託孤予受所託罔有弗孚瀝酒叙哀魂知矣乎尚饗祭齊郡君文惟靈禀生徳門静柔令慈作配君子母婦是師貴而從夫顯封是宜象服魚軒庶永壺彛如何奄忽遂隕淑姿樽酒肴蔌侑哀以辭魂克不昧其顧歆之尚饗代開封府知府推判官等祭安國夫人文嗚呼夫人之生慶門淑姿於赫元宰曰嬪其室婉婉其從祗祗其慄為婦伊何祭職不失為母伊何徳均以壹爵徳夫尊克成厥家大國斯封象服載華被躬者翟飾首者珈間朝中宫前導後遮命婦孔羣班莫我差遘疾素秋游神紫霞露濕銘旐風凄𦵏笳宗族號送爰百其車奠筵相望道途咨嗟生榮沒盛魂其知耶伏惟尚饗行狀龍圖閣直學士朝散大夫給事中充同羣牧使兼知審官東院權發遣開封府事上柱國隴西郡開國侯食邑一千二百户食實封四百户賜紫金魚袋李公行状曽祖守澄皇任開封府襄邑縣尉祖珣皇贈殿中丞父陟皇任尚書屯田員外郎累贈尚書尚書公諱中師字君鍚姓李氏其先博平人從徙魏之内黄又徙京師今為京師人公㓜孤能自刻苦過成童已與鄉貢既冠中景祐元年進士第類得補幕職便母夫人邊氏飬俛就廣徳軍廣徳縣主簿為令者鄙一縣頼公以治居無何以母䘮去官服除用制置發運使舉以真州軍事判官監蘄州蘄口鎮都鹽倉課上改大理寺丞知開封府鄢陵縣㑹嵗旱詔案苖免租其佐不問可否一切欲免公曰被旱有淺深奈何一切免也止蠲其可免者民憤且率衆訴府反劾公公鈎得倡者即致之罪由是民吏率服而尹亦以此知公才也已而僻公管勾本府檢校庫宰相薦公文章召試入等充集賢校理判太常院又判登聞鼓院遷殿中丞提㸃府界諸縣鎮賜緋魚袋又遷太常博士時屬邑多盗吏不時獲公為設方畧躬自督捕而盗悉就縳朝廷議加一官以賞公勞公辭曰此提㸃職爾冐賞可耶遂已入三司為度支判官大享明堂恩轉祠部員外郎淮南轉運使改刑部員外郎復為判官度支遷兵部員外郎使契丹還授河東轉運使面賜三品章服改工部郎中召拜三司度支副使遷刑部英宗即位又遷兵部尋除天章閣待制陜西都轉運使改諌議大夫始至兵部不卒嵗公駭因籌所以轉給及去知澶州陜部之蓄已足知數年矣澶當北使徃來之道乃城庫不壯公曰此不足自衛且無以夸鄰國遂増築侈舊加甕城其上時出按役城成莫不如古制後北使過果驚顧發問按伴以非在設備特體勢適然為對北使亦稱善嵗滿入判官部流内銓三班院又判太府寺今上即位遷給事中京東歉徃安撫一路使還留守西京先是雒吏恬於慢令官逋省悵至有十數嵗未追而不發者公至即追而立發之無一敢緩者嵗率三進牡丹又府例以百花名會然花費一出民間每進花及會作花價必翔貴民苦嵗市公亟奏罷之會亦尋廢入判都水監權發遣三司朝廷以公治雒有素且聞雒人之請特除龍圖閣直學士復守西京初雒中旱開府日雨輒大作都人喜目其雨曰隨車一日甘露降園亭取而食之如蜜寮佐議以瑞聞公曰嵗穰物和民不受敝乃瑞也此何足道於是議者慙而止適辛亥役法下公善究立法本意即推行之最為天下先而天下之行新法者亦莫不以河南為準公前後守雒嵗輒大稔或去或旱暵風雹隨起為政務先惠愛故所至必治而其去必見思也召歸充羣牧使兼知審官東院久之開封尹以事出境上命公權領府事早作聴斷日過中已庭無留訟未幾感疾疾且革猶條未决事以屬幕府翌日遂終羣牧之正寢熙寧八年閏四月十四日也享年六十一公屢試要劇無一不修舉大用謂在朝夕及其死也物論尤為公惜公性仁氣温平居與人言唯恐忤物及當官處事苟一决於心雖羣議旁撼不動也即有可聴隨改不吝若勤職奉法不以一毫私已特出於天性爾初陳丞相執中居守南都公年妙韻爽一見公於學即許以逺到及讀公所業復以早成期公他日卒用丞相薦得帖職後果至近侍丞相薨始不得美諡公力争於朝遂改諡㳟君子以丞相能知人公為能報知已也公博學善屬文復喜言當世事仁宗朝甞著十三策號曰禆治以進天子以為善䧏璽書褒諭後朝廷有所更為徃徃多如所論者長於歌詩頃使契丹徃還得詩百篇當時殆為絶唱凢著文集奏議五十巻藏於家未始輕出示人故人亦罕有見者筆札尤妙得徐浩體濟以清勁遂自成一家孝子之得銘先墓者獲公書石始以為慰幸公累階朝散大夫上柱國開國隴西爵侯食邑一千二百户食實封四百户初娶劉氏再娶吕氏封延安郡君故相申文文靖公之孫翰林侍讀學士諱公綽之女相成以法度蓋有内助焉生一男持正太常寺奉禮郎亡女一尚㓜餘皆嫁良士真州軍州推官羅浹殿中丞張規同州朝邑縣令張宰大理寺丞晏元靖光禄寺丞吕之問國子博士陳世脩其婿也卜以今年五月某日𦵏公衛州新鄉縣貴徳鄉戒海里合劉氏之穴某實佐公羣牧因得狀公厯官行事以獻能文宗公求銘公墓云謹狀祠部集巻三十四
