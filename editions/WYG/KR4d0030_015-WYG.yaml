body:
  text: 祠部集巻十五宋强至撰表代賀南郊表聖人能饗即陽位以齋明上帝居歆擁神休而孚佑照臨所暨鼓舞維均中賀恭惟皇帝陛下紹淳燿之烈光享重熈之盛福謂俗康物阜兹二氣所以降休徳大報㣲唯一純可以將慤乃乘長日之至遹奉圓丘之禋四海之助各來九州之力畢獻髙禋上逹昭格靈心之承協氣旁流並緣精意之感祖考參侑人神普和臣等顯相侍祠阻觀大報之盛節歡呼聞禮第誦思文之曩篇代賀南郊禮畢表圓丘肇祀率土均休熈事遹成湛恩隨霈中賀竊原經禮之載莫重神明之交三年親祠盛王所以報本列聖參侑孝子所以奉先於皇我朝尤縟徃典恭惟皇帝陛下聖躋維日徳肖于天有懐前人初見上帝卜南至之長晷罄中虚之一心既欵殊庭載假清廟遂登蒼璧之幣祗奠紫觚之營百靈居歆六樂備奏乃薦鬯之夕神光陸離升禋于陽霄㝢澄廓天旋法駕星拱端闈鼔舞兆民普均雷雨之施壽康丕后並浹人祗之歡臣適聽休成倍深竊抃忝司留鑰異興歎於周南阻從屬車第馳誠於魏北代元厚之給事賀南郊禮畢表躬行聖饗遹觀熈事之成嘉共神休隨肆湛恩之霈羣生鼓舞諸福紛綸中賀洪惟盛朝參用徃典報徳産之本所以三年一郊盡孝心之思所以四聖同侑恭惟皇帝陛下紹烈精之淳耀承累洽之休期聿懐前人初見上帝卜日南之長晷祠地上之圜丘百靈居歆六樂備奏乃薦鬯之夕昭格神光之臨升禋于陽歘蒙天表之應旋鳴清蹕還御端闈協氣交流普均雷雨之施歡心各得並浹人祗之和臣久去從聨比塵使指阻肅雍而相祀第抃蹈以馳誠代沈兵部賀南郊禮畢表竭精意於圓丘熈成祀事浹歡心於率土霈發徳音凡在周行維均竊抃中賀國家順稽古道參用禮經以天地大神有廣生之惠祖宗故事存並侑之文乘三年之親祠追四聖以嚴配恭惟皇帝陛下濟躬乾健至徳離明自臨皇氣之尊肇奉紫觚之饗謁泰壇而徧乎道祖假清廟以極乎孝思力畢獻於九州助各來於四海陶匏有踐幣玉普登神明相交禮樂並作髙禋上達通肸蠁於靈心協氣旁流格紛綸之瑞應於昭景貺以右丕圖乃御端闈之崇遹孚渙號嘉與罄宇之内共沐龎休臣跡繫朔陲心馳魏闕陪祠莫及拜慶徒深代賀皇太后受册表寳文温厚奉國典之休稱聖孝尊親極母儀之大奉遹光盛禮増抃周行中賀恭惟皇太后殿下夙懋柔儀誕敷隂教含坤元之徳久内助於先皇育天下之君旋尊居於長樂比厭政幾之聽屢形慈訓之勤復辟踰年尚淹於顯册有司擇日爰上於隆名臣適領漕符欽聞國慶阻就歡呼之列第深鼓舞之情又恩篤内朝禮崇顯册四海臣妾一辭歡呼中賀恭惟皇太后殿下坤徳静柔母儀光大進賢以輔先帝有内助之勤斷愛以戒後君無外施之失動懐明識嗣鬯徽昔含飴弄孫早優游於長樂臨軒遣使方享受於隆名臣比領左符側聞盛典阻從慶列第激歡誠又寳字肅將飭輔臣而䖍使隆名恭上極聖帝之尊親慶浹天區事光坤極中賀恭惟皇太后殿下懋静專之懿徳推涵育之慈懷順承上天輔佐先帝有相成之道無私謁之心逮聖嗣之繼臨預政幾之同聽大公天下未嘗恩澤於外家密導宸衷多用祖宗之政事旋還明辟益廣徽音長樂優游自享九州之養内朝定省乃惟四海之君欲報厚恩遹崇顯册嚴母儀之大奉盡臣屬以均歡臣久去陛廉比司宫鑰側聞盛典竊忭愚襟又欽奉内朝上進極尊之號歡呼罄宇下均欲報之心中賀恭惟皇太后殿下坤徳静專母儀光大進賢以輔先帝有内助之勤斷愛以勗嗣君無外施之失自懇還於明辟益増廣於徽音含飴弄孫遂優游於長樂臨軒遣使旋享受於隆名臣適領漕符方遥廷署莫陪慶列第激歡誠代賀皇帝為皇太后受册表思齊大任方受尊名之禮稽古帝舜益光絶徳之風凡在照臨率均抃蹈中賀恭惟皇帝陛下聖躋維日徳肖於天念撫毓於清宫荷愛慈於文母極九州之味以為養未充孝心上萬年之壽以為歡自篤恩性遣輔臣而申飭奉顯册以上聞寳刻粲然光有司之備物宸衷祗若答莫厚之深仁臣久去近班側聞盛典阻歡呼於嵩極猶繫滯於周南又上崇名於長樂仰慰慈顔舉盛典於熈朝益光孝治照臨所及歡蹈其均中賀恭惟皇帝陛下獨運乾綱若稽古道自臨正宁之凝命克謹内朝之問安荷文母之仁深撫清躬而愛篤夙厚恩性比同政㡬復辟踰年遂髙懐而退處有司擇日奉顯册以上聞臣久去從聨方恪司於留鑰阻陪慶列第延望於明廷又尊名恭上慰長樂之慈顔盛禮敷聞廣中宸之孝治照臨所及鼓舞維均中賀恭惟皇帝陛下駿命紹休清衷覃粹懋聖人之至徳仰事内朝大文母之徽音寅加顯册飭輔臣而䖍使奉寳字以尊親能報厚恩豈止三牲之養載光大號可刑四海之風臣適處外臺正遥丹戺激歡誠而尤劇就慶列以無從代賀皇帝為中宫受册表埦琰敷言遹恭行於盛典宫闈動色益増耀於徽名凡在有生維均大慶中賀恭惟皇帝陛下寳有重器勤懐永圖踐宸極以稱尊重坤儀之作配念邦家之所御先在儀刑猶日月之相須始全臨照繄進賢而輔佐廣稽古之聰明以正位於長秋未膺顯册因熈成於大禮爰舉上儀臣職繫朔陲身遥丹戺徒仰母臨之慶莫從鼇抃之聨又有司備物謹擇日以選儀乃聖臨軒重俔天之作配文敷琬琰喜動宫闈中賀恭惟皇帝陛下稽古稱尊撫辰凝命不有至明之極亦資内助之賢厚徳承乾貴天王之同體長秋正位懋太姒之徽音爰加册禮之崇以稱坤儀之大輔臣將命持使節以奉行率土傾心仰母臨而歡忭臣任縻朔野跡逺明廷就慶列以無階馳愚衷而第切代賀皇帝為中宫受册表儷宸極之尊嚴屢周華嵗膺寳文之温厚増耀長秋凡在懐生率同大慶中賀臣聞闗睢所以基王化坤順所以承乾元岐陽之宜百男騐進賢之效媯汭之嬪二女輔稽古之明以迄盛朝亦資内助恭惟皇帝陛下清衷昭曠至治登閎大亘地以稱尊重俔天之作配以禕衣之奉宗廟祼獻時勤而赤綬之正宫闈柔恭日茂尚淹盛典未稱徽名申飭柄臣肅將册禮臨軒以遣使節示極襃崇率土之仰母臨維均抃蹈臣比司宫鑰阻侍殿帷第激歡誠莫從慶列臣無任瞻天樂聖聳躍歡呼之至代王尚書謝加食邑實封表三年親郊遹成熈事一曰慶澤爰及從臣疏新命於訓辭増舊封之食賦罔功被寵匪報懐慙中謝伏念臣禀性樸忠與世迂濶歴華塗而始徧愧薄效之未收一離鳴玉之朝數換剖符之地宣上方之恩澤亦既累年撫北道之兵民汔兹半稔伏念國家嚴順帝之大奉講就陽之肇禋四海各勤其來九州畢獻其力而臣適專留鑰之掌絶望屬車之馳奉引諸塗空預甘泉之籍駿奔以職莫陪吉土之祠第率守臣之常坐修方物之貢甫訖聖饗頻沾睿恩既廣爰田復加其户容孤臣之竊幸由洪覆之推仁此蓋伏遇皇帝陛下靈承天心均施神貺雖清衷寅畏自抑於鴻名而慈渥㴠濡亦周於外輔敢不勤宣條教益勵忠規免貽素食之羞思稱鴻恩之渥代元給事謝加勲并食邑表親郊己事灑澤均休賜詔十行轉勲一級賦益爰田之數寵深維谷之憂中謝伏念臣起自諸生最為孤仕秪洊揚於三紀奚云補於萬分頃貳大農旋陞近侍引南州之紱何有治功籠北道之財復無利術㑹盛旦之展采奉圓丘之肇禋第羡諸候之駿奔敢嗟太史之留滯固不能聽屬車之雷動扈從諸塗觀吉土之天臨肅雍在位遹成熈事例沐湛恩併蒙異數之加彌積罔功之愧此蓋伏遇皇帝陛下務均神貺祇順天心雖於穆猗那已形容於羙頌而克自抑畏弗享受於隆名尚霈洪私俯延庶尹敢不益圖忠藎匪懈論思誓畢㣲生庶酬上徳代賀潁王納妃表宜家淑徳作配元良極典册之盛儀誠邦家之大慶中賀臣聞人倫兹始嘉禮所以重乎婚宗事其承親迎所以聞於誡恭惟皇帝陛下建大清之極治紹淳耀之烈光畢張朝經爰及家事乃眷天支之愛矧居王爵之尊孝友生知温文日就雖曰少成之善當資内助之賢歴選華門進嬪朱邸適得公台之後備該圖史之聞禮法自嫻言容兼懋長子主器既度越於戚藩遣使臨軒亦寵優於嘉耦將傳萬世之嗣茂對三星之期動嘉氣於深宫沸歡聲於罄宇適司留鑰阻預朝鑾鳯飛遥聽於吉占鼇抃第馳於愚悃代賀皇帝登位表臣某言伏以䖍遵末命光紹丕基天地同符人祇共悦中賀臣聞重華之協於帝所以陟元后之尊下武之繼於文所以昭先人之業恭惟皇帝陛下聖躋維日徳肖乎天性于欽文躬有歴數四方所照適仰燭於離明萬國以寕遽獨觀於乾造荷五聖之謨烈副三靈之眷懐臣蚤與禁聨久違朝宁恭聼龍飛之會阻陪鼇抃之行代賀太皇太后受册表載享尊名益光令典欽聞大慶胥悦羣情中賀恭惟太皇太后殿下至徳静專柔儀閑淑粤嬪仁廟以位中宫訖無私謁之心隂有相成之道全節鉅羙揜前世之徽音順子慈孫續兩朝之孝養惟是聖功之超卓歡哉顯册之形容臣逖聽禮成不知手抃方居留於北道阻馳慶於明廷代賀皇帝為太皇太后皇太后受册表輔臣䖍使奉寳刻於二宫聖主尊親廣孝心於四海中賀恭惟皇帝陛下寶有重器勤懐永圖妙斷日新睿能天縱雖神㡬聖烈蓋自得於生知而子道孫謀乃一歸於慈訓爰舉極尊之號以酬莫大之恩臣適守宫符遽聞國慶阻就歡呼之列第深鼔舞之情代賀皇帝為皇后受册表禮行吉日册備長秋喜動六宫慶均萬㝢中賀恭惟皇帝陛下紹休五聖齊徳二儀不有至明亦資内助乃眷中闈之重尚稽顯册之加爰命弼臣奉將盛典維邦家之所御先在儀刑猶日月之相湏始全臨照臣比司留鑰正逺朝鑾莫從鼇抃之聨徒仰母臨之慶代元給事同天節進奉功徳疏表右臣㐲以風薰貫序肇天令之清和日御盈旬戒聖期之震夙虹樞擁慶鳯歴標祥沸萬笏之歡聲横九門之協氣臣是敢躬趨金地面禮玉毫命浄侣以薰修誦秘文而演暢所覬宸暉普照與塵界以無邊睿算増多等河沙而莫數第劇後天之祝曷勝向日之誠代漕使謝上表才難稱責既當煩使之劇權恩在圖新復冒從臣之舊籍寵緣任假感與懼并中謝竊以維今外臺莫重北道邊控强敵戌屯勁兵籠貨民間而惟恐渉傷財之名轉粟塞下而僅能供待哺之口而又歳支洪河之備而官用幾屈所以艱於運輸地列數鎮之師而吏員實煩所以要在刺舉苟虧精明强濟之具曷振轉給澄清之綱如臣空疎於事暗拙漫更委寄蔑著勞能比分帥符偶陷吏議官非理去既一跌於嚴塗咎止退思已都忘於榮路尚荷皇慈之寛置每䝉法語之矜存通漕朔方果疏恩於不次進班延閣仍還職以如初載省生成率歸造化此蓋伏遇皇帝陛下乾綱獨運神斷日新進退朝論必清衷之自擇予奪官序絶浮議之可移遂俾單庸訖叨甄録敢不内殫愚慮仰副睿懐少見事功庶酧燾覆代漕使謝上表小才之臨大計未知經畫之所從薄量之函厚恩尤懼寵榮之不稱中謝竊推諸路並建外臺特陜西領使之難蓋軍須自昔之為重緣康定用兵之後顧民力至今而未完籠貨闗中而唯恐渉傷財之名轉粟塞土而僅能供待哺之口加用度之百出無利源之一遺而頻年薦飢常賦罕入在平時之無事尚或須才方近日之餽邊豈容冒選宜得老於金榖之要術號曰朝廷之能臣俾總漕權始安物議如臣暗拙於事迂疏曽㣲日月之勤第幸風雲之會預嚴塗之陟降迨此彌年董朔野之輸將止於踰月驟更劇部誠出誤恩此蓋伏遇皇帝陛下曲軫清衷弗遺舊物蓋念自塵於侍從未嘗少見於事功使効㣲勞免慙空食敢不内殫愚慮上體睿懐雖云轉給之司務充常課不為聚斂之計取累至仁代韓魏公謝賜生日禮物表報極終身感遂親生之日禮頒多物恩深君賜之時中謝伏念臣蚤竭孤忠久更大任效㣲毫髪之可數力覺筋骸之己疲竊愧妨賢屢求去位萬錢空食進無補於聖明六纛啓行出猶叨於將相兆涼厥月載育初辰垂記淵衷猥加異數衣均内帛駟出天閑飭有繡韉玩兼鏤器遣子舍以將命耀公庭而拜嘉生也降神為翰實慙於山甫力非稽古所蒙何望於桓榮此蓋伏遇皇帝陛下徳厚生成愛侔顧復俾孤臣之誕日榮寵錫於聖時敢不觕勉事功益循涯分既謹且乘之戒仍逃不稱之議誓罄丹衷仰酬洪造代魏公謝傳宣撫問表恭被徳音逺聞睿訓以帥權尤劇防閑俾慎於怱㣲而聖慮過深愛惜實同於顧復中謝臣本無逺業止任孤忠相二宗之日雖多事陛下之時猶淺第云智力之逾竭未有謀猷之可嘉尚賴風雲協期日月垂照灼知戅樸可備使令斷自上心付之西畧迄去離於左右䝉記憶於姓名恐識不明未朕之前而事或暗可虞之際導至言之委曲遣中使以丁寧難勝之恩有如九鼎之重欲報之命不啻一毛之輕昔告齊宣嘗聞孟子謂君之視臣如手足則臣之視君如腹心今陛下念區區之蹤其撫存既若此之厚在臣某荷巍巍之徳其愛戴宜如何之深誓委㣲躬仰酬洪造代魏公謝賜藥物表老臣告疾累奏於囊封聖主推仁特頒於藥物恩踰望表感極情涯中謝伏念臣幸適逢時才非經世昔懇辭於冢仕旋總制於西師夙夜忘疲庶寸勞之報國寒暄乖攝俄舊疾之嬰身瀝愚悃於上聞動睿慈之垂䘏命使者之駕傳宣惻隠之言按神農之經仍賚蠲疴之品自慚弱質有軫清衷此蓋伏遇皇帝陛下禮厚近司愛偏舊物欲勉驅於衰苶因曲賜於矜憐良劑載和庶仰資於衛養洪私所被敢少怠於報償代魏公謝生日禮物表門弧之志四方適記親生之始邦詔之書十札遽䝉君賜之臨矧惟被惠之優榮敢不拜嘉而竦激中謝伏念臣比塵冢任自信樸忠才近不足以鬯逺猷智小不足以諳大體未竭股肱之效己嗟筋力之疲妨賢懇避於宰塗本覬鄉邦之養疾易守忽兼於帥路復叨闗輔之宣風西略是經寸勞何有遹丁誕日第謹私門敢謂睿明亦煩省録飭身枝而將命獲手舞以敭休良駟繡韉既輟天閑之數織文鏤器復分御府之餘光生陋軀榮動衆目考愚衷而自省知恩紀之由來此蓋伏遇皇帝陛下禹度并容堯仁廣被乃眷四隣之舊不遺千里之遥爰舉舊章併推蕃錫孰為進退一酬今日之所蒙必也功名庶保爾生之無忝代謝生餼表抱恨已孤記親生之有日載􅆳既渥感君賜之維時拜命云初銜恩莫罄需雲寵被震厲交深中謝伏念臣風力不强時才甚陋萬鍾厚禄十年己負於空餐六印重權半嵗頗慙於假器身逐戎旃之逺心存王室之間厥生之初在秋云孟遽荷懽恩之浹仍蒙飫賜之臨此蓋㐲遇皇帝陛下優渥老臣始終舊物記其誕日嘉乃丁時均䵄粲之精甘輟醪牽之肥㫖既醉既飽愈防鼎食之浮有猷有為畢望豐功之立庶殫塵露少答雲天代謝賜詔允相州表引疾拜章不覺懇言之累發賜書遣使忽䝉聖諭之矜從恩重何勝感深以泣中謝伏念臣久塵大任一信孤忠禦邊未究於薄能卧閤旋嬰於宿疹徒然自勉曽未有瘳勢不遑安顧總帥非養疴之地情無所隠冀上心推從欲之私果軫淵衷特頒温詔備詒禮遇之非薄更赦赤愚之可誅俾息殘軀許還舊守書奏而臨淵每懼恩俞而勿藥自康豈曰衰罷可當眷寵此蓋伏遇皇帝陛下仁如天冒徳與日躋虛懐最後於四隣愛不移於内外拂性恐傷於一物念愈篤於始終容解劇煩庶期完復優游此日儻存犬馬之餘生黽勉異時誓答乾坤之大施代謝中使齎詔令赴闕朝見表故鄉得請合從便道之行温詔垂音特許明廷之覲仍飭王人而將命愈知君父之隆恩俯伏拜嘉兢榮萃感中謝伏念臣自明愚分獨恃主知懐章本望於息肩改帥弗容於量力私心尚歉未遑觀戍卒之旋歸宿疹俄嬰安敢效古人之卧治雖獲鄉邦之願豈忘魏闕之思召節遹臨禮數尤異此蓋伏遇皇帝陛下不遺舊物垂記孤臣親遣星軺俾傳天㫖仰荷乾坤之愛曷勝犬馬之情代魏公謝傳宣撫問并賜湯藥表星軺將命忽傳金玉之音天㫖均慈仍拜刀圭之賜兢榮維谷荷戴如山中謝伏念臣久玷冢司備䝉睿奬知樸忠之可使付寵寄而不疑一逺威顔再經旬浹悉心圖報弗知道路之勤回首瞻恩唯有闕廷之戀方休徒御初見吏民遽被温言兼班珍劑此蓋伏遇皇帝陛下俯憐舊物有軫深仁念病質之久衰冐時寒而遐適特賚養疴之具仰銜惻隠之恩誓竭愚能少酬聖眷代謝賜詔及湯藥表議將易地先開諭於温書念此養疴復分頒於靈藥禮誠出於特異力敢忘於自量中謝伏念臣幸適逢辰才非經世少則被用不謂精神之有涯老猶謹身至於衰苶而後已向徃經於疆場比入覲於闕廷天光照見於殘骸鄉曲許還於素志優游偃息纔安僻郡之十旬委曲丁寜欲付朔陲之數路屬此大寒之際軫其多病之餘新領輕軺兼頒珍劑此蓋伏遇皇帝陛下眡孤臣之厚無舊物之遺拜嘉雖荷於深恩揣己難勝於大任臣已别具劄子奏論謹奉表稱謝以聞代謝加功臣食邑表三年親郊一日慶澤乃眷近司之舊遹加羙號之榮賦兼益於爰田懼實深於維谷懇辭弗獲虚受為慙中謝伏念臣力學不强賦能俱短二府迭居於一紀三朝奚補於萬分要路妨賢故鄉乞守自季秋之去國僅三月之偃藩伏值朝家若考前經肇禋上帝九州畢獻其力四海各勤其來而臣適領左符第聞盛禮固不能聽屬車之雷動扈從諸塗觀吉土之天臨肅雍在位逮成熈事首沐湛恩併推異數之優増負罔功之愧此蓋伏遇皇帝陛下祇飭聖饗永承天心雖於穆猗那己形容於羙頌而克自抑畏弗專享於蕃禧均霈洪私俯延外牧敢不勤宣條教益勵忠規免貽空食之羞兼塞假名之議代魏公謝遣使齎詔撫問及授大名判府兼河北安撫使表使指親臨詔音開諭清漳病骨䝉典軫於餘生全魏髙牙俾勉從於重任成命固知於難免私心間有於未安中謝伏念臣幸適逢時才非經世早以功名而自許不知量力而後行晚惟衰苶之相乘未即乞身於勇退丐故鄉而偃息冀滿嵗以優游會朔野之洊菑動上方之北顧乃分綏御之柄以屬短疎之材而又丁寧以遵䘏民之言周旋以盡使臣之禮此蓋伏遇皇帝陛下寛仁兼愛終始誤知因付畀於劇權首簡圖於舊物儻止以别都而假守猶堪强䇿於疲駑如兼數路之提封實恐坐成於瘝曠所有兼河北安撫使臣已别具劄子論奏謹奉表稱謝以聞祠部集巻十五
