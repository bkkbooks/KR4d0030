body:
  text: 祠部集巻一宋强至撰五言古詩次劉才邵送魏彥成韻國朝廣仁恩法令去煩苛三官貴持平除用不輕可矯矯魏詳刑儒術富而夥餘事及刑書議論不偏頗能令舞文吏無計得掀簸計其所平反隂功已堆垜神方介以福豐穫報勤播當即趋要塗鳴玉清以儺誰云出處間此事難預揣秋風鄉思動請郡向江左猶冀欵襟顏巳聞將轉舵想見桐州民延首候來舸置酒樂佳辰剩插黄花朶依韻答吳殿丞應之見寄古人不可見空名留竹素幸而並世生千里或相去懐賢我何勞蓄道公其富老驥伏櫪鳴使看駑駘歩浩歌掉簪紱思極江山趣西風動遊袂撇在千巖路賤子匹馬來邂逅一相晤既見豁所懷私心願執御論議攻不破牢若金城固作詩遺長髯知異衆人遇向負春遊辭以風雨開霽既久樂事未果因書百言聊以自戲常恨春日少況遭風雨多桃李冷不覺按原本缺二字如濁河廣陌斷游騎寂不聞行歌方其正雨時樂事空蹉跎晴來又累朝日暖風祥和紅入桃李枝綠轉池塘波何曽到花下把酒呼青蛾屈指九十期今已一半過繫日乏長繩欲却無神戈花落解笑人謂我前言何道旁松何年澗底栽移植俯官道腹空蟻穴衆枝瘦龍脊褭斧斤須良材霜雪豈終老大有歲寒操見盡桃李夭雷君自陜及門謁與書偕聊成短篇以答來貺一官偶來泗舉動畏謗嘲萬事不掛齒終日口欲膠所學未信時尤欲宻歛包賢者或我顧未免談屢交雷侯將家子而至自陜郊踵門貺予書享饋煩弦匏始見氣頗勁既語理不殽愛子欲子薦言畢徒啁啁托䕃須高林而乃依寸茅盍行游鉅公一言變魚蛟聞杭饑皇祐二年客従吾鄉來告我歲大歉百金易斗粟富者頭屢撼餓殍相枕藉億口盡虚頷客言尚未竟予淚巳成㸃避席駭相問予𠂻不能掩位卑俸給薄用度抑難減是以之官日盡室來未敢予行弟獨留居常動予慊歲凶吾産薄慮其苦麄淡所以聞客言私懷輙興感客遽前止予君言固足貶善自憂家為微俸誠亦忝上有天子明封章日可剡先陳劭耕稼次述抑聚斂澄汰兵籍冗惇尚圡木儉坐使四海富寧患食不糝胡為所謀狹而復自戚慘再拜起謝客予言愧塵玷上知郡都官列郡二千石所理我與共臨淮守最賢萬口交一頌彼邦困飛蝗我境欲集鳯彼民粒不充我黍地無空去聲嚴乎如秋霜巨猾弗得縱斷乎如蓍龜吏法不敢弄鈴齋晝觀書朱轓春勸種明堂購衆材我公實梁棟行吐胷中奇勲名光有宋賤生何為者碌碌備僚從天幸所與薄半歲侍羈鞚鷰雀勢力小鵝鴈食口衆貧賤兩雖甘瀝懇輒披控朝廷重為邑外臺薦方用豈惟進寸蹠抑可利微俸私心覬公舉如昔望郡貢媒衒士所醜未罪已自訟公如飛一章舉族免饑凍呈屯田溪水日夜落稍稍露沙面經甸更不雨深處亦成澱巨篙架空航澁若泝淺淀况乃載百指數纜安可縴念此歸思發急踰强弩箭公如惜滯留願借長風便送藥王圓師吳僧甚商賈嗜利角毫芒或以醫自業利心劇虎狼今時愚鄙人平居恡私囊寒餓來求仁一毫不肯將不幸病且亟呼醫計倉忙惟醫所欲求萬金弗較量吳僧業醫者十室九厚藏張口待人哺喋喋厭酒粱求其不爾徒蕭叢㨂蘭芳圓師何許人出家本衢梁自圓之先師三世為醫王圓尤得術精一丸起膏育雖掛吳僧籍亦吳其衣章仁義薰厥心愈彼不願償人以財㗖圓惡如唾霑裳晨齋未有餘一餅蔬充腸行槖無長物秋風藥裹香昨因赴人急挈然來浦陽始見巳可愛氣温語端詳再見結所好佛外喜縑緗住乆見益數乃知數事長作詩聊紀師豈曰為行光題婺源胡氏翛然堂歙山碧參差歙水綠演漾之子山水間築室傲天壤山空鳥飛鳴水净魚下上觀魚悟至樂聽鳥悦幽響一樽泯悲懽萬事齊俯仰人境兩翛然無復塵區想故人石渠英緣以命堂榜作詩羨高懷中服非外奬孫莘老名堂且賦詩嗟今急名人疾足投世網心撓跡固喧求得道巳枉兹理曽莫知所趨岐已兩予亦慕子徒泉石久思徃何當伴琴觴一鼓東南槳擕印謁新守宿至徳上方翌日馬上追書二十韻擕符拜州守半舍度微徑院距邑十五里有僧謁道傍云我迓邑令因徐指􅓜林佛宇頗嚴浄願驅大夫馬一宿憩征鐙我生嗜煙蘿聞此愜幽興乃留驗僧言金碧果暉映捨策游上方塵襟覺踈瑩山氣亂朝暮谷響答鐘磬清風中宵來雲歛月垂鏡微吟不知旦坐席若初定遂行登脩塗回首謝巖磴咨予秉微尚碌碌奚足競一月兩移府未署事前已嘗謁府未暇救民病徒為章服裹折腰損真性予連日奔走吏事蚤出暮還君然兄數賜臨問乃不果一見辱遺佳句謹依韻和酬朝出雞聲新暮歸馬蹄苶思君不得徃一飯或三輟自從伐木興友道寢欲滅夫子眷獨勤聊解予心結横溪回道中作赤雲蔽層霄旱日作炎酷解帶䕃廣厦膚汗發如沭世無廣寒宫何地避蒸溽嗟嗟尚未已里胥報甚速云有邑頑民飲酒溢鼠腹半酣張空拳中者致殞踣甲令著定憲繼踵當視覆駈車不敢緩冐暑走山曲敝蓋無大隂託庇何跼促因思古賢宰民鮮犯鞭扑子賤弗下堂政務自清肅顧予今何人為治乃不淑民既冒重辟已亦若匍匐胡不樹善治泰然處華屋祠僊姑回馬上作至和歲甲午徳音絶常軌寛徭且宥罪外復講羣祀君言一朝發人神共悅喜今我官浦陽距邑越十里聞有僊姑祠獨弗識何氏按圖得本原云是黄帝女當年追僊遊兹地倐輕舉于今數千載廟貎尚留此幾欲私謁欵吏事日勞止遽㑹郡符降奉行徳音止以廟隸邑境俾我即祠所詰朝叩庭下牲體已夙庀巋然重林間楹桷極華美姑一婦人焉血食反無已丹朱雖男兒而又作堯子生失四海位没同若敖鬼大夫不自立始信徒為爾久雨雨師握天令汲汲不停駕疾驅鞭羣龍俛首隨叱咤乘怒作霶霈不復息晝夜羲和久埋輪縮手喜閑暇山川盛奔溢若虞厯陽化農民驗甲子其應旱在夏農民謂甲子曰雨夏當大旱我疑上天漏誰能補天罅慰此農民心無使憂早稼寄辟彊憶昨枉君軒始來就客邸爾僕方息肩顧我遽屈體守閽前通名倒屣出致禮相見吐論議所學愈根柢徐為出巨編徹若渉清濟昏膜得箆刮塵心逾易洗我亦露狂簡君曽不訶詆于時園正花長日甕盛醴插枝必滿頭飲醆須露底未幾踏歸鐙相將灑别涕戀戀有情照數數辱書扺自言困道途僅能足鹽米頻吟口燥吻乆騎肉消髀首飛詩人蓬腸苦孟郊薺學舍勉棲託亨㑹復傾徯黄巻樂徃聖青襟列諸弟愛子乏先容何人堪宻啓努力著要策隨詔獻文陛伯夷詩昔紂為不道毒心無生靈四海如在鼎誰能救將烹周武從天人戎衣舉仁兵伯夷獨何為乃諫不聽行紂徒久厭主一朝倒戈迎天下既宗周大冊書武成夷義愈為耻寧死弗苟生周粟惡不食雙目且餓瞑紂無王者實徒有王者名雖曰臣伐君紂徳匹夫輕吁夷豈不知意在銷姦萌書感擇已要有持擇人要有别淺夫脱所守柔顏附炎熱庸兒昧所擇目前事苟悦彼柔有時變爾炎有時歇歇者既死灰變者遂剛鐵平時綢繆地一朝等楚越古人論淡交君子保常莭作詩貽知言不為昧者説奉和純甫秋扇粲粲機中練作扇圓中規盛夏天無風廣字猶蒸炊汗流既浹體蚊齒仍毒肥團扇當爾日功利兩得施一入君掌握汗卻蚊攘披秋風刮地來涼氣襲空惟功竟勢亦去退藏乃其宜聖人制器用用舍各有時弓所以在鳥鳥盡弓胡為蹄所以在兔兔獲蹄何之葛屨乃履霜刺譏見于詩作扇本禦暑暑退當棄遺奚必昧用舍託怨班婕妤八月十六夜與宗哲純甫翫月結客城東樓明月初出海漸如水精盤天㝢無寸靄清光如何買厥價珠百琲中秋一夕過已覺人意改冰輪縱遲遲此夜復誰待老蟾益自張吐輝増十倍把酒共月語世態何足罪自有昭昭暉千古萬古在冬日偶書呈縣學李君擇之北風吹嚴雪草木無媚姿野田一穗盡雀鼠猶苦饑浦陽槩窮山不與隂冬宜今我雖旅宦一身十口隨有酒奉親壽呼妻伴兒嬉幽腸尚多感悁結對此時念子客千里形影外更誰空齋抱吟膝敝案覆飲巵我本依賴少校子反有餘何日富貴塗引子並足馳朝得位䕫契暮致君軒羲收身結嘉客量金買妖姬人間有閑愁安能到雙眉送純甫仙尉秋晩送歸客别酒風前酣一揖不回歸撇然就征驂挽裾問客故捨我何其甘客言有慈母三歲淮之南今將拜嘉慶歸心劇風㠶薄親厚他人倒置理豈堪顧予失所問汗顏為客慙客生富豪家妙年穿青衫初仕已絶足不與羣駑參掾邑尚牽制逸驥受轡衘縱之使自馳萬里日可貪持此作親壽行矣毋少淹將别純甫四十字奉呈我馬將北馳子車亦南挽車馬無留行相去即相逺風林秋聲乾落日孤峰晚後㑹未可知莫使别觴淺將有東陽之行宗哲為具話别以詩見招因答來貺秋高山城幽風動林葉吼百感從中來將分故人手故人惜輕别樽酒欲相厚未飲巳頽然别恨濃於酒别筠陽憶初來筠陽風土習未穏家人畏山氣一日或數飯愁來數去期三載若天遠居之既累月吏事頗云簡山水慣可觀雞彘肥堪饌却愁解印絞奪此養疎懶觴詠趣滋適不覺滿銓限門前迎新官槌鼔閙田阪顧予謝鄧侯寧有邑人挽水聲與山光念此違耳眼寄純甫相從浦陽官三十月盈缺出必並轡游居常對案啜予褊子能恕子短予還訐久而見交心中不容間舌問詸之間乃於窮秋時忽作逺道别别腸如亂絲一寸知幾結别語如悲笳一聲凡數咽咽極繼以號旁顧亦慘切匹馬獨來歸山城雨初歇依韻答貫中見貽魚蝦泳大海龍困汚池埋鸞鳯氣塞吭百鳥鳴其喈猶吾吕夫子短褐包壯懷舉脚踏青雲失勢寸歩乖却視後來軰厭已猶積柴否屯豈我獨升泰奚人皆一别春四歸聚首邈不諧前日忽踵門謁與行李偕相迎把交臂似合已擘釵于時莭清明花净無纎霾共引不筭觴傾瀉猶長淮歌詩互挑戰舒慘出百骸愁吟慘春暉樂詠舒寒荄男兒萬里心無作伏櫪騧天王下科詔羅俊基泰階盍行取好官一為光同儕野園移植小松平生歲寒心頗好歲寒色一松如人長慘淡窮山側樵兒日過之有意斧斤得予心異爾意野圃為移植醉聽疎聲眠吟到細隂息落落巖澗姿相對永朝夕如言千載後其長可千尺人生雖百年相期眇無極且結無情游汝固予何易豈待百年外人松兩殊迹人為松下土松化圡上石我生始踰壯足以伴寒碧公立煎茶之絶品以待諸友退皆作詩因附衆篇之末造化于草木所與有薄厚茶生天地間建溪獨為首南土衆富兒一餅千金售公立須南官好去聲居衆富右俸錢未到門已入園夫手買藏惟恐遲祕之逾瓊玖前日發箱篋出以奉賓友蒼玉碾底碎浮雲盌面走一飲睡魔竄空腸作雷吼茶品衆所知茶徳予能剖烹須清冷泉性若不容垢味回始有甘苦言驗終久吁茶特不幸而出三代後不及餘草木盡掛詩人口禹貢籍九州瑣細登橘柚古若有此茶商紂不酣酒范鉞進士遺樓徹司馬庭石以質交樓作詩美之因邀某同作樓君仕塗傑范子儒林選論文二人者誠至不以勉范也車將西樓也酒以餞胡然膠漆地猶假外物顯范子庭前石千年立蒼蘚移入樓君圃重可載十輦堅以示固交此意豈云淺怪不渉剜刻險不至崖巘坦然久要情無向石間辯其堅竟有泐其重尚可轉不若照以心兩確乃吾善永結忘形游嵌巖君勿羨和施耕進士憶竹夫子卧古屋趣敵巖谷深六籍環一身口誦頭不簮瘦碧久去眼寂寞清風心朝思䕃之醉暮思繞以吟秋空碧新弄無處停幽禽安得青玉枝來作半畝隂終朝對几榻歲寒結知音於焉傲富貴追蹤晉賢林京華對雪嘉祐歲庚子長安一尺雪落地還成冰后土凍欲裂出門望天街層城褁銀闕健馬載髙冠傍人指䕫卨拜表瑤墀歸酒面風前熱萬井莫回頭窮閻正騷屑曉突無青煙饑唇閟殭舌咄嗟路邊子未死衣百結亦有待次人空囊磨歲月愁吟徒爾為泱漭天地闊與任道及順久二師賦小閣見月醉領玉川子夜入支公院危閣邀共登身在霜空半缺月穿雲來塵區未應見長飇蕩寸靄天宇痕無線坐久吹青燈寒光可對面飄颻釋苑秀洒落儒林彥相逢愛清景險語寫幽玩野令才素慳斗為吟毫健詩成萬象索孤影轉樓殿遊屨絶出門高僧應作伴誡言君予言欲艱出口終身俱衆人易由言朝出暮已渝言之于一身譬若戸藉樞爾樞苟不慎彼戸將誰扶不重一語言是輕六尺軀志言要有成不成䧟半塗耻言在克悛不悛行卒汚今吾觀衆人一言異朝晡爾志既可見爾耻復若無行將小人歸鳴呼爾非夫祠部集巻一
