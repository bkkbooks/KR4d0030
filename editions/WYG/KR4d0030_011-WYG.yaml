body:
  text: 祠部集巻十一宋强至撰五言排律依韻奉和司徒侍中雪二十韻瑤林紛有蘂玉海浩無津葢地都藏險漫天不露垠片輕消鑿落光冷奪純鈞賀笏庭前客懽盃隴上民清輝交夜月妙曲次陽春􅇠苑誰傳簡蠶崖自比銀香沈宵爇麝烟濕晝炊薪履没平三徑忩明斷一塵乘時飛更急帶晚賞逾珍酒合斟瓊液巾宜頂白綸分形雖各值灑潤要皆均渗野今豐魏飄筵昔瑞秦禽疑越貢雉獸訝晉祥麟巧剉枯株木偏宜勁節筠寒林圖似展粉筆埽初勻嘗愛漆園羙寓言姑射神如公詩具羙揣物意尤親久作依劉客難追訪戴人幕中􅆳絶唱席右媿嘉賓不獨調元手風騷敵孟醇詰朝雨寒宻雪雜下輒成一篇呈諸匠者幸賜光和飄洒初驚曉霏微或舞簷勢應縁雨作威未抵霜嚴水靣瓊銷液山頭玉露尖偏能仁富室只觧虐窮閻樵凍肩増竪魚寒手懶箝助清歸賦筆送冷入歌簾退縮悲毚兎埋藏憤老蟾旋醒疑酒薄宻擁喜爐添尚媿侔連璐纔宜比散鹽飛輕憂絮妬落早欠梅兼真宰恩先漏豐年兆逆占綾加侍臣被彤下使君幨預促羣萌逹前驚百癘潜尤甚窮臘降多後世情嫌某近辱諸公先和前篇鄙思未已復自次元韻奉呈纔落先明牖無多未壓簷得時雖較淺着物始知嚴報歳三登速裁花六出尖賀祥開萬物却癘喜千閻腹餒禽剛喙螯僵蠏怕箝地成銀色界門盡水晶簾燕市凝盃蟻書幃氷硯蟾天形四垂接曙色十分添海訝龍飛沬盤疑虎刻鹽陰陽驚臘早氣象假風兼嚼爽膓忘渴吟寒口懶占學輕頻舞䄂禦冷盛張幨謝媛資佳詠袁生苦宻潛自縁人意别一愛一憎嫌長安二月二十二日雪十韻曉白乾坤静寒消氣候侵麥滋堆隴疾花没聚枝深浩蕩中春尾昭蘇庶彚清函闗雙粉蝶繡嶺一瑤林鶴冷驚幽夢鸎愁閟好音拂衣輕㸃綴落酒旋浮沉門擁藏髙卧牕明照獨吟飄時穿箔罅積處值樓陰南客増蕭索東風助浸滛年來交態淺乘興欲誰尋送朱元弼主簿登第後還鄉簿領非吾事儒林物議間談經泮宫水校籍道家山職業纔相稱塵勞豈素嫺官期慵屈指親側且承顔楚岸維齊舫掦州入故闗時人榮晝錦洗眼看南還送度支劉郎中被㫖赴闕赴辟函闗道來時犯雪泥今乘匹馬過早見晚鶯啼嶢闕兼程到丹墀數日躋一言知國器三接是雲梯小醜翻然順靈珠自此稽和戎須上䇿議要合征西次韻郡寮櫻桃之什人説櫻桃羙誰知味特殊顆勻圓更好色麗賞還須樹樹紅攅夏年年價滿都畏風應早摘宜日稱晨敷血滴春鵑淚胎含火齊珠透肌勝琥珀爽口劇醍醐怒目晴全赤粧唇㸃誤麄愛擎宜翠籠登進合銀盂秀實期先薦流鸎莫漫圖園林千百品甘處後塵無彭九廷評改丞衛首垂臨訪未遂馳賀輒成鄙句少伸愧謝三年廷尉評别事忽除丞歩武通規近生涯薄俸増翰林終必復雅道已難能不預聞新命那期念舊朋馬鞍煩逺御爵刺改前稱禮曠徒慙汗情髙倍服膺彈冠開慰喜聳袂羡軒騰馳賀氷泥滑賓階愧後登送評事十九叔入秦白露沾蘭草王孫轉憶歸蔡州新戰罷郢路去人稀謁帝不辭逺懷親空有違孤舟㸔落葉平楚逐斜暉北闕見端冕南臺當繡衣惟余播遷客只伴􅀈鴣飛依韻荅公節長髯踏昏鼓詩巻置予懷屢讀銷蘭炬幽眠廢竹齋雷陳叨契宻李杜媿名偕子羙有李杜齊名真忝􅀼之句明月驚雙目清風暢百骸舊游今厯紀新句老逾佳筆力支傾嶽詞源瀉倒淮覓官猶博奕賤賦甚優俳夫子心雖壮羣兒口更排謗譏從爾類事業屬吾儕他日材須用平時照莫埋相期空有道欲薦反無階足跌那傷驥角争堪笑蝸醉鄉逃得喪兄之新亭榜日醉鄉俗調外滛哇縱酒時遺幘逢人或懶鞋閒乘太湖棹静繫洞庭涯梅雨開新霽江天斂宿霾苦吟邀郢客妙唱聽呉娃顧我千憂集陪兄一笑乖此行情分厚枉道願言諧䇿馬闗城逺深愁日墜崖北京判府司徒侍中生日三十四韻仁祖龍飛榜宗工鳯舉春爭先欣得雋直上欲驚人終賈年方妙軻雄學已醇紆朱光半刺垂白慰偏親器業期廊廟聲名壓搢紳試言俄有㫖落筆不無神儒館羣邦彦王畿位幕賓諌垣尋振翼法座屢攖鱗雨露専圖報雷霆肯避嗔上心疇侍從大手屬絲綸使蜀星文動回梁帝眷新黠羌初負漢儒將續臨秦就統興師律能捐受命身苦甘齊士卒寤寐息風塵未幾登培幄猶稽秉宰鈞旋更諸鎮帥連牧數州民文武才俱屈安榮䇿未伸總戎離晉野移疾守漳濱符契真千載謀謨復四隣鴻樞纔守運英衮遂同寅扶日升黄道朝天冠紫宸功髙嫌赫赫跡退喜恂恂分陜勞姫旦還鄉滯買臣良籌深制勝苗格偶増旬西顧憂全釋東歸請繼陳俞音來荅詔喜氣送回輪故國分銅虎離都改玉麟誰知圖任舊祇見寵章頻茅社重留地桑弧載誕辰喬崧秋降甫寳厯歳名申馬錫天閒駿衣班内帛珍康强鍾衛武爵禄茂平津長與三台應兼之五福臻神明知必相壽合等靈椿晦之江樓小飲辱詩懷寄謹荅來貺因以奉招遙知相憶處相憶對秋江渉有波濤濶飛無羽翼雙端居君故里薄宦我他鄉交臂經時失憂心曷日降此稀人迹到惟聽足音跫願命朋遊駕來吟吏隠牕倦談須擲塵劇欽定空缸論契何如重千鈞不可扛文相生辰祝壽盈數號良月應鍾飛律灰當年凝間氣此際毓元台出契千齡運居為百辟魁智多全徳水位峻冠朝槐經世雄門盛熈邦鉅業開賚商名掩傳平蔡畧輕裴肅物嚴秋去充閭慶旦來最誰興善頌䝉顧寔微才圭衮榮長享松筠歳不摧相階常煥耀巖石鎮崔嵬適限縻官句無縁薦壽盃應天五福外更願事康哉次韻元恕苦寒之什繁雲凝不散朔吹動無涯林秃霜摧葉河膠凍裂沙饑禽啄石髪彊䑕墮簷牙應有四方客倍懷千里家老松堅自若病竹折相义喜擁重衾麝愁聞絶塞笳謀温藉狐腋辟冷泥榴花豈待窮冬雪方為氣象誇次韻梅守著作喜守倅冬杪祈雪春初獲應之什郡境時雖泰江鄉臘已深羣情憂雪晚精意喜天忱夙駕纔分禱春空倐變陰銀成佛氏界瓊掩帝家林始向風前舞還逢水靣沉乾坤方一色埃滓莫相侵薄畏晨光鑠清宜夜魄臨撒鹽矜巧喻授簡喜知音月窟埋仙兎霜毛碎獵禽驗深兒植杖聽落女停針扄户人安卧乘舟客訪尋長鋪呉地練競貢禹邦琳潤未沾農畝威先到旅衾馬蹄行見迹鶴髪此羞簪愛潔慵施帚思烹預滌鬵難收俱碎璧漫想辟寒金飛瀑傾台嶺驚濤過越潯兆年能作瑞澤物豈無心氣象符神設陰陽順斗斟䕶梅偏拂拂欺栁故森森樵塢如迷失漁簔重不禁積遲唯濬壑白早是髙岑爐飲聊堪禦樓觀恐不任當今平坎亞免使有﨑嶔第止塵心渴誰開凍口吟梅州才素逸藻思衆嘗欽髙唱俄攄發終篇絶麗滛更兼和宻霰並好爽煩襟屬和仍鴻筆珍藏勝楚琛正聲都欲寫抽曲入瑤琴某介直寡合為邑亡狀而杜兄一見過愛作詩稱許謹依來韻奉荅平生懷古哲所趣背時人餓死不巧宦力行惟庇民風波方滿眼霄漢欲謀身山水得一縣松筠為四隣分安籬鷃恱機少海鷗訓道義聞君久襟懷類我淳盍簪何太速傾葢似非新交向篇章定情縁里閈親胷中都絶介席上竸誇珍他日攄長䇿相擕獻紫宸送京西運使周度支公持使臺柄行矣過鄉闗自昔捐繻處于今擁節還素推仁義本將底輸賦閒恵足躋民富威先變吏頑高談能佐治大筆出誅姦所稟具純德未嘗柔正顔最為時論重自結主知難忠節久方見詔音行復頒匪朝登相閣均福浸人寰列郡方馳戀征艫已莫攀風霜十月始鐃鼔一川間驟奪孤生庇瞻言感涕澘郊外感事田原土盡辟禾黍積如鱗聖主弗横賦農民猶苦貧末游滋不業素敝寝誰因富室豪奪利里胥蠶食人為生常汲汲乃粒罕陳陳况在水旱地更遭科斂頻其將委溝壑何以給昏晨去弊與務本無非縣令親上知府張少卿邦君今刺史光禄古名卿况是三台後仍兼二事榮才猷希世出議論一時傾文燄長千丈詩鋒鋭五兵量形滄海狹氣與素秋横官路紫朱競公心紱冕輕金華推羙郡銅虎愜専城半歳開尊府休風變細甿堂陰空晝訟桑野勸春耕毎布詔條暇間擕賓從行江山尋勝地笳鼓擁游旌好景樽前挹新篇席次成雙溪兹壯觀八咏昔虛聲治狀稱尤異宸衷眷直清勢應非久次代豈俟終更卓馬朝將近元龜徳素明豐功増閥閱舊物取鈞衡屬吏誰堪䘏孤踪此最平下科踰十稔薄况甚三生尚壯羞乾没雖駑願使令斯辰如賁飾吾道定䝉亨輒取鹽車吭聊逢伯樂鳴謝知府少卿某為邑歳餘材術短䟽知府少卿特形清舉事出望外謹成五言十二韻詩一章上謝萬一賤僚尸屬邑踰歳事雄藩自視無尤異何階計薦論公為千騎長官復九卿尊陞絀懸諸手榮枯繫片言俄収一介技俾出大賢門鋭意推臣轂剡章飛帝閽先容掄㪚木後澤浹孤根立發韓灰燄坐生鄒谷暄泥塗漸霤漢瓦礫變璵璠倍喜非初望難酬是厚恩敢忘知巳賜况有寸心存稱謝堦墀阻形留意欲奔上知府少卿近代東南守何人與古同唯公臨婺女變俗似文翁流化陶編户延儒萃泮宫棲糧農畝溢鞠草訟囹空風月歌詩徤江山氣象雄雙溪今改觀八詠昔非工文酒髙懽外園林勝賞中妙年登白首素節有清風嘉會千齡合皇天五福融晚躋輕位棘行覲帝宸楓卓馬趨嚴詔元龜簡上聰謀猷一朝啓利澤萬區通諸邑誰無狀孤生性最䝉簡書循吏檢牒訴盡愚衷鋭意鋤姦蠧推心活困窮不能防衆口止觧潔微窮方托雲垂蔭俄觀歳改筩氣寒期念黍聲在或知桐昔值民留寇始聞書薦雄生成单賤跡今日願因公上運使工部天地慳英氣人皆所得偏公乎何卓越性乃獨純全精學窺神奥遺經討聖淵辭宗師者衆詩將敵無前風雅一篇出邦都萬紙傳斯文知未墜大筆舊將顛早聽諸公論仍推執事賢松筠貞節勁金石亮誠堅曏受嚴宸寄嘗持外計權才良魚遇水姦墨雀逢鸇黜陟司當爾澄清古亦然裁譏成貝錦亂曲惡朱絃未幾恩函改俄聞使斾遷彭門勞鎮撫漢詔許周旋鈴閣畫開巻熊轓春行田坐棠稀訟牒恭梓接鄉㕓治狀頻稱最褒章訝未甄淮州繁轉給漕柄議登延旒扆知名舊朝廷付命専温書頒緑檢要職復青氈歳赤膏腴地河膠金穀船尚繄心計敏能免國需愆既足中都食兼充内帑錢輸將今底績留滯矧經年不俟更書滿行聆迅召宣帝猷歸潤色天下佇陶埏賤士何為者孤蹤最𤨏焉技踈謀鼫䑕聲冺類寒蟬七載沾微命三霜偹冗員謹亷徒自信朴訥復誰憐材散良工棄筯駑善御捐泥塗寜避辱溝壑尚憂填援手惟公易為容更孰先願由門下進畢力効塵涓上運使工部綱紀提諸郡朝廷重外臺舉今持使柄第一議公才心計籠寰字時名薄斗魁邦家經費足山海利源開待哺充兵口圖豐積帑才鄼侯慙首漢唐室魏稱裴幹濟謀無敵澄清志不回謟言迎刃破姦膽望風摧羙課連優異繁司久剸裁由來藏器業所趣在公台豈似更書滿當聞迅詔催帝前推惠澤天下活枯荄賤子今州縣孤蹤始草萊十年恭紱冕再命尚塵埃馭吏猶防盗憐民甚撫孩官箴誠自朂士轂復誰推近幸窮山側親瞻大斾來霽威寛跼蹐賜坐許徘徊短效時令獻微躬或見哀光華生祼壤飛燄發寒灰古亦伸知已愚寧媿自媒鑄顔惟此爾捨魯更何哉巨野容頑鑛良工取散材願由恩館出畢力䇿駑駘上致政蔣侍郎二十六韻憶昔初登第公時再鎮杭諸生盡賓禮賤子正親䘮顧在齊衰下難瞻棨㦸傍無依繞樹鵲欲進觸藩羊豈謂二千石容趨數仭墻襟懷一虚接位貌兩俱忘復坐䝉嚴誨公嘗教至以忠孝之大節窮居庇末光寒蹤深退省感遇劇中藏俄觧武林印復懷呉郡章重經所憇杜俯近必㳟桑毗林舊隠在焉政續前遺愛州存舊大綱風騷揖韋白術業駕龔黄衆有台衡議朝推治狀良棟材掄杞梓廟器薦圭璋車馬還非逺公甫爾代還劇有退休之請㝠鴻趨莫量儻來輕弁冕思去傲滄浪俞詔優賢降安車就第康鴻樞辭宻輔碧落應文昌世外風波息齋中日月長静憐詩酒地回笑利名塲愚也生無似公乎惠末償昨官從一掾去德越三霜逖聽禠華紱末由稱賀償旅巢今甚邇思館宻相望傾仰心揺斾兢慙背負芒功成何以祝五福貝無疆寄獻王中丞近侍才俱傑明公望獨尊紀綱新獻府徳業舊王門禮樂陪朱邸文章落紫垣訓辭含鼔動氣槩獨飛騫厭直詞臣筆堅求牧守藩圖書遷禁閣封部領家園曉日旌旗疊秋風鼓吹喧萬人瞻駟馬千騎簇雙鞬令肅闗河静仁深草木蕃先皇俄側席百姓互攀援到闕何心緒遺弓已淚痕東廂延進對數刻慰煩寃一作逢入廟三朝見聖孫風雲歸夙契社稷入危言罄竭丹誠露從容玉色温殿中繄執法陛下肇披元爰立宫寮近由來國史存台星㸔比比淮水正源源白簡抨彈後洪鈞宰制繁盛期開旦暮偉烈照乾坤下客真踈鄙參戎謬薦論去年趨大幕累月奉清樽召㫖催乘傳駑情劇戀軒此生猶斷梗在處是孤根豈自身難致云誰手未援空彈愁坐劒感幕主人恩送陳郎泗州得替厯選臨淮守多聞政術偏若柔非似水即是急如弦下吏或弄法屬僚時竊權邀權沸鐘鼓市譽飾庖籩此弊歳月久何人才業全我公來作郡衆口悉稱賢寛猛履中道勤勞經比年憲章難爾枉公素精法令綱紀自吾専間喜文字飲懶開歌舞筵迎賓常倒屣公喜賓客開無留詢酌水毎留錢公潔亷之聲尤重時論無媿古循例豈同今備員頻陞功狀最宜待寵章甄上意深嘉乃髙懷遽撇然琳宫願監董公始抗章監靈仙觀鈴閣厭拘牽帝惜惟良去公逾所請監俄聞拜俞詔章再上乃許觧郡得往閱陳編公嘗語某日吾求去郡無他欲得閒局閲圖史耳未可謀真隠行當被峻遷散材蒙剪拂殊遇絶夤縁有立期他日無望報二天聊將感知涙灑送北歸船七言排律送玉夕拜移帥慶陽一月天書兩紫泥朝持使節暮征西公適自京兆府領都漕又改帥慶陽一月之間凡兩拜新命闗中父老攀旗尾閫外偏禆望馬蹄行色欲侵邊雪散威聲先壓塞雲低情勤佳客雙延辟公辟劉李二君欲置幕下令肅疆兵倍訓齊城堡此時歸鎮静朝廷自昔重招擕坐收勲葉光彛鼎入拜恩私寵介圭文武兼才縁已試父兄前烈不難躋却慙主帥經三易幕府徘徊守故棲送趙龍圖赴成都禁中延閣龍圖貴天下名藩益部雄紫詔一開雙渥澤錦城重入五春風公自御史使蜀距今出守凡五年矣吏民望拜行塵外父老喧迎喜氣中猶指繡衣前蜀使宛然緑髪少文翁獨當明主新才選應記先朝舊諌工蘇息兩川遺惠在撫柔千里宿心同旌旗毎順遊人出樽爼寧容座客空却恐江花尋未徧已除刺史作三公送張龍圖赴益州天子首除全蜀尹今上初即位公首拜此命近班親問治才長輔臣皆曰明公可出守當令逺俗康擁節兩川曽不擾剖符千里定為良圖書溢目延丹禁印綬垂腰制一方紫誥忽來雙雨露錦城重去五星霜望塵騎走兒童竹夾道壺傾父老漿坐嘯樓臺萬山壁行春車馬百花香西南毎往臨藩屏前後多歸入廟堂那比小侯論歳月即陪元宰爕陰陽無勞青史誇京兆今代成都有趙張公實代趙僊姑馬上回見野塘荷花盛開感成短篇波靣參差萬蕚紅直憂綘蠟日邊融却應絶艶無仙骨何事清香屬釣童緑芰間成新様錦畫船撑動亂霞叢便能移植金堤畔早恨曽淹濁水中一等生成勞化匠獨教榮落對熏風逢時得地俱難偶古來賢才與爾同送孫公素機宜書記赴太原劉龍圖之辟夕樓清嘯却妖氛越石并州晉史云威望裔孫行破敵羙名才子去從軍闗榆礙馬陰初合塞草迎人緑自薰幕下清吟消日月樽前壯畧起風雲尋常喜論兵民䇿尺寸羞銘將吏勲傾歳金門同獻賦公素實劉公同年進士平時玉帳暫論文早傳尺素頻來魏莫待飛鴻晚過汾誰問何官一書記十年閫制自當分事見杜甫送髙適詩送知府余少卿朝野清風五十年更留政績與民傳全家只飲東陽水自古無如太守賢手把耕犁農業勸足投庠校士風遷弗容惠愛終三載倍使罷窮戀二天來暮井閭存昔訟去思亭觀有新篇傾城幼艾方遮道盡日旌麾不得前塵土想趨層闕下夢魂猶憶兩溪邊吾君正欲登耆哲未放収身到地仙送記注楊學士被詔赴闕學士聲先壓並游詞源浩蕩浸崑丘九重紫殿三題就萬里青雲數刻収天子臨軒名第二春官奏巻等俱優翰林試筆尋揮寫册府譌文倐校讎京邑紛華非所好鄉邦偃宴得其求始看别酒傾同舍早聽讙謠載兩州嚴詔飛來批鳯尾近班歸去立螭頭一年父老漫留寇四世公台將至彪即日金鑾開歩武往時駟馬减風流蹉跎舊掾瞻行色漸老從軍祗自羞孫曼叔待制安撫至陜西先以詩寄不同四客老商山朝出東宫暮近班彭翼豈容時暫息龍鱗祗自歳餘攀身猶侍從先康濟心與生靈共歉艱郡國尚聞愆雨澤朝廷西顧動天顔鴻虚禁閣違登降觸熱軺車事往還赤地相望千里外清風一洒百塵間誰知奉使今持節比見從戎昨過闗漫學彈冠貢公喜鬢毛蕭颯欲投閫送張如瑩栢城親見五雲飛歸奏嚴城侍玉墀重待三長専筆削新遷八座總綱維却縁闗輔初通屬便向齋壇去把麾暫使文星厯東井方資逺畧控西陲乖言今覺詼諧驗清獻但容龜鶴隨李丞相以尚書議論剛正常戲呼為張乖崖今復鎮復不擕家故併及之巫峽風髙送帆席錦江春動照旌旗臨川畧應添刀夢宣室行聞盛德詩看取鋒車即西去巖廊正欲聚高䕫依韻和志國酋夏霖雨之作平溪漲雨欲過人后土浮泥苦寄身但得薰風如舜世未應大水似堯民淵漁弄沬知生樂林舄啼饑與死濱急浪横流成浩蕩陰雲狂態轉紛綸盃觴自好消長日草樹猶疑泣晚春杖䇿北園尋傲吏葛衣飄洒任吾真送運使李工部自陜西移益部十韻近取河湟議出師公才正合濟今時朝廷好問平戎䇿郡縣無勞諭蜀辭蕭相餽餉堪仰給馬卿建節忽西之未容歳課闗中奏即聽風聲劒外馳壠雪欲飛行路片江花應發到官枝桑麻蔽野居民富錦繡連甍雅俗熈萬井謳歌饒樂事百城才賦省文移就更使部雖云俗入用王朝固未遲緑髪貴名由衆論青雲舊物是台司東歸馬首須迎駕為感新來國士知韓魏公生日治身時位俱云得同體君臣繫所遭仁廟自從延輔弼聖孫相繼委鈞陶早辭十載調元鼎尚擁平年出帥旄白首未嘗安富貴丹心愈更事勤勞曽無半語矜功大猶有流言忌德高皎皎忠誠通日月悠悠險計息波濤由來正直陰須相此去勲名勢轉牢伊昔初秋降申甫于今外牧滯蕭曹恩頒天廐雙龍種賜及家庭一鳯毛再拜捧觴何所祝願公三熟見蟠桃新秋再宿澂凉兆間氣生才厯世稀緑髪文章驚紫殿青雲事業照黄扉力陳社稷安危計首幹乾坤造化機二相鴻圖三聖倚兩扶龍德九天飛勲名屈指中階少富貴抽身北道歸翁子鄉邦纔得請鄴王臺觀已増輝擁旄欲去觀民政仗鉞俄來統將威信令指揮千帳帖仁恩涵養百城肥西方幾月留旌節南靣終朝待衮衣入幕最容孤跡早捧觴光抱寸心微初逢誕日稱公壽長願台星輔帝暉考近汾陽功更似德攀衛武道猶非洪鑪物品常無滯翹館羣英永有依拜賜韋賢車服盛元城傳詔到庭闡玉勒雙牽名騕褭錦章輕疊瑞麒麟三朝丞相迎恩賜萬歳君王寵誕辰將命綵衣宣漢禮拜嘉香案望堯仁太平致去今無跡造化禆來昔有神社稷一言嘗定策色辭九鼎但垂紳乾坤不負謀謨力日月難磨富貴身封國連紆六金印鄉邦阻駕兩朱輪行追前訓還英衮再領羣生入大鈞聊借壽樽傾北海久叨賓館祝平津却應從此天文裏遂指台星作老人王尚書生辰肅時天氣凝良月近晦星精降慶閭弱冠文章驚殿幄青春富貴絶朝裾安危倚注心逾壯中外翺翔髪未踈禁職榮兼三學士選朝尊冠六尚書别都宮闕留魚鑰全魏闗河入隼旟輔相合逢先帝久君王今用舊臣初日邊紫詔來朝暮天下蒼生待慘舒身與太平功業老康强衛武百年餘謝陳伯成學士蓬萊仙人才偉英三世實以文章稱持盃玉虹汲澗壑奮筆金虎虓丘陵開懷未嘗有表暴出語矧復無驕矜超然古人考是否蔑爾時俗論愛憎識君始者兩俱少獨我今也百不能半載沉疴類鶴瘦終朝癡卧如凍蠅醫工診臂即司命藥債攪心逾惡朋煩君終日一問訊使我多感常填膺感而有贈不須怪近來交態猶春氷兩浙轉運使吕少卿輓辭卿月無光没使星屬封涕淚逐霜零敝禂舊服從身殮素節清風到目暝澄汰濁流師孟博誅求横賦罪延齡塵埃尚父當年玉寂寞韋賢奕世經千里九秋傷旅櫬一門三相起家庭誰提大筆書功行為激貪夫作羙銘祠部集巻十一
