body:
  text: 祠部集巻十八宋强至撰狀代賀冬上諸官狀寶典履長雲臺視朔復天陽於七日亞儀㑹於三朝恭以某官洵直懋功融明迪哲發揮當世之務兹鬱於賢謨綱紀列城之風聊分於使領順迎令序誕擁龎禠某適限他司莫前為夀傾瞻抃頌曷諭下情鄰郡知州狀一陽聿新萬寶伊始合隂陽之交讓歩珠璧以聨暉恭以某官才為吏師學際聖閫班條治屏聊鬱於逺謀鳴玉嚴塗佇揚於華貫導迎令旦集受繁禧瞻禱所深名言匪悉代謝運使工部保舉狀某自少也賤實今之愚學弗名家力徒稽古一竊科籍久縻祿鍾間關四紀之餘忝冒數州之寄唯臨淮之陋壤乃沿汴之安區自領一麾僅彌期歲事弊未革民瘼尚畱日虞官瘝以厎吏責豈謂某官曲矜懦介特賜甄揚掩其疏短之才謂可劇繁之使親形封奏上達冕旒感積於中望踰於始昔者楚諺珍季布之諾不啻得金魯經尊仲尼之褒有踰贈袞竊欣幸㑹迥越舊聞敢不佩服攸箴周旋乃事天休雖至而不以為喜官局是專而靡營其他永矢捐軀仰酬知已代謝施待制狀昨以他郡寓家使塗抵任孑居䖍命之署冷甚廣文之官豈謂曲諒愚𠂻過垂恩惻俾沿臺牒往促漕舟皆縁公為得遂私欲獲挈賤累盡歸巨庥此盖伏遇某官盡物以誠任仁於已永言感服曷究指名代謝二司狀某到郡累旬監州無狀簿書弗整管庫少嚴製錦致傷雖强學而安可血指為斵盖不能之使然承攬轡之按臨欲望風而引去不時斥罷盡出優憐知無不為力圖拙者之效死而後已誓答仁人之恩近阻高明諒臻禧福伏望順節自夀協時所瞻代謝兩府狀被恩至渥冒職如初俯伏拜嘉兢慙失措伏念某早縁曲藝竊綴茂科逢辰寡資累日取進曏領漕權之重往當河朔之雄方殫鄙才思稱繁使而所屬列郡非良長人致狂冦之不咸嬰孤城而自守不能慮事而先擿徒爾傾忠於已萌賴廟算之萬全破冦巢於一舉私心俟黜恩典從寛止奪使麾尚叨守紱雖頻年易郡未始滿期而南服按刑僅諧累月豈圖明命復眷孤蹤就改外臺俾還舊物盖使過者欲功之勉嘗失者知得之榮靖言忝塵厥有縁自此盖伏遇某官代天敷化當軸均仁匠物謂無可捐器人容有不備卒令駑質仍玷龍光敢不究悉事權激昻志尚少圖拙者之效庶答大鈞之私代到任謝兩府狀右某比者就䝉細劄移領善邦望闕非遥假麾何幸竊念某本由平進親遘盛期累日而取官資固無他術應宿而居郎位誠玷茂恩而復頻易左符率遷喬木唯泗封之故郡實淮服之㑹區曷稱衰遲輒當繁要此盖伏遇某官代天敷化與物終仁畀分外補之榮曲盡大鈞之賜敢不周旋乃職黽勉在公永矢捐軀仰酬知已某下情無盡感懼激切之至代謝諸官狀兹以短才猥當煩使藂然財賦之供億乘以簿書之冗紛徒爾傾風末由奉記豈圖情照首貺音縢意在逺而彌親禮由謙而益厚仰銜勤抑第切銘藏歊溽云初標儀尚邈勉綏寢餗前對寵榮代謝轉官狀帝饗告成德音申諭泛均洪澤施及冗員被寵匪叨拜嘉知愧伏念某本由曲藝冒進茂科早縁幕廷寖踐閨籍止圖累日之效以致列星之聨豈謂禮訖總章慶覃列位或講求曠典之舊或侍從嚴祠之勞此而例遷固匪虚授若兹忝據良自夤縁此盖伏遇某官素朂霄期致階榮漸卒令駑猥亦玷龍光敢不加慎操脩益思樹立上酬天造次答已知捨是而他不知所措代謝二司狀露章易郡得請還朝獲遂私誠將違公庇怔惶承命喜戀裝懐伏念某荏苒外麾徘徊末路力圖為政之效日抱瘝官之虞重以迎侍安輿阻遥故里雖竭晨昏之奉殊乖羞膳之宜然君父之命已行弗宜數改而人子之心未盡因用上陳豈謂睿慈俯從愚欲此盖伏遇某官素推大惠曲軫孤蹤贊行終物之仁使就養親之便永惟感幸曷究指名代得替謝上司狀術短事叢地卑郡要加庭闈之奉養有風土之乖殊弗便旨甘遂形懇請願除便郡以就私誠露章方聞俞詔隨下矧爾更書之代將違䕃宇之醲得免官瘝卒以理去靖言所自厥有由然此盖伏遇某官早借題評俯矜樸直靡尤庶物之曠曲示兼容之優獲解守麾俯行艫之入覲回瞻恩館惕感涕之無從代謝提刑狀近以露章宸冕卜兆親塋因縁盡室之還將就乘舟之便為謀弗熟引慝固多值使斾之按行呼篙工而詰問仍移牒命俾述事端雖勉開陳尚虞舉劾豈謂靡尤既往之過特寢必行之文此盖伏遇某官量極兼容仁推再造念效官四紀粗守於謹廉使竊寵一麾獲全於榮幸欲報知已敢辭捐軀謝兩制狀祇奉明緡就叨寵寄京畿近服邦漕重司倂集茂恩驟加庸品竊以為國領計須官得人餽輸中都不朘民而厚上澄序庶位不簡賢而附權具足兼長乃名宜職苟容竊位曷弭公言某效局無堪瘝官有素江淮易任曾靡寧居金穀主謀怳迷舊習豈謂浩繁之委不遺孤冗之蹤此盖伏遇某官言味借優褒華引重振拂汙滯矜憐介愚寖聞當扆之聰遽復外臺之命敢不周旋乃事恪慎厥脩永矢捐軀仰酬知已代謝王舍人狀逖阻風猷寖更年所日為簿領之關掌坐致音書之闊稀方切傾賢遽䝉下教感與抃㑹情鈞禮優恭以某官素練善經洊揚膴仕沈毅有畧不廢壺歌之懽嘯聚自潛巳絶雈苻之警果凝顯烈驟陟榮班某處事弗精瘝官是懼尚䝉寛假不汝瑕疵去德未遥佩恩良極代謝許發運狀某一竊科籍久糜祿鍾累日而取官資固微他術應宿而居郎位誠玷茂恩向叨郡紱之榮越𨽻使臺之屬罄殫拙效訖乏最稱逮秩滿以還朝仍便麾而假守靖言忝冒厥有階繇此盖伏遇某官為容有先增價十倍卒令駑猥亦被龍光敢不佩服攸箴周旋乃事庶幾一得云補萬分永矢捐軀仰酬知已代謝經過諸處官員狀近沿臺牒獲道治封上謁賓除屢遘賢規之粹交讙宴爼過䝉主禮之優還局而來息肩未暇復往推於詔獄因曠奉於音縢尚賴寛明弗加疵咎伏惟歊炎貫序福履餐和諮欵寖遼傾瞻曷既益綏燕起前對褒陞代謝王副樞答書狀近者伏聞某官光膺徽冊叅掌繁機增天子得賢之稱副大臣行道之實幅員億姓咸託於鈞陶藩翰下寮竊形於距躍因傾愚悃上凂台光豈謂公輔量寛廟堂政暇自忘絶禮回貺鈞函拜讀以還兢榮失據伏維緝熙帝載翕受天祺恭以某官王佐偉才民靈先覺高文大冊蚤冠於雋科華貫嚴途洊揚於聖世備紓賢業自結主知密侍清光益隆體貌禁扃視草久屈將明之資樞幄暢謀聊分宥密之寄行明緡之登進職上衮之凝嚴副國倚毗協時瞻屬代謝許州相公狀頃在三川屢為吏第疲駑而自守微銖兩之足甄伏蒙矜憐介愚終始振拂預郎垣而竊寵忝侯閫之亞麾訖賴曲成敢云自致栽培之德怵論報以無階樗散之資復託蹤而得地出入材館貿遷歲筒辭藝荒蕪濫肩下客之列禮遇優厚率荷上臺之仁㑹遷印於宰廷方建麾於京輔首錄門下之賤俾綴仕階之榮露章上聞俞命隨降弗由稽古之效遽有進身之基靖言載惟厥有攸自此盖伏遇某官大鈞播冶煦律吹枯匠物謂無可捐器人容有不備是令茂渥輒及鯫儒棠棣微生盡沾雨露之澤鶺鴒翾品皆縁卵翼之恩永矢糜軀仰酬知已代謝中書狀濫被恩俞出司憲職語能且薄荷責惟憂竊以國家惇尚至仁哀矜庶獄治刑之吏或舞於深文抵罪之氓間罹於密網因重按章之選俾澄濫罰之源宜得敏才以當繁使伏念某肖靈非粹學古不優早從朝弁之華寖冒書林之目以至分守符之寵寄備王府之末員罄竭鄙才訖微善狀優游一郡思全懶放之懷董按列城本非平素之望靖言塵玷厥有階繇此盖伏遇某官翼亮天工運平帝縡器人容有不備匠物謂無可捐坦然至公施及無意敢不周旋乃事恪慎厥修誓殫一介之勤少答大鈞之賜代謝李兵部狀此縁厚幸得備屬官向因愚悃之傾輒凟使威之重豈圖乘轉給之豐暇忘爵德之達尊俛顧下僚特頒諄誨仰佩一謙之美第增三復之勤恭以某官元精所生盛德之後早躋纓紱之貴自結纊旒之知總漕節之劇司方圖顯效復相門之逺躅行被茂恩謝蔡學士狀惷㝠亡狀汩沒於時向補獄官嘗備掾屬轅駒局促曾建議之弗明市狗悲號或賞音之間及洎冗曹之滿歲㑹卓馬之還朝無何孤蹤亦旅上國天銓待次殆困東方之飢酒正乏員遽叨北海之薦靖言駑猥曷稱甄揚此盖伏遇某官興勸官能助開公道不遺簪履之舊力提管庫之微敢不佩服攸箴周旋乃事謹材六物寅守於舊聞第課三年庶成於微效謝范陽軍司理狀官舍接疆日瞻高矩客車過郡時剽美聲思清晤以未涯遽珍題之為貺恭以某官才猷膚敏方格淳修一命開榮尚淹於逺蹠上臺交薦行蹈於亨塗倍順節宣少平頌願代謝文相公答書狀蚤以孤單素叨奬遇訖被大鈞之賜寖貳外麾之榮旋去門牆漫逾歲月一身銜感因罄敘於悃悰兼幅瀆尊懼自貽於罪戾豈謂王公之量曲惟犬馬之情弗爾擯遺親形誨諭拜嘉至渥論幸無涯伏惟静鎮大邦具膺景福恭以某官天元間氣王佐偉才以忠誼結主知以道德為已任畫一之歌既作休有成規太平之䇿略行翕臻至治俄還宰印出剖使符幅員蒼生望晉公之再入旦夕徽冊副周尹之具瞻代謝兩憲狀某天資闇昧胄系寒微早挾片文晚塵一第脫略名場之困間關仕路之榮旋貳方州適居要地鮮嘗坐局多所抗塵間參决於簿書訖無禆於課最慤廉自信畀瑣誰容豈圖經世之才方重按章之選夙夜重寄品裁庶官隨器而任人市骨而圖駿以某外弗修於邊幅内粗守於廉隅諒其介愚謂可甄拔特邀露奏上達邃旒坦然至公施及無意靖言忖度厥有階繇此盖伏遇某官樂育興懷兼容成德輕於慰薦錄此孱庸敢不持前所存覬後有立糜軀以報知已難酬代謝何龍圖狀伏䝉特抗辟書俾從藩服匪才被奬早度其難勝成命未行預虞於弗稱惟治朝之故事付帥府之要權得舉賢材以備官屬眷乃題輿之請最居推轂之先贊行教條關决政務講兵民之利疚考風俗之便宜當取經通之流以光慰薦之首如某者胄從寒薄性得顓愚局若轅駒因逮明之無所欣如壧蟄第竊忭之為多伏遇某官為木先容采葑下體將令駑猥亦玷龍光儻卵翼生成獲繇於恩館則頂踵酬報不後於衆人府推謝學士狀自去京都亟來淮服馳心翹館之下回首長安之遥仰企高風倍增勞臆恭以某官德宏業巨行潔文醇由妙年而取甲科不累日而踐華貫早被溫書之召入登祕館之遊贊劇治於神畿勢非久次暢辰猷於禁署議所同歸願輔粹襟行光寵數俛惟瑣亞倍百他倫謝李兵部狀近以驟逺崇威懼遺孤迹愧向重知之地尚懷未滿之心因貢牋函仰通几格繇誠計之迫遽致言詞之譸張謂塵將命之嚴必冒瀆尊之咎終朝自省悸魄難安曷圖大漕之崇弗間冗曹之細益恢全度曲究下情謂夫以賤干貴者盖有欲言由初及末者方能成物特寛罪斥親賜教音事絶舊聞幸踰始望惕焉下拜藏以為榮兼審順履時暄誕膺景福恭以某官蚤紓賢業自結主知言施當世而可行名揭本朝而甚白連更重柄未嘗坐席之溫方總外臺行被詔函之趣還台衡之舊柄光史冊之新書庶俾孱庸訖歸埏冶代謝二漕狀承乏于兹字人未幾官簿弗整民瘼尚畱與錦使裁雖强學而安可血指為斵誠不能之使然聞覽轡之按臨欲望風而引去不時警斥盡出優憐究悉寸心誓殫拙者之效周旋巨庇庶免瘝官之虞方逺使威第馳愚悃恭以某官才兼數品名重本朝綱紀列城之風暫光主寄發揮當世之務行暢賢圖伏望上為邦家精調寖餗代謝舉陞陟狀尸官下邑才微分寸之長被薦上臺恩甚丘山之重事踰望表感劇愚𠂻伏念某孤平之蹤汩沒亡狀語能勿齒於俗吏行已恐羞於古人一竊祿鍾偶逃於官曠再汙縣紱復避於親嫌曏從淮服之遐易宰江濱之陋而且歲穰相接民訟幾稀鞭扑牒訴之罕關懐賦租科斂之易為力顧何治績足稱褒章此盖伏遇某官興勸官能助開公道諒其懦介謂可甄揚特屈知人之明猥形躐等之舉敢不周旋乃職佩服攸箴永矢糜軀仰酬知已謝知府少卿狀長無寸才寒有餘地百里自效職頗憚於不修二天誤知衆遂疑其可取近具版謁前從府趨瞻棨㦸之甚嚴覺筋骸之如束伏䝉甫寛苛禮為霽嚴顔損邦侯之達尊加國士之優遇以至均惠公庖之品許陪燕爼之懽千騎雍容下臨所舍十目駭愕相視為榮事信越於前聞心第藏於厚賜下邑歸去尚戀卿雲之濃終朝度思益加恩地之重恭以某官禀氣間傑為時老成朝廷渴賢方念元龜之舊廊廟虚位佇增顯爵之光孤生咸依四海僉屬謝通判國博狀某託庇歲餘發蹤門下散木成器繄公輸之先容駑馬為良由伯樂之囘首近白吏事往趨恩閎方守閽之通名已倒屣而垂接斂板長揖為降階墀之尊虛襟相容不知州縣之賤以至燕觴延勞騶御枉臨泥塗生光僚友改觀守在民社未幾告還瞻言軒牆猶有餘戀伏望協班寛詔坐擁繁禧恭以通判國博器完道醇性潔文妙雍容倅乘之任豈曰盡才頏頡書林之遊此其宜職伏望為國自夀以時考祥謝越州知府待制狀蚤聽諸公之諭竊親盛德之光位貌間殊情禮疎絶怵自進之無路第仰高之有年遽被上臺之符俾論㑹府之秀雖殫愚效何禆勸駕之勤比訖事經方適拜塵之願而大賢不自貴重一介亦加采収以至燕爼將恩餞壺申貺退銘盛遇増劇丹悰伏惟訟缿畫空道環天粹恭以某官器函剛實才貫機深允蹈古人之直清喜言當世之利疚旋躋延閣之祕自結嚴宸之知東南請麾巳諧均佚之志旦夕被召亟對登庸之休四海共依孤生非佞謝楊直講狀近並諸君謬程多士曾是辭才之短介於季孟之間而甘辛好殊臧否鋒起人執一見誰將適從實繄定鑒之精與决羣言之惑卒多彼彦之在選獲逭有司之弗明終朝度思受賜深矣復縁賤子之跡嘗出先公之門掩其頑䝉陰有憐奬逮單車之亟引溯翹館以增勞伏惟贊行寛條翕受純福恭以某官薦紳碩望名世偉才學造聖賢之微文經邦國之要貳東南之巨屏猶鬱羣瞻陟左右之嚴塗乃云宜職伏望為國自夀副時所傾謝陳秀才狀發詔羅俊命卿辨才伏審一攄妙文旋中異等逺蹠此始私心竊驩首貼長牋尤識厚誼陳君即先輩氣得秀粹學探本原諒竊鍾祿之榮勉從貢部之式華歲方盛致身其時青雲在前舉足可到永言欽頌曷罄懽愉囘劉侍郎生日詩狀五十富貴偶同治越之年八千春秋難辱借秦之諭珠璣可玩瓊玖是慚空積感懷莫知報禮謝富丞相狀比者祗被恩書與持計節寵幾于冒分失其安伏念某偶席世資罔通時用介愚既定於所禀矯揉雖勞而莫移矧䇿足於冗塗固絶心於要路向㑹高明之當國一隨長短以取人縁是孤孱亦叨奬拔承財闈之官乏何所建明佐神甸之治經終然暗拙懇求外補止覬小麾曷圖造物之仁弗顧假人之議遽以煩使屬之短才既假漕臺之劇權又分淮服之近地無桂玉之憂足以致舉家之温飽有海陸之産足以奉偏親之旨甘實私懷之便安第官責之深重按列城之吏狀要在澄清籠一道之地財抑資幹濟當竭愚慮以酬誤恩載惟單跡之生成率自大鈞之終始即具舟檝益遥門牆敘感臆以無從企台光而增戀恭惟某官器包民極勲濟王塗挾重計以尊本朝履正德以儀庶位三辰以軌百化其凝公路倚平暢偉謀於當世親闈棄養纒巨痛於終天愈隆注意之私屢降奪情之詔雖力祈終制靡循方進之故常而久鬱其瞻深跂晉公之再入伏望節哀順變視履考祥上副廟朝之依下平海㝢之願謝賜酒食狀僕馬瘏勞暫遂寧居之適酒肴豐旨兼䝉飫賜之加戢感良深諭言匪悉謝館燕狀竊冒使華肅將君命屬征驂之稅鞅即候館以肆筵祗服恩勤第增感戢謝合食酒果狀邦家修睦慶歲籥之履端肴核優賓參壺漿而申貺仰承嘉惠增戢愚𠂻謝春盤幡勝狀歲功遹起春物滋榮製妙飛幡動縷花於剪綵珍藂多品錯絲菜於雕盤併此拜嘉惕然萃感謝生餼狀車馬少休方諧定館餼牽並賜迥越授餐匪頒之禮既優荷戢之懷良劇謝射弓御筵狀燕儀示惠過䝉折爼之私射禮序賓曾乏主皮之善其為媿幸無諭感銘謝餞筵狀輕軺載飭將事于征嘉豆旅陳遽叨式宴良厚使􅎶之眷特加祖軷之勤祗佩弗忘敷論罔既燕京謝酒果狀逺駕單車甫經别甸特念行人之至重煩使者之臨均沾玉斚之清醪兼雜秀林之珍實仰承優貺增戢鄙懷謝兩制狀謬被恩緡出提憲局才輕責重寵至憂深竊惟庶獄之原動繫生民之命雖詔條所約深慎於吏文而州縣之間或違於上意因精使者之選以董欽哉之刑必得周才乃名宜職竊念某職非經逺品不及中襲鉛槧之遺芬粗求寸效究簡書之深意都昧舊聞就領僻官尚虞隳職矧在淮州之劇尤稱犴獄之繁此而按章誠曰假寵靖循忝冒厥有階縁此盖伏遇某官言味借優褒華引重振拂汗滯矜憐介愚寖聞當扆之聰俾預外臺之寄敢不持存平允考察濫寃永矢糜軀上酬知已上李刑部狀右某頃在親喪嘗經治部名屢達於將命遇迥殊於衆人旋承卓馬之朝入覲蒼龍之闕俛惟賤迹時旅於上京適㑹輶軒逺使於絶域第傾德宇阻叩賓筵賴幸㑹之猶然續恩暉而有所周旋侯幕方備於下僚密邇逺麾復為於屬吏愧營職之亡狀致貢書之不時仰跂標儀坐勞悰臆恭以某官夙鍾間氣親遘熙辰秉忠諒之一心出誠明之正性固合往宅元輔陶成太和本朝以漕權之艱淮服為最兵興調度之供億地賦詔求之浩穰庸資兼才以領大計然外臺分寄誠鬱於具瞻矧中扆須賢行膺於爰立伏望為國自重以時納休上知蘇州蔣密諫狀右某近修板謁獲叩坐隅伏䝉忘位貌之霄泥錫燕私於樽爼間沾豐品申貺名醪揆恩禮之踰常浹肌骸而盈感奔馳吏役邈矣一涯契濶台光倐焉累日愧營職之亡狀致貢書之不時伏惟鎮撫善藩綏寧泰宇恭以知府密學諫議夙鍾間氣親遘熙辰秉忠諒之一心出誠明之正性優游訟樹密邇恭桑圭衮儻來靡嬰於素志江山有助不廢於清吟伏望為國自重以時納休代上李度支狀向擁州旟曠馳書舍伏惟贊司邦計妙順生經恭以某官親㑹熙朝洊揚美任佐大農之調度方委於周才邇中扆之聰聞行歸於劇任代上吕狀元舍人狀伏審茂對恩書榮躋法從伏惟慶慰恭以某官業術精奥方格淳修學足以挹軻雄之源行足以蹈淵騫之軌親逢文雅之㑹優冠秀廉之科華要洊揚聲光愈綽方載言於宸扆俄給札於禁林有文章溫厚之才能體詔意代誥令坦明之作遽當上心佇見追還三代之醇逺駕二京之右少見儒效即歸宰司某頃吏邑封嘗棲蔭宇側聞新命增抃寸襟代上范資政狀伏自某官就奉制音往觀藩政門牆愈逺慮違冗賤之蹤牋牒不時懼凂高明之聽伏惟静班寛詔誕擁純禧恭以某官王佐偉才民靈先覺忠言坐斷乎國論大筆追還於古風領樞廷之弼謨専將閫之節制備紓賢業獨映朝端旋陞祕殿之華益重嚴宸之眷幅員億姓已躋富夀之區藩屏一方聊布中和之治行圖舊德還宅元台曾是懦微素叨知奬特矜孤進之自力畢大鈞之仁事雖怵於命違恩固踰於衆遇更繄埏造以託生成上永興路監司狀叨從師幕將預戎機才無一長顔有餘愧某其少也賤乃今之愚治曲學而不根經逺猷而恐泥他技俱短獨潛圖史之精自知甚明僅給簿書之務若建都之舊地重開府之盛游主人仁賢僚友俊茂應抗章之僻置往厠其間須主畫之該詳密禆於内笑談足奉於多暇牋檄皆如其欲言縱横智謀出入方畧若此之比率非所能尚繄官局之居適託使臺之庇致孤生之冒選良本為容昧素術於從軍願前承教據依有所欣幸兼常代上判府龍圖狀貳政小邦瞻風上笏屬秋商之貫序仰福履之餐和恭以某官經世偉才搢紳碩望忠言坐斷乎國論大雅追還於古風中外洊揚明哲一致迅躋内閣之貴益重嚴宸之知京邑四方之表儀翕騰於尹政宰廷百辟之師帥當被於朝僉咫尺聰聞旦夕再拜代上催綱王太博狀右某向嬰藩守阻奉郵音仰計水行妙熙谷養恭以某官禀氣間傑為時聞人掌禮局之儀深明於典故促漕臺之運方藉於幹能行疇茂庸驟陟華貫伏望上為宗社精調宴興代上通判陳太博狀右某自逺風符洊更年籥川壤攸阻緘縢幾稀伏惟贊行教條翕受禧福恭以某官量函夷雅學際本元侯閫亞麾尚淹於逺蹠相門襲慶當繼於先芬伏望上為邦朝精調寢餗代上楚州監酒洪推官狀右某啓言念日傾高誼斗曠幽緘逖料燕寧妙符生理恭以某官藝文精奥方格淳修坦坦榮途固宜於濶步區區利局誠鬱於逺途佇善課之告成即寵恩之躐等更祈珍嗇少慰顒瞻代上運使李刑部囘衙問侯狀右某伏審出按屬城近旋崇斾仰惟吉履俯萃醲休恭以某官親遘聖辰備紓賢業登車攬轡已澄敘於官聫輓粟飛芻復羨盈於邦計行旌幹濟驟陟凝嚴伏望上為闕廷精調寢餗代上知郡郎中狀右某近者屢布音函繼紆誨牘屬餘寒之未殄諒沖履之惟休恭以某官方格淳修政能通敏守麾頻易率揚循吏之稱時議翕歸尚起潛郎之嘆佇凝顯績行被茂恩瞻奉尚遙傾祈倍切上知郡都官狀右某自去公庥鎮縻吏役日尸鞭扑之囂冗坐致音縢之闊稀伏惟入對王休備攄賢藴神觀静復天和舉臻恭以某官迪氣純全賦才肅給守麾滿歲方格上聰之聞使節宣風行膺外計之委俛惟孱懦永托甄題伏惟上為邦家精調寢餗代上府推學士狀望闕雖邇瞻風甚勞伏惟視治多餘練神增爽恭以某官量函夷雅識貫幾深親奉盛期獨膺華貫書林擢職方贊畫於王畿法從須賢行拜嘉於宸陛祠部集巻十八
