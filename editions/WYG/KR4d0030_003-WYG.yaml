body:
  text: 祠部集巻三宋强至撰七言古詩棲雲閣越山東南號勝絶古寺巖洞窮高深山雲出為洞口雨或時散作巖下隂不有神物此蟠據安得氣類長相尋寺僧愛雲恐雲逺置閣雲上躡以臨豈惟憂懐獨舒悦更許遊客開塵襟客來祗知寓暫賞不道歸去還塵侵寜如僧住得安穏終日自共雲無心陸君置酒為予唱陽關即席有作陽闗何處草烟平不識陽闗空記名古人驅車欲西過吟成繕寫離羣情天涯此去故人絶雖有樽酒同誰傾古人幽怨幾時盡至今愁殺陽闗聲陸君酒酣喜自唱坐上客淚俄縱横杯盤咫尺意萬里忽若身在關山行耳傍宛聞車馬動簾外已覺邊風生乃知樽酒須故舊為君一飲無餘觥結交行貴友高車照簮組富友黄金輕糞土二友方論富貴交以漆傾膠入心腑一朝金盡囊無餘門前不見簮組車貴人今車底似昔早失黄金舊時客由來結交要勢均一輕一重難為人滔滔世上耳餘輩寂寥管鮑今埃塵交情以勢不以義今日雖同明日異君子結交自有持賤貧富貴不我移依韻和李評文思我心烱烱君應識萬事都慵獨吟癖二年客眼看京華可見無媒進無益勢門所喜在佞豪直語空拳無一懌愛君挺㧞生貴家不學庸兒醉朱碧兩提試筆賦翰林落落金聲天上擲改丞殿省頭不囘直把羣經重研摭相逢憐我猶滯濡四十金閨未通籍勢門宜不容此身頼有君家好投跡書齋延坐開新編光熖文章追祖白更邀詩社同襟期脫略形骸一疏戚公侯必復君勿遲志士由來輕尺璧贈賈麟賈君貌古文章老虬髯鋪胸犀挿腦戲誇才力驚衆人談笑千篇筆端掃酒酣座上披天真剗去厓岸露懐抱今年禮部更新書續詔九州登俊造宿儒晚秀趨術茫肝愁胃苦搜辭藻獨君所向異爾為長袖陂陀踏幽草君近遊徑山行窮兩徑躋巖巔指㸃晴江辨秋㠀却騎匹馬歸湖山古寺相逢情愈好空罇無物醉故人輙出囊錢具梨棗更長坐久然青燈語雜譏諧欲顛倒我方正色起問君何乃終年事枯槁齒牙未豁才有餘一賦從容成腹藁琢磨高論馳古今足歴天衢騁王道駑羣㳫㳫猶爭先驥騄胡然甘伏皁君徒俛首不我答我反慙顔汗如澡丈夫貴富難近窺一第定非論晚早豈同祖誼名漢朝位不公卿身已夭何時却掛吴淞帆霜蠏初肥恰新稻前日以詩贈賈麟進士繼蒙和答而楊蟠從事亦隨次元韻鄙思不休輒復自和二篇賈生俊辯凌諸老二十漢廷冠挿腦魁竒逺裔空傳家惨淡壮年翻却掃巧心用過金㡬緡憤淚頃乾玉三抱五湖夢數歸何時四海形单生不造鄉宴無心聽鹿鳴時平有口歌魚藻每舒意氣拂劍光懶把窮通叩蓍草江河飲肺吞阮劉風月吟腸笑郊島君才慎勿恃晚成俗態由來尊少好衆人競進皆揠苗獨子甘貧猶嗜棗囊装未抵一羽輕筆力堪支泰山倒閑身自放壠上耕愁靣誰憐澤邊稿幽尋騎馬衫覆韉冷臥乏氊床露藁無勞兒女憫滯材豈竟乾坤厄吾道從前平歩封公侯亦有逢辰出輿皁光華聖旦髪可晞涵泳儒流身已澡收還事業幸未遲揖取功名須及早不然一世成虚生雖曰百年如實夭公朝富貴弗汝慳仕路高車似麻稻其二愛君氣榦霜松老一見相投許肝腦豈同世上秋葉交不及嵗寒如電掃有才無命三十强寂寞吟齋膝長抱愁來徧踏公卿門綻褐不縫誰改造文章直吐元化胚天樸豈須施斧藻長篇下筆縱立成一字未曽傷草草辭源奔注吞衆人有似驚潮沒孤島善君取友論片能不學常情求百好琢磨六藝相與游我愧性靈昏椹棗平湖渌浄時招邀爛熳清尊為君倒客塗見月凡幾圓勌馬聲飢奴色槁路傍甲第欺儒冠奴厭腥肥馬餘藁我疑造物偏膏粱富貴何縁慳有道貫糜巨室君空囊朱紫摩肩君衣皁大鵬寜合安㝷常怒翼天池終刷澡功名豈必收目前兩鬢未銀猶得早顔彭骨朽千萬年漫與後人論夀夭君其努力攀青雲盛醉春風釀香稻題惟晤師斑竹杖蜀江濯錦含文漪竹生江岸初緑滋錦波一浸入竹肌萬洗不落斑在皮又聞淚㸃灑舜妃遺跡漸染傳今時搯不受爪滑可持隠起高節無屈欹江神雖寳莫自私煙根忽逐霜刀離截而為杖得者誰龎眉大士今一枝斒斕頗與壊衲宜朝躋山巔暮江湄山備兕虎江蛟螭爾杖未折莫汝危足力自健無險􅇖安用童子兩肩為當年常竹紋無竒猶託變化神葛陂况此已是斑龍兒長恐一旦風雲隨復整頭角還天逵未必久為師有之和禮之喜雪十二韻水官司冬不舉職天地當凜氣輙温頑風伺隙倒天令掃蕩不使繁雲屯隂崖邃谷殆窮臘空有雪意乗朝昏宿荄老枿亦借便欲洩陽氣芽株根往往百怪竊窺視思以沴疫傷羣元頼吾太守為民切百拜黙與上帝言臣因視民問農計亟雪猶可望有年知民所欲弗帝告安用備位稱守藩至誠一發動天聽霄垠地堮俄瓊璠混然上下共一色直疑元氣猶胚渾狂風埋藏反失勢却授威柄還水官既去豐年在冬雪豫擬癡腹盈朝餐送闗景芬祕書赴山陽尉峩冠初上童兒首君已老成予輙友肺肝相照二十年今日不殊前日厚紛紛共笑薄媚徒對靣論心囘靣否吁君意氣非昔麤猶著青衫從吏部得官将尉古山陽有藴無施州縣後山陽楚邑為最雄聒聒衆咻千萬口階庭聽命趨上官守閣使臺鞾日走舟車冗客來百須政逐從違成好醜君才遇事有巻舒公道當官膽如斗或時畏縮類懦夫私請不容毫髪受往行素守禆長官肯到縣㕔同木偶頗聞彼俗殊東南例重市門輕隴畆鹽商茗販白刃隨切與椎埋破淵藪能聲自可博已知懶趂庸兒媒左右吴江日暮山川愁疎樹烟頭排敝帚北㠶欲掛傾别觴還有隂風吹散酒醒難為别醉㡬何人世無時好分手知君此去忘故園淮月楚雲惟我有送呉判官雨乾青活淮上山君領善課趨帝闗春風滿路馬足健翩然征轡不可攀吁君登科越一紀中又困躓罹苦艱蒼虬垂髯猛虎臥青衫四十鬢欲斑我疑君胸典籍府千軸萬巻羅其間聖經賢史及怪説叩之不已如循環有時啓口論時病往往憤發涕欲澘位卑道屈志未就姑以大筆誅雄姦就令君居太史局猶足上下馬與班剛然古膽貫白日不為權貴柔正顔退之常患天地恵偏向君子懐獨慳高冠大笏盡知已行矣得意東南還贈徐君强浦陽窮僻山縈迴徐子匹馬窮山來十年不見安否外怪子靣黝身紅埃自言壮圖醉無㡬獨有古膽剛不摧日于篇章遣孤憤袖出巨軸為我開密行細書㡬千字一一紙上皆瓊瑰渾然天成有警句直若未剖元氣胚間工磨琢弄纎巧真宰手把天葩裁詩人古亦少達者非特徐子如寒灰孟郊老獨張籍瞽李杜落魄皆何哉剔抉幽祕奪造化雖甚寒餓天弗哀又疑才命不俱得既奪之命止與才子今所往但逢蹇絆驥兩足猶駑駘浦陽山深尚春淺桃李纔蘂花正梅子時過我值訟簡花下一飲将百杯酒酣慷慨起勸子更厲頭角需風雷縱令不偶竟窮死猶愈空腹冠崔嵬邑舍東池近日荷花盛開輙書短篇奉邀宗哲純甫二同寮前時乗暇到池上荷花未開荷葉小彌旬風雨隔追賞期㑹簿領復煩擾今朝始得臨舊隄花開已繁葉将老古人最謂行樂急癡兒漫欲官事了錢楊與我近同趣一樽今待共君倒聮鑣且來趂花飲莫待紅稀并緑槁七夕七月七日暑氣徂此夕何夕樂且娱世傳牽牛㑹織女雨洗雲路迎霞車初因烏鵲致語錯經嵗一㑹成闊踈牛女怒鵲置諸罪㧞毛髠腦如鉗奴星精㑹合不可詰我疑此說終誕虚又言星能遺人巧羅列𤓰果當庭除綵絲貫針望星拜夜深乞巧勞僮愚吾聞樸散形器作人奪天巧天無餘匠心女手劇淫巧工與造化分錙銖薦紳大夫一巧宦坐取公相如指呼間乗巧言惑主聽能改荼檗成甘腴纎辭麗曲騁文巧剜刻聖道無完塗星如有巧更可乞益恐薄俗難持扶我願星精遺人拙一變風化猶古初題藴忠上人歙硯山僧有硯名龍尾此石來從歙溪水通明直可照髪毛瑩滑不容安手指案上長疑片月生匣中自有浮雲起蒼然顔色涵秋波不學端州誇嫩紫溪匠琢為寒瓦形如從銅雀初飄零只仍故状不復改獨有亂㸃生繁星髙閑上人妙書劄什襲藏來時一發拂開輕霧磨烟煤揮灑霜毫氷紙滑咄嗟此硯何為哉世上别有潤色材胡不往焉與徘徊日濡大筆把詔裁無久滯此空塵埃通判國博中齋詩天下以中為大本天地得中能自生古之聖賢一用中政刑禮樂萬事平於戯後世中道䘮政分寛猛刑重輕禮非儉陋則奢僣樂不専一須鏘鏗其間萬事亦頗僻或過不及誰與繩今公奮然力追救大署中字為齋名謂中之迹不可見粲焉其道存六經尚書洪範有皇極春秋王道為權衡在易之爻貴二五于詩無邪義甚明子思著篇究根柢王通命説垂儀刑夜探羣書味中理雞鳴而作還奉行出處語黙皆時中措諸萬事無側傾有時賔至相與樂詠歌亦作中和聲簷前竹樹有中色四序不改長青青公今一州貳守政千里猶變中庸甿異時朝廷賛天子擴之四海中道成至得攝齊升公齋一聽中論退服膺還府推楊學士無為編蜀山秀色参天起子雲文章摩玉壘闗右衣冠從古名伯起光華擅楊氏後來氣象幾寂寥今日西州聞學士吁雄述作擬聖人蹭蹬三朝官不徙震雖有時無雄文而又晚齡纔得仕豈知學士丁妙年一日青雲趨萬里高才大筆驅古今奄有震雄兼二美布衣平昔抱經綸浩蕩著書窮日晷幽居獨占無為山因以名編仍號子學士既以無為名編復自號無為子鑿開元氣爭化工剔出微情泣山鬼先儒浮妄遭芟鋤直與六經相表裏青衫冗掾錯致身四十摩肩雜胥史日趨官府舊學荒已分清流将絶齒前時輒辱授此編如以咸韶震聾耳夜侵燈燭畫廢餐若涉江河徐見涘乃知無為非不為道化自行而已矣立朝本此足有施堯舜吾君那出是天球豈合藏窮家再拜持編復齋几謝通判國博恵建茶建溪春早地未暖建俗巧計催春陽茶傍萬口噪地烈驚破芽英不得藏猶嫌旂槍已老硬獨愛鳥嘴嫩未長擷而焙之一朝就更範圭璧為圓方南州尚珍北固重自非富貴寜預嘗浦陽賤官性怯酒素許茶味為最良日分牒訴費齒舌口吻鎮燥喉無漿建溪竒品逺莫致日夕夢想馳閩鄉塵埃填心渴欲死忽拜公賜喜可量拆封碾破蒼玉片雲脚浮動甌生光愚知公賜豈徒爾欲俾下吏蠲俗膓滌除詩冗起清思驅逐睡興窮縑緗玉川不暇盡七椀已覺兩腋清風翔予家畜貍花二猫一日貍者獲䑕未食而花者私竊之以去家人不知以為䑕自花獲也因感而作二猫詩貍猫得䑕活未食戯局之地或前後猫欺䑕困縱不逐豈防厥類怠其守花猫狡計伺貍怠帖耳偷銜背之走家人莫究貍所得只見花銜鼠在口予因竊覘見本末卻笑家人反能否主人養猫不知用謬薄貍能服花厚花雖利鼠乃欺主竊貍之功亦花醜人間顛倒常大此利害于猫復何有純甫以予去嵗九日赴東陽今年復趨府作菊花問荅見遺因以戲荅問籬菊何事秋香欠春馥淵明嵗嵗走征途冷落重陽誰采劚籬菊答自古人生有離合不得淵明泛玉觴還有子真擕酒榼附原唱問籬菊誰遣金英秋始縟花枝依舊去年黄人髪不如當日緑籬菊答清香數日還飄䬃縱使人生鬢易華猶見黄花開幾匝泉上人畫牡丹芳樹不合生深堂座上似已聞生香乃知丹青逼造化獨有真假爭毫芒枝外霏微包雨露筆跡淋漓濕縑素遊蜂蛺蝶頻往來今日經營知汝誤蜀川趙昌妙花樹前後無人昌獨歩師今合昌成一人畫手紛紛那敢措上人筆下如有神一掃欲空西洛春姚黄魏紫色憔悴自覺筆假勝天真天工栽花苦榮謝畫工運巧無冬夏天工巧極誰論價輸帛傾金只酬畫将令世俗尊造化呼僮捲障不復掛和楼志國范君武讀胡尉臨安所獲顔魯公書斷碑書名唐世凡幾人魯公運筆獨有神當年一字百金直異代儻獲宜爾珍公嘗道直不容内江湖出走刺史輪東南揮翰落幾郡在處巨蹟刋堅垊石堅字巨未應泐旋復五代遺荒屯州鎮尋兵寺觀火缺碑毁碣埋泥塵乾坤豈亦愛字寳不使久屈卒不伸脗合隂假好事手得此斷石溪山垠苔封土蝕初莫省一洗爛若開三辰不由名氏驗體法氣質渾厚知顔筋㸃端屹如泰山立畫勁森似長㦸陳寜同棗木浪傳刻少陵尤惡肥失真蒼茫疑聞地靈泣為失此石后土貧好事得之不自有能廣墨本遺其倫始從君武惬傳玩大句感發驚儒紳寫公勲徳無一欠何必讀史勞吾唇青衫志國繼高唱首論書法詞逾新末言公忠死賊刃不覺憤淚霑予巾昔人謂書乃心畫浮沉直撓皆相循公心逺可此書鑒體不姿媚一以淳嚴嚴古氣自盤薄宜汝希烈不得臣雖云筆力奪元化濟以忠誼重萬鈞後來忠誼弗公學磨鈆臨帖虚終身李斯篆𨽻豈不好彰彰姦迹流自秦乃知一藝不獨善所貴名節堅松筠魯公之書以名貴歴代共寳無沉堙送裴光世赴舉光世出門頭懶囘身将西去犯斗魁風雲自繋鵬鵠健里道正為驊騮開憶初鄉賦選主司數州側腦聽外臺一朝吾鄉騰薦口姓名喜得丁與裴筆揺試席動千指匠精反愧木盡材六人既㧞里中傑黑白自可消怨猜君名稍稍近人底豈是天意激後來主司南宫頃第一又嘗禮部預揀才裴如晦嘗充省闈㸃檢官頗傷辭律變新進怪僻一鼓波遂頺既而移書六人者歴數文弊有可哀且言文章貴體要試格尤要合凖裁六人既拜主司教青雲㨗路知力推方今最曰塲屋公實藝可進那用媒君胸二紀富珍藴毎向紙上揮瓊瑰掛名省壁定顯赫續取科第仍崔嵬明年躍馬游街塵請君飲乾臨别盃走筆送張伯起男兒剛膓逾古鐡每到傷離猶暫折離緒不啻亂繭絲纔攪衷膓便成結憶昨送子秋風前薄酒三行歌數闋我歌多感酒易醺子車為我澁不發今來與子舉别觴還是去年分臂日人生嵗嵗有離恨爭遣緑鬢不為雪安得共子並翼飛四方上下無時别臨洺驛雨中作朔野無花春意薄斧聲惟見桑枝落北人是日競條桑手執懿筐共操作客亭繫馬吟寒㕔細雨纒愁牢似縳多情北鷰能傍人如説春心繞踈箔故鄉桃李應滿園爛熳香風隨處著十年游宦辭江湖塵土日侵雙鬢惡天涯懐抱傾東南悶對青燈舉幽酌丙午寒食厚卿置酒壓沙寺邀諸君觀梨花獨蘇子由不至以詩來邀席客同作予走筆依韻和之種梨易長地舊淤春風一掃無枯株沙頭古寺枕城角楼殿自與人迹踈看花置酒三月破㸃檢座客惟欠蘇酒酣花底不知處恍若身世游蘂珠銅臺割據古豪盛樂事已去惟邱墟直須及時結勝賞莫局官事同轅駒林僧迎我屢前揖野鳥避客遥相呼咸陽有花逺莫見豈若此地來須臾風前嗅雪不宜緩春芳過眼猶奔車繁枝向月合照映亂片落地無掃除罇邊酩酊不復計馬上倒載聊􅂸扶子由閉户自懶出花與雙眼知何辜天姿必欲貴純白紅杏可婢桃可奴君詩險絶不容和梁園騁思慙相如寒食安厚卿具酒饌邀數君子遊壓沙寺觀梨花獨蘇子由不至詩成命座客同賦予既次韻和之明日上已安復置酒招予與蘇又明日請予屈二君為射飲之㑹而蘇君仍用前韻作詩見及予亦復和花前爛醉如泥淤猶恐花過嗟空株壓沙梨開百頃雪春晚未賞計已踈厚卿置酒趂寒食蜂喧蝶閙人意蘇林間把盞誰我侑鳥歌聲滑如溜珠魏都風流重行樂艷妆麗服明郊墟我初聞招便勇往悢不挿翼附駿駒峨眉夫子趣獨異靜坐幕府煩邀呼車公不到座寂寞大句落紙來須臾樽邊弄筆輙强和布鼓乃敢當雷車主人明朝復命客是日禊事修祓除日涵花氣暖不散酒力易著起要扶清明予亦飲射圃罸觶屡困辭不辜杯盤一飽藉脫粟那有白飯餘君奴事見杜工部集梨花好在期共醉功名身外終何如送川僧玘上人歸雪竇釋子羣羣蹈一轍類能恐誘鼔師說彼上人者劒外來獨許清吟調風月就我乞詩歸甬東三叩賔階通刺謁何時腰下觧缾盂巖竇應逢先臘雪小桃值風零落殆盡偶成鄙句奉呈諸君小桃庭前祗一株無數花開艷新繡破蘂脉脉向人笑閙枝酣酣索春鬭只見蜜蜂來往喧不道雙鷰共時候醉吟繞花日幾遭坐卧欲來花下就東風昨夜忽顛狂曉枝㸃檢不依舊惜無錦帳闊百歩遮藏免被風力驟小兒地上拾亂片猶愛殘香再三嗅桃兮開落奈汝何却取餘杯醉春畫近承楊子遣垂和池上短篇愛而有贈且攄予懐楊子文格少已遒自闗以西鮮此流逸興一發不言休詩吟千篇酒百甌始謂富貴力可求行年四十差厥謀相逢渭水初清秋氣俊秋隼辭長虯歡然一見分輙投往來自爾月屡周忽聞屋角鳴春鳩感時出門寫我憂載酒興慶荒池頭半酣繫馬聊登舟紛紛渉水驚眠鷗晚陽欲落孤煙收開元盛事空林丘流年數百如囘眸陳迹隨感來吟搜偶作短句詒同遊楊子既見遽和酬筆落紙上不暫留詩珍玉案書銀鈎詩人乃是天地讎造化萬物遭剜鎪天公報之甚操矛少使稱遂多窮愁子嘗両舉試此州病坐試席出則瘳筆力健可掣十牛及與命鬭力弗侔翻被命屈豈自由嗟予所學淺以浮不與造化為怨仇胡然天公亦我尤剛腸勁貌寡媚柔觸忤貴勢在轉喉蒼顔常調祗自羞使看平歩趨公侯子來我語徒啾啾天高聽卑誠謬悠不若且黙真良籌有酒一醉春風樓送李去病楊元老君王赫怒超前古威令風馳奮皇武将士咸懐敵愾心桓桓孰可當貔虎岷峨横抹西南坤河池散闗當北門堅城髙寨礙飛鳥天兵百萬方雲屯給軍自古資巴蜀接軫連檣轉芻粟正須将漕得其人賦役平均軍食足三分才具超常倫不獨摛藻追淵雲究宣徳意可預見抉剔姦蠧蘇疲民使星入蜀今重應芒寒色正相輝映川合東西幾萬家佇瞻玉節交相慶行聞盡録平戎功給餉正與提兵同紫泥封詔看西去歸來聮騎朝王宫賣松翁窮山老松幹百尺縱有愛者勢難值小松聳擢未及文何亦冷落守巖石由来世眼習繁侈競事妖紅與爛白徃徃破産聚名卉未見有一號松癖城中有客賣桃李美價髙下隨意得咄嗟彼叟何為者浪負松本窮九陌行求善價吻欲燥力弛還立朱門側過之千百絶一顧寜復肯許一錢直音聲猶帶澗風澁顔色尚染嵐煙黑松材雖良人未見其奈桃李有春色嗟哉子計信踈矣豈宜肩入芳菲域速培舊土養松幹待棟明堂柱帝宅予疑叟非鬻松者無乃矯世為所特衆趨時好逞穠艷何獨孑孑衒皴碧羣雄馳騁尚譎詐軻以仁義游六國時乎釋老肆分籍愈以原道破羣惑叟乎叟乎予爾知獨行矯世難為力與盛毅同賦暮角行城頭滚滚寒烟起城裏無人冷如水一聲暮角聒地來聲中宛轉含餘哀逡廵流入單于調耳邊似近單于臺坐客未終聽對靣淚雙迸郍復将軍絶塞眠朔風吹落玉帳邊狼烟未盡不待曉恨不立起銘燕然何人始製角中曲幽怨到今傳不足吁嗟畫角終無情百年日月銷此聲冬雪行㓜年壮氣寒逾熱更喜朱顔照飛雪門前地厚堆玉塵屐齒千囘狂走折今來過壮能幾秋眼未見雪心先愁病膚隠粟出門懶敝袍盡日紅爐頭此身知更十年後雪屋能如今坐否層衾没頷定晝眠那復吟邊開凍口壯齡衮衮洪濤奔百年浩蕩未易論人間萬事亦顛倒且對今雪空清樽送盛君方秋風木葉飛邊檄日暮銅臺别杯釂燕姫一曲聲未終交臂方擕忽南棹相公鎮魏從辟書玉帳三年奉談笑宻謀直道禆主人飽食庸兒或隂誚君殊不顧但自若烱烱誠心復誰照相公還朝數論薦援手無人在廊廟薦章未報人事改魏國門前客相弔聖賢尚覬後世知萬事那能目前料方今擢才不待次道路紛紛走嚴召朝廷必欲收真才豈有如君使常調讀書適用非苟知脫略空言直趨要有餘利刃未一施可惜青萍反居鞘誰能出力終提擕㑹看驚人露芒耀君如弗偶好言命予亦徐當卜耕釣送知府吴龍圖國初以來治蜀者處置盡自乖崖公當時奏使便宜敕不與天下州府同行之已及八十載姦宄銷伏誰之功因循至此漸抏敝有未曉者時相攻鞭笞小罪亦檢察不許略出常科中下民知之頗不懼州縣往往藏羣兇側身斂足未動者實以累朝恩澤隆公之初來蜀人喜慈愛久著民情通衆心歡然恥犯法捄藥浮薄歸醇醲盡将約束付僚吏興起學校還文翁二年美化極沾洽逺近循服如偃風上将歸公問誰代當使間作如笙鏞遂求元老得青社其人廊廟之宗工往年鎮撫有異績大斾再來遣于東公今與之合符去到必奉詔参䕫龍大資舊徳固無慮剖判自出其心胸所憂厥後嗣之者忠定良法還如空養頑活狡作淵藪不免剪殄煩興戎蒙之憤懣久填臆言賤不得通九重頌公上殿起居罷第一用此聞宸聰京師逢徐良温叟明府弱冠相逢今四十當年壮氣虬龍蟄交情獨在酒琖深人事細論衣袖濕詩書誤身浪自憐公獨滿眼誰可揖蒼顔已變長安風後㑹更應尤戢戢小疾中元恕相别徃長安信筆成篇奉送一春三月少見晴濕雲不飛壓花老君來别我西出闗病裏傷離似翁媪和風吹靣纔㡬程即入風流洛陽道司農水利無留行洛城花開為誰好漢唐陳跡到可尋猶有山川豁懐抱憶昨行春從魏公興慶池邊玉樽倒公今已為泉下游徃事憑君問煙草官家諸路急使才歸對明光切須早題可久上人房素屏雕軒畫室吴僧居花草禽魚屏靣集豈如蕭爽大士堂雪山數尺平頭立滿齋虚白已自生隔坐紛華不容入霜毫一掃都無㾗獨有淋漓粉光濕好丹世上空紜紜趣與師同百無十常時吟客惟我來共愛此屏微靜翕日晴難駐手試捫指下瑠璃無寸澁願乗醉筆留㡬行為寫髙僧白雲什送王賔玉相如昔乗使者車縣令負弩當前驅頗矜意氣誇里閭檄詞爛熳肆欺誣歸來不説民飢臞餘佞更留封禪書江山清絶冠天區豈甘久被斯人汙邇來炳靈軼古初耆俊相繼馳亨衢堂堂御史今名儒志節慷慨忠義俱才高識逺器有餘不似文園淺丈夫一朝持節歸成都使星皎皎臨坤隅輟從憲府恩意殊霜威鶚擊正所須姦胥所在察于荼交劵計斤良可吁鋤㓙芟穢忌踟蹰元惡須行七日誅惡除惠澤益霑濡頓使枯瘠都豐腴坐茵未暖氊氍毹詔歸還直承明廬朝廷急賢恢逺圖碧雞金馬不用渠以人報國功難踰諸生中有何武無謝三門提舉輦運宋叔逹郎中寄古碑雜言長安古名都漢唐以來帝王宅當時髙冠大帶接跡公卿間聲名大半文章伯能書萬變軼出意象外那跼體法就常格傑詞精翰在處勒琬琰從此闗西富碑石咸陽原頭螭蟠龜負不知數風雨皴剥塵土蝕荒郊壊宇大者臥榛莾小者老祠佛廟往往龕屋壁憶初來長安于此心頗溺朝披夕購自忘倦一紙不吝百金易豈惟讀辭玩㸃畫漢唐往事皆歴歴始者累一以至百今既累百至千未免廣搜覓古人載書兼兩懼猜謗今我車載不足更囊積中郎知我有碑癖封寄數本跨數驛中郎中郎雖欲遂愚癖愚也字學不進文格不長翻愧嗜此苦無益雖然古人亦或有所嗜又恐一朝捨此愚意無以適碑乎誓将蓄汝永吾好不已聖猶賢博奕祠部集巻三
