body:
  text: 祠部集巻三十宋強至撰書樞密相公書按璣衡而攷度維斗建寅掲象魏以班常俾民觀治恭惟樞密相公勛髙盟府道濟治朝才兼文武之資身繫安危之重樞廷制勝以坐鎮於四夷宸扆仰成兹奮熙於百度維春祺之所嚮與嵗厯以咸新某職總計臺跡疏材館徒切壽康之祝阻修謁對之儀樞密太尉書恭帷樞密太尉元龜先識隆棟巨材日宣九徳之常坐制五兵之本廟謀密勿已躋天下之安邦禮論思愈祕省中之語遹臨元朔翕受蕃禧某總計使臺馳誠賓廡瞻風滋劇介壽無階省主蔡給事書蒼靈布序華嵗闓端肇一氣之㤗通資百昌之咸遂恭惟省主給事才包王佐道貫民彛名躋日月之髙學破鬼神之奥贍中都之調度坐懋豐功渴四海之儀刑行膺徽冊發春兹始介福攸司某蚤託下風適提外計徒叙誠於竿牘阻馳慶於庸門省副郭郎中書恭惟省副郎中薦紳碩望經世偉才蚤登要路之華時名甚盛進貳甘泉之掌風績其凝五始遹臨百祥攸召莫遑為壽第劇馳誠省副王郎中書恭惟省副郎中惠和秉哲通裕標才貳職大農兼正列星之位陞華近署靡需累日之期順履王正永綏天禄瞻祈并切鋪述奚殫省副兵部書恭惟省副兵部蚤紓賢業親遘聖辰進位五兵兼造財闈之劇疇庸六典即登法從之嚴順履一元載蕃百福莫前脩慶第切馳誠中丞唐諫議書恭惟中丞諫議體凝方重學貫本元危言嘗犯於雷霆直氣欲摩於星斗一誠獻納愈爲朝論之髙萬事脩明遹厎臺綱之正始和戒旦茂祉對時某素被重知適膺煩使兹阻壽觴之奉曷勝頌牘之䖍郡牧龍圖吕侍郎書恭惟郡牧龍圖侍郎玉璜荗閥金鉉慶枝親逄聖神之期自厎功名之㑹文昌貴秩矧兼延閣之華法從邇聮暫屈劇司之委遹臨元朔益介純禧禁總計河濵馳誠門下永言企頌曷盡敷論判都水兼龍圖韓給事書恭惟判監龍圖給事世推人傑道覺民靈歩瑣門之榮班直珍圖之延閣智謀有裕繄臨長於水官績用其成行對休於天子維時開祚與國均休某乆去朝聨方提漕節莫前為壽敢後馳誠賀新推官書右某兹者某官茂對宸緍榮從賔幄顧短才之有望幸婉畫之焉依方列慶音遽貽珍牘俟諧瞻揖併述欣銘代賀監司書伏以華歳履端蒼靈布序審璿璣而攷度揭象魏以頌常恭以某官康濟懋勤融明廸哲入膺宸綍出領使麾方首祚之丁辰逮屬城而䝉福永言慶忭曷任下情答監税李學士書伏念向繇幸㑹獲除光儀鎮鞅計薄之勞絶攀臺閣之軌封壤雖密緘縢幾稀伏帷闗掌多餘神明自復恭以某官道先民覺才為世生由妙年而取甲科不累日而致清貫書林擢職誠允公言利局冗寮固非久次靡容秩滿行被詔還代賀諸官書伏以蒼靈布序華歳履端揭象魏以頌常審璿璣而攷度恭以某官早紓賢業荗著官能屬首祚之膺辰固自天而集慶永言瞻頌曷究敷宣代賀吕度支改兵部糾察在京刑獄書伏審顯膺鴻渥榮改清郎矧辱已知倍増距躍恭以某官搢紳念望當軸慶宗親㑹穆清之辰累更繁劇之任進憂卿之秩方啟於榮途悉君子之心以繩於庶獄佇歸柄任少副輿言伏望上爲闕廷精調寢餗與鄉中親知書右某啟某一塵科籍久偃鄉閭制除調官闕滿之局率繄仁庇備厯亨衢銜恩固深論感非悉旋營職之鮮暇致拜音之後時恭惟順履新陽誕迎景福江闗十里已逺於髙賢塵土三年遂淪於俗吏未諧諮覯第極傾翹上通判元太博知縣葉太慱書昨者乆偃鄉邦屢登墻宇素昧業官之術多所乞靈毎繇清見之間未嘗無誨洎逺從於吏役俄越去於公庥日尸鞭扑之冗囂不覺音縢之曠絶仰惟徳履坐擁休祺恭以某官道具粹醇器函剛實曲臺掌故來惬於輿言片紙垂褒佇歸於柄任俛惟孱懦鎮託甄題伏望上爲邦朝益綏寢餗永言瞻頌曷究指云問候府推張都官書自阻賢規曠馳書舍屬寒威之方厲諒時祉之載蕃伏惟某官名重儒林學優聖域闗决都畿之政聊藉治才延登經緯之華行膺睿選餘祈自厚少副勤瞻代問候發運主客書右某近者伏值駕言屬封道出賤土幸階守紱之職屢叩賓閎之嚴使車還轅倐爾踰月官簿堆案缺然寓音伏惟順履新陽誕迎景福幹濟多裕神明頃還恭以某官文章世家忠諒許國不由累日之乆力取顯官之榮上知素明自結益固然外臺分寄誠鬱於具瞻而中扆須賢行聞於爰立代上特服魏諫議書右某自叨朝寄出領州麾月有詔條之奉行寖焉音問之稀濶仰惟孝履俯順禮經恭以某官元精所生盛徳之後躋諫署之秘列將漕臺之重權中殊洊揚屯夷一貫方隆帝扆之眷遽遘親堂之悲頗鬱輿瞻尚淹冊拜矧萬鍾及養足少抑於哀摧儻細札奪情可兩全於忠孝伏望上為邦社精調寢興代問候發運主客書右某近日伏值出按屬部俯經賤封繇天幸之使然獲風期之覯止去徳米幾嗇神諒佳鎮鞅簿書之煩純疎竿牘之問仰跂標範第勞悃悰伏望上為邦朝精調寢餗代上持服魏節中書右某逖阻朝逰鎮縻郡事曠奉聲問仰諮宴興恭以某官才貫幾深量函夷雅親逄真聖之運早踐列星之垣方不世以懋勲遽終天之遘戚然徳雖欲報靡極於孝思矧忠亦可移庶全於禮制和州余郎中書右某近列慶函繼紓誨牘倍聆徳履舉集休祺恭以某官植操端方秉心純亮紫垣應宿早厯於清郎秀野班春聊熙於雅俗行膺宸選少慰人言伏望上為邦朝精調寢餗通判太愽書右某近䕶布音嗣䝉占教伏審賛行藩政坐擁天祺恭以某官親㑹㤗辰洊揚美仕曲臺進秩矧故事之素明别乗亞麾猶清議之未允佇歸柄任方恊與言海州倅書出承吏乏阻備賓榮當淮洲囂冗之衝有官簿沈迷之慮營職亡狀貢書不時恭以某官文章世家忠諒許國副車貳政尚鬱於賢圖細札須才行膺於帝簡糾察吕兵部書右某近日嘗貢牋縢計塵几席惟按治之多暇固尊生之有經恭以某官當軸令枝薦紳碩徳早被上心之簡總詳庻獄之繁踐徃訓之哀矜莫非慎察體至仁之欽恤多所不及矧隂施之已隆諒寵褒之非晩審刑李屯田書鎮縻郡事逖阻朝㳺矌敘暄凉仰諮寢味恭以某官道先民覺氣秀人靈早頏頡於仕途尚淹延於郎署䖍共職事慎審刑章抵罪之氓頼盡心而䝉恵舞文之吏皆束手而憚威矧治狀之有成加聰聞之甚邇行甄善課驟陟清班代答本州都曹書右某啟自去故棲向從逺宦豈圖謙眷特損音題恭以某官植操端方賦才肅給勾稽一郡適藉於幹能第課三年行膺於寵擢永言感頌曷䆒指云朱判官書右某自把守麾曠馳書舍豈圖髙誼先枉長牋伏以某官名世標才際天藴識泛蓮之幕夙著於能名恭梓之邦洽聞於政迹行甄善最驟陟清途永邇傾祈曷殫崖略本縣孫長官書右某啟言念自分符竹久去鄉枌舊業一㕓幸棲於仁政順郵百舍遽損於誨音細玩載周銘藏無斁矧夙凝於治狀固上格於聰聞行迓寵陞倍祈珍攝永言感頌曷盡文陳代答滁州監税李學士書言念竊居藩守幸邇風猷如隣洪河日所䝉潤不逺數舍缺然寓音豈意謙撝猥貽勒教暫屈才於利局行還職於書林庶順生經以須詔召傾祈惑篆匪諭名言代上濠州吕學士書右某叨紓守紱宻接侯封斗踈順驛之馳日企餘光之及仰惟坐鎮俯順生經恭以某官文章冠時纓冕奕世早躋閠籍之華貫復列書林之貴游鈴閣班條寜容於滿歳鋒車祗召行在於匪朝代上糾察吕兵部書右某向縻州守逖阻朝逰雖順翼之數通顧髙風之敻邈仰傾徳宇鎮投勞襟恭以某官天鍾粹純世濟勲業上方倚注允得民獄之平時所企瞻知為相門之後行旌善最峻陟清途伏望上爲邦家精調寢餗代上發運侍制主客書右某自邈崇麾倐經累月阻奉音郵之問仰諮徳宇之安恭以某官器函淳深術藴經濟以外計浩穣之委暫掌於吏權矧中宸眷倚之隆行當於柄任代上提刑郎中書右某近貢音縢仰詢韻宇惟按洽之多暇固尊生之有經恭以某官親遘㤗辰洊揚美仕提綱庻獄絶吏手之舞文嚴課中宸竚上心之嘉績伏望上爲邦社清調宴興代答丁舍人書郡卑地要術短事繁阻奉音函遽頌教幅受而伏讀藏以為榮仍審燕興舉臻禧福恭以某官學造聖際行為士宗親逄盛期獨映華貫然禁塗載筆曷究澤民之為而台衮輔謀佇觀行事之效代答秘監書嚮領外麾遙瞻上笏豈圖恩奨首占教文伏讀以還兢慙靡措恭以某官懿文表世亮節在庭中外洊揚明哲一致台衡著徳方渴於老成仙室需才寜容於歳滿代上徐舍人書伏審光奉宸緡榮持使柄伏惟慶慰國家以外臺至重列郡攸儀澄序庶官以判白於賢否總領大計以俱億於經常僉謀所同明哲惟允恭以某官業術精奥方格淳脩臺閣清塗聊抑翺翔之勢金穀重寄適繄幹濟之才行被詔音驟還柄任上昌樂縣官書近覯風期過承禮遇旋經違異頗極傾依到郡少間致書差緩餘祈精嗇以迓寵恩感頌之私文陳匪悉代上省判邵金部書伏自拜命宸廷貳權計省官簿紛委使郵絶疎曠叙暄凉仰諮宴起恭以某官方格脩整業履該明觧麾通漕之臺遽甄最狀亞職甘泉之府允屬時才矧心計之素明加聰聞之甚邇行疇幹濟亟陟近嚴代謝知州書近者祗被宸緡奉安親柩暫還素里數覯清塵備䝉主禮之優過篤朋從之好旋違徳宇適抵治封方休道路之勤榮即有詔條之宣布傾賢惟日裁寄後時矧風績之其凝佇恩意之不次尚遙晤對倍冀遵頣答仇員外書早綴下科寢階冗列備聞髙誼之日久願見盛徳而跡疎近布勤惓之辭倍攄傾嚮之意兢畏太甚舛誤有之妄指趨廷之賢謂為同籍之契隂須嚴斥絶覬好音頼長者優容之深出小生意料之外懇諄其誨矜恕以情置書䄂中永以為佩負荆門下勢所未能恭以某官名髙士林學造聖閫平時沉俊領民籍官簿之繁疇昔著篇極國體人事之大行膺褒陟倍保宴興感頌怔忪曷殫崖略代賀范天資移鎮書某以孤生嘗棲大庇亟䝉教育之賜有警懦孱之姿尋違逺於帥墻鎮奔馳於吏牒緒言不及夙習幾還頼天不棄愚賢方昜鎮復幸使麾之屬適當官次之依善政所施可日聞於矩矱短才無狀庶訖託於生成恭以某官鉅業熙邦雄文表世出平亂略入總繁機挺金石之純誠尊股肱之一體輟從秘殿徃領臣邦已躋㫿俗之安靡俟更書之滿朝端英衮行被於登庸天下蒼生一歸於陶冶畢宗臣之能事光信史之直書瞻頌傾依曷殫崖略代謝栁侍謮書特紓公幹垂貺鈞函俯親小國之隣曲損天臣之體拜而伏讀藏以為榮恭惟臨撫善藩綏寜㤗宗伏以某官民靈先覺王佐偉才以文章取甲科以忠誼結明主華要之選翺翔殆周厭預玉堂之游出領銅符之寄諸侯之府矧坐鎮之彌年上相之廷行登庸於匪日代答劉龍圖書近塵愚悃上凂台光豈謂損體貌之逹尊錫丁寜之勤誨惕焉拜藏賜以為榮恭以某官廸操直清秉心忠諒公論加重主知甚明尚淹當軸之才聊寄尹京之任王都億萬之口翕頌政聲相階比兩之躔行膺冊拜代上文相公書託身播物之鈞生成有素延首翹羽之館景仰無涯日為吏簿之榮時闕公函之奉伏惟燮調元縡集受純禧恭以某官道著将明量函夷雅秉尹躬之一徳㑹舜旦之重華雲龍恊期圭衮旌徳丹青教化蔚為百辟之師富夀幅貟靡失一夫之所太平之業夙夜以基代上向少卿書伏審祗函詔音榮觧使領孤危晩景違逺巨庥藐如嬰兒驟奪慈母蕞若疲馬止思故軒遐企㤙暉第零感涕承使旌之就道阻信服之把麾叙戀莫前馳想良極恭以某官搢紳碩徳當軸慶技輸厚利於邦家已殫幹略暢偉謀於圭衮行被寵恩代上文相公書用人惟舊鈞宰焉依亞外諸侯之麾鎮嬰俗狀瞻大丞相之府阻拜台光伏惟宻賛萬機翕膺諸福恭以某官清廟偉器朱絃正聲伊尹以道覺民靈山甫以職禆衮闕結帝扆之隆眷踐公槐之絶班熙然吾氓登躋仁夀之域致我真主拱揖勲華之隆百辟所儀四海共賴代答吕郎中書近者伏值某官駕言于藩道出兹土獲風期之覯止盖天幸之使然展奉良疎緬懐甚靦豈圖髙誼先枉珍函何其賁餙之多無乃謙撝之過兼聆近履舉集龎禠班教善藩行攄於素藴拜嘉褒詔佇陟於清塗代答陳太博書伏審觧麾炎服假道淮邦惕牋候之未能遽郵音之首及俛惟弱植嘗預同升兹天幸之使然將風期之覯止拜塵有自引領増勞恭以某官家世名才朝閨碩彦曲臺進秩矧故事之素明片紙垂褒諒茂思之行集併須瞻拂以訖悃悰代答荆南知府齊學士書伏審茂對思函榮躋仙局伏惟慶慰竊以國家興敞秘館延登偉才特優承學之賢乃建載言之職其應華選允屬名儒恭惟某官學造聖徴識探經奥大筆擅淵雲之妙卓富髙文當年飛終賈之聲早光上第對休辰而逄吉揚顯仕以開榮叅計財闈茂明經畫宣風漕節多所澄清遄升史席之華兼領守麾之寄矧洞庭之樂土惟荆渚之推藩民物素佳江山尤勝優㳺郡閣足詠中和之篇陟降王塗行歸侍從之列某側聞新命竊忭寸襟惕賀牘之未馳遽誨音之首及永言感躍曷究指云代問候海州知州書近被臺栘逺承官乏企仁候之幕下時戀恩暉供冗職於淮壖日馳俗狀門墻且邈牋牒弗時伏惟鎮撫善藩綏寜㤗宇恭以某官郎垣碩徳王國偉才領麾滄海之城豈容滿歳奏課甘泉之府行擢茂功上徐州通判都官書向者某官久偃鄉邦屡親標矩同心相得喜接髙賢之遊交臂分攜鎮供冗吏之役奔走道路淹回歳時馳塵想而彌深奉幽緘而久缺豈謂弗爾遐棄而貽好音惠愛逾周雅素皆在仍審貳藩之暇益臻素履之和海近㤗康已騰於輿頌綈紙迅召行陟於嚴塗回慶成軍髙郎中書右某啟伏審紫詔承恩粉闈正位伏惟慶慰恭惟知軍郎中才猷膚劭術業脩明刺史承流方登於最狀郎官應宿遽服於華章軍壘班條連上頻年之最星垣進秩載光列省之文首貺音函第増感騰與商州閻修撰書右某啟審擇剛辰已班寛詔即商於之便郡脱炎服之脩塗章懷近買臣之鄉失馬誠塞翁之福而况屯夷殊致明哲惟均想宣化之多餘固養恬而増粹行膺迅召還陟嚴塗代回史秘校書文試有司業精諸彦光外臺之舉首大華閥之慶餘垂貺長牋益欽髙矩即収名於上第當得意於青春餘冀自持以須大到回慶州鈐轄梁文思書參領戎韜徃臨邉劇喜獲賢䂓之接顧慙主禮之疎旋審涓辰已諧視事首紆榮翰増戢鄙懐方外圉之倚才佇中朝之紀績餘祈厚愛以對華褒亳州宋内翰書恭以某官學際天淵名重纓禬早陪乙夜之覽允極千秋之榮謂翺歩王塗未殫行事之效而班條侯屏少見澤民之爲順履慶辰具膺景福宅上台而秉軸諒在匪朝祝南山而奉觴莫違為夀永言瞻頌曷究名言揚州錢侍讀書恭以某官元精所生盛徳之後紹該洽之先業陟亷良之茂科華要洊揚聲光愈綽宻侍鈞衡之覽遽厭晨趨樂從露冕之遊已凝風績靡容秩滿行被詔還屬亞歳之膺辰固自天之集慶某按封兹限為夀莫前瞻禱祈深名言非諭江寜府皇甫諫議書恭以某官莊重自居直清不倚間闗數紀出入兩朝寝隆法座之知峻陟諫垣之秘典刑在事方倚老成之資藩翰于宣遽布中和之治順迎令序誕擁龎禠瞻頌所陳名非非究杭州吕舍人書恭以某官道具粹醇體凝方重早躋仙籍之甲選久陟禁林之貴游英衮之暢偉謀尚淹大任晝錦之過故里聊請使麾某適按部封正遙墻宇祝南山而為壽莫遂前趨託無幅以貢音曷涯下悃運使工部書恭以某官王國美才郎垣碩徳荷曠旒之隆眷方倚兼能領金榖之要司尚淹致逺行疇最狀驟陟嚴塗順履令辰誕膺景福某按封兹限為夀莫前瞻禱所叢名言非諭發運大諫書恭以某官夙鍾間氣親遘熙辰翺翔要路之華聲動薦紳之望以至兼諫署之嚴宻總漕臺之劇繁給食中都暫繄於心計秉鈞上笏行被於詔音屬亞嵗之膺辰固自大之集慶某久違賔次徃按刑章為夀莫前瞻風兹劇回梁文思書一别河濵歎離羣之乆矣相逢闗右幸道舊以懽然旋復暌逹方深企嚮遽貽書好益固襟期伏惟某官才武絶人忠勤許國適領兵鈐之要行收邉閫之功倍順節宣少符瞻禱上察院書恭以某官文為國華道先民覺雍和朝弁之貴暉映士林之光佐邦漕之劇司適資心計兼臺綱之要秩允稱恩章行旌幹濟之能驟置凝嚴之列順迎令序誕擁純禧為夀莫邉瞻風徒切代回江東轉運張學士書自阻風期倐彌年所沉迷官簿常若少間臨按屬封曽無虚月因懬牋函之奉仰諮燕餗之安豈謂眷存首貽音諭伏審坐籌大計翕萃繁禧恭以某官行潔道醇才宏業鉅外臺劇使頻成第課之優東觀昔游已復載言之選盖上心之圖舊行思數之疇庸領漕節之輸將諒非乆次踐王塗之嚴宻進服徽章代答曹州孫祠部書官部按疆日傾盛徳客車假道時剽美聲思清晤以未遑遽珍題之首及仰銜嘉貺第繫鄙哀恭以某官方格淳脩才猷膚敏紫垣列宿蚤踐於清郎緑野班春聊蘇於雅俗行圖風績增晉褒章代賀亳州皇甫諫議書伏審光膺細札移甸巨邦審即便辰已開尊府伏惟慶慰恭以某官行推髙爽道具粹醇親逢宸扆之知蚤陟諫垣之秘洊凝風績頻昜守麾唯亳社之名區實淮壖之重鎮暫繫耆徳以布寛條熊軾班春豈容於秩滿鳯書申命行被於詔還代問候文相公移鎮書伏審卓馬還朝朱轓赴鎮已離邦於日下將假道於淮邉鐃皷沸川特雄方面之勢冠盖溢路願識相君之威矧叨簪紱之聨嘗託鈞衛之造日傾台斾増企愚襟伏惟順履蕭辰誕廸茨福恭惟某官民靈先覺王佐偉才感㑹帝宸綢繆公路畫一之歌既作休有成規太平之䇿略行遽臻至治暢衮謀於已試収廟略而弗居出甸陪京摩遑滿歳旋膺徽册易鎮要藩行將宣布寛條撫柔雅俗坐席未暖亟五月之政成詔書誕頌復三篇之冊拜俛惟疏冗訖望埏陶代回舒州栁龍圖書比塵使局獲邇侯封徒然燕語之傾缺爾牋脩之奉豈圖髙誼首占珍題情在逺而逾親禮由謙而益厚兼審坐班寛詔舉萃繁禧恭以某官才貫幾深器函剛實對休辰而逢吉揚顯仕以垂光冠卿列於禮司登禁聯於延閣主符假守聊鎮於善藩鈞軸須賢行膺於迅召代上并州梁相公書伏念自領小麾久從遐徼門墻萬里敢忘坱圠之仁寒燠一音不徹崇髙之聴台光在望愚悃増勞寒籥丁辰善藩觀政神明所相福祚其蕃恭以某官社稷元臣山河間氣樞廷宥宻早暢於廟謨宰席凝嚴深禆於國體前班漢詔出殿并門屈大丞相之威尊總外諸候之節制免童迎迓兢喜細侯之來姦黨㪚逃率歸廣漢之治行圖偉績還宅上台代上許州賈侍中書爰初還臺以迄補郡台光在望曽無數舍之遙俗狀増勞都缺單函之獻第負芒而引媿難擢髪以論愆竊繄賢宰之量洪未識下僚之禮廢伏惟坐班藩政參嚮天和恭以某官業履崇髙智謀廣大抱誠明之正性秉忠諒之一心蚤簡帝衷首謀王體師尹當國有具瞻之民阿衡代天無不被之徳以至疇咨舊徳登冠鴻樞珍䇿立成逺夷坐至帷幄以肅京師其尊位長百工允極宗臣之貴柄更二府弗收造物之功懇列壤封請臨寰服對宸緍之均逸露公冕以觀風居外弗異於中歛大以施於小行膺徽冊復圖文武之才還秉元鈞寝造邦家之福代都運張待制與宣撫郭樞宻逺迎書伏審出佈恩徳近違威顔前纛甫臨列城増企冐霜稜之初凜萃時祉以載蕃恭惟某官偉略沉雄傑才髙邁胄襲汾陽之慶神傳圯上之符方倚壯猷以籌多算㑹小戒之玩境煩近弼以臨邉制勝幄中未煖鴻樞之席宣威閫外遽揚都統之旂行懋丕功坐寛西顧某漕文所繫郊候無期欣跂并深名云非悉代王龍圖問候省主韓侍郎書自去朝游遂叨州守當兵民之綏御亦既踰年凡使客之徃來曽無虚日居有寛條之所布閒為多病之相乗雖勤向徳誼之心不忘朝夕而仰諮福履之禮曠叙寒暄方渉冬嚴諒蕃時祉伏惟某官才包王佐道貫民彛名躋日月之髙學破鬼神之奥瞻中都之調度坐懋豐功掲海宇之儀型行膺徽冊與郭樞宻逺迎書比貢音函當徹髙明之視適丁寒籥仰惟跋履之勤兼審嚴騶甫臨近境行瞻台範増企鄙懐伏惟某官鉅業茂明傑才宏逺本兵之地輟帷幄之前籌奉詔以行寛朝廷之西顧餘留迎謁併叙欣翹代張待制與宣撫郭樞宻逺迎書伏審前旌甫臨近境即躬郊候増聴車音仰遐胄於霜稜固載蕃於時祉伏惟某官偉謨經世丕績熈朝制勝中樞聊輟神機之助宣威西徼行聞廟算之平進謁有階翹瞻尤劇答鳯翔黄元禮察推書向縁厚幸得奉賢規曽乏少閒遂疎主禮暌違未幾瞻嚮殊深遽損音題過存愛意屬霜稜之倍厲固時祉之載蕃伏惟察推延平方格淳修才猷膚敏寜久煩於婉畫行前對於華恩順序自持副愚所禱賀滄守沈修撰書伏審就鎮劇藩兼榮秘殿肇開尊府肅布寛條伏惟慶慰恭以某官厚望端朝傑才髙世包經謀於術内富羣籍於胸中贍給京師方轉漕臺之粟慰安黎庻旋分帥閫之符重通儒之操修當太史之論譔行祗嚴詔寖服皇僚賀王周二侍講書伏審内閣陞華禁筵勸講側聞成命竊忭丹悰伏惟某官名世挺才際天藴識不由汲引自逄真主之知旋取顯榮漸見通儒之效比進陛於書殿凾入侍於經帷上方嚮文適資稽古之力行矣登用遂適當今之宜列慶稍稽負慙良劇與慶州機宜㑹節推書自濶髙風倐經累月比辱音函之貺殊欽禮意之勤旋若舊疴稽修報牘方講邊防之節制諒煩幕府之文書益保粹襟行膺茂渥回提刑少卿書比者建旄舊雍總節全㤗運帷幄之前籌曷明逺格寛朝廷之西顧第竭寸心方休道路之勤即有詔條之奉未遑叙悃先辱占書感愧并深名言非悉回慶州王給事渭州蔡待制書誤䝉上㫖出總西師初見吏民甫班條教久荷謀謨之貴寖驚精力之疲尚繁邉閫之帥才協圖大事庶副朝廷之聖寄共厎成功曽書禮之未修遽慶音之首及并深感愧奚盡名云回河中府吕修撰書右某啟比辭冡任旋付劇懽剖分陜之守符總全秦之帥節下車視事方祗布於詔條記室占書遽逺形於禮意永言感篆奚盡名云賀判府宣徽太尉書恭惟判府宣徽太尉大忠奕世偉業熈朝參制五兵輟樞廷之勝算并䕶諸將領邉閫之劇權進揚徽猷増峻台序疆埸無事行厎於丕功旂常有銘愈光於前烈某心馳門下踈繫幕中第修慶牘之䖍兹阻夀杯之獻回賀耀州冀郎中書伏審比諏榖旦肇布寛條伏惟慶慰本朝愛民數郡擇守維華原之重地實陜服之劇州氓編既繁訟牒亦衆其當師帥之選宜屬公明之材恭以知郡郎中識際幾深器函端實自厎時名之重洊揚風績之優剖符此方寜需於滿嵗趨召不次祇在於匪朝㑹慶禮之未修遽誨音之首及永言感抃曷盡文陳賀渭州蔡待制書恭惟知府經略待制偉才經世厚望端朝出觀邉閫之風進列禁塗之籍遹宣逺略益懋莊猷坐布藩條兼兵民之綏御行參國論陪承弼之謀謨茂對令辰載蕃景福某心馳門下跡繫幕中徒度慶牘之修兹阻壽杯之獻祠部集巻三十
