body:
  text: 祠部集卷十宋强至撰七言律詩依韻奉和司徒侍中視河愜山聞昔兹山運土成喜情此屋與連營可憐事出三王後不得親逢伯禹名鄰國一朝罹暴水相君先慮護嚴城他時人說公來日應記初更月旦評依韻奉和司徒侍中冬節筵間喜雪初長日景午隂前瑞雪迎開上相筵㸃綴酒杯飛細細侵凌歌扇落綿綿嵗功豫作三登地雲氣都成一色天驚破醉魂詩句險不容吏部甕根眠和司徒侍中喜雪熙寧玉燭最調和瑞雪先時破札瘥大紀有年仍嵗後尺盈平地此冬多戲圭旋翦飄疏葉祭璧初沈委大河再燮隂陽人望久一方順氣入塗歌依韻奉和司徒侍中元宵席上席上香風轉綺羅北門東道漢蕭何燈搖萬井年光嫩月覆千閭夜色多樓閣影重占物阜管弦聲洽驗民和相公不惜陽春曲傳與都人每嵗歌寄齊州曽子固學士歷山名重舜耕餘太守文章世罕如但見清風變齊魯未聞紫詔起嚴徐最宜視草歸時訓可惜揮毫落簿書千騎行春且乘興里無勝母莫回車依韻奉和司徒侍中壬子上已㑹許公亭賡吟令節最多年禊飲春亭五侍筵初戊申上已長安燕亭後軒侍飲和詩明年隨府來魏是日奉和鈞唱有當年簪履誰猶在今日門牆獨未之句愛客公心寬似水催人物態急如絃園林爛熳驚三月樽爼徘徊戀二天跡近風花飄未定且隨珠履醉金船和司徒侍中壬子寒食㑹壓沙寺詩四照梨花一色中他時珍賞有雌雄魏人能辨梨實雌雄髙牙就景能芳宴皓齒停歌誦正風樂極光隂窮日御詩成造化奪春工佳辰不禁祗園火林杏兼然萬㸃紅金星隱地爍逰車那用行隄更築沙官妓趁時簪玉蘂藝工隨分賜銀花每乘此節尋蕭寺全勝當年醉習家歸漾綵舟歡意在還延賔從盡流霞㑹壓沙寺觀梨花小隊逶迤駐寶坊祇園花發認崑岡日髙恐釋三春雪風細猶傳數里香垢染了無依佛界品流逾重被台光更䝉佳句形珍賞漫說寒梅競效妝和同賞梨花紺園幾頃白雲英似覺漫天玉氣騰句引春風香陳陳侵凌夜月粉層層時間冷艷尤難識世上妖葩各有朋每嵗旋來張翠帳芳庭同賞憶吳僧奉陪韓魏公燕王氏園亭席上賦詩留題脫去塵官一屣輕十年世網羡冥冥幽花笑晚新詩就好鳥啼春宿酒醒辭客醉題紅粉壁黃丞題羣客名氏放屋壁相君髙宴緑隂亭是日飲雙柏亭鄴人應怪三台畔今夜光聯處士星滏陽賔客擺塵羈一笑名園萬事遺細草幽花多自種閒雲靜月最相宜鄉人乘暇就攜酒野客尋春來賦詩白髮朱衫猶民府南歸已覺十年遲依韻奉和司徒中壬子三月十八日遊御河當時御水始通津遂作河生記此辰載籍不聞傳故老盛游相繼到今人金貂為政居從俗畫鷁連年出慰民錦繡匝隄簫鼓沸風光流動一城春綵舟徐動信春風丞相行春樂意融花底馬蹄追暮鳥栁梢旗尾掛晴虹驅馳造化三篇裏擺落尊榮一笑中何况佳辰偏宴客酒樽東閣不曽空送王仲賢郎中游天平山近來好事數中郎笑指秋山學楚狂散人宋喬實從此行絶頂去天應咫尺回頭平楚祗毫芒步侵猿鳥雙藜杖吟蓄雲煙一錦囊日並塵遊疏逸駕自憐丘壑意空長依韻奉和司徒侍中安正堂觀牡丹獨王花天晚自開羣芳臣妾漫爭媒金刀幾度裁雲葉玉席多情向斗魁晉忠魁第一星西三星日三公檀口似迎遲日笑香心肯逐疾風頽嵇康絶交書云榮進之心日頽相君造化春工手寫入新詩意更瑰瑰意琦行壬子六月庚申夜陪魏公詣龍壇上公小隊俯郊關讀祝焚香拜夜壇旱魃此時尤肆虐應龍何處輒圖安呪辭如律噴孤劎刲血須明驗一盤盛夏連年陪席位自慚不是牧民官晚晴雲暗青天一鼓雷旱蝗那得輒為災易盈畎澮流先溢不盡關河色漸開豐兆已從膏澤見喜情還逐夕陽來平明官屬趨丞相樂合公堂送賀杯依韻奉和司徒侍中壬子中秋對月莫畏流光催白頭且欣圓魄半清秋當時初作今宵㑹每嵗還同故事修飛蓋漫游虧燕喜胡牀獨坐減風流何如錦席笙歌擁醉看銀盤射玉樓病中漫呈師朴學士初春抱病涉新秋叩遍醫門廢厯酬小子幸災因語怪乃有唱言子居於室中而知外事常有人從頂上出入者老夫委命獨忘憂情知仕路多猜險賴有君家共戚休自豫臥病魏公賜書恤問再三藥裏關心詩興在未應風月廢吟搜依韻奉和司徒侍中八月十九日賞菊秋風生意衆憐遲一旦先開豈足悲無髻競分濃蘂插有襟聊對細香披閏催雖隔重陽月節去猶勝十日時不比無名閒草木早䝉造化祇堪嗤依韻奉和司徒侍中壬子九日虗堂飛閣席頻移早宴安正堂晚集跨山樓肯對茱萸憶賜枝杜子美有茱萸賜朝士難得一妓來句詩集元精尤唱絶歌翻新曲更相冝太常沈丞以新詞侑飲席登臨晚日曽誰怨醉倒秋風不自知一種孤根輸老菊明年猶得傍東籬酬鄭叔巖虞曹惠詩因以奉送五年西北事軍書心共青雲頗負初老大濫隨丞相後嵗寒未覺故人疏論情詩句空稠疊轉眼花枝欲破除相見不能同酒盞春風添恨入離裾仲春感懷春色愁邊已不濃眼開天地久隂中亂紅雜下殘花雨暗緑兼飛弱栁風生計荒蕪有酒盞交期零落減詩筒多情惟有堂前燕來往貧家與舊同上高明府孫世則寄書及詩依韻和酬客顔憔悴過三閭猶喜良朋記拙疏忽隔重江論舊契更言終日困新書來書有新法推行應答不暇之說宦情共減中年後樂事難同二月初正月晦日獲詩與書奉答之日乃二月旦好在江山一樽酒他時懷抱為君舒某數年前䝉集仙盛公慰薦今方用是改官近以啓事論謝伏辱長箋垂答因成短篇少抒感臆淮邊曽以此身歸每見嘗寬使者威一昨薦章䝉首上十年墜翼恰重飛功名未果時看劎報效猶乖夜攬衣聊向短箋論感慨更煩尊教寵寒微次韻陽朔丘尉述懷登科君已十年餘斗粟猶肩縣尹卑閔已漫形韓子賦添丁賴有玉川兒海邊毒瘴濃如霧嶺外征塗亂若絲三嵗歸來無薦者金門猶喜從臣知次韻丘柲校程苦熱羲和驅日晝如燔萬里焦原草木乾旱雨驟晴還作熱炎風寡勢豈成寒渴思沆瀣朝餐美坐想凌兢迹到難汗浹肌膚空秉箑浪將霜雪擬輕紈依韻和道濟私丞集英殿秋宴作都場百戲已先呈舞字逡巡列太平酒緩天顔應有喜樂高禁漏不聞聲晴暉忽傍金莖動協氣偏從玉座橫何事君臣皆共樂銀臺連日奏秋成何大宰生日却數中秋已過旬老君親送玉麒麟力侔二氣文詞重回繼諸公德業醇論道他年要黃髮看公當世斡洪鈞泰山如礪河如帶到此猶為劍履臣河嶽靈神擁瑞來劎川一夜起雲雷祥風破臘吹灰琯和氣先春報砌槐龍邸久膺心膂託金甌終為姓名開年年已與梅花約長借清香入夀杯哭曾四丈供備前浙東都巡檢平生獨慕霍嫖姚弱冠功名喜自邀報國劎鋩沉氣象絶人尺藝委風飈總戎江海空流轉分間關河竟寂寥幾百熊羆懷舊愛哭聲應過甬東橋贈黃任道辭源浩蕩輸滄海筆勢飄颻薄紫霞公府薦才猶未試士林淪滯不須嗟相逢轉更開懷抱一跌何嘗掛齒牙文帝欲興三代治可容賈誼在長沙依韻奉和省判程郎中省宿北望宫牆樹萬年九霄雲退湛秋泉坐間星斗懸吟次夢裡江湖在目前月緩粉闈添皓色更長紅燭滅青煙中郎心計元無敵更向風騷擅將權雪霽出郊京塵滚滚日眯眼心豁郊原初雪晴幽禽忽傍粉樹語瘦馬時踏瓊田行高吟浩蕩真吾事薄宦飄颻愧此生却羡老農相顧喜土膏乘潤說春耕元夕觀駕御端門詩仙韶樓底㺯春和簾額隨風捲繡波午夜九霄開寶扇一聲萬夀徹明河燈纒月影祥光動酒入天顔喜氣多侍從有班無籍去花邊空聽太平歌次韻都曹燈夕之作夜色澄明宇宙寬新正才半覺春慳行歌遡月疑塵外醉眼隨車憶夢問燭影更和人散亂漏聲不放馬舒閒啼鳥看報嚴城曉滿引金船倒玉山仲春攝太僕卿祭馬祖宿齊城外作一年四出國門西今喜春郊散馬蹄晴日自隨河靣動宿雲仍傍栁梢低齊宫得句還揮筆鄉國尋芳憶杖藜承杞九卿猶假攝不應巧宦至通閨篋中得調官時楊氏所寄書慨然追感笑語無蹤莫更尋每懷平昔恨猶深况看滿幅相思字曽訴幽閨獨自心因想音容如在目不知涕淚已盈襟恨銷除是綵箋滅弗比遺香苦易沉庭前梨桃二花方盛為暴風所吹感事成篇梨白桃紅才可嘉風前亂雪趁殘霞提壺有口只喚酒鳴鴂何心専妬花九陌樂遊非往昔五陵豪氣漫塵沙清樽倒盡却興感席上餘春天畔家一春未嘗行樂而羣花今已離披感而成篇只知倦馬趁風沙不覺啼鶯破物華始擬尊前謀小酌早堪枝上數殘花壯圖慘淡流年駛樂事參差暮景鈄薄醉浩歌搔短髮江湖歸興滿天涯送史正孚再提試筆入南宫落紙文章近更工一第聲名光晝日十年意緒散春風眼驚梁苑花枝靜心豁秦川酒盞空材大莫嫌關賦冗青雲知巳有諸公陪羣牧使進呈揀中御馬薰風微轉殿南稜玉色天顔粹自凝數馬從容陪晝接飛龍迤邐備時乘久圖駿足求初得一顧竒毛價遂增竊笑漫踰梅福願半生玉陛輒三登二月十二日城西送韓玉汝龍圖馬上作信馬春風踏軟沙晴郊芳意接京華緑垂波靣官橋栁紅出牆頭御苑花過玉津園莫問年光侵老境且拚日醉送生涯歸鞭猶恐嚴城隔那得行人不念家後二日趙無愧杜君章垂和前篇復用元韻自和呈二君給園勝地隱金沙隨音心開筵餞使華社日兼宜數杯酒春風未動一枝花垂垂禁鼓喧城裏一一歸鞍傍水涯魚目間投引驪頷夜光雙吐照貧家一去傳語行人莫回首緑槐隂合定還家三月五日病中對雨作何術可留枝上錦誰人能換鬢邊絲不堪有恨餘春日更值無聊足病時久判浮名唯念酒肯因閒事輒忘詩雨頻未拂金明栁空聽蓬萊唱舊辭漫呈盛任道監簿甲第衡門憶並開笑談無日不追陪繞欄共覓花時句隔壁嘗呼雪夜杯一别青雲俱蹭蹬相逢白首重徘徊炎天臥病還同巷早晚欣聞步屧來苦熱天上扶桑樹合枯火雲四起抱陽烏誰能赤腳渡銀漢直欲跳身藏玉壺河朔飲杯空酩酊臨淄汙雨自沾濡井深水逺渴心劇百丈無繩轉轆轤客有貌吾陋容者以詩謝之野姿瘦骨逼吾真處士毫端合有神正色未嘗移勢位苦吟自覺逺風塵漸驚老態侵雙鬢猶逐時名繫一身可是封侯須燕頷恨無勳業上麒麟用洪景之韻送郭子山别筵那得易為情别酒連連祇自傾車馬縱遊憐客興江湖幽適負吾生盤中異味歸南食篋裏新詩記北行文史藏身榮路在未應高迹混柴荆賀吳樞府詩吳公尹京踰月遽拜樞府之命治聲一月滿長安直上星樞聳具觀空䇿危言驚主易能施行事似公難詔辭浩蕩留邦國廟略縱橫出肺肝拜慶親闈雙白首更傳盛事入衣冠九日作九日登臨雙闕邊三秋感慨一尊前黃花若解憐多病白髮應嗟老去年憶昨忽叨門下召此辰方醉侍中筵追歡筋力於今異贏得新愁入短篇臘月二十三日羣牧使元內翰曽龍圖同日拜樞參之命是日立春洗馬池邊喜氣俱二公同日上雲衢北門學士參台鼎內閣才臣二斗樞曉殿春風迎拜舞晚街霽日照傳呼回頭應笑蹉跎客飬拙長甘伴圉失甲寅仲冬祠馬步宿齊宫乙卯仲春十七日復因馬祭到此漫成短篇昔年庭木雪僵條今此風和栁自榣人事轉如風不定年光暗與雪俱消城中佳氣生宫闕塵外清居隔市朝顧我何能知馬政江村祗合老漁樵甲寅二月罷戶部勾院移羣牧判官待次數月乙卯春復自請罷羣牧誰客豺虎漏讒人又遣花封退食貧漸老可無詩過日連年唯有悶償春奔波塵土非吾事流浪江湖合此身且信濁醪存妙理一杯萬慮付洪鈎席上走筆贈别李子先醉魄吟魂李謫仙風流未絶驗家傳詞源直欲傾三峽飲量真疑漏百川幾寸燭花催餞席數程栁絮撲歸鞭别愁衮衮無由說吏部先尋甕底眠送彭景行寺丞侍飬得請歸荆南别業上年慈母懷鄉淚愁殺啼鵑耳畔飛歸計任荒揚子宅劎外先廬在焉喜情自入老萊衣秣陵五馬開樽待父執梅公令守金陵荆渚雙魚薦饌肥能為聖朝全孝理賢聲行色兩光輝孫公素中光將往相臺謁韓魏公詒詩為别因以酬送公時新改京兆節花紫宸班退聽宣麻鎮鄴司徒換將牙到日玳筵公定喜當年珠履客尤嘉公頃鎮北門公素實從辟賦驚閣座爭觀禰樂重當時合姓車入夏後園聞更好繞池十丈看荷花依韻和酬孫公素中允寫懷見貽車馬門前住罕逢春坊內允獨相從領垂素髮驚潘嶽公素以豫駭其早白來詩有霜毛初出之句器負青雲愛仲容身世百年今有愧功名萬事近尢慵不緣婚嫁須微祿已拂紅塵就赤松九日陪雨制諸公燕趙氏園亭筋力追歡勝去年不應吹帽愧華顛壯心未折秋風裏笑口頻聞晚照邊學士帶欺黃菊爛侍臣綬奪紫萸鮮自憐蹭蹬諸公後一醉猶能賦此筵送李山甫赴熙州懶憶盰江釣緑波春風躍馬望洮河平生富貴來雖緩一日功名得便多城上隴雲飄漢角樓頭關月慘羌歌剩禆儒帥開邊䇿大有燕然石可磨豫在病告君玉見過翌日成短篇奉招官居冷落人稀到病枕欹移日幾回薄宦淹留無處說平生懷抱為君開盤中飣餖延粗飯甕靣澄凝泛好醅更有無窮欲言事可能重跨蹇驢來順師歸湖寺後以詩見招因戲答之山月溪雲思有餘嶺猿沙鳥靜相於閒中物象都收斂别後詩才愈發舒擬就鄰翁沽竹葉直邀野令走籃輿提壺漫叫無憑凖一醉春風莫誤豫順師有可能沽酒引柴桑之句紫微舍人宋公愛子姪三人同日得第作詩以紀盛美君王親䇿集英年始信常山子姪賢白晝相將金榜上紫微三謝玉階前衣冠近事尤為盛閥閲清芬愈可傳馬躍春風歸里巷蘆花爭看一行鞭君王賜第御靈和兄第同時捷雋科名占風雷三級遍恩霑雨露一門多衣冠盛事喧金榜里巷榮歸綴玉珂他日鳯池須接翼侍中隂德有餘波山中雨後雨足前村雲未回逡巡屏靣數峯開相呼野鳥逢人住自戲山蜂趁馬來野色通明林葉净溪聲奔迸岸沙頽田翁見我應偷笑底事行吟廢酒杯寄題雙巖寺古寺南偏兩翠微錦溪碣石豈全非雲煙來去長相接猿鳥東西各有歸泉溜夜淙寒入座嵐光朝滴潤生衣而今野曠無人築唯見林僧對掩扉莆陽徐大守數賜臨顧軍壘初分太守麾馬頭南去有光輝吏人郊外迎飛蓋父老溪邊指繡衣到日嶺梅含細藥昔時鄉樹長新圍世間得意多遺舊誰肯柴荆數款扉林大年殿省金輪院讀書有寄仕到監州興漸多人生四十未蹉跎自嫌朱紱生門調直要青雲取世科新喜鴈名傳日十暫題試筆寄巖阿山翁只作書生看不識前呼導玉珂依韻和吳七丈詠雪平明無數六花飄氣象崔嵬變一朝落勢孤城圍不盡寒威窮巷著偏饒臨衣未拂還成舞近燭才看早覺消散稱少陵吟白髮更逢太白跨鯨腰江邊玉樹渾無地世上銀河自有橋宿凍即交山口路冷波應減海門潮當年右席辭空在今日扁舟興轉遙寬褐紅爐溫坐外人間萬事任寥寥園竹為大雪所折露葉煙稍拂草亭雪中顛倒翠虬形且留完處裁吹律莫聼傍人議殺青却恐看來愁野客若為扶起屬園丁寂寥數畝清風地宿酒從今不易醒挽故司徒侍中贈尚書令韓魏公建儲嘉祐發先機蓋世功名古亦稀一冠鴛行舟地立兩扶龍德九天飛偃藩汲黯時云臥去國周公遂不歸星坼中台薨訃入君王淚濕輟朝衣平生忠節見臨危四紀三朝報主知伊尹告歸曽未果子房强臥竟難支朝廷首配嚴親饗鹵簿新排送葬儀澤在生民功社稷堯文更揭墓前碑西北油幢疊總戎六年幕府從裴公談兵玉帳知何在宴客金錢定已空麟閣英姿隨爽氣鳯池陳迹想清風白頭無路酬恩地一寄哀情薤挽中馬公節挽辭慘淡南宫鎩羽翰空歸座席甫能安魂收長夜棺尋閉淚灑殘春䄂未乾君下第還家不數日遂卒老母始甘無祿釜世人今轉薄儒冠土中猶動難平恨月照孤魂桂影丹王廣淵郎中挽詩暮歸紫陌尚鳴珂夜哭逡巡接浩歌暮歸高歌巳而大哭漸老為郎逾藴藉平生從仕亦蹉跎笙沉緱嶺空乘鶴書絶山隂欲換鵝日落九原車馬散悲風更向白楊多祠部集卷十
