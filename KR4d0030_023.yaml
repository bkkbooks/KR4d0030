body:
  text: 祠部集卷二十三宋强至撰啓代趙閲道待制謝中書樞密三相公啓總計司之劇部大懼曠官兼法從之後陳兩慙竊寵伏以明君之使人以器當適小大之宜元宰之造物若鈞亦存窳良之别矧此洪河之道是為諸路之先制牙環守者三十六城實煩吏職張口待哺者數萬餘卒尤費軍須與權之使必也賢器如某者性愚而不可及才短而無所堪親逢聖宸朂起孤宦參諫垣之未能祗知重國體而敢言領財省之要司不能贍邦儲于既足方負甘泉之責遽塵通漕之榮靖言載惟厥有攸自此蓋伏遇某官丹青元化坯冶庶工取才不求其周所以亦收片善進人欲勸其後所以特用匪功敢不講求利源澄序官品罔有二事庶成薄勞上酬覆幬之仁次答埏鎔之賜代上參政樞密啓輪將使權之要論撰儒職之榮誤寵獲兼短才增愧云初視事竊懼隳官竊惟金穀之司實佐邦家之費每當朝中之所選尤以河北而為先蓋邊宿重兵境控强敵州縣至衆而官屬亦倍隄防雖固而河流靡常軍須吏稍之所資嵗斂月支而僅給付之外計必也兼能如某者山東鯫生天下孤宦早據法令而自效晚喜事功之可為嘗馳使者之車按章遐服旋總理官之局主讞丹書比叨邦選之謬思參董京司之劇務有禁扄之老以臨長得以備員無甘泉之課以黜幽偶云逃責敢圗餽挽之寄乃屬空疏之徒載惟忝塵良有階自此蓋伏遇某官協開國論參亮天工匠物謂無可捐器人容有不備遂令甄擢施及寒微敢不夙夜以思始終乃職庶收薄效以答厚知代上謝宋侍讀啓某支郡下僚西州末吏傾服大名之日久願見盛德而跡疏一被臺移往推民訟寓樂邦而彌月方束詔條拜黃堂之下風蔑諧願望豈謂高明之造不遺冗外之姿以至命記室以占音飭公牙而說諭噢咻備至銘刻逾常遽逺治封尋還賤守營局無狀貢書不時伏惟觀政多餘育神增裕恭以某官民靈先覺王佐偉才由妙年而登科甲不纍日而都顯位華要之選翱翔殆周藩屏一方聊寄中和之詠丹青萬化行攄燮理之才代問侯毫州宋侍讀啓某黽勉副車阻遙巨屏㳂臺移而奔命曽靡寧居貢郵訊以問安因成曠禮企台儀而敻邈馳塵想以增勞伏惟坐布寬條翕臻純祉恭以某官道先民覺文擅辭宗忠簡上心名重天下而自羽議朝寧黼黻辰猷待乙夜之親程已殫明效宣二天之美化聊鬱賢謀行被詔還亟升柄任代上謝張修撰啓泮宫領教曽微善狀之足甄通漕剡章誤謂鄙才之可取所得出于望外其感溢于情涯竊惟北道之雄是稱諸路之最上臺之公舉有限屬部之吏員實繁㳂牒而奔走者困于道塗據按而區理者疲于州縣率有忮心之交騖庶乎薦口之一開援能以勞在義為允某也曲士今之愚人進乏世資之憑動乖時用之適學雖絶意于非聖任亦甘心于為貧識軒冕之儻來自安愚分無田園之歸去敢冒人知尚司關市之征蓋徇斗升之祿旋逢上相之居守樂得諸生而養成猥䝉薦書遂置學館傳道何術真愧人師之妄為素餐匪功了無嵗課之可考敢望重言之慰藉輒先諸吏以挈提揣躬靡他載德有自此蓋伏遇某官兼收介善力啓至公重輕士倫若運權衡之物名教巳任首掄庠序之官乃俾鯫生亦叨清舉敢不益堅素守增廣未聞肯效陋儒惟専翰墨之際尚須異曰自致功名之間庶幾立身少報知已代上謝徐職方啓自違風範日詠賢規㳂牒他邦未嘗安席奏書下執邈爾無階夫何恩詔之深數有誨音之及兼審歊炎貫序緩履餐和恭以某官王國美才郎垣碩德素重上心之眷洊臨方面之雄增秩賜金行膺于寵數飛緌鳴玉亟踐于嚴塗都官王義甫到任謝史館相公啓按章北道顧慙薄效之未伸參計外臺誤謂短能之可使恩忽推于望表幸兹溢于情涯竊以國家置使于四方漕運難才于三路咸云河溯之付畀尤繫朝中之選掄蓋制牙環守者三十四城吏員倍費乎刺舉張口待哺者數萬餘卒兵餉實煩于轉輸而又河防嵗苦于常科民力日疲于庶役舉是職者豈易人乎宜得衣冠之賢久知金穀之要不曰冒處始逃深譏如某者受性直愚與時迂濶仕宦最為孤進器資何有他長徒以公家之事可為勇于竭力衆人之言不恤要在便時憲車方懼于竊乘漕柄遽䝉于虛授論資既淺度術復疏省其由來何所自得獲此假人之寵率由造物之私此蓋伏遇某官道啓至公人收片善終始成就再三挈提寒苦頑金首被宰鈞之所鑄朽如散木更煩化匠之為容致兹要劇之權次屬庸交之品敢不粗殫駑拙稍集事功有所建明講爾俗爾民之利病弗専聚斂副吾君吾相之使令代答平陽方寺丞啓兹者謬器小材獲官下邑賴昔高賢之治者及今善政之存焉民口能言時聞大略使愚心矜式第守于成規未暇裁緘猥先賜教過敦禮意增劇銘藏恭以某官業履蹈中才猷彪外進丞卿寺方啓于修塗出長民封連升于最狀倍綏燕餗行對褒嘉感臆所深名言非悉代上樂職方與管御容皇城啓伏審奉三后之粹容降列真之祕宇順浮齊舸甫次敝封拜德有涯望風竊抃恭以某官早逢熙旦獨映榮班傾忠諒于端朝密隆宸脊肅表儀于禁列增峻使聨餘遲趨承並紓悃臆代上本州知州啓自塵仕綴即稔賢聲萬里宦遊方二修候之屏一㕓農畝獲依刺史之天論幸固多貢音為懬伏惟坐班寬詔誕擁厖褫恭以某官經世偉才搢紳碩望禁塗翔步計在于匪朝郡閣觀風寧需于滿嵗伏望益綏寢味以迓寵休代上到任謝監司啓過承優詔獲典重藩初見吏民自慙師帥兹有公庥之託得無私幸之多伏念某一冒榮階久糜稍食﨑嶇官路之險少所備當黽勉公家之為老而逾勵嚮按章于遐服旋佐幕于中幾專領一司甫彌周嵗罔禆尹治僅脫官癏誤奉朝恩俾分州寄矧孟門之劇鎮乃禹貢之粵區風宜信佳氣俗殊悍桑土之資既富雈苻之萃亦繁過家之上先塋實為便道守邸之驚兩組殆是故鄉撫柔其間疏短為懼兹蓋伏遇某官器函閎博才貫幾深上簡淵𠂻外臨要部澄清一道舒慘百城特霽使臺之嚴顔與之假借有容卿寺之朽質得所據依敢不祇服攸針勉圗所報推行新法之本意以便吾民宣布本朝之寬條俾知上德下情感賴曷究名言代上參政趙侍郎啓撫關輔之一方殆周嵗籥逺京師之千里增跂台光日有教條之奉行坐成書禮之稀濶伏惟參聞國論翕受天和恭以某官學際聖賢量包公輔至誠以矯物僞重德以鎮世浮自先帝之知人洎上方之圖舊十載台路一心王家致主暢謀益祕省中之語二公論道弗收天下之名行徽冊之延登慶洪鈞之付畀代上樞密侍郎啓向以短才猥當重寄撫綏何術可臨西土之民兵疾苦所詢或見故鄉之父老中心爰究纍月于兹曠尺牘之問安積寸襟之馳仰伏惟神機所總時祉載藩恭以某官業履崇高智謀光大經正德以儀庶位挾重計以尊本朝嚮冠序于宰廷久宣勞于王室搜濶儀之未講範成憲於可行乃收真相之極功以畢大臣之能事付鴻樞之要柄采英衮之昔謨文武以兼安危所繫矧廟堂之畫一尚循蕭相舊規帷幄運竒更藉留侯之前箸聊制五兵之本復調萬物之鈞回上制置發運待制啓蚤以頑䝉謬塵奬拔發蹤門下致諸公之交章去德嵗餘無一日而忘惠向他邦之待次方小邑之效官訟諜相紛日嗟州縣之勞職公函缺謀懼凂朝廷之逹尊伏惟大計坐籌繁禧來集恭以制置發運待制鍾氣問傑為時老成董轉給于外臺久繄碩畫步凝嚴于內閣獨映榮班主知益明賢業彌劭紅粟朽貫已增羡于邦儲英衮繡裳行進圗于廟略俯惟疏賤訖託埏鎔代回答毫州朱侍讀啓自塵劇使曽靡定居間走浙檽亟來淮服董漕臺之將給精爽幾殫企鈴閣之邃嚴晤言都隔豈謂乘偃藩之多暇飭記室以占音祗服眷存第勤銘刻恭以某官名重天下道簡上心屏翰一邦聊寄中和之治埏鎔萬品行攄康濟之才益保興居庶符瞻頌代答度主簿啓某寡能近器承乏劇封顧使檄之已行不敢輒讓恃賢僚之餘裕可容匪才豈謂祕書先被郡符暫煩獄寄方違始望遽辱好音感慰并懷名言非諭代與王內翰啓被詔西來嚮假金城之守引領東望日企玉堂之賢缺貢書音仰咨德履想嚴塗之視草擁龎福以如茨恭惟某官學入聖微道先民覺文章取重于榮路詔命推高於禁林導宣睿心明如星斗之揭鼓動羣聽震若雷霆之馳聲名素格於上聰潤色久煩於大手行自復門之要徑躋二府之崇賢業得申朝言方允代上太保啓伏以某官術業該深才猷膚敏親逢盛際獨映榮班洊更使領之崇自結宸嚴之眷將明恩于郡國方諭上仁書茂績于鼎彛行攄將略又伏審逺泛仙艫甫臨陋壤行瞻使範增忭愚襟恭以某官莊亮秉心忠純迪操羽儀環衛蚤踐于班榮陟降禁嚴特優于主眷瞻風伊邇獲幸良多代上集賢相公啓往違翹館來刺劇州省才略之短疏愧恩榮之優重坐勤官事罔知日月之遷仰庇台光曽缺寒暄之問伏惟密謨王體參嚮天祺恭以某官涵德淳深秉彛惇大得位行道擴經濟之初心尊主庇民鬯太平之偉績彌縫衮職之闕調適鼎司之和崇謙矩以自持避豐功而弗有堯舜相授方逢極治之期邴魏有聲永底協恭之績問侯上青州文相公啓伏審茂對詔音出班藩政埏鎔有舊歡抃增深恭以某官社稷宗臣山河間氣秉直道以結人主挾重計以尊朝廷嚮宅鼎司首調國縡裁黜貴幸振拔滯淹窒塞濫源啓闢治路底邦猷于甚盛密簡中宸避廟略而弗居懇辭上衮剖守符而均佚露公冕以觀風卷康濟之大而就一州遂藩宣之樂而鬱四海朝端劇位纍復於登庸京左數邦更繫於鎮撫一相處外勞周伯之未歸萬民具瞻願晉公之再入行膺徽冊還陟元台又伏審茂對明緡改臨重鎮肅使旌而就道露公冕以觀風休命傳聞列藩竦抃恭以某官器函簡厚道備將明儲精上天佐命皇國富貴由道宜位冠于中階君臣同心俾世登于至治暢衮謀於已試隱廟略而弗居出甸陪京靡容滿嵗副天子詔書之意思慰遐氓分大臣方面之權就更巨屏行聞鎮撫雅俗布宣寬條五月政成趣晉公之再入三篇冊拜復周尹之具瞻代上吕舍人啓嚮者伏值知府舍人被命于藩擁麾過泗輒緣幸㑹獲拜台儀自爾吏職相乘日有泥塗之辱公函不講懼干爵德之尊洎解賤官復沾巨惠無舉家投足之地方困他邦給異日濟川之舟俾還素里沐恩至渥論敢寧殫恭惟知府舍人道備將明器函簡厚髙文取重於時論大筆追還於古風陟降嚴塗蚤揚于仙貫發揮外命適暢于辰猷固宜徑登政府之崇增重本朝之列眷言右浙之㑹樂駕兩轓之遊觀風澤民尚屈一州之用得位行道未平四海之瞻佇對宸緡亟升台席代與永康仙尉祕校啓瑣焉近器效此冗官幸陋邑之密藏分清流之勝境豈圗髙議首枉珍函奬與過優銘藏增劇恭惟某官天資夷爽士檢淳明較藝省闈數當髙選試才縣道尚抑修程行對華章勉綏素履回泛與諸官啓自解守符逖疏賢檢邈爾道途之阻徒然燕語之傾契濶以還起居何若官能肅給行對於寵褒時序歊炎勉加於遵衛企頌之切敷述奚殫代與錢塘知縣張殿丞啓一辭鄉邦三仕京府參差歸計汩沒塵容邈然先疇適在治部聞滕公之仁政庶得相依因馬卿之宦游未緣親炙伏惟字民有裕膺福無疆恭以知縣殿丞業履純明氣質高爽治有餘地誠百里之淹才誦已載塗喜萬家之䝉福行躋華貫遹踵清門伏望善順節宣精調燕餗代與襄州劉待制啓逺據歸鞍適經便道氓謡溢耳甫及仁侯之封賓所馳心行瞻延閣之範屬嵗筒之遒盡惟福履之綏和峴首班春尚淹柄任堯心圗舊即被召還企嚮兼深指云莫罄代答上荆南府知府啓自違節下尋吏淮邊念簿領之裝懷曽無暇日願音縢之致問不覺曠時溽暑貫辰粹襟迪吉恭以某官名重朝論才為吏師自結上心之知暫受方面之寄荆渚江山之勝聊助清吟槐庭位著之嚴行膺寵拜代上張成殿丞啓入奉宸緡出紆守紱方休道路之勤頓即有詔條之奉行馳謝未遑賜音俄及仰銜雅好隂激懦𠂻恭以某官夷靖自居直清不倚朝閨著籍茲漸于榮階利局沈才行祗於休命回上省副兵部啓恭惟省副兵部才兼數器名重本朝屈二財闈甫足中都之費進登法從行為近署之光陽德方升天和參嚮永言瞻頌曷盡文陳代上發運兵部啓右某啓某胄系單微天資鄙固懼無名於沒世因有意於興宗力究聖賢之書弗㳂父祖之業人皆誚其狂妄天獨啓於愚冥兩與計偕一塵舉首方激昂於壯節遽困墜於下科母未嘗於君羮子巳泣於封樹念遍親之需養延餘息以圗生勉就銓除之官淮服矧在掾曹之賤獨稱獄吏之難蓋上官之議有重輕而細民之罪係出入苟持平之一失則置法於必傾以故考求物情執守公是然孤音寡和動畏於謗譏而方枘投圓間逢於嫌怒第慤廉而自信且朴訥之誰憐如𣪚木之出溝中匠無顧者若棄芻之委道上人皆踐之伏遇制置發運兵部振起時風陶成士類忘其位號之隔視若子姓之親許力倡於諸公將首形於清舉齒牙過奬羽翼隨生昔者魯經尊仲尼之褒有如贈衮楚諺珍季布之諾不啻得金而况通漕劇權薦紳碩望一言所與羣議為榮决期孤跡之成弗自他門而致當繇恩館以漸亨塗重念某粗免官瘝甫周考格儻受代而去不備於使令則蒙遇雖優何緣而振拔是猶茂林弗能庇欲墜之葉巨浸不足活巳枯之鱗伏望制置發運兵部垂惻滯蹤助開公道特加慰薦訖保孱庸如此則孤抱如丹誓圗於補報羣才知勸率厲於廉隅捨是以還未知所指祠部集卷二十三
