body:
  text: 祠部集卷十七宋强至撰狀賀韓魏公生日狀素商肇序元精萃在於金行大昴儲祥上相出符於寶厯維時載誕與國同休恭以判府司徒侍中道濟王塗望髙宰路功名自著而避逺無跡德爵極隆而持循以謙一巳安行而有餘衆心仰慕之不足卷三朝之巨業久退守於宫符撫千里之環封復懇紆於鄉里門弧戒旦鼎食增榮宜夀而臧合萬辭而祝頌若富與貴永百福之崇髙某適倅計庭正遙恩館馳歡誠而第劇就慶列以無從北望台光卑情無任激切㙴禱之至樞密富相公加户部尚書狀伏審誕揚內命具告外廷進長地官增崇台序伏惟慶慰恭以樞密相公器包民極勳濟王塗洞安危之大機更文武之二柄宰庭論道尚存鄼侯之舊規樞幄本兵不聞敵騎之南牧兩朝感㑹一德將明遘繼聖之重光采建儲之前議特加峻秩示奬元勳雖懇列讓封隱廟謀而弗有而勉從制册激朝論以逾髙上富資政狀向紆守紱逖逺台符當淮州囂冗之衝積官簿沉迷之慮馳心材館徒爾增勞奏記鈴齊缺然不講伏惟布黃堂之政事萃泰宇之福禧恭以某官道簡上心名重天下髙文大册蚤中於賢科要職美官獨揚於聖世將命絶域能尊大於本朝避寵鴻樞益光華于全德進升祕殿出領巨邦綏一州之氓惜利澤之未廣調大鈞之化庶中外之咸依行奉詔書入居鼎席樞密張太尉加吏部侍郎狀伏審顯對冊書增崇命數優國老之舊德進天官之亞卿邸報初聞朝論胥慶恭以樞密太尉天民先覺王佐偉才抱忠諒之一心出誠明之正性參鼎司而調萬化清風尚存坐宥省以論五兵白首逾厲適報受遺之德遽疏進秩之恩垂光中階登二冡宰鴻樞之祕想妙略之咸依赤松之遊追先芬而未可永言企躍曷盡敷云參政趙侍郎加吏部侍郎狀伏審帝制發中天官登二埏陶所暨喜躍惟鈞恭以參政侍郎道備將明德含惇大忠言坐斷乎國論文體追還於古風自結主知厯紓賢業拜先皇於卧內親受遺言出嗣聖之宸𠂻特崇舊德加峻中臺之貴秩益光近輔之榮班某總計朔陲馳誠翹館顧業官之有守思展慶以無從代賀向少卿狀伏審宸檢疏恩月卿進秩暉映之下躍抃兼常恭以某官亮節在廷懿文表世榮寵紳緌之貴慶鐘圭衮之餘領通漕之事權贍大邦之用度芝函錫命棘位登賢心計無垠聊屈外臺之寄聰聞甚熟佇觀迅詔之來俯惟冗微鎮卜棲倚代賀李參政狀伏審帝詔登賢宰庭進序埏鎔所暨歡躍惟鈞恭以某官上天元精清廟偉器行出世表文為人師識度宏深夙稱大臣之業忠誼肅正自結真主之知遽違京邑之雄徑宅廟堂之貴圖講治安之䇿今也其時樹立太平之基决於匪日九州四海萬口一辭某適二守符逖遙台屏雖聞風而增忭惕馳賀以無階代賀待制諫議狀伏審入覲宸旒峻躋諫闥側聞新命竊忭丹悰恭以某官莊重自居直清不倚早逢文雅之㑹優踐廉良之科回翔顯塗暉映當世早居侍從之職屈領事為之權掌通漕之司方凝於荗績奏甘泉之計密簡於上𠂻遽兼內閣之華驟置七人之列金榖之委聊慎於才難鈞衝之崇佇膺於册籍即圖趨伏併述欣翹代賀梁副樞改給事狀一違牆宇久偃邦鄉有簿領之攖懷習成慵放顧音函之布問坐致濶稀兹承疏渥嚴宸登賢華序矧叨暉庇實倍欣愈恭以某官莊重自居直清不倚逄辰熙穆筮仕光亨飛緌金馬之廷早揚仙貫視草玉堂之署密暢宸猷日親奉於威顔位益隆於體貌鴻樞之府參掌於繁機責瑣之門驟光於寵拜矧時所傾屬上方倚毗咫尺台衡聿攄真相之業仁夀億姓以畢大臣之能代賀歐陽龍圖知府狀伏審光奉制書就移治屏伏惟欣慰恭以某官際天藴識名世標才允極將明之資以基太平之業屈司宫鑰鬱四海巖巖之瞻行被宸緍宅上台兩兩之曜代賀文相公狀伏審恩章均霈册命發中慶與國均榮動物聽竊以昊天著象酌氣者機衡之司皇國設官賦政者喉舌之任審是要選歸於宗工恭以某官上台元精清廟偉器厯二府之重委踐三槐之絶班晉公砥淮右之平入持宰柄山甫補周家之闕逺踵賢規大屬股肱之良益隆體貌之地某職二方郡跡遙廟堂馳賀無階企悚良極代賀發運待制狀右某伏以寶典履長盛儀亞嵗羲易紀某來復魯史載夫望書恭以某官才貫幾深德㴠剛實外臺重委誠曰藉才之司內閣邇聫决非久次之地順迎令序誕擁龎禠某適守賤司不獲躬詣階墀稱慶卑情無任瞻頌激切悚惶之至代賀運使張刑部狀伏審寵承鴻渥榮改清郎伏惟慶慰恭以某官業履蹈中才猷彪外洊更重委率著能名括地賦於列城實關心計陟秋官之要秩兹副恩章俯惟下寮方備屬吏側聆甄擢倍萬欣愈代賀許發運賜出身狀伏審光被詔音榮升科等側聞異數隂忭丹悰竊以國家圖講聖治之端追救時文之弊以有司持尺寸之度豈盡得人而賢者具經濟之資或艱中第爰頒不次之命以擢非常之才恭以某官識洞深幾學探精藴雄文大筆自結於主知細札溫書特躋於賢選天下知勸朝論加優燕賀良深葵忱曷罄代賀龎昭文狀伏審就膺制册升冠宰庭成命既行有生同慶恭以某官髙文經世巨業代天道誼致君忠諒行巳間綏邉閫旋二樞廷浸隆萬乘之知參斷三公之論砥邦猷於甚盛密簡中宸隱廟略而勿居一歸上衮遽正元台之位以彰真相之才廟堂之號得賢莫先今日區夏之觀至治計在匪朝某職預漕臺迹遙政府亞紳緌之歡蹈邈矣無階託鈞治之埏鎔幸而有地代賀陳雜端狀伏審榮改諫聫就登憲職伏惟慶慰竊以臺選之妙官材實艱言朝廷是非紏臣僚過失其膺慎簡允屬宗賢恭以某官行潔性醇德宏業巨髙文大册早中於賢科美職要官進揚於聖世才為時而傑出道遇主而盛行間分九五之憂往撫東南之地全安罷俗宣諭至仁甄擢俊良抑黜姦懦逮使車之還止果宸扆之嘉焉開英衮之便塗濟繡衣之上笏彌逢庶政之闕今也其時樹立太平之基决於匪日俯惟冗瑣舊辱奬憐新命傳聞寸𠂻竊忭訖恩成而有地從賀列以無階又祗服恩華進更臺選伏惟慶慰竊以國家深講至治並登偉人風議所關憲職為最紏朝行之過失正色不回論邦體之是非危辭無避其膺妙簡允屬宗工恭以某官術業宏長才猷膚敏見不忠於君者直哉必言苟可利於國乎行且弗顧嚮領嚴宸之命盡觀列郡之風升賢黜姦扶弱抑蠧逮旋崇斾入覲邃旒宣詔意而甚明果上心之稱允繡衣劇序聊示於徽章英衮絶班行光於寵拜代賀陳相公狀伏審寵建使旌榮兼相印仍躋祕殿復鎮舊藩伏惟慶慰恭惟某官社稷宗臣山河間氣秉直道以結人主挾重計以尊朝廷嚮宅鼎司首膺晉錫裁黜貴幸振拔滯淹窒塞濫源啓闢治路砥邦猷於甚盛密簡嚴宸避廟略而弗居懇辭上衮部守符而均佚露公冕以觀風卷康濟之大而就一州遂蕃宣之樂而鬱四海帝心久注恩數推優謂體貌舊臣宜帶宰臣之序欲節制諸郡因加將鉞之雄禮意甚隆輿言弗愜一相處外勞周伯之來歸萬民具瞻望晉公之再入行膺徽册還陟元台曽是疏頑嘗依挺造頑金待器更期大冶之開廣厦既成敢效翾飛之賀代賀發運鄧郎中狀伏審祗奉荗恩出司通漕側聞成命竊抃寸襟恭以某官術業宏長智謀膚敏郎垣應宿蚤躋位著之嚴使節宣風洊領事權之劇旋聞名於法坐亟佐職於財闈眷言淮海之輸實備邦家之計董外臺之轉給宜得周才被溫詔之褒升允資碩畫俯惟屬部將庇末暉欣幸交深名言非悉又伏審祗奉恩函總司利柄竊以中都之費率繄通漕之供乃簡周才以分重寄恭惟某官中和迪哲亮直秉彛謹漕節之輸將洊登最狀參財闈之經度久試豐功遽為總哲之知却領東南之計俯惟懦品嘗庇末光復依使斾之嚴不失君軒之舊永言慶忭倍萬等倫又伏審進膺宸誥出總使臺將托末暉預深竊抃恭以某官行推髙爽道具醇全遘復旦之聖期踐列星之郎位備紓賢藴自結主知洊持漕節之嚴入預計廷之劇綢繆利柄厯詳金榖之原䝉被朝僉都領江淮之運物論皆允邦須所依俯惟下寮行備屬吏永言欣幸曷䆒名言代賀施龍圖狀伏審北轅按部中路改恩罷總漕臺往司宫鑰伏惟慶慰恭以某官器包民極勳濟王塗親對休辰洊揚膴仕領邉藩之劇部參財省之偉謀風績並凝褒章增峻遄升延閣之祕益注嚴宸之懷董大計於東南久煩經畫副具瞻於中外差緩升庸遽被溫書暫班寬詔俯惟屬吏夙荷恩私歡戀并懷指云非諭代賀錢侍讀移青州狀伏審光膺細札移殿巨藩伏惟慶慰恭以某官方格淳修器識宏逺髙文大册早决於世科至論昌言有禆於國體進直禁扄之祕旋陪乙夜之觀禮遇益隆地望絶擬輟居嚴署出守南麾已躋雅俗之安靡俟更書之滿朝端上衮差緩於登庸京左數邦聊繄於鎮撫即光册拜大副巖瞻代沈主客賀文侍中知永興狀進膺册命出布政條伏惟慶慰恭以某官王佐偉才天民先覺濟極功於天下暢巨業於朝端蚤躋台序之嚴旋宅宰司之冠搜闊儀之未講墜典畢修畫常憲於可行成規永賴去終禮制起應詔音建淮海之髙牙鎮關河之巨屏式是逺略穩如長城繄樽俎之前籌寬朝廷之西顧外蕃王室暫勞申伯之行歸秉國鈞再俟晉公之入伏望上為宗社精調燕興代賀知府李密學狀伏審祗奉制音就觀幾政側聞新命竊抃寸襟恭以某官經世偉才薦紳碩望由妙年而取上第不纍日而都要官亟自禁林之遊徑登樞府之直時論歸重上知愈明京邑四方之表儀翕騰於尹治宰廷百辟之師帥當被於朝僉咫尺聰聞旦夕册拜未遑馳慶先辱占書愧喜并深名言非諭代賀安撫太保狀伏審肅膺朝命出諭上仁拜德有階普天共幸恭以某官識度沈逺機神迅清名簡萬乘之心才兼數器之任帝念東南之郡民罹水旱之年分使臣之光華奉承溫詔布天子之惠愛撫慰羣元某適守陋藩行瞻嚴斾永言企抃曷究文陳代賀青州文相公狀伏審就膺細札移鎮巨邦凡出埏陶惟均抃躍恭以某官山河間氣社稷宗臣道遇主而盛行位因功而數易運神機於樞幄才服華章參正議於鼎司遽更徽册方將緝熙當世之縡舒暢蒼生之心㑹狂敵之悖常嬰孤城而假息獨形忠憤請殄姦妖廟算略施寇巢隨破晉公登用最髙平蔡之勳傳說贊襄休有弼商之䇿追合宫之濶典一旦舉行詔列郡之禮闈同時開設少見大臣之效弗殫真相之才露冠冕以觀風剖守符而均佚朝端上衮矧久鬱於民瞻京左數邦後暫勞於君重行祗明命還宅元台曽是孤生嘗叨清舉請假書林之職俾兼漕節之權雖寢曲恩如沾大賜自違鈞屏尋總計臺苐切歡誠阻從賀列代賀宋內翰移鎮狀伏審祗奉明緡移専巨鎮伏惟慶慰恭以某官民靈先覺王佐偉才道簡上心名重天下升華延閣蚤潤色於宸篇翔步禁扄久發揮於內命旋陪乙夜之覽允極丁辰之光固宜陟降王塗優游公路遽出觀於藩政巳外鬱於巖瞻復被恩函改臨邉閫眷惟中國之望恃若長城之堅綏懷逺人節制諸郡講兵命之利疚考風俗之便宜行聞敵騎悚威固無南牧之意朝廷倚重不復西顧之憂紀績王常調元台鼎某適司通漕方庇末光亟聞新命之行徒劇懦𠂻之戀葵傾倍切燕賀無階代賀制置端公狀伏審拜嘉朝右進秩臺端凡被埏鎔惟均慶慰竊以國家盛重中都之計率繄通漕之才謂金榖之繁尤國之要務而嵗月既久兹見於成功將大升庸之階故先雄劇序恭以某官性與道㑹器隨用周邃冕對敡方嘉於碩畫法冠直指遽踐乎榮班恩出主知事光物論矧繡衣之上笏即英衮之便塗時議皆然愚言非佞俯惟孱薄最辱奬憐新命傳聞喜踰於他等賤司嬰縶跡阻於前趨企悚攸深名言匪悉冬至賀錢內翰狀寶典履長盛儀亞嵗義易紀其來復魯史重夫望書恭以某官業術崇髙智謨光大厭禁林之久侍聊以觀風暢台衮之偉謀行聞祗召順迎令序誕擁龎禠某守在小邦跡遙巨屏祝南山而為夀適阻前趨託縑幅以貢音曷殫下懇代賀張刑部得替狀伏審顯膺召節榮解利權行乘卓馬之朝入覲蒼龍之闕良階柄任增忭禁悰恭以某官風業宏長才謀膚邵自領漕臺之劇益為辰扆之知給食京師已報輸將之最敡休軒陛佇嘉經畫之明亟列近嚴庶符頌願代賀省副端公充待制狀伏審祗奉恩函榮躋禁職側聞顯命竊忭丹悰恭以某官識宇宏通才謨髙亮休辰而逄吉揚膴仕以開榮蚤為聰哲之知出總東南之漕剗去積弊樹成新規力董輸將矧勤勞於十稔訖繄幹濟已瞻足於中都固風績之茂焉果上心之嘉乃適因奏計之便遽被疇庸之章對命嚴宸升華延閣訂兹慎選誠曰當賢籠金榖於百城暫還舊物秉機衡於二府佇拜明恩代賀張待制知揚州狀伏審解麾吳服移鎮淮壖審即便時已開尊府伏惟慶慰恭以某官秉心峭介懋德優宏素履清風最髙乎時論美官要職厯踐以班榮蚤居延閣之華纍典名城之重蘋州舊俗方結於去思蕪城故知尚嗟於來暮適兩轓之稅駕班寬詔以觀風靡俟政成行光柄任代賀發運端公授省副狀伏審顯承恩詔進二財闈成命已行寸襟竊忭恭以某官才兼數器名重當時弗援強近之知自結聖神之眷兼臺綱之美秩總漕節之劇司給食京師矧風猷之久懋敡休軒陛會嵗課之告成亟嘉經畫之明旋被褒升之渥亞計廷之要職方倚國才暢台路之密謀行光寵命俯惟疏冗最辱奬題適領守符阻從賀列代賀運判賜章服狀伏審被詔發中拜嘉不次伏惟慶慰恭以某官鍾氣間傑為時聞人名動薦紳道結當扆髙文大筆自取於要官巨業周才遽當於顯用乘江淮之嵗歉加金榖之數藂力暢偉謀助成大計果申慶典以録豐功將興歎於能臣乃疏榮於品服主恩至當物議皆然某適二守符阻陪賀列瞻言使斾曷諭愚悰代賀二漕改官狀伏審嵗課告成星垣增峻公庥所暨私抃惟均恭以某官名重薦紳才兼數器被邦家之選遇蚤暢賢謨董山海之輸將洊登最狀旋承鴻渥進改清郎矧繄碩畫之明更聽茂恩之擢屬官居之有守趨慶列以無階企悚交深文陳非諭代賀副樞給事狀伏審顯承明制參掌繁機成命既行有生胥慶恭以某官智謀光大業履崇髙挻金石之純誠抱廟堂之偉器忠言坐斷乎國論亮節素邀乎主知間倚重於翰垣將往綏於邊閫遘溪酋之崛强憑巖險以繹騷議舉靈誅僉推碩畫方使旌之就道俄宸詔之命還果廟算之萬全破寇巢於一舉洎聞大凱因答豐功拜嘉青瑣之門二職鴻樞之府圖講治安之䇿今也其時樹立太平之基决於匪日佇更徽册進陟元台副函夏之具瞻畢大臣之能事俯惟愚品久託鈞庥散木弗材嘗荷先容之賜頑金能躍更聞大冶之開第劇歡誠阻趨賀列代賀何龍圖移慶州狀伏審茂對宸緡就更藩閫受知有素抃躍惟深恭以某官才為世生道先民覺蚤署含元之上第旋直承明之祕廬當扆以忠誼知名薦紳以文章矜式俄持太史之筆久列侍臣之班益峻恩章遄升禁列眷惟治屏俯控西陲宜得國楨以綏邉俗用恩威之二道専節制於一方隱若長城暫繄於坐鎮霈然中詔行趣於登庸某適二麾符阻趨旌棨遙瞻使節曷罄愚誠賀得贊都監王殿直狀伏審告成美課入覲嚴宸驟奪公庥第增愚戀恭以某官清端不倚沈毅有謀董師律於方州適兹滿嵗佐戎旃於邉閫其在匪朝倍慎寢興以酬光渥賀田户曹移令狀伏審顯奉宸緡就紆縣紱伏惟歡慰恭以某官器資夷逺品格端嚴决科妙年掾郡更嵗薦書交上劇論於美材褒詔亟頒優分於便邑未遑修慶先辱占音感抃并深名言非悉賀金華著作狀審即便時已臨劇邑方棲餘庇竊抃丹悰恭以某官學有本原性函剛實參華金馬兹漸於清塗分寄銅章遂攄於素藴宿官所限稱慶莫前瞻抃交深名言非諭賀文潞公狀伏審肅即便時肇臨宥省神機所總福祚具蕃恭以某官涵德淳深秉彛光大協風雲之盛㑹揭日月之貴名早冠序以宰塗汔致平於王路比煩逺略往殿劇藩建淮海之髙牙方開尊府挹河汾之間氣趣覲清光夙推英衮之謀首付鴻樞之柄方隅無事暫賴留侯之運籌廊廟有聲復歸蕭相之畫一鬯熙朝之偉績收髙世之極功鐘鼎所銘邦家之耀俯惟衰晚訖託埏鎔第內激於歡誠阻前陪於慶列代趙待制賀昭文相公加左僕射狀伏審誕膺徽册祗服華章進升右相之尊增重元台之體伏惟慶慰恭以昭文相公世濟人傑道包聖微揭日月之髙名㑹風雲於先帝奉綴衣之末命定䇿禁中暢英衮之偉謨立功天下上念大忠之力恩推異數之文加峻秩於天臺光元勳於王室傳聞成命舉慰具瞻某職總利權心遙材館阻從慶列第劇歡誠代趙內閣賀昭文相公狀伏以在復之來七日陽德其升建子之貫三微王心所慎恭惟某官先識經世元勳格天衣冠百工鈞冶萬彚繫安危於天下感㑹兩朝輔左右之廷中周旋再紀遹臨慶序翕受純禧具瞻之石巖巖永堅民望相比之星兩兩增耀台光某兼冒從聫總司漕節薦夀觴而莫及跂相閣以逾勤代李才元學士賀西京文相公狀伏審就膺徽册更尹别都尊府初開薦紳均抃恭惟某官器包民極勳濟王塗蚤殄寇巢旋持宰炳履正德以表庶位挾重計以重本朝搜未紹之闊儀遹殫能事暢無前之偉業重享成功措邦體於既平隱廟謨而弗有踐崇髙之極而自鈞出處之致斂康濟之大而樂就蕃宣之勞亟換左符兼升右揆列讓封而避寵順成命以居留然而幅員蒼生咸願晉公之再入壞冶舊物豈忘周尹之具瞻行對宸緡復調台鼎代賀何舍人狀伏審宸緡疏渥法從登賢向聼朝僉預伸靣賀旋承拜命適偶戒行徒增忭于寸襟阻裁誠於尺牘竊以代訓誥宣明之作真見文心惟文章雅正之才能體詔意膺是妙選允歸宗工恭以某官識貫幾深學該巨細早躋諫垣之祕列亟踐禁廷之貴游丕變時文一至古道載筆書萬代之法兹為儒榮持衡宰四海之平猶鬱時議矧注録之上笏即登庸之便塗行奉詔音驟光册拜某嚮緣同籍之分嘗被虛襟之容逖聞褒升倍深茂悅代賀韓舍人狀伏審茂對恩書榮躋法從側聞褒擢隂切欣愈恭以某官器資淳修業術精奧早逢文雅之㑹優陟秀廉之科華要洊揚聲光愈綽方載言於法座俄給札於禁林有文章溫厚之才能體詔意代誥令宣明之作遽當上心行追三代之醇逺駕二京之右殫儒者之顯效置鄰哉之近班代賀安撫陳舍人狀伏惟某官品格淳修才猷膚敏言經邦國之體學際天人之交道簡宸襟地嚴諌署珍䇿重計施諸當世而可行要職美官不由纍日而自致出宣溫誥溥諭上仁行入對于清光亟徑躋於嚴近順迎令序誕集純禧某别乘庀司矧宿官之兹限南山興祝固介夀之莫前代賀李刑部移襄州狀右某伏審就䝉細劄移鎮巨蕃伏惟慶慰恭以某官經世偉才縉紳碩望露章懇郡方俞詔之褒優當軸須賢行寵恩之升擢伏望上為邦國精調燕興代賀張待制移揚州狀伏審膺圭符之寵寄易淮海之奧區肅柬剛辰巳班寬詔俯惟陋壤獲邇大邦榮庇末暉喜踰常等恭以某官才猷髙亮風績宏長早㑹遇於聖辰久翺翔於禁職解吳興之郡印尚仰褒書改廣陵之守麾復開督府露章按罪方紹昔賢之風加秩賜金行光循吏之目某適膺州棨阻叩賔閎從慶列以無階馳懦𠂻而第劇代賀廣州王少卿狀伏審茂對明緡就移巨屏躋奉常之少列兼文館之祕聫蓋以國家慎重長人愛綏逺俗因推不次之命以付非常之賢登庸出於此塗歡頌均乎衆口恭以某官直清不倚莊重自居行髙薦紳名記當扆雄文取重於時論大雅追還於古風董淮服之輸將瞻神都之供億才周數器勳濟本朝督府千兵暫臨南海之鎮溫書一札行陟中台之階俯惟下僚久備屬吏側聞異數竊忭寸襟藐如嬰兒驟奪慈母苶若疲馬止思故軒喜戀交情名言非諭代賀湯都官狀伏念自奪恩暉寢更月所門墻愈逺箋牒不時豈謂不遺冗賤之蹤特賜丁寧之誨拜而伏讀藏以為榮旋聞入奉明緡寵更巨屏庇廕之下喜忭兼常恭以知郡都官秉節直清賦才雄健㑹龍飛之復旦被龜紫以光朝出守之領使麾矧隆帝渥衣繡之過故里兹實儒榮趨伏非遙瞻依倍切代賀正上亳州宋侍讀狀恭以某官學際天淵名重纓禬早陪乙夜之覽允極丁辰之榮翔步王塗居勞侍從之事班條侯閫出詠中和之詩順履慶辰具膺景福宅上台而秉軸諒在匪朝祝南山而奉觴莫遑為夀代賀正上昭文相公狀斗初建寅帝出乘震西京講物允重三元之朝東國著經實尊五始之月恭以某官山河間氣社稷宗臣挾重計以尊朝廷秉直道以結人主位隆公衮勳濟王塗太平之䇿略行巳濟至治畫一之歌繼作第守成規坐掄大猷首調元縡廟堂之上深暢於偉謀旒扆之間日傾於正誼聊觀風於雅俗因均佚於陪京須五月之政成復三篇之册拜伏望順迎令序誕擁龎禠南山之石巖巖鎮為民望泰階之星兩兩永耀台光某職列漕臺迹遙相閣薦夀觴而進拜阻預後陳貢慶牘以凂尊曷涯下悃祠部集卷十七
