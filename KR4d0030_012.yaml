body:
  text: 祠部集卷十二宋強至撰五言絶句暮春伯憲留飲席上走筆戲成春從花際來却向天邊去鶯蝶空徘徊尋春下知去春去無多日勤來把酒巵殘花聊點綴猶勝對空枝次韻和純甫遊寶掌遇雨遊騎來逢雨寧全是折磨純甫有天磨之句山神應洗路恐惹俗塵多穴泉冷冷西穴間終日滴甘乳道傍渴者多切莫飲豺虎龜峯一峯如龜橫得自禪翁説衆山迤邐來宛然此前列有待來時簾捲晝坐久竹移隂有待無消息南忩睡興深七言絶句立春待得春來解病顔東風猶細北風頑未全青帝行新令臘去元須浹日間萊絲生葉落雕盤欲去春衣怯曉寒惟有多情雙彩燕不須風暖舞叉端楊公濟以詩索粉紙依韻和答春雲落紙不歸天就把霜刀翦四邉欲送草堂還縮手少陵慣見浣花箋二月二十六日偶書舊年把酒對花熲酒氣花香日傍人今歲酒踈花未見惟將感淚濕青春三月十日作一病十日不出門坐銷芳意踈清樽今朝騎馬探花去枝上十空無一存暮春晦日緑隂輕處記春蹤芳草雖殘飲興濃明日清和天更好不須愁聼曉樓鐘覩林夫詩編信筆唐子能詩世一家不矜纎巧翦天葩直窺六義追風雅世上騷人謾葦麻書香山寺壁精藍孤絶亂雲間雲外疑無路可還顧我塵喧非白傳緣何今日到香山張升甫惠新筍走筆代簡謝之粉籜迎霜嫩更勻中厨未有許嘗新明朝便好供佳客只恨杯羮欠紫蓴翌月當屈升甫升甫旋和答復走筆酬之嫩籜斑斑玳點勻圓膚細細玉條新渭川美實容先食却向秋風懶憶尊公度惠花走筆戲謝二月都城未見花不知春色落誰家滿盤折惠情何重略嗅生香思已嘉送王審言供奉飛花幾點送春餘執手春風意慘如一見相歡露肝膽莫因别後却情踈送石師正馬蹄南出都門路行客少年春色暮花片空隨别盞飛柳條難繫征鞍住禽鳯二絶繫搏微禽拙自防綱羅須觸是尋常不知利觜鷹揚處却漫喧啾怨鳯凰鳯凰只是瑞時鳴邂逅千年或一聲不比喧啾爭巧舌微禽何苦蓄疑情次韻酬禮之見贈為吏淮壖嵗歘周不如當日傲公候君今亦欲折腰去遇好雲山且勝遊次韻遊山雨中飛飛煙雨惱春遊幾許餘花水上流獨有佳人折殘艷歸來滿插鳯叉頭寄縣學方晦之素志青雲已貼然風霜苦處涉層巔不如未第方夫子獨抱遺經議聖賢戲書保安院壁僧言此寺從唐建冠蓋無人一到來還似長官居僻邑不逄使者枉行臺辛卯七夕悼往憶共佳人曝繡衣餘香如昨舊歡非鵲橋雖别年年在猶勝嬌魂去不歸聞馬公節裴光世别頭入試偶成憶昔丁年力戰文旁吞強敵若無人鄊書果在諸生上二子今誰躡後塵偶書淨信院壁繫舟曽訪逺公廬遊屐重來一紀餘惟有湖山如往日懶將前事問禽魚松江别吳伯強底處與君長笑歌夜舟醉漾松江波君帆今夕不我住其奈一江風月何盧申之以惠山泉二斗為贈因憶南仲周友舊年拂石坐松隂曽與周郎共訪尋淪落人間少知味一逄瓶榼便傷心文園病渴酒難澆望見南泉意已消買得茶來無銚煮只將清冷送簞瓢奉和堯夫固窮終不悔沉淪滿腹深藏上古珍手寫新詩成幾卷亦教餘事照千春過伯樂廟廟下孤墳償是非壞簷仄柱若憑依門前過馬空驤首那得當年一顧歸開元寺仁王院見叢竹偶書一别琅玕數畝隂七年飛夢繞家林北僧好事猶能種偶向塵埃灑寸心太陽嶺髙侵寥廓勢盤紆倦足登時每一吁方寸人心猶有險况教廣地盡平塗苦旱壠上痿人卧稿苗頻年郡國訴諸朝雨師不為蒼生起只縱晴虹作旱妖赤地關中帶幾州濁涇清渭㧾如溝野農不省天時晚猶禱間神望有秋承乏幕府晨出馬上書五載青衫走兩都始作開封掾今為縣元城北門官緒更區區馬鞍出帶殘更夢却是雙飛鄴縣鳬朱郎中以梅花衣香分惠諸君皆有詩謝依韻和之百和殷勤出省郎清真似有雪中香風流不在金爐暖自轉餘薰到錦囊望思臺一朝木偶發深宫父子恩隳暗曖中不見戾園埋恨處至今草木有悲風溫泉壯觀悲涼舊迹存蓮花泉暖至今溫行人莫罪無情水一笑華清是禍源依韻和溫泉上公分陜半年餘駟馬東還不待驅肯獨澡身湯室裏行推潤澤浹民膚寇參軍九日惠詩以左馮翊趙監所遺玉液一壼并詩答之久傍嚴公趨玉帳近蒙賀監解金龜一壼分助登高飲客宦長安共此時九月十日龍與寺飲餞蹇磻翁赴梁門酒半題名南軒因偶書屋壁昨日曽來把酒巵隔宵已過菊花期回頭一笑成陳迹不獨秋香有盛衰九月與府中諸君會此又自和萬事人間若漏巵喜情常滿固難期却將昨日樽前菊零落金鈿已覺衰好把悲歡付一巵明朝北客有行期勸君莫聽驪駒曲只恐催人兩鬢衰寇參軍以孤鴈一絶見貽因酬之紫塞來時偶失羣追飛已隔萬重雲人情所喜惟朋附耳聽孤鳴似不聞依韻和裁花二闋前後殷勤選衆芳名園移植總成行要須花笑春風裏次第迎公入醉鄉移花新了詔書來似負迎春著意裁桃李我公天下滿不須偏待此中開宋周士以新菌為惠并示佳句依韻和答食菌由來勝茹芝十年此味望晴霓雕盤細簇春雲朵惠我殷勤助殺雞醉中劉道叔尹嗣復李子先垂和豫乙已嵗開元寺仁王院詠竹二十八字復依元韻走筆答之憶弄吟毫倚翠隂也應新筍更成林感君瀟灑𢋫詩句不負凌虛一寸心韓及甫惠陜梨走筆書句謝之霜後瓊漿味轉饒關山封寄路迢迢分甘珍重知君意應為相如正病消李景初許借翦綵花數軸一觀纍日不至戲成二絶督之壼蜂蛺蝶日徘徊只欠生香去復來應是春風隨玉指剪刀行處一花開剪綵茸茸細逼真秋風堂上數枝春為偷造化防天覺却擬深藏不借人病中雪夜聞韓六祕校會諸君玉色乾坤無一痕暮寒慘慘入千門自憐司馬方消渴不得摛詞醉兔園别都觀閣玉欄干尤稱褰簾把酒看唯有三冬多病客擁衾時聽夜聲乾庚戌仲春十二夜同無愧飲林夫西忩有感憶聽西忩一曲歌金杯未盡轉橫波酒徒依舊歌聲斷今夜西忩奈我何走筆依韻和酬王彥霖幾度春風信陸沉曽題醉筆寫花隂詩情不復隨風亂今日花前對展禽感舊情懷日日深三春能幾半晴隂醉題難盡當時意啼徹春風羡暮禽夫子人間第一流清言暫隔已離愁今朝偶負尋春約詩思勾牽未肯休不住年光衮衮流鶯花漸老使人愁鶯猶可聽花猶在再卜他時一醉休和司徒侍中同賞梨花映花急把玉交杯風掃殘香已幾堆酷愛豈惟公假借慣曾御苑見花來聞無愧夜會二三君子戲呈二十八字燭邊醉臉擬融酥盞畔歌喉欲貫珠應念東家多病叟靜披寬褐擁紅爐坐客宋周士忽垂光和復用元韻答之魏臺營妓勝添酥一笑堪酬百琲珠只恐更深雲雨散明朝共是守寒爐風流雙腕轉凝酥舞徹伊州汗有珠探手始知簾外冷照堂獸炭焰圍爐誰云燕趙敵瓊酥何似君家一緑珠酒罷早歸香閣睡也應蘭麝早添爐謝和詩忩外家僮遽疾呼開門滿幅把明珠驚回一覺無聊夢猶有寒燈守藥爐上詩惠酒有謝登髙無具結歡悰狂寫愁吟叩主翁遽荷兵厨均美釀却將酩酊謝西風暮角畫角愔愔清且哀古今曉色此中催可堪絶塞風霜苦還傍將軍玉帳來和司徒侍中舟中再賦一闋燕子迎船貼岸飛波光流色日暉暉都人倍戀行春樂只恐恩容畫錦歸河亭戲題黃沙衮衮激洪流白舫人羣雜馬牛却憶春風湖上月畫船載酒鑑中遊馬上見庭竹玉圓碧瘦與誰期只待丹山綵鳯飢生傍短墻真失所可憐直節衆人窺席上戲成玉溪一别十年餘北綰銅章西辟書寄語湖山好相待蒼顔歸日駭禽魚勾院偶書一坐間忩百慮清門前寵利自營營官書既少人喧息唯有嚴風戛竹聲謝元功惠茶長卿病肺渴欲死宰豫寢興晝復濃緑雲杯面呷未盡已覺清液生心胸謹和答惠茶之什緑雲浮面味回長每飲疑兼盛德香不獨蠲煩優下吏更容歸遺細君嘗九日有感時屬疾頗久每嵗登髙盡醉歸未曽輕負菊花期今年枕上酬佳節感淚雙痕落似絲憶昨方陪上相筵召書忽到菊杯前主人舉酒勤令飲一醉秋風恰二年壬子嵗丞相登高進上豫被堂劄召赴闕公勤勤飲云自此不比慕府一得縱飲矣甲寅立春夜雪迎得新年送臘回一朝生意動寒荄玉塵後夜籠金闕元是春風帶雪來謝春幡曉策嬴驂趂謝恩君王昨夜賜春幡塗金翦綵雖云異競戴還同拜禁門張文通以詩覓小桃走筆依韻和答名園聞説洛陽春金谷前無石季倫第一牡丹應慣見憐君翻作覔花人文通復用舊韻相示仍走筆和之花前直判醉酬春飲量慙非劉伯倫折去也應顔色在不知誰是戴花人牧飬監閲馬骨瘦誰知驥騄名駑羣平視圉夫輕夷塗好在重驤首喜見今年春草生陳伯成學士垂訪以病中新浴不克見走書二短篇謝之時情逐勢餌邊魚貧病由來俗易踈何事太丘直有道炎天問病到貧居病膚新浴覺神還散髮支頥一室間豈敢不冠延重客空將感抱寄慙顔别户部勾院竹一來省户兩春暉今日飄然襆被歸直節貞心惟我愛此君相别似依依泛湖有作不比危湍急瀨船平湖慢漿恰相便蓬飄萍泛真吾事舞袖歌鬟付少年贈芝公長老我愛師開方便門聞人有疾足先奔何須端坐禪床上始是如來不動尊間卿遽然云别因書二十八言奉送禪翁為我出巖扉坐席才溫便拂衣又道孤雲無定所如何却傍舊山歸間卿遽垂和答復依元韻戲之師怨白雲相望久師有白雲教早歸之句撇然便欲欖征衣其如飛雪能留客不放禪翁及早歸師有飛雪滿衣之句詩餘漁家傲影雪月照梅溪畔路幽姿背立無言語冷浸瘦枝清淺處香暗度妝成處士橫鈄句渾似玉人常淡佇菱花相對盈清楚誰解小圖先畫取天欲曙恐隨月色雲間去祠部集卷十二
