body:
  text: 祠部集卷二十一宋強至撰狀代問候文相公狀迎塵箋牒仰瀆鈞衡兩兩台星諒回于鑒照巖巖尹石彌極于企瞻伏惟坐論萬事之機翕受百祥之粹恭以某官代天巨業名世偉才冠羣后于中階總大猷于一體稷卨維已治安率土之濵羲軒吾君拱揖巖廊之上某夙惟駑猥嘗荷埏鎔適居冗外之聨阻伏凝嚴之地代問候運使郎中狀二職于藩宿官無狀比緣崇斾出按屬城道繇陋邦日瞻髙矩去德未幾馳戀彌深曠奉箋函仰咨寢餗恭以某官盛德之後元精所生紓賢業于端朝踐郎曹之正列尚淹柄任暫領漕權運心計于無垠適資幹濟取民藏于既庶行底羡盈貯簡宸𠂻驟升邦署代問候發運大諫狀向按屬城迫道途之勞止遐傾䕃宇惕箋牒之缺然伏惟溽署貫辰粹襟迪吉恭以某官民靈先學王佐偉才由妙年而取甲科不纍日而都顯位以至躋天閣之密侍兼諫垣之要班主知素明賢業彌劭差緩登庸之邦屈持通漕之權然金榖羡盈已富王都之計而均衡密勿行居台席之崇代問候發運狀寄身使節職守藩旟撫弱植之疇依企餘光而日甚向沿臺牒曽靡定居仰奉郵音倐成懬禮伏惟坐籌大計舉集繁禧恭以某官覺在民先行為世表早躋纓紱之貴自結纊旒之知寵寄兹隆聲光愈綽籠山海之貨方洽羡盈充邦國之須適繄幹濟行疇茂績亟踐嚴途代問候發運孫大監狀解去山麾朅來上國尋嬰人事之冗間奉朝趨之常南望使臺才逺千里內省書扎不修纍年簡棄乃宜兢慙何補伏惟坐籌大計參萃繁禧恭以某官名重薦紳才兼數器寖揚膴仕獨映榮班總山海之輸將尚煩劇任瞻邦家之調度行録茂功輿言所符柄用非晚代問侯許端公狀近者伏遇某官告成嵗課入覲天威因假道於屬封獲趨承於嚴斾宿官無狀第引領以傾風貢問不時徒靦顔而增懼伏惟時暄貫序純履餐和恭以某官業履蹈中才猶彪外勤勞十稔總淮海之輸將贍足大農經邦家之支度已列霜臺之祕行登天閣之華翹企維深欣愈曷罄代問候南京杜相公壯茲以謭材猥當煩使閲簡書而按治曽靡寧居奉箋牒以問安已成矌禮伏惟水行貫序谷養餐和恭以某官業履崇髙智謀光大尊股肱之一體挺金石之純誠珍策熙朝已底山河之靖安居就第遽遺圭衮之榮維衆論之稱賢矧上心之圖舊就􅖴大政當叩於元龜善育粹襟庶全於永祿代問候何舍人狀蠢冥無狀汩沒於時亞麾洙泗之交日迷簿領極目河山之阻時曠音縢伏惟坐布寬條翕膺景福恭以某官中和迪哲亮直秉彛學究天人文經邦國才為時而挺出道遇主以大行載筆記言未殫於儒效露章請郡將布於主恩雖光晝錦之行尚淹英衮之命佇膺迅詔還踐嚴塗代問候許州相公狀猥瑣無堪生成有素亞外諸候之守日奉詔條仰大丞相之尊懬塵箋牒伏惟布黃堂之政事卒泰宇之福禧恭以某官勛濟王塗器包民極才為時而挺出道結主而獨深首翔台路之嚴親輔帝期之盛登用良畯裁抑貴權講潤典之所未行讓元功而不知有亟露章於宸扆願還印於宰廷萬民具瞻方依於周尹一相處外俄殿於陜郊幅貟渴鈞冶之仁朝廷思體貌之舊行膺徽冊歸宅元台俯惟冗微庶乞埏造問候通判都官狀阻侍坐隅倐彌旬浹﨑嶇末局固奔命之無休引遡崇麾惕進音之滋緩仰維坦履翕受繁禧恭以某官名高王朝學際聖閫二車贊治聊鬱於聖圖細札須才行趨於帝所代問候青州資政狀荏苒外麾徘徊末路門墻愈逺慮遺疏冗之蹤箋牒不時懼凂髙明之聽企台光而且邈馳愚想以滋深伏惟靜鎮善藩益綏泰字恭以某官際天藴識名世標才宰樞廷之密謨專將閫之外制悉殫碩畫厯樹豐功天下已安暫休于廟略方面之寄屈布於藩條諒五月之政成即三篇之冊拜回崔判官權縣右某比者方效小官獲棲大庇偶沿臺牒暫領邑章撫弱植以疇依跂餘光而日甚豈圖髙誼猥貺瑶封何其賁飾之多無乃謙撝之過永惟感服曷究名言待答王待制狀右某向嬰郡事罕奉郵音阻敘暄凉仰咨寢餗豈圖恩奬猥占教文恭以某官經世偉才搢紳碩望時政有大利害莫非昌言宸謨之日坦明多所潤色行膺鈞軸之拜少慰幅員之瞻伏望上為闕廷精調燕起代答秀州聶郎中狀右某自逺朋簪向紓守紱豈謂不移鄉閈之舊曲有箋縢之貽兼承坐布藩條舉臻茨福恭以某官早紓賢業自結主知擁麾東南已擬郡治之最奉召旦夕行被朝僉之榮伏望精調燕興俯慰瞻頌代答趙虞部狀右某近者伏遇被命出都假道過泗輒緣門下之舊屢獲坐隅之趨虛襟以容雅眷無替而復諒其孤進每有先容俯矜滯蹤力發薦口自逺去於德䕃庶少披於感悰賤介遽還誨音首及拜而伏讀藏以為榮恭以某官當代鴻儒薦紳碩望郎垣應宿早愜於輿言侯服亞麾尚淹於逺跖停宸檢之褒擢復相之光華俯惟冗微鎮卜棲倚伏望上為宗社精調燕興代答陳都官狀居鄰善郡日庇餘光竊聆卓馬之朝入近蒼龍之闕未遑馳慶先辱流音屬先序之方中企賢規而寖邈即膺甄擢倍萬和調代答知宿州朱司門狀嚮繇順驛之臨嘗拜珍函之辱旋沿臺牒往督漕舟行李淹徊日月逾邁抗塵無狀裁記不時恭惟順履初炎翕情純福善藩布詔方著於能聲溫檢須賢行躋於華貫勉遵時序倍保興居回諸官狀王正謹始天吏肇和欽堯厯以授時稱漢觴而薦夀恭以某官親逢盛際早厯榮階屬開祚之膺辰期自天而集慶永言瞻頌曷罄指云代答運使任學士狀拜嘉至渥冒職如初鎮鞅簿書之勞絶攀臺閣之軓豈圖恩照首占教文伏承給食中都餐和泰宇恭以某官器函剛實識貫幾深以忠誼結主知以文章重時論然漕臺煩使誠曰藉才之司而書殿詞臣决非久次之地行祗迅詔入踐嚴途代答湯都官狀向緣朝謁屢遘賢規去德未遐瞻風滋劇旋承新命榮領使麾方列慶函遽貽誨牘恭以某官才猷懋美政術修明早踐清郎之塗洊揚循吏之目第甘泉之最狀允格聰聞甸甌閩之巨邦行旌治迹趨承匪邈企引兼常代答王承旨狀伏䝉逺紆公幹垂貺鈞函不遺外補之蹤曲損大臣之體拜而伏讀藏以為榮恭以某官王佐偉才天元粹氣以文章甲賢選以忠誼結主知飛緌金馬之庭早揚仙貫視草玉堂之署密暢宸謨日奉威顔益隆體貌台星兩兩行正坐於熒煌尹石巖巖自副時之瞻矚代答淮陽知軍司門狀伏審祗被恩書榮臨治屏寸襟增忭餘潤焉依恭以某官識蹈大方氣陶至粹妙年結綬蚤著於能名列郡鎮麾方凝於美政行甄最將亟踐嚴途某適守陋邦獲鄰善壞未遑馳慶首辱占音愧躍兼深名言非諭代答招信羊寺丞狀伏審肅即便辰已臨劇邑坐席未暖早騰治聲闔境相歡謂得賢尹方兹竊忭遽辱流音感愧并深名言非究代回新知楊州張學士狀伏審就䝉細劄移鎮巨藩伏惟慶慰恭以某官才貫幾深量函夷雅蚤躋朝紱之貴久踐書林之游領漕節之輸將參財闈之經畫善狀連最髙懷愈恬益隆天子之知交上柄臣之薦尚稽顯任猶布寬條然主衮儻來靡嬰於素志而江山有助行適於清吟弗須坐席之溫佇被鋒車之召未遑馳慶先辱占音愧喜交懷名言非諭代答詳覆陳著作狀伏審茂對明緡榮躋祕局伏惟歡慶恭以某官器宏才博行潔文醇洊决雋科未紓賢藴掌漕臺之通庾遽被更書由省户以詳刑適當滿嵗亟從宸陛之對擢踐道山之遊未列慶函首紆珍牘永言愧忭曷究名云代答揚州張學士狀近者伏值某官賀言于藩道出兹土獲賢規之覯止愧主禮之缺然旋聞肅東剛辰榮開尊府將迎鮮暇日謹教條之行企忭交懷尚稽箋牒之奉豈圖恩照首占誨文伏讀以還兢慙靡措仍審肇班寬詔翕萃繁禧恭以某官業履淳修才猷髙爽踐書林之清切久别嚴途總漕節之輸將纍持重柄洊臨臣屏增煥豐功旒扆知名素嘉恬退之節朝廷倚德行承迅召之音代答舒州林龍圖狀疆堠相望第風猷之仰止簿書紛委愧音記之缺然豈謂曲代愆儀自敦髙誼乘偃藩之多暇飭記室以占書何其賁飭之多無乃謙撝之過恭以某官薦紳耆碩經士偉才親對休辰薦揚美化登禮司之少列增重卿聨參延閣之榮班有光儒效眷舒人之故國分漢守之左符藩漢須賢暫勞於君重朝廷圖舊行被於帝咨代答盧郎中狀向塵賓席獲吏淮州適逄耆德之英出共本朝之理大事决於庭下率任通明短才備於幕中訖無云補第積官瘝之慮敢圖公舉之榮過被奬憐猥形慰薦旋違恩館鎮奉臺符奔走道途淹徊嵗月塵勞之狀早冗而可嗟起居之音濶疏而不備寄顔有靦論感無涯豈謂自損逹尊首頒勤誨拜而伏讀藏以為榮仍審泰宇甚休景福如召􅚿以某官行推髙爽識貫幾深付古諸侯之權洊更重寄著漢循吏之目行光直書代答杭州吕舍人狀近玷茂恩驟塵劇使事經多目悉䆒寸心簿領盈前曽無虛日懬紓悃幅少謝奬延豈圖乘偃藩之多餘飭記室以占教祗服謙亮第勤愧藏恭以某官德履蹈中智謀經逺蚤陟雋科之首洊揚仙貫之華載筆嚴塗壓司於外命請麾要郡樂布於寬條然而先一州為大用之階辭纍日乃髙賢之致鈞衡之委旦夕以須代答新運使學士狀伏審就解守符復持漕節顧惟無狀方此按章獲使範之焉依增愚襟之竊忭未遑馳慶先辱占書祗服謙勤第深銘著登車攬轡矧視事之初挽粟飛芻佇疇庸之最餘留瞻仰以訖悃悰代答青州相公狀伏審相公光被明緡就更巨屏天下億姓雖失於埏鎔京左數邦獲繄於鎮撫側聞成命竊忭塵襟因敘慶於單函懼瀆尊於上衮豈謂忘公台之絶禮命記室以賜書拜讀以還兢榮靡措乃審商秋貫序鈞履餐和恭以某官社稷宗臣山河間氣均股肱之一體挺金石之純誠備紓賢業之髙亟踐朝班之劇廟堂之上雖利澤之素行藩屏之間欲教風之親及即膺徽冊還秉大鈞夙荷陶甄曷勝企抃答通判都官狀自違盛德倐越兼辰伏䝉特忘位貌之殊首錫誨言之重惕然拜賜藏以為榮伏惟順泛齊舲舉綏泰宇恭以某官學請聖閫名髙士林關掌郡符豈稱髙賢之藴翺翔書殿兹為美職之官伏望倍衛燕興少平瞻頌謹奉狀申謝答知軍郎中狀久阻賢規懬馳公牘豈謂秉偃藩之多暇命記室以占音禮意過勤感藏增劇恭以棊官鐘氣間傑為時老成軍壘班條衆起潜郎之歎璽書褒績行光循史之稱進服徽章倍綏冲履瞻依之懇諭述奚殫答蓬州僉判方中舍狀近㑹高車甫經陋邑夤緣世舊遘晤風期少釋愚心之傾獨羞主禮之缺違顔未久占教致三自損朝廷之達尊弗遺州縣之勞賤禮緣愛厚感與幸并恭以某官材猷懋明襟致夷逺屈能大幕聊繄婉畫之精考謂嚴宸行被華章之寵益綏燕餗庶副瞻祈答方寺丞狀向以菲材之資久承旁縣之乏簿領勞止鎮汩於塵容箋函缺然第傾於賢襝豈圖謙眷數枉誨音逺貽窮海之鮮申貺秀林之實拜賜甚渥貢書弗時尚恃粹襟之寬未識苛禮之廢恭以某官才猷肅給方格淳修劇邑字氓甫成於美謂明廷考績行對於茂恩倍保燕興少符瞻頌答方秀才狀某名在州縣沮壯氣以無餘賤如塵泥分英才之絶顧豈謂方君先輩特敦髙誼逺枉珍函褒假過優諒緣於誤聽庸愚自揣有激於加修炙溽貫辰燕興迪吉行攄素藴平挹顯科瞻頌交深文陳非悉答范仇香狀自逺朋逰倐兹纍月徒勞吏職曽靡定居愧書禮之缺然遽誨音之來止益知雅契之篤兼審粹襟之和恭以某官方格淳修才猷膚敏大邑從政猶未朞年當塗交章計在匪日答王交代狀嚮竊恩章濫紆宰紱考格垂滿治材本疏賴有後來之賢將更既往之繆永拜新命稽修慶函豈圖隆謙先占溫教恭以知縣祕書氣得天粹學鉤聖微早交諸公之章可知一邑之政上心嘉乃遽降於俞音萬目顒然佇觀於新治益綏福履行服褒華感頌所叢名言非悉答東陽韓中舍狀進膺明詔出宰劇封方列慶函繼紆榮牘兼承撫字之隙坐擁福休之繁民口交歡適歌於新治官居甚邇幸竊於餘光倍保宴興少平瞻嚮答滕廷評狀某名在俗吏跡疏時賢青雲得塗因觀民足之逺黃綬為邑益覺致身之卑敢圖髙明弗有貴重親占溫教欣奉仁風讀竟感來榮存辱去兼審協班寬詔坐擁繁禧恭以某官道具醇全業包康濟厯試藝文之要連升科等之優别乘雍容豈需滿嵗嚴塗陟降其在匪朝答丁著作狀自違風槩再見嵗除旋承茂對明緡顯升祕局迄無暇日阻列慶函敢圖通明弗爾簡棄逺頒溫教垂賁寒蹤其為感藏豈敢忘去恭以某官量函夷雅學探本源金馬之廷方參於華序石渠之府行考於祕文嵗籥幾終天和迪吉永言瞻頌曷究指云回諸州守倅逺迎狀國賔戾止適修迎榮之常道主勤斯遽枉撫存之問即披賢矩併敘感悰回不經厯州軍守倅逺迎狀張旜表事莫遑枉道以瞻風搖斾馳心遽辱移書而講好永言感慰第極銘藏回移厨狀方趨長道適次巨封過䝉主道之勤特置公庖之腆仰銜厚眷竊謹中藏代答滕廷評狀偶逃官曠猥玷序升敢圖名世之賢首講珍函之好誨辭溢美感臆兼常恭以通判廷評學鉤聖微才適邦選果符輿論之屬進列鼎科之榮别乘雍容扉需於滿嵗嚴途陟降計在乎匪朝伏望上為邦家精調燕餗答福建轉運曹司勳狀比玷茂恩併加誤寵擢司內命假尹中畿猥䝉慶問之流第劇感懷之摯恭以某官才猷膚敏風績宏長領南服之輸將贍大農之調度行甄美課益保粹襟答慶帥孫給事狀伏審茂對明緡顯升瑣闥側闈成命竊忭丹衷恭惟某官經世偉才際天逺識蚤紓碩畫屢懋膚功旋易左符暫勤西略總兵民於一道穩若長城肅號令於諸蕃晏然外圉詔音非晚柄用其時少副瞻祈益綏燕起答雄州趙都使狀伏審顯承恩詔增峻使聯首煩榮教之臨差愧慶函之緩恭惟收勤逺略倚重要藩用威愛之兩端督戰耕之大本坐升禁衛行擁節旄感頌并深名言奚罄代馮內幹答鄭州王防禦狀近者靈輿西引吉仗東旋往來要邦終始大事靡闕百須之奉率繄千慮之周坐以享成居然備使仍首貽於誨牘誠過篤於謙懷臣節益明兹不忘於忠孝君恩雖大知有報於生成欽佩兼深名言非悉答棣州王學士狀假尹神都之劇日費剸裁懷賢治壤之遐居深馳嚮逈存髙誼首貺珍題秋老氣清益綏寧於素履才完行潔將陟降於華塗回燕王狀適驅軺傳甫次都圻猥䝉禮意之先特損書音之貺仰銜撝挹增劇感藏答副使狀駕言單傳道出别畿特枉珍題良紉謙懷之篤弗遺未介第藏感臆之深答留臺崔籍庫部先狀伏審茂對恩章榮持留憲未塵慶牘首降誨函仰重意之所臨戢懦衷而無斁恭惟留臺庫部鍾氣間傑為時老成暫均佚於分臺足增輝於列宿即諧參對倍切欣翹答耀州知府樂少卿狀某素乏吏能繆參帥畫屬方祗於官局曽未列於公函敢謂自屈名卿之尊不忘故吏之眷首頒溫教垂賁寒蹤伏讀再三感藏千萬秋炎尚熾時祉載蕃恭惟知府少卿不世壯猷為邦雋老寬條所布方坐鎮於善藩大政其咨行召還於舊德盧郎中狀頃備下僚僅彌朞嵗沐仁侯之撫愛均國士之奬知遽㑹露章堅求易郡俞詔隨下孤蹤失依尋伏枕於踰旬方驚困篤逮解麾於舊服莫遂遮留鎮為吏職之榮缺爾公函之奉仰惟純履舉集醲休恭以某官王國偉才郎垣碩德甘泉奏治狀之最宸扆嘉老成之風行被褒書驟陛近署田省主狀語才亡狀䝉顧有年何幸走於江淮倐淹徊於日月門墻愈逺分遺冗外之蹤箋牒不時慮凂髙明之聽伏惟坐籌大計舉擁繁禧恭以某官才貫幾深器函剛實雄文取重於時論大筆追還於古風親逄聖辰獨膺賢選究國體而指人事已擅著篇之竒潤神化而輔帝猷尚淹當軸之效矧計庭之上笏即台衮之便塗匪朝升庸為世休福又恭以某官方格淳修才猷膚敏雄文珍䇿早奉對於大廷要職美官遽垂光於當世傑識即以照今古重計足以尊邦朝雖上知之甚明顧賢圖之猶鬱主謀才府暫繄經畫之竒兼秩禁扃聊稱文章之實矧觀已試之效宜被非常之恩詔冊發中宰衡升用手陶坯冶之化大副幅貟之瞻開祚膺辰自天集祉某預外臺之將漕方備屬官祝南山而捧觴敻違私懇又器能無取蹤跡本孤早被恩憐力垂振拔雖日馳箋牒曷殫感遇之懷而鎮鞅簿書尚缺問安之禮伏惟坐籌邦計翕萃天和恭以某官行潔性醇德宏業巨髙文大冊優踐於賢科美職要官進揚於聖世兼禁扄之嚴密主財府之經宜富國澤民皆出著篇之素秉鈞當軸未紓經世之才矧給足於中都行奉承於徽冊宋侍讀狀語能無狀被遇最優迹久去門墻之嚴書再徹左右之聽居常牽吏繼缺問安大臣之量猶江河能容簡曠小人之背負芒刺第切兢慙伏惟宣布教條導迎禧祉恭以某官夙鍾間氣親㑹熙辰厯更顯仕之光增重薦紳之望鬱胸中治安之䇿猶屈守麾樹天下太平之基行登台席李端明狀支郡下僚西州末介跡一去門墻之峻漫厯嵗時耳弗聞訓誨之餘坐成愚陋宿官無狀奏記因疏豈謂自損台嚴首傳教旨孤蹤知幸淪髓銜恩伏惟順履初炎翕臻景福恭以某官夙鍾間氣親遘熙辰蚤升祕殿之華久踐禁扄之邃華要之選翺翔殆周名重薦紳道結當扆然文章之任已極於儒榮而鈞軸之嚴未平於物論行膺徽冊亟宅上台南京歐陽龍圖狀按章郡邑鎮為簿領之勞馳想門墻俄懬音縢之奉伏惟肅班寬詔舉萃繁禧恭以某官名世標才際天藴識屯夷殊致明哲惟均自結中宸之知早躋內閣之貴幅貟億姓願託於國鈞藩屏一邦尚司於宫鑰時議雖鬱主心已傾諒五月之政成即三篇之冊拜與王交代狀近者使還貢書計已徹視吏冗鮮暇續疏問安伏惟待次多餘練神增裕恭以某官道具醇粹學探本原聚以藏身為士君子之守施之有政得古循吏之風益輔夷襟行光逺跖他留瞻奉併訖悃悰與王交代狀末吏淹期方盈於愧汗髙賢廣度遽錫以誨音審履春陽益叢天祉終朝北首以須華馭之來曷日南軒俾釋芳襟之望餘留覘拂併寫悃忱發運張司封狀解印小邦還臺纍月京塵汩沒益嗟俗狀之勞書舍缺陳第企賢規之粹嵗華方晏福履攸寧恭以某官簡厚凝姿中和秉哲周才足以了大事敏識足以照羣疑中外僉言當踐嚴塗之祕東南重計尚煩碩畫之精靡俟終更即祗迅詔俯惟瑣品蚤預同升欣頌兼常文陳非諭河北運使李司勳狀伏念某叢爾孤生斷無他術委身屬部嘗䝉慰薦之再三碎首思閎未報生成於萬一自違門下承乏淮南素號僻州了疏便驛怵音縢之不講第顔汗以無從竊恃兼容之私弗誅苛禮之廢苦寒貫序恬養餐和恭惟某官業履純修才猷膚劭蚤揚膴仕獨映熙朝眷言北道之雄尤慎外臺之選亟圖籌畫專領輸將適此登車沛然餘刃行瞻中都之費坐澄列郡之源雖使節觀風誠周才之允屬而相門襲慶矧前烈之未隳即踐嚴塗行參妙選敢因毫素用寫悃忱樞密吳侍郎狀恭惟樞密侍郎文經邦國學際天人親遘唐虞之盛期獨懷朝董之珍䇿危言切指蚤奉對於大廷妙略參陳適運竒於密幄登庸之選倚立以須迎日在辰膺時納祉某素叨奬拂方總輸將惕馳慶以無階第頌言而滋劇副樞吳侍郎加禮部侍郎狀伏審祗承制命增峻台儀進敡天子之光登踐春官之二伏惟慶慰恭以樞密侍郎氣鍾間傑道具大醇體安素履之休德蹈黃裳之吉危言珍策講重計以尊本朝勝算偉謨經逺猶而禆宥密早被先皇之用重膺繼聖之知特録精忠亟加顯秩惟是常伯以為亞卿逖聞成命之行彌增寸襟之喜代與發運楊郎中狀進玷茂恩往祗煩使竊顧宦能之疏短寵愈憂深向陪尹政之浩穰力隨神耗逃責弗暇投閒乃宜敢虞詔綍之頒輒與漕臺之寄尚繄厚幸將庇末光屬炎律之貫辰諒粹襟之迪吉恭以某官量函夷雅才際幾深董山海之輸將方圖碩畫贍邦家之調度行懋膚功靡俟終更即趨迅召李侍制狀為郡事煩寓書禮曠仰惟吉履俯萃醴休恭以某官才貫幾深器函剛實雍容邇綴暉映端朝侍帝閣之凝嚴方繄潤色掌天銓之華要適賴持平田侍制狀頃吏西州屢瞻崇斾玷塵慰薦之數䝉被顧知之優旋去恩閎漫踰嵗籥曠奏書而敘感姑引脰以傾風逖料燕興翕臻禧福恭以某官民靈先覺王佐偉才親遘穆清之期洊更繁劇之委迅躋內閣孤映端朝然潤色宸篇末殫行事之效而頒條侯服庶見澤民之為代答兩轉運狀叨二屬封獲棲巨庇輒論榮遇䖍貢幽緘方積瀆尊之虞固無還教之望豈圖恩奬嗣損音題三復以周一謙斯在仍審提衡外計按治列城素履攸寧蕃禧紹至金榖登羡適砥中都之饒綸綍褒嘉行膺大柄之委伏望為國自重以時考祥諸路轉運狀比塵劇使蓋出曲恩曽無經畫之明率藉輸將之助受署纍月貢音後時伏惟坐籌邦計之繁翕受天和之粹恭以某官才猷膚敏方格淳修漕節澄清方凝於最狀宸緡溫厚行服於褒章瞻頌交深名言非諭代賀提刑主客改轉運狀伏審國計須才朝簽議可榮膺宸詔就改使麾伏惟歡慰恭以某官當軸慶枝薦紳碩望親逄真主之運早踐列星之垣忠誼秉心術業經世按祥刑於列郡多所平反第美課於嚴宸益隆委寄重中都之支度領南服之輸將運心計而有初簡聰明而非邈俯惟孱品方託巨庥聆邦家之擢賢惟增距躍如犬馬之慕主尚戀恩暉適守官常阻從賀列彌深企抃曷罄敷陳祠部集卷二十一
