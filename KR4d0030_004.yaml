body:
  text: 祠部集卷四宋強至撰五言律詩李花地暖春才半蹊深氣巳暄風光何處好雪浪此時翻勻似金刀翦裝成玉杖繁夭桃漫相壓吏部竟誰言曉鐘縹眇驚春夢鏗轟送曉聲敲煙出野寺催月下山城窗映東方白燈留半壁明隱然餘韻在羣動巳營營閏月晦日乾坤一傳舍日月兩征輪邂逅逢餘閏連綿送晚春巢邊迎燕熟枝上數花頻漸暖茅簷日吾將理葛巾落花林間花自飛物理不應悲偶對飄殘地休論艷發時有情香水靣無數點河湄蜂蝶含餘意徘徊繞舊枝因訪楊公濟遂同步野夫家省其母野夫時就試南宫馬繫揚雄宅門過孟母鄰升堂豫獨拜豫拜其母同井子兼親公濟所居與之密邇萬卷先生富千金舊産貧早將安穩字去慰杏園春同楊公濟賦破山得開字無物終天地青山豈免開萬人鑱秀骨一氣失全胚漫貯崇朝雨猶防浩劫灰何年巨靈手曽此擘崔嵬同楊公濟賦晚過西村空影倒波面晚陽留樹梢人煙青近郭鳥道暗長郊世外空搔首溪邊懶結茅滄浪那敢羡漁父定吾嘲苦雨雨腳灑不斷魚龍沸巨溟浮泥溢平地暴水入中庭門巷絶尋訪壺觴誰醉醒頑雲速收斂渴欲覩天晴螢幸藉炎蒸力因遷腐草蹤清宵能自照暗室肯相容雨巷幽光晦風簾亂點重臨書方汝賴惟恐有鳴蛬種藥百藥吾誰辨農皇舊有經傾金購善種按譜驗真形易地防根瘦他時欲劑靈天時縱不雨灌溉賴園丁贈於潛張定國蕭散前川令才高氣亦剛學攻諸子短能涉衆人長日月銷書卷功名撫劒鋩他年有大用莫漫比柴桑某近與和叔遊景愛之不足因吟短篇以贈夫子南州傑相逢出肺肝平生潛聖閫壯嵗尚儒冠鴟鷃霄垠擊蛟龍井底蟠恥將孤憤劍容易向人彈贈李熊先輩􅍶崒閩人秀夫君得最完文章醇不雜氣質渾無刓場屋聞新詔鄊閭正素冠天應老賢業頭角壯年蟠詔書一日至多士競軒眉獨有儒林傑方纒風樹悲飢腸惟飽學正口絶柔辭從古器大者於中成就遲與王仲密諸君泛湖十月清霜後孤舟皓氣間酒邉頽白日棹底倒青山境勝歡憂泯吟頻物象慳吾儕一笑後魚鳥伴誰間急棹趂吳門寒日山尖落孤煙樹杪屯水流天欲動舟急岸如奔縹眇穿雲角蒼茫望郭門片心爭宿鳥去去近黃昏初入汴山勢隨淮斷河流帶地渾嚴風踈樹影落日露沙䀶客興雙蓬鬢吟懷一酒尊舟行那敢緩霜意滿乾坤新鶯未見攀花宿才聞隔葉歌可憐毛羽細莫怪語言多匹馬春風路輕舟夜月波數聲來入耳最奈客愁何轂下春日楊栁長安陌遊車錦繡香漫傾春日酒誤入少年場意氣青雲客風流白靣郎致身愁獨晚檢點鬢毛蒼寒食前二日對雨紅濕花枝軟青涵栁色鮮未開新禁火自起欲晴煙坐卧銷佳節招尋憶舊年故鄊遊樂地心折泛湖船對雨寄楊公濟江海嵗云晏雨冥風自凄葉光羣木洗翅濕幾禽低靜榻欹寒枕孤城隱暮鼙少陵車馬客催踏草堂泥雨中呈丁評事騷雅丁夫子年來客路岐故關春夢後獨館雨留時詩有龜兒掌遊須驥子隨令嗣侍行君家千嵗鶴應解念歸遲歸鳥日落群山靜天寒獨鳥歸聲悲故巢逺影入片雲微蹤迹憐吾滯青冥羡汝飛莫為雙翼誤須避暗中機宿慧安院積淖厭行路解鞍欣曲肱疾風穿敝屋細雨濕青燈聒夜有飢鼠觀空無定僧中宵塵纍息山水思填膺九日病中泊舟召伯堰采采南山菊還應滿故園豫之小圃實占南山全家泊孤埭多病負清樽木末秋聲老天涯雨氣昏鄉關吟望外愁淚有雙䀶某為府曹伏蒙吳先生以詩見寄謹依韻奉酬瘦馬風埃裏蕭疏分亦安間趨京兆尹冷甚廣丈官錦繡頒詩句松筠映嵗寒天邉師坐濶南望秖長歎同盛任道賦暮隂得寒字野館臨空濶江城起暮寒年光去天末雪意上雲端自失歸禽影能侵病客肝莫將愁對景入夜轉漫漫次韻禮之齋中述懷僻坐治孤學取書窺古人高風凜如在千載邈相親欲滿詩書腹寧規富貴身獨君知已厚無亦慮吾貧春雨一篇呈純甫賢僚縣庠諸彥漠漠隂常結垂垂勢未收潤多宜土脈落久驗溪流與物知無間於花似有讎少年車馬客惆悵為君遊二月大寒偶書短句上天誰與問四序曷相干已季春成暮當溫氣反寒農心憂地凍俗眼惜花殘我豈殊民意身為父母官經春罕嘗見花今出湖上悉已離披飛花何太急春在豈須忙亂點不經眼殘枝猶斷腸愁看湖色淨怯照鬢毛霜回首壯遊地幽襟付淺觴山中遇雨馬上涼秋雨隨愁入亂山垂垂衣袖重點點鬢毛斑猿鳥寒聲外漁樵古畫間片時全嶺暗急趂暮鐘還純甫小池生雙蓮造化有詭異雙渠共蕚翻凌波洛神艷泣竹舜妃魂得所雖欣地猶孤尚笑根聖朝不言瑞圖獻恨無門和純甫獨往至德上方避暑敝屋數楹隘炎曦一線長梅仙厭煩溽蕭寺得清涼山鳥聒幽耳澗泉蠲渴腸兹逰君獨勝河朔浪飛觴通判國博惠建茶且有對啜之戲因以奉謝數餅建溪春求逾尺璧珍封從鄉國逺惠與郡僚均午榻忘搘臂晨觴厭啓唇拜嘉當對啜相待况如賔書窗一室微吟地開窗更欲虛入雲驚紙破照月愛櫺疏野色連朝夕秋光滿厔廬何如謝太守逺岫獨相於寄題張殿直長春亭甲第俯河湄修亭靣勢宜琴樽長有樂草木似無衰境勝青山敵心間白日遲祖良迷大隱獨與赤松期寄題郭明府寺丞潁上西齋退築謀何早間居興頗濃渠流通潁𣲖窗列隔淮峯玉麈談賔盛牙籖載籍重雨中時墊角一代慕林宗奉答雅均途中見寄二首濁流非猛激無以頓澄明此邑先膏潤今豫力潔清人皆疑矯行君獨照真誠一得途中什譊譊衆口平貧固誠吾分廉斯亦士常漫多愚執守愧少子文章雅均前篇頗憐豫廉貧復有論文有力之句雖幸相逢近猶嗟此别長何時却南轡重把論詩觴觀棋鬭智不鬭力一枰思解圍防人甚勍敵平地有危機蝸角爭先後狼心競是非傍觀縮手者往往見精微九日過後漫題堂前雙菊花日金相照條風翠競翻誰言羞晚艷自喜勝孤根客土深培力家人一溉恩秋香真好在未易負清樽和純甫紅葉秋園無艷色特地起西風間向煙林翠時呈霜片紅霞光青漢襯燈炬碧紗籠不解隨松柏染裁煩化工再次韻和純甫紅葉之什徒密嗤翠幄有文殊紫屏因霜變顔色點樹作丹青廢苑掃還聚踈林生易形秋風無别艷祝爾莫飄零挺山道中早行有感晨興事行役寸祿此時輕撲靣風霜緊隔林雞犬鳴遙天分淡色殘月露微明便欲投簮去無田可力耕山驛孤燈盡霜天片月低還家人自喜戀櫪馬頻嘶野水分微白巢禽驚穩棲前村應曙色依約數聲雞宿山寺蒼莽窮山路蕭森古寺門夢深宵殿月淚迸曉枝猿人事隨羣動山情阻細論城中塵沒眼愁思滿歸軒某承乏東陽周親惠然顧訪未幾告别以詩餞之親戚富貴合賤貧宜見踈獨君從逺道為我枉高車相得未逾月薄言還故廬風霜正凄暮臨别尚躊躇晚登至德上方偶書短篇呈山主雲公城市隔半舍院距邑十五里好山寧在深亂雲歸别塢落日照踈林能解外緣縛始堅安住心冠裳方我誘漫作愛山吟離東坡後寄題義師上方山水東陽富僧居更翠微晴峰露秋骨古樹減煙圍啼鳥逺相應孤蜂間自歸豫生秉幽尚夢想在禪扉劉叔茂及第後往廣德拜親過吳江新治今嵗同升客如君有幾人青年登一第白首具雙親喜氣生軍壘歡迎聚邑民諸兄在天祿勉去繼清塵惠山泉封寄晉陵船東南第一泉出瓶雲液碎落鼎月波圓正味云誰别繁聲秖自憐要須茶品對合煮建溪先官滿將見舍弟三歲别吾弟今歸心始降從兹得安寢無夢過重江預驗鵲音喜行看雁影雙西湖猶可泛酤酒市羊羫途中寄純甫諸友分攜地重陽欲近天共誰搴菊蕊獨立憶梅仙對飲乖今日傷離似去年佳山足吟賞應自有新篇志逺法師挽辭寂寞湖邉寺荆溪目巳瞑窗雲猶曉白竹徑自寒青野鳥悲吟動門人感涕零里無梁補闕誰可法師銘庚子歲除輦下作呼兒來秉燭點檢鬢邉絲志在驚時晚年加願曉遲京華猶旅食世態益吾悲四十明朝是愁吟杜子詩久雨見月千門却燈燭久雨愛氷輪愁眼開今夕清光對故人更長頻側帽望極反霑巾幾為浮雲掩行藏類此身立春宿凍歸何處池塘漲暖波日盤花靣永風入鳥聲和爼菜堆生葉閨裳剪薄羅獨憐詩酒興早較昨宵多依韻和粹中早春寒威猶壓曉淑氣巳回春不道朱顔舊剛憐華歲新震雷將出地蟄户莫存身漸報鶯花信眉頭日漸伸早春寄擇之北陸寒威盡東郊晝景添風和引禽哢氷暖出魚潛草木回生意乾坤待澤漸寧知巖谷下經歲嘆才淹正月三日郊外馬上作長日牽人事新年散馬蹄和風吹凍栁殘雪點春泥意愜境自勝興來杯屢攜徘徊羡飛鳥曉逐野雲低禁煙節同子玉徐先生野步繫馬道邉樹杖藜坡外岡風來花自笑露過草猶香樂事論三月吟懷騖八荒時平那有感雙淚肯浪浪春色淺深花靣染來去栁邉浮雨氣那能洗年光亦共流濃濃交野緑拂拂上朱樓轉恐紛華眼蕭條不愛秋題劉有方御藥翠巖亭購石黃金費開軒翠玉叢端居憐象魏逺意自衡嵩花弄踈簾日禽呼靜榻風移山寧有術未易笑愚公升之元真觀讀書白日無停運青雲要早圗寓居鄰上士述作笑潛夫案冗書籖滿窗明樹影孤徘徊拂塵壁一半舊題無送李厚祕校赴相州戶曹迎婦金貂宅之官銅雀臺俱新是婚宦有素獨憐才簿領時能撥圖書日可開無勞歎州縣自足脫塵埃醉卧彭澤終朝飲杯乾入醉鄉眩頭遺野幘坦腹委藜床吏部甕邉卧山公馬上狂何如此安穩寢興為吾長和叔以琴詩見貽因成一篇奉答製就七絃器斫殘千古桐正聲希世出羣耳此時聾徽暗列星隱意存流水空憑君莫輕撫留取和薰風古劍只因耕戰地得此古龍泉磨拭自今日埋藏曽幾年無將試蛟窟宜待靜狼煙寄語姦邪輩當鋒莫向前壓書玉白玉雙蹲工深刻楮勞長疑奔月窟渾欲動霜毛似喜書成穴猶驚筆有毫案間誰汝待自覺守株高睢陽春日偶書二首凍栁輕能舞枯河暖亦流東風應自好逺客獨含愁攬鏡傷吟鬢無錢買釣舟誰能終日興大半在滄洲楊栁亡隋岸風塵舊宋州寄家盈百指憶弟濕雙眸旅宦那能定人生本自浮旋酤街北酒凖擬送春愁睢陽别包進甫飲遍長安酒春風送馬蹄異鄉憐會合明日復東西行興看君速歸期恨我稽門前客星瀨到日濯塵泥别希魯回馬上口占兄佐諸侯幕愚居孝子廬奔馳他自得情味獨相於先送秋帆動還嗟友席虗平生感知淚今日為漣如大風正月明朝盡東風半夜狂乾坤搖蓋軸草樹拔毫芒亂瓦飄無數寒沙走更忙聖時讒口絶天令莫乖常寄盛子美俞元功二先輩二君得第後守選寓相國寺習試法彼美吳州傑相從蕭寺居聊窮三尺律肯恃五車書前有殊尤等行當選擢初秋風吹客袂鄉思復何如試法新立數等寄公立一朝揮别袂九日在征岐識我相思意如君獨坐時榴花須滿盞菊蕊况盈枝目下重陽淚宜看杜牧詩寄俞君度夫子憊巳甚平生心向存黃金空舊産白首寄他門獨酌醉應淺愁吟聲更吞飄零那復久知已有平原員外陸先生常恤其貧過洺州朔野風煙古臨洺氣象存魏風沿土性漳水抱城根故壘盤荒草殘碑落近村太平民産富桑柘半郊原祠部集卷四
