body:
  text: 祠部集卷二宋强至撰五言古詩賀陳右司生辰悠悠大塊間萬類紛相敵偉哉拔俗人真宰豈無力六經陷邪說釋儒共一律天未喪斯文公生抱絶識著書羅古今射策開胸臆前輩幾欲盡後來昧所適天將激頺波公生秉孤直數諫難居中三已無愠色海宇屬無虞天工或曠職天保祐皇帝公生藴竒德培擁棟梁姿一旦壯王國禁網雖小寬疲俗未全逸惟天念我民公生富才術發揚雲雨勢諸方待膏澤天既責公深眉壽夫何惜行看佩相印不羡登仙籍南山雅望重北斗威聲赫禀生固難朽吐納自不息惟昔軒冕徒尤喜山林跡留侯追赤松志就亦何益傅說為列星但己脫寰域孰如我公貴與國長無極送張升甫三十韻歲餘客秦雍處俗失大方眼前紛朋游外同異中腸最得張子晚一見合柔剛拜我十年兄本非以其長直緣父兄舊及此三紀强子之先大夫疇昔倅餘杭豫時以童子進謁升公堂仲兄齒豫亞同學𨽻州庠行聫坐接席無異彼雁行此時君尚孩縱記今亦忘去住忽南北中間異行藏後豫與君兄鄉貢入帝鄉見面初驚疑偕問徐乃詳同年忝進士茲復同省郎伊豫論契好始見今髮蒼昨君解下邽東去隨薦章歸來婦翁家春風到秋霜豫居幸對舍有酒呼隔牆往還興頗熟間外絶毫芒乘月步橫橋觀漁立回塘詩句迭唱酬稍稍積巾箱自許先功名知我尚激昂放言遺形骸不以我為狂古稱管鮑交千載竊相望辭我復云東坐不安吾床汴水日向落更久不可航甬東拋田園不治久欲荒急省江南兄數事皆不遑殷勤挽征袖强留盡一觴何以將别意時菊有清香送吳令常甫之武平朝廷重一邑悼昔容備員自嚴薦舉法頗號近得賢仕者既擇地主恩那罄宣遐封暨惡壤十必九棄捐武平杳何所閩裔天南偏林密毒虺藏吐瘴蟠長煙冬候氣亦暖里俗衣不綿舊冬昨請代闕榜張三銓無人議一往常甫獨不然丈夫志四海豈安廬室邊畏避屬衰怯我今幸壯年所寄有民社勇去無山川吳天破新臘雪片衝離筵闔坐勸别杯情厚禱亦䖍藥餌慎勿疏善保食與眠柂牙起驚濤餞車散江壖吏民前塗奔爭迎上瀧船到修府中謁首低小侯前主人知才名應以塵土憐下車轉春首訟未臨婚田逺人喜新君有訴恐不先據案掃滯務一决如流泉呼兒伴兒戲邑事樂靜便地寬人物稀林實雜海鮮荔子委樹旁毛魚不論錢飲食信云美那肯事宴筵政休寧間齊空腸味陳編他人保無過歲滿猶自遷矧君資性好進業補未全材長老松幹氣强直弩弦坐養青雲資歸著要路鞭君家新蔡後清節能世傳豈必因賞格薦狀期聫翩鄙人忝末契相識由童顛憂懷自足感况復别緒纒君其慰我私北鴻附新篇曽元恕纍日不相見以詩垂寄依韻和答丈夫收功名要在少壯時今豫四十强才短良時遺俯首入掾曹所託真一枝動靜繫他人何異馬受縻事業乖聖賢饑寒愧妻兒浩歌望青雲致身分已遲江湖久去眼終日懷釣絲元恕知我深愛惡非衆隨憐我事冗宦役役猶兒嬉十日不一見敢以奔走辭與子結永好交情保無移相從文酒歡晚歲滄洲期走筆成一篇答徐君先輩見寄定交初何年昔齒㑹稽學君壯我尚少道復先我覺子時于衆人百鳥一鸑鷟學官程諸生題品或義卓衆方縮手顧君筆已一捉落紙千餘言渾如金出璞辭場或鼓行無敢犯鋒矟有時談遺經聖賢在口角憤疾異說妄摘抉三傳駮語氣清不休旱天冽雷雹南北俄乖張同時去師幄未幾㑹京國君羽正濯濯以文試有司好古拙雕琢一失太常第聞子繼屯剝翠鎩纍在毛龜剔釁由殼古人亦憂患千載名愈卓豫雖綴小官夙志負山嶽簿領但戕性祿粟不周啄再命作陋邑舉動尤齷齪旋巢子何所距我幸非邈寄詩冬為期當遂笑一握待將得喪理同付尊酒濁送元恕我本生窮閻才命兩乖塞再試得一第失足落銓格去年赴選集摩肩雜𨽻役吏口駢名呼摧沮氣填臆僦居在間坊門巷少人迹于時苦病吟誰肯顧越舄髙冠縱一臨車馬有屈色平生青雲志帖帖若墜翼羡君富詞才時志復兩得解褐拜初命便綴審官籍秋髙馬足健駕言往京國諸父列禁嚴南北羅第宅往來伯叔間此行穩棲息君家世儒林圖史况山積燈火今可親幽探勉餘力京都號紛華君志定非溺勿貽雙親念此外慎眠食早行澠池道中二年别咸秦八月過崤澠碎石隱地起險塗抱山轉我馬無完蹄我僕有重趼林紅烈炬暴澗白亂流淺夙駕露濕衣夕休獨臨饌轍迹環九州孔子未能免咨豫獨何人安坐顔輒靦區區適其宜誓將策疲軟乙已十月七日過黃河中流遇巨浪偶作清旦絶大河拍隄滚黃沙巨舟忽搖簸心悸眼亦花咨豫豈輕生將身試魚蝦忠信固所慿此理懼或差定息神魂寧歸心眇天涯故鄉念昔游湖靣貼碧紗醉舫穿芰荷坦腹如眠家天水自照映鷗鷺相交加雖無風波憂齷齪未足誇豈如尋河源安穩浮靈槎脫略遺近觀飄飄薄飛霞低頭顧濁流卑險吾汝嗟過潼關巨方信天開嵽嵲土山口豈惟控內外勢不漏飛走一夫或當關可敵萬夫守山河此襟帶怙險聖所否明皇晚倦勤意恃太平久絶艷荒真妃轉盻六宫醜祿山假天性恩豢不知厚鐡騎長驅來哥舒苦徒手吾君暢道德四海一父母人心自固結茲關復何有苦雨關輔連歲旱耕地千里赤官家放租稅猶有道邊瘠羣國乞膏雨童巫呌蜥蝪神聽久寂寞民意轉凄惻天公忽瞑目一怒乖龍殛雨師偃其旁驚起振厥職不復計多寡傾㵼信朝夕入地知幾犁陜人以犁測雨之深淺地上但盈尺訇如三峽注那辨四簷滴落勢曽未停廬井反憂溺始知天公難不易人願適舉頭告風伯速吹濕雲坼却還秋日光迤邐照阡陌俾民布新種來歲飽牟麥幕中偶書劉侯驅車東幕府賔客稀憑几獨蕭然真與萬事違巢燕無世情間堂時一歸東風忽怒號輒來撼窗扉攪我靜中趣聒聒無停威塵沙亦侵人猶喜勢力微日暮風稍息出户聊振衣行吟視庭木枝空但花飛幽思感晚春浩歌送斜暉翟公大書門怨激恐已非俗物喜去眼杜子吾庶幾徙居人生如寄客况復真客宦南舟與北車來往若征雁殘暑赴西雍冉冉忽秋宴三徙乃定居始至寓法掾㕔又徙倅㕔又徙書記㕔遂安居什物旋營辦騰移費負挈猶恐僕夫訕幕府文書稀食息有餘間短才乏所補公給浪䝉豢懼辜主人恩從事不敢慢南軒有佳趣流渠㵼幽澗潺潺無時休弄水悅童丱關中氣候晚時菊始云綻亦有終南雲朝暮生顧盼浩歌一樽酒常分任鵬鷃幕中書懷宦游老歲月春花漸空枝坐耗鏡中顔日饒鬢邊絲流俗宜重輕青雲勢參差剛腸寡所合出門復何之趨向於今乖考古聊自怡黃卷有聖賢目覽心與期君子顧萬世小人較一時不見九原骨貴賤共狐狸惟有賢愚名縱久亦兩岐退之賦二鳥無乃為物移信已一推天孟子真吾師得喪付濁醪身外非所知九日與諸君飲寒暑當遞遷日月㑹陽九緑鬢驚秋風黃花泛樽酒行樂重此辰登髙命諸友古人感塵世宜開笑歌口送粹中赴舉朔風攪疏林短日寒無暉有客氣軒昂束書赴禮闈行槖雖云輕滿抱藏珠璣出以售春官善價其可希骨肉送出門稚子猶牽衣我為舉别觴一言庶不違京師足紛華慎勿事輕肥白首有雙親待子得官歸石亢之出銅雀臺硯相示信筆題其後銅臺遺荒基寂寞千載下黃埃朽壤間所得或片瓦硯材世共珍購金不論把浪好昧所别往往亂真假聞毁憶初向關中觸熱事西走淋漓汗征衣早夜犯星斗歡然赴所知辛苦復何有主人喜賔至相見勞杯酒誓將效毫髮聊以塞所厚遇事因輒言何嘗計從否平生性坦率間或忤交友是非長安城側身避讒口彼姦乘其前吾慮亦已後二叔誣周公三人惑曽母青蠅亂黑白視潔以為垢聖賢且不免豫免焉能苟浩歌動歸歟至此信不偶春風憶東南巖花映溪栁南山有屋廬釀熟喚鄰叟何時理扁舟舊物入吾手回頭謝狺狺投北汝誰受壬子歲旱熙寧歲壬子春旱初可怪不雨訖夏尾天地一爐鞲赤日裂厚土黃埃沒經界農夫望雲霓脰折意未懈侍中守北門撫俗先罷瘵閔雨憂更深遍禱劇齊戒老宫與佛廟三日一往拜冠者厭於呪褐者勞於唄雨應絶不聞煩鬱何由快憑誰訴天公請執乖龍械豫初春被病中夏少間勉入省局偶成二十二韻東風吹春來移疾聊少休寒熱戰豫軀漸如錯春秋侵尋日以劇謁告牒屢投性命吾自安所負空食羞交親每問訊愛者或見憂伏枕數晦朔忽忽月四周有叟肆囁嚅咄哉我何尤騰口狀豫疾張大實頗浮背憎咒休咎唯恐豫疾瘳寧獨冀術勝仍欲悅豫仇叟乎汝何愚天命非爾謀生死籍素定理莫移恩讎身世如寄客日月速置郵引照盍自警霜雪滿汝頭胡然不知止脅肩諂貴游干進苟朝暮利吻銛戈矛豫今偶不死官意滋悠悠卻來坐省局心跡逾林丘北扉對新篁隂薄幹巳修薰風送瀟灑不博千户侯富貴功名間有待終無求鸞鳳志寥廓燕雀徒啾啾某蒙君章兄寵示櫻桃佳篇輒依韻奉和炎蒸有正色下與地氣關相結成含桃使冠百果班獨憂赤日曝坐變紅成殷多應綘闕種上聲流落來塵寰金盤瀉不定四走如循環睡龍失火齊頷空皆血澘以口比樊素白傅誇嬌鬟卻嗟荔子陋逺在炎荒山每歲貢天子險路勞緣扳豈如盛京洛地廣生不慳朝須暮可進先御後匪頒離樹既不久弗改猶童顔嗟嗟唐中宗游樂芳林間芳林園名君臣失儀度口摘省手攀不聞薦先廟書在史冊間愈藉爭詩豪徑句嘗往還豫知青冥賜難到山溪灣韓退之和張水部敇賜櫻桃詩有傳賜出青冥之句林園幸自有圓顆赫不黫雖熱豈厭食縱密寧忍刪况此鮮嫩質非並青梅頑羣牧司雨中池上作纍朝困炎威一雨轉愁意偶看碧蘆叢宛在滄州地岸草間自滋庭葉紛以墜移床就幽窗簷溜聒清睡送章傳道東歸三十八韻一日或數篇數日哦一軸夫子之於詩夜補晝不足長吟天地間萬象困題目天徒飽其才而特餒其腹聲名三十載半百事場屋今年試春官淡榜輒不録東風吹殘花客淚迸京轂回頭謝青雲却抱來時玉河陽謁相公每見輟飯沭贐金實空囊禮遇駭僮僕遂游西諸侯騎馬度函谷長安尋素交零落半丘木惟有終南山相看似舊緑東李雅好客既親意轉篤授館如投家晨杯繼宵燭羸馬殘青芻饑僮厭餘肉豫方坐幕府陷嫉苦流俗羣吠耳且盈介立趣頗獨得君倍歡然坦不置邊幅論情雖云晚聞誼固已夙二章初交鋒懦氣令避縮自笑不量力强和旋取衄從此遺形骸留饌或脫粟有酒時招邀共醉小軒竹論議到聖賢道德富停蓄豈比篇章流烟雲繞心曲飄颻走邊城新禁察儒服戎帥不敢延進退勢俱觸六月汗霑衣幾作窮途哭回來卧旅舍所得不充欲鄉思生秋蛩輕裝遽云促行當買淮田晚歲謀退築豫材覺無庸計慮亦既熟無資媚要權與世背馳逐秪合從漁樵胡為苟寸祿淮吳幸相望有鄰可容卜浩歌老吾生爭食任雞鶩薄宦猶縻人歸飛羡黃鵠豫以病久不赴朝謁因灸三里穴罷信筆偶書竊祿了無補卧疴慙有日空聽朝雞鳴阻挂朝衣出啓處不自安灼艾加諸膝庶幾起沈苶犬馬委微質立秋後病作此寫懷卧病喜秋至昏煩庶以平清風不少濟宿疢仍相攖凉葉猶未振隂蛩已先鳴四時順萬物奚獨戕吾生入山謁怡然上人因成短篇皆書即時事行穿六松隂鳥語逢人寂林僧洗山鉢正了寒堂食揖我喜滿顔吟窗半軒闢鳯凰山名不無情天外送佳色春風動花雨枝上或涓滴羡師得安住我亦有間適出門懶鞍馬把袂步幽石石盡浮泥深恰恰露雙屐臨别心徘徊野店更一息僧副普濟過豫詰其師名僧職之所自則曰嘗濟活饑民百萬朝廷論酬以得之欽嘆不足繼以詩云佛子葦麻衆槩能蠶食人庸奴買師名納資不計緡普濟釋苑秀類同行佛均往歲東陽饑愁聲聒蒼旻天民坐欲死誰肯發一囷師勇營饘糜全活百萬民外臺上其事朝廷嘉師仁相府議優賞美號寵厥身汝往二爾正示勸出聖神今時士大夫體雖具纓紳十九飽妻孥何暇及困貧視師固有激抑可警其倫墨蟹瑣瑣江湖中忽在幽人壁短螯利雙鉞長跪生六㦸骨眼驚自然熟視審精墨初疑蟺穴束猶帶浮泥黑橫行竟何從躁心固已息終朝牆壁間頗有肥霜色我來空持杯左手莫汝食誰奪造化功生成歸筆力祠部集卷二
