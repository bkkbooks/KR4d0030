body:
  text: 祠部集卷二十五宋強至撰書代上姚都官書某愚無所似得綴一官以吏左右不逢叱恕於願已足敢望引以為可舉哉恭以執事之賢人人願出於門下雖甚愚極陋亦知得舉之榮非才卓業巨烏能捨衆人而獨取哉今執事之取某不惟人人疑之其亦私自疑噫豈執事知某之誤耶將哀其窮賤而欲推之大亨之塗耶不然安能捨衆人而獨取也苟執事誤以為可舉則某當履其真可舉之術庶無玷知人之明或哀其窮賤而然亦黽勉自立以副執事推近之意若是糜軀論報亦不敢在衆人之後辭意鄙直仰冒威重下情無任惶懼之至代上發運大諫書十一月初一日其位某謹齊祓裁書百拜有獻於某官執事某竊以士之貴於三代也可謂盡矣進則頒厚祿以寵其行退則翹車聘幣以勸其進士生此時宜無求矣然猶有自進者故箕子之書曰豫攸好德皇則錫之福噫德如三代之士猶有自進而後知者矧今之士哉竒林偉行可貴而寵之者無幾問有焉或沉鬱卑辱不為上之知可默而俟舉耶唐之儒韓愈氏卓矣然猶三上時相書惴惴焉以不出為懼况衆人哉某愚甚於他不通曉獨知士之所以為士者以有守而或脫則轉而之小人之域不待旋踵故雖賤貧困躓未嘗脫所守綴下科與士齒者六年矣𨽻執事麾下且二年顧其術無可以貴而寵之者而辭未始一進書未始一上反默而受執事之知抑難矣恭惟執事學際聖賢道充當世由文章取上第立朝廷為名臣天下之所共聞也執事之門下孰不願出哉某今為屬吏獨不能圗進是待欲高於韓氏進身不本於箕子他日天子以政之柄授執事其願出於門下者益衆而某之迹益疏雖辭日進而書百上無及矣是敢執自進之説求出於門下伏望寬其誅斥一賜采擇使士不獨見貴於三代自執事始冒犯台嚴局地待罪不宣某恐懼百拜代友人上張刑部書正月日具官某謹齋沐拜書運使刑部節下某前日獲見伏蒙執事略僚屬之禮顧問甚密退自度曰豈執事與某同産子嘗聮職而然耶不然何待之渥也若執事固記之矣奚假援以為説哉抑有欲聞者徒以仕宦三紀謹亷自守雖前後薦者二十餘力憊心怠墜不能奮中夜浩嘆甘為廢人歸無田園未決引退竊嘗謂上之人求人為用愈於在下者之求為人用也何則部使者持外臺之柄不獨以按舉為已任抑將擇能者以分職治一官否則一職弛宜得強敏精幹之為用若某之病弗堪烏足當執事之用哉方其往來督舟運宜其慮也今乃獲免將受代而去家貧族重患弗能任伏望執事就舉廬夀暨舒一監兵以處某使得從容養病而又食口百指獲圭田以自贍則生成之賜盡出門下矣干凂威重伏地待罪不宣某惶恐百拜上京西運使田刑部書自使車北轅凡五六月而一書之奉不徹將命豈特為簡惰哉蓋大人者不責人以苛禮雖一書不通未爾得罪某不佞兩得備屬吏頃官河朔不幸以喪去因不得玷清舉之末及執事領淮漕某復佐泗幕覬執事收麾下之舊雖愚不遺矣而天奪之幸適會移部噫豈某之望絶耶曰然然天其或者俾某因梗濡滯官久益練抑待執事之知深然後挈而躋大亨之塗不為艱矣若是未能絶意於甄録也伏望為國自夀以副區區不宣某惶恐百拜上運判馬太傅書正月日具位某謹百拜獻書運判太傅明公執事某常病今之學者始攘取六經之文以為辭章幸一中第則志滿意得曰吾方從政安學為浮剽不根遂為淺人噫君子之於學豈獵其名而止哉蓋曰終身而已矣某不佞於學無足道惟是嚮學之心異前之云者雖奔走賤辱未嘗輒忘學也竊嘗謂學患不通經經苟通則性誠明而丈深醇不經之文猶葩華爛熳見者恱之終無益於實也雖間嘗為小文視今之得名者恱輒犯其鋒然於聖人之道則浩不知所濟思得大人先生傳授聖言之微使術明而性通然後發為文章行為事業以成某之志者有日矣恭惟執事學際聖賢名重當世六經之道自已誠明而深醇然豈獨裕諸已哉必將推其餘以及學者則其平日之志願成於門下或曰下吏之於上官非公事起居不得輒至前乃欲受教僭矣某曰不然爵位有尊賤傳道無尊賤之隔設孔子為司冠須三千之徒均為司冠然後乃傳道聖人之意不亦狹哉則誨人不倦不為孔子言也若乃論窮訴滯懇懇有乞憐之辭此衆之所以望衆人非某之所以望執事也干冒威重進退俟命不宣某惶恐百拜上運使李刑部書某竊以疏賤之士或嘗得王公大人一言之賜他日獲進猶藉以為説者何耶蓋貴豪之門人所歸也歸者日衆則疏賤之迹有時而遺其意邈不得通矣必道其嘗所得之言以信左右彼大人者必曰是吾嘗所言者然後賤士之意通而其迹不遺矣頃執事領漕某時以衰裳見門下執事不以越禮而加罪與之進而賜之坐使極其所欲言而去及執事倅計府某方調官得泗掾復進謁於門下執事教之曰泗車舟之所會上官之耳目甚近當潔汝行幹汝局事人將汝知矣某再拜而謝曰公之言聖賢不過是敢不拳拳孜孜以戒夫失墜今執事按兹部某適得備屬吏則向之言不獨使銘之於心奉行於已異日知某者不在他人而在執事爾某固疏賤不敢他云以瀆尊者止道嘗所得之言取信執事干冒威重伏地俟譴不宣某惶恐百拜上發運主客書發運主客執事伏自使車南轅即欲一拜書以咨起居之安而且布其區區焉朝以奔命夕以訊獄輒因循而至今甚畏服執事之名為日滋久重以大漕使之尊越在麾下目未嘗觀盛德之光耳未嘗剽訓言之餘一旦獲見遽以吏事白左右其禮有所限隔也其情固未相接也使明且辨猶將踖焉而不能通况某之愚且訥既畏執事之威又迫尊卑之勢哉宜乎局從而無所建明也夫聲之巨莫若雷霆無顛踣起隊而駭之者以常聞也光之巨莫若日月無蒼黃掩目而畏之者以常見也設不常聞其聲而聞焉不常見其光而見焉將疾走折足之不敢豈止畏且駭哉某前日之見執事何異初聞雷霆而乍覩日月偶不病走耳尚安吏事之建明哉噫江淮僅百郡郡約十吏若然則奔走於使部者殆干計其聞以文著以法稱以幹聞辱知於執事者几幾人知而深器之者復幾人某以不佞無似之迹泯然於千百人中覬執事之知抑難矣雖然常內訟而自咎曰某文如是某法如是胡不強其所不能而求及其所能哉故夙夜孜孜庶幾有立而後有立而人捨夫畫者而取夫將進者執事之心不過若此其知之器之非所敢望儻憫其進而憐之不勝大幸干瀆鎔造無任戰汗之至不宣某惶恐百拜上運使李刑部書某聞有困於路隅者垂朝夕之命反低遲其聲而欲人之哀之雖過者千萬莫知其求救也幸有一知將轉溝壑矣寧若大聲疾呼及救之速哉某自得第歸已喪母制除調官待踰歲位早祿微族弗能贍不為不困矣竊嘗思祿足周數口位足以見行事之效者惟邑為可然本朝慎重此選須舉乃用某勉雖所不能而隂覬塞舉者有日矣懼左右或未信故默而不敢遽言其亦低遲而欲哀者歟昨日覩舉邑新格外臺慰薦歲定常數令而後求出於門下者日益衆求者既衆執事必拔其尤異者而遺其常品者某以不似之迹若又後衆人而進縱執事録門下之舊不以不才而遺之一旦某不𨽻麾下則執事徒有振拔之心某徒切覬望而事且無及矣今日疾呼而告者此也儻哀而救之卑預清舉之來則困躓之迹免為路隅之比矣干冒威重不任戰汙之至上提刑主客書某聞詢樂工之能否宜就太常問吏狀之殿最宜就考功何則所統専者其知詳設太常曰某吏之狀最未必果才也考工曰某工之藝下未必不能也何則非其所統者其知必略是故雖考功升黜然後知矣狀太常進退然後辨樂工今天子登賢材而試諸用命執事領外憲然則執事所統何等為最専不在刑獄乎某獄官也將有問才否於執事者儻執事謂某才雖千百人交毀不為損謂不才雖千百人交譽不為益何則毁譽者雖衆不若執事所統専而其言取信之必也然則獄官之職何為哉曰囹圄謹訊劾審而已矣能髙下其議而卒與法會者獄官之才也若是某之才豈足當執事之稱耶曰不然執事之責某者職於才何預焉恭惟執事雄剛卓越當代罕儷異日取家世舊物相人主圖教化某將與天下之吏程公狀於政府豈特區區今日論獄官才否乎干凂威重伏地待罪不宣某惶恐百拜答李裁造屯田書阻侍師席歲行一周而一書之通復不得繼竊念孤生之迹出自門下雖曰奉書猶不足報恩奬之萬一矧一書之不能繼哉自顧怠惰分從棄絶而大賢之心乃惓惓於賤子夫行事之效者其小惟百里之邑然朝廷慎重此選須舉乃用若是某不能無望於執事也恭惟執事文章事業當代鮮儷總外臺之計歲行十周輦運有經矣財用有羡矣事之敝蠧者盡更張而剗去矣執事之於利權可謂成功矣某不以今日求一邑之舉於執事執事不置某於清舉之末一旦國家以教化之柄授執事則天下之士皆願埏鎔矣執事必將取其尤異者以備器使某於彼時復何望哉幸執事憫其困濡一賜振拔使某增寸祿以活微族得民杜以攄素志則生成之造不在他門矣若才與器某烏足云而齪齪謹廉自信固明甚豈復纍大賢之明哉干冒威重俯伏待罪不宣某恐懼百拜上提刑太保書某竊見今世之士有一言自進於王公大人之前必獲自衒之咎而士亦此自以此某獨謂不然其用憑藉貴髙之地附託左右之援豈復自媒哉挺然而進者其必賤貧滯鬱有志欲伸之士也夫弟子之於師門迹相與處也言相與椄也術業之髙下志慮之逺邇可較而知也仲尼猶患不知而曰盍各言爾志矧下士之見上官哉羣而趨默而出位貌之隔如天地之相邈不言誰知其志哉噫士之志有二公焉則建勳名興利澤為天下萬世之休私焉則享厚祿活親族為一身之計今賤為九品而曰某欲建勳名興利澤人必謂之任癡僭妄不誅而唾幸矣安敢言公志哉若一身之私志豈得默默耶於戲銓選之吏祿粟不足蓄數口代者一至則不復可得不渝而蹈窮餓之壑者幾希逮一沾京秩則祿給弗暫絶可以活親族矣然則由銓選而之京秩無他也恨簾舉而已恭惟本朝重使臺之寄付升然之柄自貧墨弛曠類可以伸使志某吏執事麾下行二年矣懷私志而覬公舉者抑有日矣今將代去是敢蹈自媒之咎挺然自進其説伏望執事哀憐而采收使某一與慰薦之末免擠窮餓之壑滯鬱之志獲伸於門下則執事之進人仲尼之用心也意迫辭切干犯威重無任戰汗待罪之至不宣百拜謝提刑學士書某嚮典泗獄得吏麾下才數月獲見於左右不踰再雖䇿駑砥鈍靳有以為執事知且沉微之迹疏而奔走之日不甚久勢不可得已及官滿如京師或有持執事簏士之日示某者則某之名在焉始疑中信終而惕然感以愧何則淮南之郡𨽻使部者二十有四其銓選之吏仕焉者豈下數百人彼才了一局而用兼數器者又豈少哉然後事之門望清舉者常數百而執事歲舉不過二十人必將録其才稱而拔其尤異者某獨泯於其間安望捨衆人而舉某哉設執事知奬之猶待日月之久何見取之遽哉或者之傳似可疑也徐而思之執事以髙文逺業傑然為三公後是必收寒素聞至公以增大無窮之體某雖不佞亦士之甚寒而求進之未已者寧之不為執事先隗之取乎故疑去而感來噫古之報知已者豈縻軀碎首而止耶抑將忠君澤民圖建勳利為受知之效某之區區竊所慕焉若乃謹廉自持特衆人之常守爾不足為執事道戴負厚恩重踰山嶽無任激切荷德之至不宣某再拜代人上李兵部書知府兵部執事某委質下吏越在外邑惟公事起居乃得一至鈴下才空迹疏宜左右之所棄忽賴執事聰明廓然坐照千里察賢接姦不以逺邇易視聼故吏雖疏外常若奔走於其間以是某之區區或為執事之亮拔始以萑苻微聚輒冠邑境雖上憑府威悉力殄獲而朝廷大制考信州郡須保委明甚方議賞格伏蒙執事録下吏之纎效斷然鑑其情偽剡奏列上謂同真狀某苟粗拜一命寸進一級則天地之惠出朝廷而卵翼之賜繇執事也自被奏以來益勵操守蹈氷臨谷未踰其慎庶幾副執事之奬爾近有執之宵人非意往訴謂某雖市米當價而不時儻直雖考之者今未越旬浹而孤危之蹤不能無憂懼也何則一邑之民或受枉於吏自非刑虐誅掠殆不可忍其他自直於府君者可無一二今市文木而為其所訴當爾之時夷齊可疑為汚士卓魯可疑為暴吏曷以自明哉故終日惶惑不知罪戾之所從復蒙執事精明是非外判終始信察謀其無他并容曲全置而弗問若是𨽻治下者已三歲知已之遇未一報而蒙庇於執事者已至于再雖被寬釋愈於重責之為愧儻執事垂憫儒介力畢大患不以一眚加擯斥則翳桑結草寧知不為門下報耶上提刑司封書某嘗病今銓選之吏拙於為治而巧於知已者人十八九平居不事事一旦榮進欲激於內不惟口之於言而又筆之於書冒上官之聽曰某材且職人不某知使有志之士恥混斯人之徒不敢一言卜知遇矧敢以書哉某𨽻執事麾下數月矣言未嘗一發而書未嘗一進者正為是爾然事有不可以􅀈者因敢輒布左右某初命泗獄掾使臺外諸侯不以某不材舉以堪一邑奏可移浦江而浦江地僻陋前後為令者或以膏潤自利一切務市恩噤口不敢議威刑民視官府如私家吏易令如僚及某始至呼吏問某事閲某簿則癡視矒對如市人然私自謂其弊不甚矯無以頓革帥民者宜身先以故渴不妄飲浦江水幸民慢吏弗率者以刑頽波壞紀力澄而躬緝然後浦江之人知今所以在治民而民所以在奉令未幾會來陽缺宰州郡誤以某為可使困俾承乏而東陽地完户殷民校喜訟每更一新令則必搆虛懷牒坌入於庭下以探令之能否彼計苟行則將接迹而來矣某鈎得姦狀數扶其不直者此弊幾少息然猶有以辭來浹枉直者日不下百數朝與之辨至㫙僅能無留事假攝方期月遽遇執事臨按兹邑其間管庫簿領期月以內者固已躬治自餘素弊實未遑究若乃民有叩行麾自訴者吏有守庫緡不謹者斷罪之夫輕兵器之不籍罰金之差厥數田訟之積有日然雖伏蒙執事明哲內照仁恕外及以其前之數事率開舊令期月而變聖賢猶難優容橫貸弗忍罵斥某寧獨不愧於心哉尚覬借階前容足之地一吐其愚又值執事兼程取道前旌不留益懼且嘆曰竭駑力供賤事孜孜不敢少弛者俯恐負於斯民仰圖知於上臺爾儻上臺遂以不職齒之則愚事去矣而又使車之按婺歲或一往浦江在婺為竊僻雖綿歲不一歷今假他邑幸而遇使車之臨不得少進其説某之區區將説不伸矣恭惟執事文章器業傑出不羣天子以美祿養賢材而朝廷推賢材者歸執事始先公以直諒稱當時今搢紳議直諒者歸執事如執事可謂在朝為名臣在家為名子矣有志之士孰不願出執事之問哉某雖無似竊亦覬願重念某再試於禮部得一第得第垂十年獲一邑同時下科之人籍朝闕綴京秩者不可勝計某誠為困且滯矣雖嚮時薦者凡九人而舉邑越太平本朝之格繇銓選升京秩者用五人今闕其二不瀝懇於執事之門將誰憐乎意迫言直不覺輕僭干凂威重不任戰汙待罪之至不宣某再拜謝提刑司書某前日之貢書左右也家人沮於內曰若為屬吏不逢上官罵叱幸矣乃敢别白是非耶若將得罪於范公矣僚友沮於外如家人之言亦曰若將得罪於范公矣某獨曰不然夫賢者樂與人辨是非豈惡人自辨是非哉事有因言而後白豈有不言而自白哉與其言而獲罪不猶愈不言而獲罪歟遂決而不顧不逺數百里使人持書以聞事未報翻惶然甚於家人僚友之惑隂自訟曰人言不言其必得罪於公矣既而持書者還則執事之賜教在焉趨迎亟受百拜以讀則奬借之辭燦乎如龍章之飾祼壤勉最之辭溫乎如父師之詔子弟恩假之辭廓乎如山藪之包汚疾然後僚友賀於外家人賀於內曰公不汝罪而汝容則公之恩天地不如曷為公報哉某曰大焉澤民小焉飾身而已矣引領麾下不勝感切之至上提刑司封書提刑司封執事某竊謂士生於今之世及愧以今之士待已乃曰古之士人求為知己我惡肯求之於人哉語介可也適時則未也殊不知古之士也修而寡今之士也雜而衆雜而衆故賤修而寡故貴古之士或潛德不輝朝廷闕之不能為治至有禮文交聘而不肯一起州郡敦逼乃起為朝廷用者不曰寡且貴歟於斯之時猶有老死巖谷而卒不聞當時者焉矧今之士千百進朝廷之治不加益千百退朝廷之治不加損而又籍銓管者見上官則踖踖焉而趨帖帖焉而去不可曰衆且賤歟當爾之時尚曰我介而志古我惡肯求知於人雖然人誰求汝耶鳴呼行已非艱知已其艱哉唐之士韓愈氏卓然其賢矣猶曰法秃齒豁不見知已矧下於韓萬萬而復生今之世歟不老死不遇幸矣何止鬚秃齒豁而知已不見哉某不佞得邑最窮僻雖守官職不敢以僻自懈奈何使車按部多道旁縣是徒有伸於知已之心其路無繇自伸也譬鬻貨者羅列當市門則道利而易售苟挾而走窮巷其良與仁偽無復自辨望其見售於人也某前日承乏東陽幸一會使車之來其亦挾貨窮巷而遇趨都市者歟儻執事一顧而略售則貨雖偽人少謂之良矣或遇而不顧顧而不售復執之歸窮巷將委棄無日矣尚安良偽之自列哉恭惟執事道醇而器完德髙而業巨而又十四州部吏榮悴之柄當執事之乎某部吏之一者執事挈而出汙塗之中甚於及年之易使其髮未秃齒未豁又獲大賢為知己與夫老死巖谷而卒不一遇者榮悴相萬則執事之賜山嶽來重某之貨將交顧而競售焉千凂威重無任戰汗待罪之至不宣某百拜上運使工部書竊謂匠石天下之工也欲得天下之材而用之而天下之材常少間有焉或不為匠石用者豈匠之心固遺之耶抑材之生幸不幸繫焉耳其幸而生平達之地匠石過焉苟睨而斧之則人謂其材必良材矣其不幸而生窮險之巖崖雖拙工之目不以寓焉矧匠石睨而且斧是尤不可得已縱其材堅拔完挺人將以朽木齒之矣夫士之仕於世也何以異此且上官之心欲得部吏之賢而簏之而部吏之賢常少間有焉或不為上官薦者豈固遺之耶亦仕之地幸不幸繫焉耳其幸而度通都要邑上官過焉苟一顧而遽取則人必謂之才吏矣其不幸而處陋僻之壤求衆人之顧不可得矧上官之顧且薦哉雖其守通亷介特人將以下吏齒之矣浦江即山為邑山險而不可車溪斷而不可航以是上臺之按部雖曠嵗不一歷使才者居之猶將泯默沈鬱而不自達况不才者能自達乎某於兹歲餘矣雖動民飭已罔敢少懈而迹孤能短何所借譽前日幸遇使車過境得以伏謁道左猶窮崖之木邂逅匠右其睨而斧之有動於心哉恭惟執事全德偉勳取重當世上心所眷將漕吳服老姦宿豪既已誅鋤而屏絶矣積弊巨蠧既已掃除而剗革矣生民之利已修建中都之費巳充給趣召嚴覲期在旦暮異日謀王體圖治本其肯取天下之財為明堂之用雖材堪欒櫨執事其肯遺之罪則某之區區願采於今日也千凂威尊伏地待罪不宣某百拜上知府卿書某竊謂無位以行道無夀以守貴無權以薦士此丈夫之不足者何足雖志摩穹霄業包經綸乃飢吟圭衡一命不亨道可行乎哉或冠纓峩峩珮聲鏘如方朱顔猶童已肉飽螻蟻貴可守乎又若委身下僚自辱塵泥雖耳目英趐秪若聾瞽士可薦乎是三者不可明矣若乃位足以行吾道夀足以守吾貴權足以薦吾士執事其人焉恭惟執事抱不世之偉德出三公之慶門今殿邦東南環地千理吏目督郵而下皆趨走以聽命不曰有位乎凜然秋霜以肅疆梗煦然春陽以曝困窮執事之道既行矣年過六十齒堅髮稠人望儀采盛逾未艾不曰有夀乎樂只愷悌其錫難老鼎司襄章兹子青氊旦夕取之以揚祖休執事之貴可守矣扶奬亷善抉鉏姦贓升絀之柄我得以執不曰有權乎𨽻吾治者厥邑惟七準詔拔吏歲常四人今乎其時士可薦矣抑未知所薦之士果何士也某竊料之夫良匠搆厦必度堅挺之材彼脆而屈者何預斤斧某迹卑地寒復官窮山治聲不長薦口孰開譬孤株生陋僻之壤而匠石之足不到日為樵豎之所睨不薪而灰幸矣惡望斤斧之及哉雖然執柯局於近則已必欲取林之周則欒櫨榱桷之用寧以地而捨謂某之微躬敢借此諭凂瀆台重無任戰汗待罪之至謝江西轉運程大卿寄詩書某啓大江之西漕權為劇才者所處乃有餘地特抒佳句逺將動意辭語警發真得清助吟諷數過手不能置感服之私并深悃臆不宣祗白集賢相公權蜜大尉問候手書某啓維眷之暮氣序喧甚伏惟坐斷國論台候萬福企仰盛德與日兹劇某總帥於外事有中覆率賴成算之濟疏拙惟知勉勵庶寒寵寄東望門宇千里而逺縻限符節末繇曕對伏冀上為眷倚益護寢餗不勝區區之禱不宣某再拜祠部集卷二十五
