body:
  text: 祠部集卷七宋强至撰七言律詩依韻和令綽兄弟春日出郊春色才從野外知桞隂花氣暖霏霏出林啼鳥逢人住掠路游蜂傍馬飛薄宦塵埃空自哂長吟風物阻相依弟酬兄唱饒才思珠玉同携滿䄂歸依韻和張叔毅讀桞先生文先生蕭瑟半塗休一跌青雲不再收名壓班行來衆毁筆鑱造花起天讎王韋黨破誰為地栁播風殊願易州廟食羅池今尚否滿編遺韻掩鳴球呈陸革進士魚沫遇窮能一煦鶯聲得意亦相求近來無復友朋義獨善頗為魚鳥羞今日指心論皎皎明朝掉臂逐悠悠世間唯我交夫子憂喜同懷二十秋逰華藏寺我今作邑水雲鄉一到猶疑換俗腸况在塵區正紛汩乍來法界得清凉松筠鎖霧姿逾秀樓閣摩霄勢欲翔更即髙僧叩空理功名富貴盡毫芒書吳江埀虹亭詩千尺危橋跨浪雄壓橋虗閣勢凌空直疑有路通銀漢又訝橫天卧玉虹盡挹江山歸醉目獨開懷抱向清風却嗟景出天隨後不得當年一詠工登陸氏書樓塵土長愁舉眼低轉身今喜近晴霓天邉牛斗開吳墅鳥外山川走越溪擬解醉冠從此宿恨無健筆為君題牙籖繞架藏書滿知與青雲别作梯依韻和答陸革進士招飲池上詩主人愛客掃林亭天影波光相與明蝶傍池邉飛舞慣鳥從花上往來輕滄浪傲世不復羡鶗鴂妬春惟欲鳴能趂繁枝開熟釀先拚黃帽為君傾送張叔毅北歸公子姓張天上有少年如誼雒陽無滿編秀氣同歸楚後夜文星不照吳雲密蛟龍間未試霜寒鴻鴈急相呼賢昆學士有詩促還知君懶愛平湖緑白日聲名㑹早圖送范君武謫仙放蕩來江東醉吟三見江花紅吳兒聚觀玉勒駿越女一笑金錢空筆端靈文落彩鳯席上古氣舒長虹飄然又趁白雲北别語有盡情無窮依韻和鄭中立祕丞將替寫懷宰邑優遊不足為傳家事業復能持政兼子産那專惠學近康成最愛詩百里耕桑增日課三年閭井見風移襟懷灑落恬榮進清節從來畏衆知和知府王給事官舍北軒新竹子猷雅愛此君深清白傳家直至今有似致身憐徑節更應待物並虛心間來㸃筆書新粉醉後移牀傍細隂分到渭川青玉種嚴公宅裏許同吟杜甫有嚴公宅同詠竹詩得叔毅書故人消息苦難真終日吳天望楚雲黃鵠不知何處舉新鶯應似此中聞舊來飲量還能幾别後詩才轉不羣忽遣長髯馳短札數行千里贈殷勤别林仁祖御史論交鄉里各兒童三紀相看雨鬢蓬孤宦無資元附驥故人得意近乘驄秦儀面激殊今日管鮑心知有古風歸興嚴程何太急片時車馬復西東晚鶯獻都官自恨飛遷出谷遲東君不是故相遺園林縱許容羇迹蜂蝶還應笑後時休恃綿蠻能巧囀還須冷落守空枝春風著力年年在未必羽翰今便衰再和都官見答離幽便欲趁芳時越分非能守一枝多語羞隨禽反舌逢辰強學鳯來儀故林有約依前去落絮無蹤逐處隨若得東風聊借力免教燕燕競差池湯七秀才見和再和清吭臨風囀較遲春光相背去如遺名園已失堪棲處幽谷何如未出時早恨狂風偷好景更和微雨宿殘枝齊庭健翼飛雖晚一舉青雲笑我衰送施野夫赴舉胸中六籍收髙誼手撫辭章應禮闈不飲故人相别酒恐沾夀母自縫衣吳河擊棹開深凍汴日迎鞭弄短暉四十明年方得仕平生未與古人違秋試甫期輒成短篇呈馬公節裴進士光世妙譽相髙聳一鄉士林注目看軒翔玉蹄駿欲騰先路光世金距雄思擅舊場公節只待秋闈排甲乙穩擕曉硯寫文章如今老將雖無勇憶拔蟊弧尚激昻依韻和李持正晚晴出謁王子髙馬上口占之作謫仙醉跨玉鯨鱗夷甫名談喜更聞照眼暖光開野日入懷晴氣散江雲塵埃洗去人家好空濶飛來鳥翼勤莫望帝鄉頻感慨世間隨處有珍羣次韻公勝曉起對雪向曉寒威覺倍濃雪霙紛糅冷兼風亂裝瓊樹千林密疑㵼銀河一夜空鷗鷺失羣吟景內乾坤同色醉眸中青衫瘦馬凌朝出翻羡袁安得卧窮次韻公勝早梅昨夜寒梅忽一枝早如常嵗合開時欲冬天地恩先及未雪園林色易知世眼已教容易賞曉風何用再三吹若論霜菊無多晚只此春葩苦較遲豫官將滿婢子始植小柏於堂下因感而書孤根初掘出巖隈赤腳殷勤手自裁翠葉未成官秩滿清隂别待主人來階墀好養今朝操梁棟須歸異日材猶勝夭桃清意薄劉郎去後始花開暮春偶書呈才甫慎微解去銅章尚月餘一春文酒㑹全疏無機自好親鷗鳥雖弱仍甘下鱷魚樂事易空如委蛻流年難挽甚奔車酒徒文友心期在任有臧倉毁子輿豫解邑過杭遇介之學士謁告南歸同時兩郡冠鄉書屈指俄經一紀餘顧我冗塗移蹇足羡君榮路駕奔車方從解紱辭巖邑已見飛章厭石渠自古蓋棺人事定未應今日較龍豬依韻和楊尉郊外懷鄉䇿馬長郊羡子真獨贏風物與詩論驚飛雁鶩投前澗歸去牛羊識舊村暴漲溪聲聞逺近久隂山氣亂朝昏異鄉我亦嗟遊宦莫說啼鵑有怨魂楊詩有回望鄉關在何處更聞杜宇轉凝魂之句鄭君天常有詩貽楊尉因次韻以贈屢衄名場嵗已髙此行誰贈一綈袍久從客路嗟重趼獨對秋風感二毛游倦幾漫許都刺憤深將廣楚人騷而今薦口難開吻第愛窮途節可褒彭及之邀吳仲源楊公濟與某夜㑹望湖樓獨某後期為關所隔偶成篇以呈諸君月底雲樓一水湄天光湖色兩琉璃樽前更坐清風客筆下爭翻白雪詞物外骨毛應自爽世間笑語不容追千年庾亮胡牀後此興今人亦未衰諸公愛月欲狂顛腳踏花欄手襞箋那作常時揮綵筆直須飛句上青天豈無劇笑驚山叟應有妍詞調水仙獨我清宵塵滓甚亂蚊聲裏汗膚眠波射飛樓縹眇間雲梯豈合在塵寰金樽倒盡星垂地玉滴書乾月過山檻底呂僧空仰望座中蜀客賴西還我遭魚鑰無情甚只許吟魂夜度關故國英雄已寂寥飛樓氣象自飄颻天邊鳥翼愁簷額雨後虹光轉檻腰直恐笑歌驚白日却憐身世近青霄雲梯縱險容人上始信明河亦有橋再寄元真宮讀書讀書曽寄此軒頭官路歸來十二秋文酒故人無一在蓬蒿荒徑有餘愁差池嵗月辜金印憔悴乾坤復布裘郤掃塵埃張舊榻雲中雞犬笑淹留二月二日作江上初逢社燕歸青春二月色猶微茸茸屐底草煙合冉冉樽邉花霧飛蹭蹬容圖雙鬢改蒼茫樂事寸心違紫絲結鞚誰家子馬躍東風試薄衣將渡楊子風雨忽作南徐景物古愁人薄宦扁舟更水濵不識濁醪傾北固獨隨寒雨出西津連天風浪聲兼厲當路黿鼉氣亦振吾道屈伸非一日世情未要責江神登梵天上方廊腰偃月勢環遭秋㝢澄明照一毫樓檻轉身侵白日海山隨眼沒驚濤泉枯碧甃鰻形遁屋跨蒼崖鳥翼勞屈指舊遊今二紀新愁爛熳入風騷寺冇靈鰻井遺甃在焉舟過三郡率值風雨呈同行沈氏昆仲𡨕𡨕細雨濕髙秋花底歌前也合愁烟樹幾株踈雨岸風帆一夢過三州生涯未解謀根固官路那能免葉浮却羡鄰船樽有酒不妨弟勸與兄酬依韻和公濟寄仲靈禪老藤州大士兩眉厖萬卷叢身寄一窗詩力健能支倒嶽詞源湧可截奔江髙名聳動朝中士舊隱荒蕪嶺外邦想像孤風猶未見何時能使片心降贈承天月長老幾年巾屨四方遊倦足還逢勝地留電迅禪機超逹磨雲間詩意等湯休絶塵貌與烟霞古疊石心存岱華秋此軒纍石為山今我取師觀所嚮豈嫌儒墨不同流承天元長老棄本寺寄淨慈以詩戲之城裏叢林一唾捐收身微笑寄湖邊此生直欲看山老不住真為出世賢野屐懶穿雙露腳雲裘嫌重右披肩人間萬事都無著獨與風騷有愛緣詩贈寶應禪老溢公或來犬室問師禪師解臨機示意筌雲在虛空寧有礙月當隂晦亦長圓更無餘事牽塵想猶有能醫結世緣缶錫憧憧參祖學幾人垂老得林泉師被府命駐錫此山前日奉和仲靈禪老春雨詩復辱見答走筆依元韻酬之千年支許事如新欲作前遊漫㦄旬雨帶黑雲障俗客猿呼飛鳥伴幽人從容劇論知何日感激佳篇慰此辰四海聲光非鑿齒道安名重若為親觀嘉祐南宮奏名主司撥馬選龍媒二百珍羣奏籍開皎皎公衡垂日月儀儀士類望風雷誠知至鑑無遺照那免良工有滯材鄉國幾人同應詔只將春色與關裴寄題殊公禪老黃雲閣大士當年密行成山居黃色有雲生黃雲巳共斯人去飛閣猶為此地名欲到塵埃先擺落縱觀氣象亦峥嶸誰云瑞應難追復禪老而今祖意明人悅禪翁巧結廬更營飛閣取幽虗溪山雨後翠欲活櫺檻風來清有餘龍象幾年成佛界猿猱深夜雜僧居還如夢得聞涵碧誰寫丹青復寄豫經故明靜師支離堂支公昔講支離學堂上無容坐客氊往日衣冠今尚否經春几席自蕭然談間精義門人記身後清風嗣子傳一紀宦游尋舊社空將感涕灑塵編戲呈宋周士臘去垂垂凍欲消春光未動思先饒最宜才客臨歌席更看佳人轉舞腰一笑勞生應有定三冬薄宦獨無聊蘭臺侍從風流裔合為行雲賦此朝洪君然太博以元日刺字交馳卒不一見作詩相遺依韻和答知君元日趂鵷行雙觀雲邊聳百常拜表歸來乘逸興跨鞍相就攪吟腸還同皇甫尋僧孺却笑山公顧葛强我亦及門空刺字不容髙論聽琅琅暮春感懷雨聲日夜催春老不顧愁人鬢欲華堂上自來相熟燕樹間猶有未飛花詩篇間裏曽無數酒盞生前亦有涯傳語東風且從欵蒼顏更畏數年加賞春到老能逢幾度春直須飲量強增分豫素少飲吟情無際共芳草遊思難收如亂雲還見春風與桃笑却教人意嘆芝焚豫近喪偶妖紅爛白方爭賞踈竹休誇號此君昨日以鄙詩示王君遽辱贈篇過有推飾輒依元韻奉答未有功名與世傳且驅懷抱向詩篇昔曽篆刻工童伎今敢風騷領將權愧匪窮經臻聖處妄推聞道在君先還知苦意微吟否不巳猶云博奕賢答章傳道二首旋刻辭章就禮闈禁園花在遂空歸客愁春雪杯間釋詩句青雲紙上飛從祖近持丞相印舊交半著侍臣衣揚雄未老猶堪薦忍聽滄州買釣磯夫子詞源湧大江相逢早覺片心降日哦李白詩千首纍日獲觀盛編夜獲虞卿璧一雙昨日辱貺二詩屢發彩箋移曲几不知紅燭短幽窗吟髙莫信須窮滯亦有從來擁節幢送吕監簿歸淮南侍下花邊把酒趂晴暉春去花空興盡歸白髮親庭寬北望青簾客舫喜南飛京埃衮衮休回首淮月娟娟好振衣年少身名當自立不須裘馬事輕肥贈蘇宣甫謫宦多因衆口讒猶君戰衄困羈銜鷹拏羣雀翻遭網舟駕長風忽斷帆曽擁貔貅交白刃肯同兒女泣青衫有才恐失朝廷意不日房陵被詔函某嘗約才甫游雙溪以連雨多事因循未果辱詩督行謹依韻和共君曽約訪煙霞欲趂芳時物物嘉宿諾古人嘗有誡春游今我果成賖眼看日下無窮事腸斷風前已落花天氣清明當趣駕此詩先寄謫仙家送宋國叟赴吉州司理水光山翠一城浮碧瓦朱甍萬井稠平日居人皆富庶少年新掾更風流傳家妙術觀尊府决獄能聲擅劇州利刃有餘清興足不應詩句廢江樓依韻和正老自嘆之什妙年為學恥迂踈直欲聲光擅八區已是宦情嗟淡泊可堪世態較錙銖不調台鼎行吾道便翼天兵戮汝孥出入功名當若此自餘瑣細盡非夫我無尺地可耕鋤君有高田占具區正老吳門冇上腴數頃若論生涯猶厚薄獨於宦意等分銖壯年未建鴻毛利寸祿聊甘稚齒孥不學庸庸自持者髙冠空食上農夫贈辟疆人譏徐子迹飄零我愛文章輔六經大筆疑爭造化力幽吟難遁鬼神形良金縱毁剛無耗寶劒雖埋氣自靈進則臯䕫退荀孟莫容得喪擾中扄依韻奉和王平甫學士寄元內翰詩蓬萊仙闕地深沉視草讎書此盍簮禁漏傳聲來閣外宮雲曵影過廊隂能詩摩詰淹儒館未相微之在翰林馬躍秋風出閶闔片時相失遂成吟送紫微沈舍人守越州翁子懷章未足多㑹稽歸日已蹉跎舍人緑髮垂金印院吏朱衫導玉珂去國忠心傾斗極過鄉喜氣壓江波君王許便雙親養奈渴黃麻紫誥何依韻和酬閬州劉侍禁季孫見寄别來雙鬢一衰翁近喜劉郎信息通劒氣未間頻犯斗賦聲無用尚摩空君頃以能賦稱太學而竟屈于不得科試傳聞蜀道踰天上見說城南冠閬中杜子美有閬中勝事可腸斷閬中城南天下稀之句山水縱游那覺久清霜兩度變丹楓人日立春輦下作樓上滿傾人日酒更逢春氣到京華盤擎白玉來生菜勝插黃金出􅍢花客興紛紜那可數年光流轉亦無涯天邊梅桞應相笑兩度東風不在家依韻和鎮叔送元霄之什一夜雲衢火樹空照人唯有月華同却思廣陌追遊處都似南柯夢寐中未分園林辜樂事况栽桃杏有春工可憐此景何時再直待明年嵗起東席上呈正老去年贈别折寒梅盡道行人不再來今日樽前成邂逅大家花下且徘徊經春雨腳無時斷浮世眉頭幾度開莫待明朝離闊後空將餘恨寄吟杯送鎮叔三月將交雨細時餘花撲撲栁飛飛已於樹底聞鶯恨更向花前送客歸暗緑幾行迎去馬亂紅無數落征衣傷春惜别鍾吾輩此際寧容瘦骨肥次韻答正老幽歡閒憶去年時飲量人人灌漏巵我更典衣邀淺飲君猶刻燭賦新詩由來世事都無定再結朋遊未可期一紙清風惠佳句殷勤勝寄隴頭枝依韻和正老暮秋郊行感事秋郊物物作秋容目送橫天一鶚雄更逺更疑山隔霧或飄或聚葉隨風對時唯恐朱顏改遣興除非白酒充感事子真成麗倡恨無佳句敵才翁再和有客秋郊曠望中更慿佳句發才雄牛羊飽食眠平野鵰鶚乘時擊迅風倦目幾隨殘照斷渴腸惟藉濁醪充登臨不用頻興感憂喜能忘是塞翁再和我行平野覽秋空物象吟懷覺兩雄逺水有時明返照踈林無限戰西風京坻相望農收足廬井多歡嵗計充亦向此時追樂事歸來倒載效山翁依韻和答公諤郎中冠氏道中偶成􅐯􅐯黃埃接大河驅車底處覓陽和參差花信春將半惱亂詩情日轉多樂事恍如初覺夢年光撇若迅流波馬蹄莫放歸時緩知有佳人聽玉珂依韻走筆和答徐無畏見招憶初識面越庠時餘教嘗蒙覺後知早念兒童能刻賦晚逢夫子許言詩從容江介心方壯蹭蹬京華鬢已衰道舊不須親握手滿篇往事略無違馬上口占呈注記李才元學士一時聞望絶朝裾幾嵗文章動直廬鳯尾新批天子詔螭頭看載史臣書故關即路嚴霜後曉殿初班瑞雪初蜀道歸時須六印不應駟馬擅相如送曽元恕太祝赴漢陽監征漢江山色秀蒼煙山擁江光入馬鞭行思欲飄飛鳥外别顏空慘落花前勉旃關賦那終嵗好在家聲幸壯年鸚鵡故洲應寂寞得無新句發晴川古詩有晴川厯歷漢陽樹之句次韻通判張靜之郎中席上對客一飲真須盡百杯異鄉懷抱酒邊開田園幾日能歸去軒冕浮雲亦儻來交態與誰論淡水宦情空自學寒灰何如席上張公子白雪辭兼郢客來杜子美贈張翰林句有天上張公子之寄秦倅呂四丈職方淵丈人宦意靜如山五十朱衣鬢未斑富庶謳歌歸别駕太平談笑服諸蠻熊羆一兆髙門後鴻雁連飛絶塞間愛弟翰林時帥邊閫莫學馮唐終蹭蹬功名猶好出秦關寄保安軍楊公濟判官髙吟絶塞十年前醉筆才停萬紙傳麟閣主人降健句雞林官長購精篇舊遊散落今誰在新感縱橫日自憐肝膽不同軀幹小幾時獻畫請開邊依韻和張君儀職方城上觀雪重城雉堞粉相圍亂片情多故㸃衣浩蕩關河無表裏微茫草樹有光輝冷侵容鬢雙蓬短急伴年華一箭飛却憶水曹詩句好羣鴉接翅傍昏歸㑹故人集崔侍郎園池二卿園沼壓關西上相篇章絶景宜舊日宮墻流水過至今苑地畫圖知孤花春去猶臨岸野蔓晴來欲占籬荀令鳯凰池更好不須遊斾此遲遲侍次陛對已再見春感懷成篇旅食一朝還一朝紫宸前對轉迢迢青雲事業應全誤緑髮光隂已半銷始愛古人輕祿仕擬將生理付漁樵春風又入長安陌依舊間愁絆桞條和過尉氏林香陂韻長年京洛事塵埃懷抱那能一日開魚鳥宿心聊此得江湖清興劃然回天圍野色鱗鱗合風獵林香滚滚來漸有人喧迎馬足郊原佳處好徘徊迭馬特失薦還蘇回舟中作一客空歸顏色低衆人氣亦喪虹霓淚添酒盞霜天闊目斷帆檣海日西交臂散零如木葉别腸縈轉似山蹊遙知名在鄉書者雨洗秋街躍馬蹄是日鄉薦諸君謝辭送俞元宰失薦東歸蛟龍水淺一戰失鴻雁天寒相背飛踈栁不堪霜後折故人轉覺酒邊稀朱顏有改宜看鏡黃卷無窮且杜扉事業計從勤憤得未妨鄰里笑空歸祠部集卷七
