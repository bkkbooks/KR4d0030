body:
  text: 祠部集卷二十九宋强至撰書代魏公賀兩府書斗揭寅柄帝乘震塗尊五始以書元風萬民而布治伏以某官股肱王體陶冶化工輔纍洽之休期躋太平之極致維春期之所嚮與歲厯以咸新某方守北門正遙東閣兹阻壽杯之奉第伸慶牘之䖍賀密院書春秋一元本歲功之所起天地交泰驗卦氣之斯臨伏以某官峻德謨明聖辰感㑹制樞廷之勝算懋彛鼎之膚功三朔始和百祥備舍某適司宫鑰方逺門墉阻薦壽祺第深誠禱代趙待制賀張唐公侍讀書伏審被綈檢之新渥陟金華之近班增峻官儀允諧物論恭以某官職致夷逺材猷博通蔑視貴高之塗靜持恬尚之守向淹回於儒館旋感㑹於帝震詞掖代言鼓動聖謨之奧經帷進讀發揮賢藴之光矧稽古之丁辰方用文而輔治遹圖峻德滋耀禁聨某辱厚知側聞成命永言欣躍倍集悃悰賀樞密王侍郎書伏審顯奉制函榮躋宥省邸音傳報輿論愈諧恭以某官學造本元體凝簡厚有鎮浮之德以聳乎物望有經逺之業以簡乎上心嚮服憲綱言必關于國體比書內命辭每鬯于辰猷㑹帷幄之虛員慎樞機之制勝方權綱總攬之際睿選已明正才傑同升之期恩章不次亟從內相遹近置司太平可需幸君子之得位中外相慶以聖王之用人矧辱已知倍深距躍答澶州學士書自去思庥嘗論感槩曽箋牒之不繼唯簿書之是供跡日以疏心固獨在賴髙明之所照貸簡惰之可誅親占教文過形體意不遺下邑之賤加惠上尊之餘惕然汗顔俯以拜貺方春在序于氣尚寒仰維福綏益茂時祉恭以某官班條盛府夷俟于終更改命外臺遹圖於碩畫不次之用可立以須庶令孤生永有棲倚代成都趙龍圖謝雜學士及內制以上書擢始寒生寖階法從誤中宸之簡拔總北道之書將河既安流歲復小稔第云煩使曽罔寸勞而一歲之間再遷者禁職數月之內就領于帥藩竊惟近侍之中最在羣公之末躐等以進度才安任顧叙讓之弗從信為容之有自此蓋伏遇某官力開公論靡恤人言遂使無庸之姿遽當不次之任未攄感臆先墜慶音益知函貸之深弗即簡疏之棄永言愧戢曷盡名云謝待制以下及諸路帥府書領使北陲備官數月曽乏事功之建第循餽挽之常䝉以菲才擢於不次付蜀門之劇鎮加禁閣之崇聨遂列榮階訖無庸服勉收愧汗冒對恩章方恐懼于煩言益省循于愚分踰涯已甚取誚宜然敢謂愛私首詒慶問溢美辭而滿幅永嘉好以兼懷戢感良深文陳豈悉與交代韓端明書比者就蒙渙渥移守坤維鎮劇地雄俗繁物夥有江山之控帶兼民卒之撫綏唯是短能曷知逺略躐班行而亟用瀝悃悰以自陳讓不獲從愧無以釋賴繼髙賢之後具存善政之宜舊必告新願備言于矩矱小而任大庶盡力以自循已飭單車即登長道揖風期而不逺獲天幸以何多恭以治功休成謡誦騰洽介圭入覲行對巖廊之睟容英衮暢謀佇還家世之舊物倍調燕餗少副欣祈謝永興軍知府王龍圖書幕府初開謂必收于豪俊辟書纍上終無異于孱庸自應所知之求莫如兹舉之確旋叨成命增悚懦𠂻竊以陜服以西雍都為劇帥壓五路兵雄萬屯從來長人得自選士雖指麾一定但専委于文書而綏御兩閒亦與聞于論議參是機事要惟傑才若某甚愚無他可采驅馳州縣唯簿書期㑹之是知生長江湖何車甲訓齊之曽識乃冒從軍之選殊乖責實之宜非保任之使然曷僥幸而及此斯蓋伏遇知府安撫龍圖誼無求備請在必行存心奬提極力論置始奏已光于疏賤矧知再三短能絶跂于髙明寧禆萬一第堅素守益考舊聞侍經逺之談使少知于方略免陋儒之誚期自奮于功名庶幾立身以報知已過此以往未知所栽與永興機宜張寺丞書向從冗役殊負宿心遽應辟書得赴知已始被命而唯喜旋省才而輒憂第遄近聞安及逺略儻陪堂上之密議何所建明猶賴幕中之並遊久已詳達再慮及此中懷釋然矧惟髙明嘗辱雅素促裝待發將往庇于末光稅駕就安即前咨于餘論甫交春夏未適暄寒倍順節宣少副依嚮上前通判張郎中書某效官小材為邑大府辱存鄉曲之愛視若子姓之親吏事缺疏一切不問公庥掩覆二年于兹適蒙據依旋值代去自嚴馭之還闕苦孤禽之失枝違離尚新感戀如昨恭惟某官才猷膚敏方格淳修聖世淹回衆起潛郎之歎士林企竦佇紓賢業之華代元給事賀判都水監楊待制諫議書伏審進承恩綍升踐嚴途邸報初傳朝倫胥慶恭以某官傑才經世精識際天名重本朝用兼數器出提漕節總山海之輸將登二財闈瞻京師之調度旋紓碩畫愈動上知奉十行之詔除躋七諫之班列知謀通裕周水利于庶邦法從凝嚴直雲章于內閣行光台序入鬯辰猷方庇末暉側聞新命永言竦行曷盡文陳代元給事回澶相瀛定等州禁煙問候書右某啓葭律布和桐華發秀過形體意特損書音恭惟某官經世偉才濟時巨業出臨治屏聊布於寬條入覲寧朝行膺于大任遹丁火禁益介春祺代答澶州李待制書伏念去德尚新瞻風方劇敢圖高誼特徇隆謙飭管記以占音走兵辨而垂貺溫辭溢幅厚荷兼懷恭惟某官名重本朝才周數器蚤列諫垣之祕仍躋延閣之華出殿兵藩繄治功之連最入只嚴召行幾政之參聞上為廟朝倍綏燕餗答諸郡知州書葭律布和桐華發秀敢圖厚意特枉珍題順履令辰具綏景福行甄治狀入對恩章感頌所深文陳奚悉回賀懷州王大卿書伏審顯承恩數增峻官儀伏惟慶尉恭以某官當世傑才為時俊老效治功于已試懋風力以逾强聽訟棠隂載光循吏之目升華棘位遹正名卿之闕詒榮牘永言感忭曷究敷論回蘇史館書試篇甫上書殿旋登逖聽鶱翔倍增欽忭竊以六科延持起之士能直言者在選最高三館育非常之才為太史者得名尤美某官識際今古學該聖賢厯程有用之資俱踐絶優之等英聲已滿于天下逸軌絶攀于士林豈唯觀冊府之書以文章為已任必也濟治朝之美發怵他人之我先曽叙慶之未能遽占書而首及永言感愧曷究文陳回孫侍講書伏審拜命紫宸解經朱邸伏惟慶慰聖人方嚮于儒學敦教天支賢者親承于詔書進官王府某官識探聖閫名重士林遽被僉諧首當華選應劉接武方勸講于經文蘇晉飛聲佇代言于制命猥遺榮牘良戢謙懷回郝太尉書自總計臺居有文移之冗莫馳書舍缺咨福履之安特枉教音益銘謙德恭惟某官忠勞許國材武絶人久試效于塞垣纍收名于勳冊旋應褒律爰建將衙統禁旅于殿巖方深帝眷本天兵于樞幄行穆朝言伏望上為邦家精調寢餗問候鄆州李太尉書籠財北道第日總于計文引領東南遂坐疏于音尺伏惟靜班寬詔翕萃龎褫恭以某官偉略濟時純忠許國挺生勳戚之胄傑出沉雄之才旋建將衙往臨帥閫溪堂式燕時宣樽爼之謀海宇所瞻行付樞機之任伏望上為邦任精調寢興回永興王龍圖書向從煩使久去珍羣方倚重于藩垣遽占書于館記美辭賁飾之相假厚誼謙懷之兩存藏以為榮歆然感戢伏惟班條有餘介福其蕃恭以某官業履純明氣質方徑蚤列諫垣之祕旋升延閣之華撫一道之兵民暫勤西略贊萬幾于神聖行鬯偉謨伏望順叙自持副時所企回史館蘇學士書伏審給札禁扄飛綏祕館騫騰此始欽抃逾深竊以在先皇之朝舉極諫而得中殊選者無幾直太史之筆用試言而遂登此職者尤稀某官抱偉特之傑才蓄閎深之精學髙視當世前無古人奉對以條安危治亂之原策名第一析理以論進退邪正之體占等最優既已布致身之功名行將觀報主之美政未容叙慶首辱詒書感愧并懷名言非諭與總管通判而下書叨承辟命誤占恩章㑹大師之臨藩兼資綏御引短才而入幕奚補聰明引江海之陋儒暗風雲之壯略第從知已秪負慙顔賴盛府之多賢論兵有素容孤生之竊幸備位其間已促輕裝有涯伏謁永言跂抃曷盡名云與諸官書濫膺辟書獲從幕府所愧枵然之質將追賢者之遊竊天幸以良多接風期而甚邇永言欣企無諭悃誠别少卿書向者為邑河濵寄身節下伏䝉某寬部官之禮數厚國士之恩憐唯時銘心何日忘德逮賤子從知于幕府㑹明公被召于京師念失據依思論感戀門有迓吏勢不得以久留路逄還騶業已圖于一見旋聞大水驟滀近畿頗感道途之言遂從舟楫之便參差素願怏悵愚𠂻惟萬事之博通固一時之傑出當朝廷之大用非公而誰為邦國以自持兹某所禱代趙待制謝延州程宣徽書伏䝉某官特賜答教并以覽先祖廬江集尊篇垂示者大雅與觀曷深作者之意遺編增耀足慰孝孫之心恭惟某官社稷宗工山河間氣宣風外閫綿地數州乃乘坐鎮之餘能適行吟之興暢彌髙之嘉句發既往之幽光以某先祖微命粗占當時弗偶卷生前之事業一肆于詩借歿後之聲名特抒厥詠兼傳副本逺貺孤生猶韓吏部之序楊公得匪貴人之存志元相國之遇嗣業愛其大父之為文庶掦野史之前芳永與楹書而共祕欽銘欣幸奚盡名言賀唐密學授左誎議權御史中丞書竊審就膺朝紱進領臺網伏惟慶慰恭以某官才貫幾深器函剛實性兼忠義之守學到聖賢之歸危言朝忤于九天清議名喧于四海要官厚祿視如一羽之輕大節髙名坐若泰山之重屯夷殊致明哲惟均罷籠朔野之財未暖河間之席亟召登于憲府仍臨長于諫垣臺中之評行開英主之聽天下之望復聳諍臣之風矧玷雅游倍欣成命代馮當世定州王尚書問候書阻庇末光逖瞻盛德以官能以疏短當尹治之浩穰舉為寸慮之勞坐致尺書之廢伏惟樂班寬詔靜鎮要邦隂有神明來相禧福恭以某官識凝簡厚才貫幾深偉業發揮于朝端髙文鼓動于天下屯夷殊致明哲惟均居峻官儀踐中臺之八座出宣帥略領全趙之十城行奉召音進光冊拜伏望上為宗社精調燕興代賈魏公賀中書書一陽出地萬寶乘時漸萌發育之仁宜展履長之慶伏以某官位尊台路勳濟王塗對日月之休明燮隂陽而順正適開令序誔擁蕃禧方守别州正疏翹館莫前為壽第劇馳誠代馮內韓答洋州蔡郎中書伏審治功第最褒典陟明遽正積星之聨益光守土之寄慶音未講誨牘兹先篤雅眷以逾勤戢丹悰而增劇善邦敷化方撫于遐氓寒籥貫辰倍綏于妙履與北京諸官書某拙直少機濶疏為治越再期而遂去訖大庇之焉依旋從辟于關中第馳誠于門下秋炎尚熾時祉載蕃仰惟賢業之光已登最狀側聽上恩之懋亟服華章瞻頌感銘并深下懇答諸縣等賀到任書某素昧戎機繆參帥畫才備員于幕府稽論謝于箋函首墜書辭過形禮意謙勤良甚愧荷并深與王廷評太祝書向者尚書開府小子字民㑹榮侍于親闈幸屢登于賔閣厯觀子舍之賢哲罕出君家之弟昆從辟西來馳誠北望秋炎尚熾時祉載蕃矧素藴之甚充計華塗之可跂倍綏寢味少副瞻祈代王樂道龍圖賀延州陸待制書審即便時已開尊府伏惟慶慰恭以某官性惟忠亮學有本元嚮桂管之須才分竹符而領帥兼祕殿之論撰重要藩之撫綏溪酋服馴嶺表寧戢旋進升于延閣仍出護于塞垣賴樽爼之前籌付之逺略寬朝廷之西顧倚若長城教令肇宣兵民胥悅莫遑就慶第劇馳誠代河北都運趙待制賀昭文僕射相公書春秋之一為元肇謹嵗端之起天地之交曰泰遹觀萬物之通恭惟昭文僕射相公六德謨明千齡感㑹位劇宰塗之冠禮隆尹石之勳勳力盛而弗居懇蘄身退詔㫖嚴而竟起愈使道光上日斯臨茂祥攸介吾心馳翹館跡繫外臺邈無拜伏之階第切壽祺之禱集賢相公書恭惟集賢相公秉國大鈞代天元縡彌縫衮職之闕調序鼎司之和堯舜吾君拱揖几筵之上伊周諸已儀刑萬笏之前開祚膺期對時納祉某適期漕節阻薦壽觴第瞻黃閣之嚴曷罄丹函之祝參政歐陽侍郎書恭惟參政侍郎學際聖賢量包公輔文章飾至治之體忠諒簡方上之心百度咸新少見二公之效萬幾參斷尚掩真相之才維日三元具時百福某籠財北道望履髙門徒䖍慶牘之馳尚阻壽杯之獻參政趙侍郎書恭惟參政侍郎朱絃純音清廟偉器蚤二中階之論道適毗上德之持盈坐砥斯民遊大庭赫胥之世力躋至治復開元貞觀之風三朔始和百祥備舍某久棲台庇方總利權就慶列以無從列頌言而第劇兩制兩省及皇親節度防圓刺史書比者得守故鄉冀安病質請從就道屢私悃之上陳訖被溫書許請光之入對適臨近甸首枉珍函親德範以非遙懷感悰而兼劇回省府館閣書比者祗從召節遐飭朝鑾將入覲于朝廷適前臨于近服敢圖臺閣之範逺枉箋函之音展晤有涯欣銘兹劇回陳樞密書伏審入對清朝還登陪幄載光睿選允穆朝言伏惟某官莊重自持真清不倚蚤與神機之議屢從帥節之行居然偉謀伏有勝算往綏一道雖所繫之非輕坐制五兵在簽諧而尤重自聞新命適抱舊疴旋易地以云東愧布書之獨後首紆誨翰增戢感悰回滑州鈐轄王宫苑書故鄉乞守方幸便安重客假塗比諧展覿旋成暌隔殊極傾馳承已總于兵鈐遽首詒于函訊適臨窮臘益保粹襟感祝并懷文陳非諭回北京王宣徽書故鄉得守方自適于初心全魏撫封忽相傳于輿議豈伊綏御之要可屬衰疲之餘矧未奉于誤恩猶少安于鄙抱慶音遽至已曲叙于交承禮意雖勤敢豫聞于惠貺第深愧感奚盡名言回青州歐陽觀文書伏審就易東藩肇開尊府曽慶音之未講遽榮聞之先臨祗服謙懷增銘感臆恭以某官際天藴識名世生才學造聖賢之歸性兼忠義之守更謀謨于二府懇避政幾之煩卷康濟于一時洊拜條詔之餘矧元猷之尚壯宜舊德之是圖僅聞五月之政成行被三篇之冊拜回蘇省副書向遇北轅克襄大事函封叙慰醪醴致勤兹初變于常儀辱繼形于榮誨兼審載馳歸鞅復蒞財闈順履春詔益蕃時祉行膺大用倍冀精頤回北京王宣徽書比者叨被恩緡與司留鑰曽是久勞之後懼非劇任之宜然善政有條敢蘄于必告而知才相繼靡俟于更為伏惟某官道貫將明器函康濟早懋元猷之壯纍煩逺略之宣召節促歸矧上心之傾佇政鈞圖舊行王體之謨明即遂瞻承倍深欣頌回集賢相公書自逺台符遹新年籥布書不敷慮浼于髙明占教遽臨過形于眷與兼審坐論大政舉集蕃禧伏惟某官一德壯猷三朝元老才兼文武之術身繫安危之機伊尹倚衡矧早謨于王體汾陽書考庶永慰于民瞻願如調護之經以養崇髙之福代元厚之回賀趙團練書竊審給札程文拜恩增秩天倫繼美朝論推榮伏惟某官望厚宗藩學探聖閫弗流富貴之習自服詩書之勤遽以名聞旋從試可即環伊之舊列加團練之要班經藴既攄官榮此始比緣考藝兹辱貽箋感慰并深敷云匪悉代魏公回陳龍圖問候書比者總帥路以分符來臨本鎮㑹使車之隨詔歸赴近班未索晤言遂成離别方企賢規之粹遽貽書舍之音蚤羽翼于東朝行股肱于元后炎威云兆時祉載蕃益護寢興少符瞻頌問候昭文相公書帥路獲兼實託大鈞之庇台躔在望阻瞻上衮之光溽暑貫辰政幾宅慮神明所祐福祚其蕃伏惟某官道德宗工儀型元老盟府早傳于偉蹟宰庭多守于前規比深當寧之知還踐阿衡之舊首調萬化方繄商相之和羹躬迓百祥更願留侯之彊飯上符帝倚下慰民瞻回韓刑部書比者外計擇使方來董于輸將小戎欵誠遽往煩于慰納甫休行役良適燕興惟望重于本朝復才兼于數器即膺顯用以紹先芬回經略司勾當劉郎中書比喜還轅方接幕中之教未溫坐席遽從塞上之行清範載遙珍函逺及益欽勤意良戢鄙懷回慶州王給事書自當帥領遽厯于炎涼遐企賢規弗忘于朝夕逺紆勤問備戢髙情惟近侍之垂光行嚴宸之促召益綏燕寢茂對龍光京西運司范司封問候書比者外臺甚邇喜時奉于賢規中詔遹來遽就更于使節自聞新命屬抱舊疴悵餞别之不遑積攀瞻而尤劇倍綏寢味前對褒升回慶成知軍書専介之來長箋為貺以軍榜之初廢謂使令之下遷利疚備論感銘第劇適臨炎酷倍衛燕興代回河中府蔡學士書紬書懷槧竊幸後先之相望典禮班條旋成內外之禮處兹劇賢規之企遽承誨牘之詒審履歊炎載蕃禧祉伏惟某官學優聖閫名重士林才識兼長方提太史之筆事功俱最聊剖諸侯之符行被詔音進光法從益綏燕起少慰瞻馳代魏公回北京王宣徽書伏審介圭以覲方入見于清光留鑰所司仍重煩于舊德承還大府以布寬條伏惟某官才貫幾深體凝簡重粵從神聖之臨御未識公台之表儀暫被召歸數更進對嗟相見之已晚美于壯猷知非常之賢行聞于大用甫暖保釐之席即參造化之機首枉音題良深感臆回河北都運陳龍圖書竊審進加禁職出總漕符視事云初縢書首及矧惟厚望獨映近班直內閣之圖書董外臺之經穀侃然賢者之正論早嘗羽翼于東朝簡在聖人之淵𠂻行置股肱之上笏豈伊轉給可盡猷為益護寢興少符欣頌回鄭州龍圖李侍郎書審即便時已開盛府首紆榮問備戢兼惟伏惟某官經世壯猷端朝㒞老備紆業已益重主知直延閣之圖書遹光禁職宣輔蕃之條教肇懋風聲倍冀自持行膺大用答趙州通判韓虞部書賢範阻遙倐逾于半稔軍書鞅掌遂缺于單函何偉度之崇謙枉盛辭而垂賁兼承妙履誕擁蕃禧伏惟通判虞部器識純明材猷膚敏關決善藩之治已懋風聲延登要路之游允光世德永言欣頌奚盡名言回新梓路運使韓少卿書審承恩詔出領計籌邦選既行朝言惟允矧兼才于數器比贊畫于中畿績以凝時名逾列郡行引東川之漕仰瞻大農之材佇經費之既充即褒章之增懋首紆榮問良戢厚情回邠州閻諌議書叨榮纍紀愧無逺業以濟時圖報一端竊效前人之引類矧惟耆德嘗陟從聨淹徊守麾沉抑賢器加舊職之未復輒露章而有聞何謙矩之自持枉誨函而多謝佇膺大任倍冀珍頤感頌并深名言非悉回韓刑部書㑹遇關中曽晤言之未足淹回塞上已晦朔之載周夫何雅意之存屢有珍函之及寇巢納欵行復命于本朝使節增光亟躋榮于要路秋炎尚熾時祉其蕃益護燕興少符傾頌回判侍郭待制判銓孫待制書總帥路之劇權倐更纍月邈禁塗之碩德增跂髙風何雅意之逈存枉珍函而逺及矧惟賢業親㑹聖人陟降近班聊承于顧問發揮深藴行與于謀謨素籥兆涼粹襟迪吉回本路監司書多病之餘久叨塵于任重寬恩所加方偃息于故鄉遽奉更書俾司留鑰懇辭雖確成命弗回矧惟守紱之紆適在史臺之庇敢圖謙矩首枉慶函愧荷良深名言莫悉回滑州蔡待制書自館故鄉之風寖濶晤言每開順驛之筒必紆訊問何雅懷之逾厚知髙誼逈存審履春寒載蕃時祉矧惟帥節久駐邊藩繄逺略之勤宣已豐功之茂建召音行被大任攸歸益護寢興少符傾頌到任謝集賢及樞相樞使書向辭宰柄旋董戎㫋因纍牘之自陳始懷章而得請仕宦云歸于桑梓嵗時獲展于松楸殊適初心尤為私幸久勞之體如痛定而後思多病之軀合力窮而則止尚期滿嵗少息餘生遽移全魏之居留遂奪清漳之卧理寬條所布僅能勉導于上恩逺纍未明何以率先于帥路胡然冒處抑有由來此蓋某官密啓睿心力陳宰論以二邊之要固嘗備于使令而四履之封因許兼于綏御庶殫薄效更賴偉謨回都運使劉待制書伏審顯對恩章榮躋法從計文兼總輿論僉諧某官方格淳修才猷膚敏比陟諫垣之峻旋提漕節之雄內閣登賢久穆端朝之選外臺倚重暫籠野野之財未列慶音首紆珍牘其為感愧曷盡名言代回新知府待制書竊審顯承明詔就領便藩荷盛意之隆謙纍勤辭而垂貺某官氣函渾厚道具粹醇學該經緯之大原論極安危之至要經緯勤講早垂近侍之光令閣班條尚屈真儒之藴某比塵纍牘得守故鄉雖居匪久安敢忘于必葺而事有未盡當俟于略張與王宣徽書叨被制函俾司留鑰莫辭成命爰促輕裝征馭載馳祗赴别都之極近郊甫次首䝉珍牘之詒荷禮意之尤厚懷感悰而倍切回恩州知州劉留後書頃從諸生已服盛德聞道先後固爵齒之逈殊效官東西曽聲顔之未接敢謂過存謙矩首枉誨音伏讀載周中藏尤劇恭惟知府留後氣函剛實才貫幾深復辟危言早建安危之策總戎逺略晚章文武之資矧久出于亷車行進深于樞幄春和云半時祉載蕃伏望上為廟朝倍綏燕餗與益路提轉書比者竊冒恩書亟遷禁職罷籠財于北道俾班詔于西州惟是罔功併兹假寵引守章而自愧幸使範之焉依己治輕裝將叱疾驅之馭有諧清晤庶降既見之心欣企兼常名云非諭代趙成都到任謝兩府書分蜀門之印綬已玷恩章直延閣之圖書仍叨禁職據非其地寵溢于涯竊惟天下之奧區無若坤維之劇部兵民兼制政事倍繁逺略弗明重任安寄如某者跡起寒士世無顯人敢為身謀以欺日月之照嘗有言責輒犯雷霆之威繼被遇于兩朝亟升華于近署諸公同列最曰晚躋一歲再遷遂當顯用罷輸將于北道俾綏撫于西州寸勞未收環視增愧都乏致身之術率繄造物之仁此蓋伏遇某官助平王塗借重國論致淺疏之近器領險厄之名藩敢不動宣詔條力究利病雅俗俾歸于坐鎮少布上恩用人雖取于後來庶逃物論覬續中和之詠兼酬鎔埴之仁賈侍中書爰初冗宦固嘗託于洪鈞訖至近聨曽未瞻于上衮比司通漕久舍别都獲天幸以何多拜台儀而甚數廓至誠而相接忘絶禮之自居移守蜀門去離材館飭嚴騶而臨餞特借道路之光抒大句以寵行永為莢衍之祕雜然感戀萃厥悃悰恭惟某官業履崇髙智謀廣大更文武之二柄洞安危之大機書功旗常留範廊廟適均勞佚暫寄重于師垣久渴儀刑行召還于公位伏望上為宗社精調燕興代賈魏公移許州謝政府書誕頒明制祗被茂恩付潩水之印章還魏都之管鑰飭躬趨而將命俾手舞以知榮某親㑹聖辰早塵台序旋兼文武之二柄曷究安危之大機總一道之兵民第勤逺略上三年之課最曽罔寸勞自視晚齡久當重鎮洊披懇牘蘄守便藩獲遂請麾之誠良由造物之賜此蓋伏遇某官鴻猷華國巨業代天因密啓于宸𠂻致俯從于人欲埏鎔所及銘鏤無忘回王尚書書祗承俞詔獲改便藩乃屈髙明繼掌離宫之鑰具存撝抑首騰記室之箋政有俟于更張誼無煩于必告即馳輕傳阻伺前旌企佩并深敷論罔既回謝兩府親王使相逺迎書詔移輔郡叨遂于私誠道出神都獲修于嚴覲特屈崇髙之體首紆勞來之音戢感良勤指言非悉上知德州張仲巽屯田書某少遊諸公蚤服盛德自嗟仕路之晚輩未識儒林之文人比沿臺牒之行與考郡亷之藝去取有所未至曷禆賢太守勸駕之勤進退於此不遑遽䝉下執事虛襟之禮既飲食以將歡恩之厚又車馬以為惠顧之光已而旋歸復爾臨餞賜善誨俾知守職之繩墨授雄文以示立言之範模違離尚新感戀如昨霜稜逾厲氣宇增秋恭以知郡屯田行髙古人名重當世治狀第一矧風績之其凝召音以三佇恩章之兹及伏望為國自壽副時所瞻代上王尚書書某仙籍後陳名附青雲之久仕塗纍紀顧垂素髮之多引愚分以甚明冒人知而安可向當逺宦俯就冗司委吏仲尼之所為詎輕倉庾之氏歸志孟軻之所有祗恐田園之蕪未能決去以拂衣尚爾投閒而志食所繄官局將庇台光比列奉于公函敢少論于私悃伏䝉損崇髙之位勢曲趣寒蹤厚偷薄之時風親占溫教悚然伏讀謹以行藏恭惟某官粵學入聖賢之微貴名揭日月之上華要之選翺翔欲周八座劇班聊掌别都之鑰三篇休命行調真宰相鈞俯惟衰遲永有棲倚上提刑王郎中書伏審清𠂻簡在明旨召還謂使斾之節南躬當前賀致公函之缺上顔有餘慙仰侍優容少寬誅斥恭惟權府提刑郎中器資渾厚術業宏長粵學入聖賢之微清風承公相之後官聲所至物論皆歸遹當睿哲之臨朝不限才于纍日按章朔野民適砥于無寬參計甘泉財行聞于有羡俯惟冗宦方備屬官雖欣君子之得時第恨孤生之失庇回鄆州郭宣徽書近審懇避中樞往綏東土云初開府即辱詔書逮此發函己聞易鎮遂稽布謝尤劇愧懷伏惟某官勳濟王家序先台路傳汾陽之將略提汾上之帥符坐席未溫遽改邉藩之寄冦巢爰珍復歸陪幄之嚴銘頌并深諭言奚悉回諸道轉運及諸官賀判相州書向辭宰柄旋領守符晝錦云歸幾遂鄉邦之樂夕烽有警劇分疆埸之憂比獲慶音己當帥職佩詞情之兼厚輸悃愊以稍稽感愧并深名言奚悉回運使范司封書審奉恩緡就更漕節未諧修慶猥辱騰書伏惟某官世濟大忠氣函間傑適接刑章之重甫臨陜服之交調兵食于四方遽圖碩畫改使權于中道靡聼固辭聊藉輸將之才即登要劇之任賀延州郭宣徽書伏審初見吏民已班條教長城之倚衆議所均伏惟某官偉略沉雄傑才英邁向輟神機之二出當帥路之先殆疆事之告成被詔音而入覲確然清郡奚堂之坐未安復此臨邊海宇之情尚鬱行平小醜還奏丕功垂光旗常制勝帷幄回秦州馬給事書西帥所總方圖綏御之宜重客初來未盡將迎之禮暌違尚邇企仰殊深何過篤于謙懷仍曲存于雅意猶屬道途之勞頓已形箋牘之勤惓展讀載周感慙兼劇佇聞開府續獲馳書順履春寒益蕃時祉回并州王端明問候書自違風則遹更嵗端方疆事之是經曽郵音之未至猥先流間秪益愧懷惟文武之兼資本公台之餘慶勤宣逺略屢易左符矧薄伐之故區實徑兵之要處境控三敵地綿百城暫煩細侯往護諸將已聽威聲之著行甄治迹之優倍綏燕興前服光寵回賀提刑趙司封書審膺中詔就領外臺伏惟慶慰某官術業淳深器資端徑商于曲守益懋于風聲陜右按章未充于時望行圖謇諤之舊亟還論思之班首枉書音尤增感臆回閻待制賀轉給事書祗奉綈函驟登瑣闥實罔功而被寵固匪服以抱慙曽是短才訖無善狀同時並進最曰晚躋一嵗再遷不由顯效此蓋伏遇某官褒華所借言味有加致此泛恩及於孱品尚未敷于感臆乃前墜于慶音愧戢并深名言非悉代張景言回諸處賀書自叨煩使汔此彌年在餽運之非常于事功而何有被誤恩于乾造付劇鎮于坤維并假寵光仍遷禁職尋啓還而弗聽曽論謝之未遑首墜慶音傋形體臆勤辭溢幅厚飾過情感愧并深名言非悉與交代趙龍圖書就䝉中詔移領西州兩川之衢百賈所㑹中外所制兵民實繁顧惟短才安有逺略賴同升之先識嘗並二于大農今兹守符復繼賢躅固論契之莫厚容乞靈之有繇舊必告新覬詳聞于善術守而弗失當謹奉于前規再被十行之書將驅九折之馭風期甚邇天幸何多恭以逺撫氓黎休成治績髙名大節早取重于端朝正論元猷行入毗于新政倍綏燕起少副欣祈回同州趙大監書伏審進膺中詔出領左符條教初班吏民胥悅伏惟慶慰恭以知郡大監端朝雋老經世緯才風績蔚昭乎吏師時名早動于人主官儀兹峻兼治于尚方人瘼所求遹臨于東郡靡胥報政行聽召還曽是單蹤方繄巨庇未修慶問先枉誨音愧悚欣銘無諭卑悃祠部集卷二十九
